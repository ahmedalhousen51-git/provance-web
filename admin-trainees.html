<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>إدارة الطلاب - ProVance</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ef4444; --secondary: #dc2626;
            --gradient: linear-gradient(135deg, #ef4444, #dc2626);
            --bg: #0a0e27; --bg-2: #1a1535;
            --card: rgba(255,255,255,0.04); --card-hover: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.08);
            --text: #fff; --text-muted: #94a3b8;
            --error: #ef4444; --success: #10b981; --warning: #f59e0b; --info: #4facfe;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .bg-anim {
            position: fixed; inset: 0; z-index: -1;
            background:
                radial-gradient(circle at 20% 20%, rgba(239,68,68,0.08), transparent 45%),
                radial-gradient(circle at 80% 80%, rgba(220,38,38,0.06), transparent 45%),
                var(--bg);
        }
        .layout { display: flex; min-height: 100vh; }
        .sidebar {
            width: 260px; background: rgba(20,18,40,0.7);
            backdrop-filter: blur(20px); border-left: 1px solid var(--border);
            padding: 24px 16px; position: fixed; inset: 0 0 0 auto;
            z-index: 100; transition: transform .3s;
            display: flex; flex-direction: column;
        }
        .sidebar-logo {
            display: flex; align-items: center; gap: 10px;
            padding: 0 8px 20px; border-bottom: 1px solid var(--border);
            margin-bottom: 16px; justify-content: center;
        }
        .sidebar-logo img { height: 32px; max-width: 100%; }
        .admin-badge {
            background: var(--gradient); color: #fff;
            padding: 5px 12px; border-radius: 14px;
            font-size: 0.75rem; font-weight: 800;
            text-align: center; margin-bottom: 14px;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 14px; color: var(--text-muted);
            text-decoration: none; border-radius: 10px;
            font-size: 0.92rem; font-weight: 600;
            margin-bottom: 4px; transition: all .2s;
        }
        .nav-item:hover { background: var(--card); color: var(--text); }
        .nav-item.active { background: var(--gradient); color: #fff; }
        .nav-item i { width: 18px; }
        .main { flex: 1; margin-right: 260px; padding: 24px; min-width: 0; }
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 22px; gap: 14px; flex-wrap: wrap;
        }
        .menu-toggle {
            display: none; background: var(--card); border: 1px solid var(--border);
            color: var(--text); width: 42px; height: 42px;
            border-radius: 10px; cursor: pointer;
        }
        .topbar-title { font-size: 1.5rem; font-weight: 800; }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-mini {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 14px;
            display: flex; align-items: center; gap: 11px;
        }
        .stat-mini-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: #fff;
        }
        .stat-mini-icon.cyan { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .stat-mini-icon.success { background: linear-gradient(135deg, #10b981, #059669); }
        .stat-mini-icon.warning { background: linear-gradient(135deg, #f59e0b, #f97316); }
        .stat-mini-icon.purple { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .stat-mini-num { font-size: 1.4rem; font-weight: 800; line-height: 1; }
        .stat-mini-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; }

        .filters {
            display: flex; gap: 10px; margin-bottom: 18px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px;
            flex-wrap: wrap;
        }
        .filters input, .filters select {
            padding: 9px 14px; background: rgba(255,255,255,0.04);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); font-family: inherit; font-size: 0.9rem;
        }
        .filters input { flex: 1; min-width: 200px; }
        .filters input:focus, .filters select:focus { outline: none; border-color: var(--primary); }

        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 14px;
        }
        .student-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; padding: 18px;
            display: flex; flex-direction: column; gap: 12px;
            transition: all .2s;
        }
        .student-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }
        .student-header {
            display: flex; align-items: center; gap: 12px;
        }
        .student-avatar {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 800; font-size: 1.2rem;
            flex-shrink: 0; overflow: hidden;
        }
        .student-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .student-name-info { flex: 1; min-width: 0; }
        .student-name { font-weight: 800; font-size: 1rem; }
        .student-meta { color: var(--text-muted); font-size: 0.8rem; margin-top: 3px; }
        .student-info {
            display: flex; flex-direction: column; gap: 6px;
            font-size: 0.85rem;
        }
        .student-info-row {
            display: flex; align-items: center; gap: 6px;
            color: var(--text-muted);
        }
        .student-info-row i { color: var(--primary); width: 14px; }
        .student-status-row {
            display: flex; gap: 6px; flex-wrap: wrap;
        }
        .student-status {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 10px; border-radius: 14px;
            font-size: 0.74rem; font-weight: 700;
        }
        .status-active { background: rgba(16,185,129,0.15); color: var(--success); }
        .status-suspended { background: rgba(148,163,184,0.15); color: var(--text-muted); }
        .status-looking { background: rgba(79,172,254,0.15); color: var(--info); }
        .status-in_training { background: rgba(16,185,129,0.15); color: var(--success); }
        .status-completed { background: rgba(245,158,11,0.15); color: var(--warning); }

        .student-actions {
            display: flex; gap: 6px;
            margin-top: auto; padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .btn {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 8px 12px; border: none; border-radius: 9px;
            font-weight: 700; font-family: inherit; font-size: 0.82rem;
            cursor: pointer; transition: all .2s; text-decoration: none;
        }
        .btn-secondary {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
        }
        .btn-secondary:hover { background: var(--card-hover); }
        .btn-warning {
            background: rgba(245,158,11,0.1); color: var(--warning);
            border: 1px solid rgba(245,158,11,0.3);
        }
        .btn-warning:hover { background: rgba(245,158,11,0.2); }
        .btn-success {
            background: rgba(16,185,129,0.15); color: var(--success);
            border: 1px solid rgba(16,185,129,0.3);
        }
        .btn-success:hover { background: rgba(16,185,129,0.25); }
        .student-actions .btn { flex: 1; justify-content: center; }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
        }
        .empty-state i {
            font-size: 4rem;
            color: rgba(148,163,184,0.3);
            margin-bottom: 16px;
        }

        /* Modal */
        .modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 200; display: none;
            align-items: center; justify-content: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--bg-2); border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%; max-width: 600px;
            max-height: 90vh; overflow-y: auto;
            padding: 28px;
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .modal-title { font-size: 1.2rem; font-weight: 800; }
        .modal-close {
            background: var(--card); border: 1px solid var(--border);
            color: var(--text); width: 36px; height: 36px;
            border-radius: 50%; cursor: pointer;
        }
        .detail-row {
            display: flex; justify-content: space-between;
            padding: 8px 0; border-bottom: 1px solid var(--border);
            font-size: 0.92rem; gap: 12px;
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-row .label { color: var(--text-muted); }
        .detail-row .value { font-weight: 600; text-align: left; word-break: break-word; }
        .detail-row .value a { color: var(--primary); text-decoration: none; }
        .detail-section-title {
            font-size: 0.95rem; font-weight: 800;
            margin: 16px 0 8px; color: var(--primary);
            padding-bottom: 6px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 6px;
        }
        .skill-tag {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(79,172,254,0.1);
            border: 1px solid rgba(79,172,254,0.3);
            color: var(--info);
            border-radius: 14px;
            font-size: 0.78rem;
            font-weight: 600;
            margin: 2px;
        }

        @media (max-width: 1024px) {
            .sidebar { transform: translateX(100%); width: 280px; }
            .sidebar.open { transform: translateX(0); }
            .main { margin-right: 0; }
            .menu-toggle { display: flex; align-items: center; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="bg-anim"></div>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <img src="assets/logo.png" alt="ProVance" onerror="this.style.display='none'">
            </div>
            <div class="admin-badge"><i class="fas fa-shield-alt"></i><span>أدمن</span></div>
            <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> الرئيسية</a>
            <a href="admin-campany.html" class="nav-item"><i class="fas fa-building"></i> الشركات</a>
            <a href="admin-trainees.html" class="nav-item active"><i class="fas fa-user-graduate"></i> الطلاب</a>
            <a href="admin-notification.html" class="nav-item"><i class="fas fa-bell"></i> الإشعارات</a>
            <a href="#" onclick="logoutAdmin(event)" class="nav-item" style="margin-top:auto; color:var(--error)">
                <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
            </a>
        </aside>

        <main class="main">
            <div class="topbar">
                <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="topbar-title">
                    <i class="fas fa-user-graduate" style="color:var(--primary)"></i> إدارة الطلاب
                </h1>
            </div>

            <div class="stats-row">
                <div class="stat-mini">
                    <div class="stat-mini-icon cyan"><i class="fas fa-users"></i></div>
                    <div>
                        <div class="stat-mini-num" id="statTotal">0</div>
                        <div class="stat-mini-label">إجمالي الطلاب</div>
                    </div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-icon success"><i class="fas fa-check-circle"></i></div>
                    <div>
                        <div class="stat-mini-num" id="statActive">0</div>
                        <div class="stat-mini-label">حسابات نشطة</div>
                    </div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-icon warning"><i class="fas fa-search"></i></div>
                    <div>
                        <div class="stat-mini-num" id="statLooking">0</div>
                        <div class="stat-mini-label">يبحثون عن تدريب</div>
                    </div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-icon purple"><i class="fas fa-graduation-cap"></i></div>
                    <div>
                        <div class="stat-mini-num" id="statInTraining">0</div>
                        <div class="stat-mini-label">في تدريب</div>
                    </div>
                </div>
            </div>

            <div class="filters">
                <input type="text" id="searchInput" placeholder="🔍 ابحث بالاسم، البريد، أو الجامعة...">
                <select id="statusFilter">
                    <option value="">كل الحالات</option>
                    <option value="active">نشط</option>
                    <option value="suspended">موقوف</option>
                </select>
                <select id="trainingFilter">
                    <option value="">كل حالات التدريب</option>
                    <option value="looking">يبحث</option>
                    <option value="in_training">في تدريب</option>
                    <option value="completed">أكمل</option>
                </select>
            </div>

            <div class="students-grid" id="studentsList">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>جاري التحميل...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Details Modal -->
    <div class="modal" id="detailsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">تفاصيل الطالب</h3>
                <button class="modal-close" onclick="closeDetailsModal()"><i class="fas fa-times"></i></button>
            </div>
            <div id="detailsContent"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
    (function() {
        'use strict';
        let allStudents = [];

        const EDU_LEVELS = {
            'high_school': 'طالب ثانوية',
            'diploma': 'دبلوم',
            'university': 'طالب جامعي',
            'graduate': 'خريج',
            'postgraduate': 'دراسات عليا'
        };
        const STATUS_LABELS = {
            'active': '✓ نشط',
            'suspended': '⏸ موقوف'
        };
        const TRAINING_LABELS = {
            'looking': '🔍 يبحث',
            'in_training': '🎓 في تدريب',
            'completed': '✓ أكمل'
        };
        const LANG_LEVELS = {
            'beginner': 'مبتدئ', 'intermediate': 'متوسط',
            'advanced': 'متقدم', 'native': 'لغة أم'
        };

        function getInitial(name) {
            return (name || '?').trim().charAt(0).toUpperCase();
        }
        function calcAge(birth) {
            if (!birth) return null;
            const b = new Date(birth);
            const t = new Date();
            let age = t.getFullYear() - b.getFullYear();
            const m = t.getMonth() - b.getMonth();
            if (m < 0 || (m === 0 && t.getDate() < b.getDate())) age--;
            return age;
        }

        function renderList(items) {
            const list = document.getElementById('studentsList');
            if (items.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-user-graduate"></i>
                        <h3>لا يوجد طلاب</h3>
                    </div>
                `;
                return;
            }

            list.innerHTML = items.map(s => {
                const status = s.status || 'active';
                const trainingStatus = s.training_status || 'looking';
                const photo = s.photo
                    ? `<img src="${s.photo}" alt="${s.full_name}">`
                    : `<span>${getInitial(s.full_name)}</span>`;
                const safeName = window.ProVance.escapeHtml(s.full_name).replace(/'/g, "&#39;");

                return `
                    <div class="student-card">
                        <div class="student-header">
                            <div class="student-avatar">${photo}</div>
                            <div class="student-name-info">
                                <div class="student-name">${window.ProVance.escapeHtml(s.full_name || '-')}</div>
                                <div class="student-meta">${EDU_LEVELS[s.education_level] || s.education_level || '-'}</div>
                            </div>
                        </div>
                        <div class="student-info">
                            <div class="student-info-row">
                                <i class="fas fa-envelope"></i>
                                <span style="direction:ltr">${s.email || '-'}</span>
                            </div>
                            ${s.university ? `<div class="student-info-row"><i class="fas fa-university"></i> ${window.ProVance.escapeHtml(s.university)}</div>` : ''}
                            ${s.city ? `<div class="student-info-row"><i class="fas fa-map-marker-alt"></i> ${window.ProVance.escapeHtml(s.city)}</div>` : ''}
                            <div class="student-info-row">
                                <i class="fas fa-calendar"></i> سجّل ${window.ProVance.timeAgo(s.created_at)}
                            </div>
                        </div>
                        <div class="student-status-row">
                            <span class="student-status status-${status}">${STATUS_LABELS[status]}</span>
                            <span class="student-status status-${trainingStatus}">${TRAINING_LABELS[trainingStatus]}</span>
                        </div>
                        <div class="student-actions">
                            <button class="btn btn-secondary" onclick="showDetails('${s.user_id}')">
                                <i class="fas fa-eye"></i> عرض
                            </button>
                            ${status === 'active' ? `
                                <button class="btn btn-warning" onclick="suspendStudent('${s.user_id}', '${safeName}')">
                                    <i class="fas fa-pause"></i> إيقاف
                                </button>
                            ` : `
                                <button class="btn btn-success" onclick="activateStudent('${s.user_id}', '${safeName}')">
                                    <i class="fas fa-play"></i> تفعيل
                                </button>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const status = document.getElementById('statusFilter').value;
            const training = document.getElementById('trainingFilter').value;

            let filtered = allStudents;
            if (status) filtered = filtered.filter(s => (s.status || 'active') === status);
            if (training) filtered = filtered.filter(s => (s.training_status || 'looking') === training);
            if (search) {
                filtered = filtered.filter(s =>
                    (s.full_name || '').toLowerCase().includes(search) ||
                    (s.email || '').toLowerCase().includes(search) ||
                    (s.university || '').toLowerCase().includes(search)
                );
            }
            renderList(filtered);
        }

        function updateStats() {
            const total = allStudents.length;
            const active = allStudents.filter(s => (s.status || 'active') === 'active').length;
            const looking = allStudents.filter(s => (s.training_status || 'looking') === 'looking').length;
            const inTraining = allStudents.filter(s => s.training_status === 'in_training').length;

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statActive').textContent = active;
            document.getElementById('statLooking').textContent = looking;
            document.getElementById('statInTraining').textContent = inTraining;
        }

        async function loadStudents() {
            const sb = window.ProVance.sb;
            const { data, error } = await sb.from('student')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error(error);
                window.ProVance.showToast('خطأ في تحميل الطلاب', 'error');
                return;
            }
            allStudents = data || [];
            updateStats();
            applyFilters();
        }

        window.showDetails = (userId) => {
            const s = allStudents.find(x => x.user_id === userId);
            if (!s) return;

            const skills = Array.isArray(s.skills) ? s.skills : [];
            const interests = Array.isArray(s.interested_fields) ? s.interested_fields : [];
            const langs = Array.isArray(s.languages) ? s.languages : [];
            const exps = Array.isArray(s.experience) ? s.experience : [];
            const age = calcAge(s.birth_date);

            const content = document.getElementById('detailsContent');
            content.innerHTML = `
                <div style="text-align:center; margin-bottom: 18px;">
                    <div class="student-avatar" style="width: 80px; height: 80px; margin: 0 auto 10px; font-size: 2rem;">
                        ${s.photo ? `<img src="${s.photo}">` : getInitial(s.full_name)}
                    </div>
                    <h3 style="font-size: 1.3rem; font-weight: 800;">${window.ProVance.escapeHtml(s.full_name || '-')}</h3>
                </div>

                <div class="detail-section-title"><i class="fas fa-user"></i> معلومات شخصية</div>
                <div class="detail-row"><span class="label">البريد</span><span class="value" style="direction:ltr">${s.email || '-'}</span></div>
                <div class="detail-row"><span class="label">الهاتف</span><span class="value" style="direction:ltr">${s.phone || '-'}</span></div>
                ${age ? `<div class="detail-row"><span class="label">العمر</span><span class="value">${age} سنة</span></div>` : ''}
                <div class="detail-row"><span class="label">النوع</span><span class="value">${s.gender === 'female' ? 'أنثى' : s.gender === 'male' ? 'ذكر' : '-'}</span></div>
                <div class="detail-row"><span class="label">المدينة</span><span class="value">${window.ProVance.escapeHtml(s.city || '-')}</span></div>
                ${s.address ? `<div class="detail-row"><span class="label">العنوان</span><span class="value">${window.ProVance.escapeHtml(s.address)}</span></div>` : ''}

                <div class="detail-section-title"><i class="fas fa-graduation-cap"></i> المعلومات الأكاديمية</div>
                <div class="detail-row"><span class="label">المرحلة</span><span class="value">${EDU_LEVELS[s.education_level] || '-'}</span></div>
                <div class="detail-row"><span class="label">الجامعة</span><span class="value">${window.ProVance.escapeHtml(s.university || '-')}</span></div>
                <div class="detail-row"><span class="label">الكلية</span><span class="value">${window.ProVance.escapeHtml(s.faculty || '-')}</span></div>
                ${s.major ? `<div class="detail-row"><span class="label">التخصص</span><span class="value">${window.ProVance.escapeHtml(s.major)}</span></div>` : ''}
                <div class="detail-row"><span class="label">سنة الدراسة</span><span class="value">${s.study_year === 'graduated' ? 'متخرج' : s.study_year ? `السنة ${s.study_year}` : '-'}</span></div>
                ${s.gpa ? `<div class="detail-row"><span class="label">المعدل</span><span class="value">${window.ProVance.escapeHtml(s.gpa)}</span></div>` : ''}

                ${skills.length > 0 ? `
                <div class="detail-section-title"><i class="fas fa-tools"></i> المهارات</div>
                <div>${skills.map(sk => `<span class="skill-tag">${window.ProVance.escapeHtml(sk)}</span>`).join('')}</div>
                ` : ''}

                ${langs.length > 0 ? `
                <div class="detail-section-title"><i class="fas fa-language"></i> اللغات</div>
                <div>${langs.map(l => `<span class="skill-tag">${window.ProVance.escapeHtml(l.name || l)} ${l.level ? '(' + (LANG_LEVELS[l.level] || l.level) + ')' : ''}</span>`).join('')}</div>
                ` : ''}

                ${interests.length > 0 ? `
                <div class="detail-section-title"><i class="fas fa-heart"></i> المجالات المهتم بها</div>
                <div>${interests.map(i => `<span class="skill-tag">${window.ProVance.escapeHtml(i)}</span>`).join('')}</div>
                ` : ''}

                ${exps.length > 0 ? `
                <div class="detail-section-title"><i class="fas fa-briefcase"></i> الخبرات</div>
                ${exps.map(e => `
                    <div style="background:rgba(255,255,255,0.02); padding:12px; border-radius:10px; margin-bottom:8px;">
                        <strong>${window.ProVance.escapeHtml(e.title || '-')}</strong>
                        ${e.company ? ` - ${window.ProVance.escapeHtml(e.company)}` : ''}
                        ${e.start || e.end ? `<div style="color:var(--text-muted); font-size:0.82rem; margin-top:4px;">${e.start || ''} - ${e.end || 'الآن'}</div>` : ''}
                        ${e.description ? `<div style="color:var(--text-muted); font-size:0.85rem; margin-top:6px;">${window.ProVance.escapeHtml(e.description)}</div>` : ''}
                    </div>
                `).join('')}
                ` : ''}

                ${s.linkedin || s.github || s.portfolio || s.cv_url ? `
                <div class="detail-section-title"><i class="fas fa-link"></i> الروابط</div>
                ${s.linkedin ? `<div class="detail-row"><span class="label">LinkedIn</span><span class="value"><a href="${s.linkedin}" target="_blank">رابط</a></span></div>` : ''}
                ${s.github ? `<div class="detail-row"><span class="label">GitHub</span><span class="value"><a href="${s.github}" target="_blank">رابط</a></span></div>` : ''}
                ${s.portfolio ? `<div class="detail-row"><span class="label">Portfolio</span><span class="value"><a href="${s.portfolio}" target="_blank">رابط</a></span></div>` : ''}
                ${s.cv_url ? `<div class="detail-row"><span class="label">السيرة الذاتية</span><span class="value"><a href="${s.cv_url}" target="_blank"><i class="fas fa-download"></i> تحميل</a></span></div>` : ''}
                ` : ''}

                <div class="detail-section-title"><i class="fas fa-clock"></i> النشاط</div>
                <div class="detail-row"><span class="label">تاريخ التسجيل</span><span class="value">${window.ProVance.formatDateTime(s.created_at)}</span></div>
                <div class="detail-row"><span class="label">حالة الحساب</span><span class="value"><span class="student-status status-${s.status || 'active'}">${STATUS_LABELS[s.status || 'active']}</span></span></div>
                <div class="detail-row"><span class="label">حالة التدريب</span><span class="value"><span class="student-status status-${s.training_status || 'looking'}">${TRAINING_LABELS[s.training_status || 'looking']}</span></span></div>
            `;

            document.getElementById('detailsModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.closeDetailsModal = () => {
            document.getElementById('detailsModal').classList.remove('active');
            document.body.style.overflow = '';
        };

        window.suspendStudent = async (userId, name) => {
            const ok = await window.ProVance.confirmModal({
                title: 'إيقاف الطالب',
                message: `هل تريد إيقاف "${name}"؟ لن يستطيع الدخول أو التقديم على فرص.`,
                confirmText: 'نعم، إيقاف',
                type: 'danger'
            });
            if (!ok) return;

            try {
                const sb = window.ProVance.sb;
                await sb.from('student').update({ status: 'suspended' }).eq('user_id', userId);
                await window.ProVance.sendNotification({
                    userId,
                    userType: 'student',
                    title: 'تم إيقاف حسابك',
                    message: 'تم إيقاف حسابك مؤقتاً. للاستفسار تواصل مع الإدارة على support@provance.com',
                    type: 'warning'
                });
                window.ProVance.showToast('تم الإيقاف', 'warning');
                await loadStudents();
            } catch (err) {
                console.error(err);
                window.ProVance.showToast('حدث خطأ', 'error');
            }
        };

        window.activateStudent = async (userId, name) => {
            const ok = await window.ProVance.confirmModal({
                title: 'إعادة تفعيل',
                message: `هل تريد إعادة تفعيل "${name}"؟`
            });
            if (!ok) return;

            try {
                const sb = window.ProVance.sb;
                await sb.from('student').update({ status: 'active' }).eq('user_id', userId);
                await window.ProVance.sendNotification({
                    userId,
                    userType: 'student',
                    title: '✅ تم تفعيل حسابك',
                    message: 'تم إعادة تفعيل حسابك بنجاح، يمكنك الآن الدخول والتقديم على فرص التدريب',
                    type: 'success'
                });
                window.ProVance.showToast('تم التفعيل', 'success');
                await loadStudents();
            } catch (err) {
                console.error(err);
                window.ProVance.showToast('حدث خطأ', 'error');
            }
        };

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('statusFilter').addEventListener('change', applyFilters);
        document.getElementById('trainingFilter').addEventListener('change', applyFilters);

        window.logoutAdmin = async (e) => {
            e.preventDefault();
            const ok = await window.ProVance.confirmModal({
                title: 'تسجيل الخروج',
                message: 'هل تريد تسجيل الخروج؟'
            });
            if (ok) await window.ProVance.logout('admin-login.html');
        };

        async function init() {
            const ok = await window.ProVance.requireAdminAuth();
            if (!ok) return;
            await loadStudents();

            const sb = window.ProVance.sb;
            sb.channel('admin-students')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'student' }, () => {
                    loadStudents();
                })
                .subscribe();
        }
        init();
    })();
    </script>
</body>
</html>
