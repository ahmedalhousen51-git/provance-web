    <style>
:root { --primary: #ef4444; --secondary: #dc2626; --gradient: linear-gradient(135deg, #ef4444, #dc2626); --bg: #0a0e27; --bg-2: #1a1535; --card: rgba(255,255,255,0.04); --card-hover: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.08); --text: #fff; --text-muted: #94a3b8; --text-dim: rgba(148,163,184,0.6); --error: #ef4444; --success: #10b981; --warning: #f59e0b; --info: #4facfe; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
.bg-anim { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 20% 20%, rgba(239,68,68,0.08), transparent 45%), radial-gradient(circle at 80% 80%, rgba(220,38,38,0.06), transparent 45%), var(--bg); }
.layout { display: flex; min-height: 100vh; }
.sidebar { width: 260px; background: rgba(20,18,40,0.7); backdrop-filter: blur(20px); border-left: 1px solid var(--border); padding: 24px 16px; position: fixed; inset: 0 0 0 auto; z-index: 100; transition: transform .3s; display: flex; flex-direction: column; }
.sidebar-logo {
            padding: 8px 4px 18px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px;
        }
        .logo-icon {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            filter: drop-shadow(0 4px 12px rgba(239,68,68,0.3));
        }
        .logo-icon svg {
            width: 100%;
            height: 100%;
        }
        .logo-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }
        .logo-brand {
            font-size: 1.15rem;
            font-weight: 900;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
            line-height: 1;
        }
        .logo-tagline {
            font-size: 0.68rem;
            color: var(--text-muted);
            font-weight: 600;
        }
.admin-badge { background: var(--gradient); color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 0.78rem; font-weight: 800; text-align: center; margin-bottom: 14px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; color: var(--text-muted); text-decoration: none; border-radius: 10px; font-size: 0.92rem; font-weight: 600; margin-bottom: 4px; transition: all .2s; }
.nav-item:hover { background: var(--card); color: var(--text); }
.nav-item.active { background: var(--gradient); color: #fff; }
.nav-item i { width: 18px; }
.nav-badge { margin-right: auto; background: rgba(255,255,255,0.2); color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 800; }
.main { flex: 1; margin-right: 260px; padding: 24px; min-width: 0; }
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; gap: 14px; flex-wrap: wrap; }
.menu-toggle { display: none; background: var(--card); border: 1px solid var(--border); color: var(--text); width: 42px; height: 42px; border-radius: 10px; cursor: pointer; }
.topbar-title { font-size: 1.5rem; font-weight: 800; }
.topbar-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 18px; }
.stat-mini { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; display: flex; align-items: center; gap: 11px; }
.stat-mini-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.05rem; color: #fff; flex-shrink: 0; }
.stat-mini-icon.red { background: var(--gradient); }
.stat-mini-icon.success { background: linear-gradient(135deg, #10b981, #059669); }
.stat-mini-icon.warning { background: linear-gradient(135deg, #f59e0b, #f97316); }
.stat-mini-icon.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
.stat-mini-icon.info { background: linear-gradient(135deg, #4facfe, #00f2fe); }
.stat-mini-num { font-size: 1.4rem; font-weight: 800; line-height: 1; }
.stat-mini-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; }
.tabs-container { display: flex; gap: 8px; margin-bottom: 22px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 6px; overflow-x: auto; }
.tab-btn { padding: 11px 18px; background: none; border: none; color: var(--text-muted); font-family: inherit; font-size: 0.92rem; font-weight: 700; border-radius: 10px; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 7px; transition: all .2s; }
.tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.tab-btn.active { background: var(--gradient); color: #fff; box-shadow: 0 6px 16px rgba(239,68,68,0.3); }
.tab-badge { background: rgba(255,255,255,0.15); padding: 1px 8px; border-radius: 10px; font-size: 0.72rem; }
.tab-content { display: none; animation: fadeIn .3s; }
.tab-content.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.filters-bar { display: flex; gap: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 18px; flex-wrap: wrap; }
.filters-bar input, .filters-bar select { padding: 9px 14px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.9rem; }
.filters-bar input { flex: 1; min-width: 200px; }
.filters-bar input:focus, .filters-bar select:focus { outline: none; border-color: var(--primary); }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px; border: none; border-radius: 10px; font-weight: 700; font-family: inherit; font-size: 0.88rem; cursor: pointer; transition: all .2s; text-decoration: none; white-space: nowrap; }
.btn-primary { background: var(--gradient); color: #fff; }
.btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(239,68,68,0.4); }
.btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
.btn-secondary:hover { background: var(--card-hover); }
.btn-success { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
.btn-warning { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
.btn-danger { background: rgba(239,68,68,0.1); color: var(--error); border: 1px solid rgba(239,68,68,0.3); }
.btn-info { background: rgba(79,172,254,0.15); color: var(--info); border: 1px solid rgba(79,172,254,0.3); }
.btn-sm { padding: 7px 12px; font-size: 0.8rem; }
.trainees-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 14px; }
.trainee-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; display: flex; flex-direction: column; gap: 12px; transition: all .25s; position: relative; }
.trainee-card:hover { border-color: var(--primary); transform: translateY(-3px); }
.trainee-card.has-violations { border-color: rgba(245,158,11,0.4); }
.trainee-card.banned { border-color: var(--error); background: rgba(239,68,68,0.04); }
.trainee-card.banned::after { content: 'محظور'; position: absolute; top: 12px; left: 12px; background: var(--error); color: #fff; padding: 3px 10px; border-radius: 12px; font-size: 0.72rem; font-weight: 800; }
.trainee-header { display: flex; align-items: center; gap: 12px; }
.trainee-avatar { width: 56px; height: 56px; border-radius: 50%; background: var(--gradient); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 1.3rem; flex-shrink: 0; overflow: hidden; }
.trainee-avatar img { width: 100%; height: 100%; object-fit: cover; }
.trainee-info { flex: 1; min-width: 0; }
.trainee-name { font-weight: 800; font-size: 1.05rem; }
.trainee-uni { color: var(--text-muted); font-size: 0.84rem; margin-top: 2px; }
.strikes-display { display: flex; gap: 4px; align-items: center; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 10px; justify-content: center; }
.strike-circle { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 800; transition: all .2s; }
.strike-circle.active { background: linear-gradient(135deg, #ef4444, #dc2626); border-color: var(--error); color: #fff; }
.strike-circle.warning { background: linear-gradient(135deg, #f59e0b, #f97316); border-color: var(--warning); color: #fff; }
.strikes-label { color: var(--text-muted); font-size: 0.84rem; margin-right: 8px; }
.trainee-meta { display: flex; gap: 10px; flex-wrap: wrap; font-size: 0.82rem; color: var(--text-muted); padding: 10px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.trainee-meta span { display: flex; align-items: center; gap: 4px; }
.trainee-meta i { color: var(--primary); }
.trainee-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: auto; }
.trainee-actions .btn { flex: 1; justify-content: center; padding: 9px; min-width: 90px; }
.violation-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
.violation-card.minor { border-color: rgba(245,158,11,0.2); background: rgba(245,158,11,0.02); }
.violation-card.major { border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.04); }
.violation-card.critical { border-color: rgba(239,68,68,0.5); background: rgba(239,68,68,0.08); }
.violation-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1rem; flex-shrink: 0; }
.violation-icon.minor { background: linear-gradient(135deg, #f59e0b, #f97316); }
.violation-icon.major { background: linear-gradient(135deg, #ef4444, #dc2626); }
.violation-icon.critical { background: linear-gradient(135deg, #b91c1c, #991b1b); }
.violation-body { flex: 1; min-width: 0; }
.violation-title { font-weight: 800; font-size: 0.95rem; }
.violation-meta { color: var(--text-muted); font-size: 0.82rem; margin-top: 3px; }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; animation: fadeIn .25s; }
.modal.active { display: flex; }
.modal-content { background: var(--bg-2); border: 1px solid var(--border); border-radius: 22px; width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; padding: 28px; position: relative; animation: slideUp .3s ease-out; }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
.modal-title { font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
.modal-title i { color: var(--primary); }
.modal-close { background: var(--card); border: 1px solid var(--border); color: var(--text); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: var(--card-hover); transform: rotate(90deg); }
.field { margin-bottom: 16px; }
.field label { display: block; color: var(--text); font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; }
.field label i { color: var(--primary); margin-left: 4px; }
.field label .req { color: var(--error); }
.field input, .field select, .field textarea { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.03); border: 2px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.95rem; font-family: inherit; transition: all .2s; }
.field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--primary); background: rgba(255,255,255,0.06); }
.severity-buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.severity-btn { padding: 12px; background: rgba(255,255,255,0.02); border: 2px solid var(--border); border-radius: 10px; color: var(--text); font-family: inherit; font-size: 0.86rem; font-weight: 700; cursor: pointer; transition: all .2s; text-align: center; }
.severity-btn.minor:hover, .severity-btn.minor.selected { border-color: var(--warning); background: rgba(245,158,11,0.1); color: var(--warning); }
.severity-btn.major:hover, .severity-btn.major.selected { border-color: var(--error); background: rgba(239,68,68,0.1); color: var(--error); }
.severity-btn.critical:hover, .severity-btn.critical.selected { border-color: #b91c1c; background: rgba(185,28,28,0.1); color: #b91c1c; }
.modal-section { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
.modal-section-title { font-size: 0.94rem; font-weight: 800; display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.modal-section-title i { color: var(--primary); }
.info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
.info-item { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 10px; padding: 10px; }
.info-label { color: var(--text-muted); font-size: 0.76rem; display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
.info-label i { color: var(--primary); }
.info-value { font-weight: 700; font-size: 0.92rem; word-break: break-word; }
.empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--text-muted); background: var(--card); border: 1px solid var(--border); border-radius: 16px; }
.empty-state i { font-size: 4rem; color: rgba(148,163,184,0.3); margin-bottom: 16px; display: block; }
.empty-state h3 { color: var(--text); margin-bottom: 6px; font-size: 1.1rem; }
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 14px; font-size: 0.74rem; font-weight: 700; white-space: nowrap; }
.badge-success { background: rgba(16,185,129,0.15); color: var(--success); }
.badge-warning { background: rgba(245,158,11,0.15); color: var(--warning); }
.badge-error { background: rgba(239,68,68,0.15); color: var(--error); }
.loading-overlay { position: fixed; inset: 0; background: rgba(10,14,39,0.95); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity .3s; }
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-spinner { width: 60px; height: 60px; border: 4px solid var(--card); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 14px 24px; border-radius: 12px; color: #fff; font-weight: 700; z-index: 9999; }
@media (max-width: 1024px) {
    .sidebar { transform: translateX(100%); width: 280px; }
    .sidebar.open { transform: translateX(0); }
    .main { margin-right: 0; }
    .menu-toggle { display: flex; align-items: center; justify-content: center; }
}
@media (max-width: 600px) {
    .modal-content { padding: 20px; max-height: 95vh; border-radius: 18px; }
    .topbar-title { font-size: 1.2rem; }
    .stats-row { grid-template-columns: 1fr 1fr; }
}
    </style>
</head>
<body>
    <div class="bg-anim"></div>
    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="logo-wrapper">
                    <div class="logo-icon">
                        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#ef4444"/>
                                    <stop offset="100%" stop-color="#dc2626"/>
                                </linearGradient>
                            </defs>
                            <path d="M16 2 L28 8 V20 Q28 26 16 30 Q4 26 4 20 V8 Z" fill="url(#logoGrad)" stroke="#fff" stroke-width="0.5" opacity="0.95"/>
                            <text x="16" y="20" text-anchor="middle" font-family="Cairo, sans-serif" font-size="14" font-weight="900" fill="#fff">P</text>
                        </svg>
                    </div>
                    <div class="logo-text">
                        <div class="logo-brand">ProVance</div>
                        <div class="logo-tagline">منصة التدريب</div>
                    </div>
                </div>
            </div>
            <div class="admin-badge"><i class="fas fa-shield-alt"></i> ADMIN PANEL</div>
            <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> الرئيسية</a>
            <a href="admin-campany.html" class="nav-item"><i class="fas fa-building"></i> الشركات <span class="nav-badge" id="pendingBadge" style="display:none">0</span></a>
            <a href="admin-trainees.html" class="nav-item active"><i class="fas fa-users"></i> المتدربين</a>
            <a href="admin-users.html" class="nav-item"><i class="fas fa-user-shield"></i> الأدمنز</a>
            <a href="admin-approvals.html" class="nav-item"><i class="fas fa-check-double"></i> الموافقات <span class="nav-badge" id="approvalsBadge" style="display:none">0</span></a>
            <a href="admin-support.html" class="nav-item"><i class="fas fa-headset"></i> دعم الشركات</a>
            <a href="admin-notification.html" class="nav-item"><i class="fas fa-bell"></i> الإشعارات</a>
            <a href="#" onclick="logoutAdmin(event)" class="nav-item" style="margin-top:auto; color:var(--error)">

        <main class="main">
            <div class="topbar">
                <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="topbar-title"><i class="fas fa-users" style="color:var(--primary)"></i> إدارة المتدربين</h1>
                <div class="topbar-actions">
                    <button class="btn btn-secondary btn-sm" onclick="loadAll()">
                        <i class="fas fa-sync-alt"></i> تحديث
                    </button>
                </div>
            </div>

            <div class="stats-row">
                <div class="stat-mini">
                    <div class="stat-mini-icon red"><i class="fas fa-users"></i></div>
                    <div>
                        <div class="stat-mini-num" id="statTotal">0</div>
                        <div class="stat-mini-label">إجمالي المتدربين</div>
                    </div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-icon success"><i class="fas fa-check"></i></div>
                    <div>
                        <div class="stat-mini-num" id="statClean">0</div>
                        <div class="stat-mini-label">سجل نظيف</div>
                    </div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-icon warning"><i class="fas fa-exclamation-triangle"></i></div>
                    <div>
                        <div class="stat-mini-num" id="statWithViolations">0</div>
                        <div class="stat-mini-label">عندهم مخالفات</div>
                    </div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-icon error"><i class="fas fa-ban"></i></div>
                    <div>
                        <div class="stat-mini-num" id="statBanned">0</div>
                        <div class="stat-mini-label">محظورين</div>
                    </div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-icon info"><i class="fas fa-clipboard-list"></i></div>
                    <div>
                        <div class="stat-mini-num" id="statTotalViolations">0</div>
                        <div class="stat-mini-label">إجمالي المخالفات</div>
                    </div>
                </div>
            </div>

            <div class="tabs-container">
                <button class="tab-btn active" data-tab="all" onclick="switchTab(event, 'all')">

                </button>
                <button class="tab-btn" data-tab="violations" onclick="switchTab(event, 'violations')">
                    <i class="fas fa-exclamation-triangle"></i> عندهم مخالفات <span class="tab-badge" id="violationsCount">0</span>
                </button>
                <button class="tab-btn" data-tab="banned" onclick="switchTab(event, 'banned')">
                    <i class="fas fa-ban"></i> محظورين <span class="tab-badge" id="bannedCount">0</span>
                </button>
                <button class="tab-btn" data-tab="violations-log" onclick="switchTab(event, 'violations-log')">
                    <i class="fas fa-list"></i> سجل المخالفات
                </button>
            </div>

            <div class="filters-bar">
                <input type="text" id="searchTrainee" placeholder="🔍 ابحث باسم الطالب أو البريد...">
                <select id="filterStrikes">
                    <option value="">كل المستويات</option>
                    <option value="0">0 (نظيف)</option>
                    <option value="1">1 strike</option>
                    <option value="2">2 strikes</option>
                    <option value="3">3 strikes</option>

function renderTrainees() {
    const search = document.getElementById('searchTrainee').value.toLowerCase().trim();
    const strikesFilter = document.getElementById('filterStrikes').value;
    const sort = document.getElementById('filterSort').value;

    let filtered = allStudents.slice();
    if (search) {
        filtered = filtered.filter(s =>
            (s.full_name || '').toLowerCase().includes(search) ||
            (s.email || '').toLowerCase().includes(search) ||
            (s.university || '').toLowerCase().includes(search)
        );
    }
    if (strikesFilter !== '') {
        const target = parseInt(strikesFilter);
        filtered = filtered.filter(s => getStrikes(s.user_id) === target);
    }
    if (sort === 'newest') filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    else if (sort === 'name') filtered.sort((a, b) => (a.full_name || '').localeCompare(b.full_name || ''));
    else if (sort === 'strikes_desc') filtered.sort((a, b) => getStrikes(b.user_id) - getStrikes(a.user_id));

    const withViolations = filtered.filter(s => getStrikes(s.user_id) > 0);
    const banned = filtered.filter(s => isBanned(s.user_id));

    document.getElementById('allCount').textContent = filtered.length;
    document.getElementById('violationsCount').textContent = withViolations.length;
    document.getElementById('bannedCount').textContent = banned.length;

    document.getElementById('allGrid').innerHTML = filtered.length === 0

window.saveViolation = async (userId) => {
    const type = document.getElementById('violation_type').value;
    const title = document.getElementById('violation_title').value.trim();
    const desc = document.getElementById('violation_desc').value.trim();
    if (!type || !title || !selectedSeverity) { showToast('املأ كل الحقول المطلوبة', 'warning'); return; }

    try {
        const student = allStudents.find(s => s.user_id === userId);
        const { error } = await sb.from('penalties').insert({
            target_user_id: userId,
            target_name: student?.full_name,
            target_type: 'student',
            violation_type: type,
            title, description: desc || null,
            severity: selectedSeverity,
            status: 'active'
        });
        if (error) throw error;
        showToast('تم تسجيل المخالفة', 'success');
        closeModal('addViolationModal');
        await loadAll();
    } catch (err) {
        showToast('حدث خطأ: ' + err.message, 'error');
    }
};

window.resolveViolation = async (id) => {
    if (!confirm('هل تريد إغلاق هذه المخالفة؟')) return;
    try {
        await sb.from('penalties').update({ status: 'resolved', resolved_at: new Date().toISOString() }).eq('id', id);
        showToast('تم الحل', 'success');
        await loadAll();
    } catch (err) { showToast('حدث خطأ', 'error'); }
};

                    <div class="modal-section-title"><i class="fas fa-clipboard-list"></i> سجل المخالفات (${userViolations.length})</div>

                        ? '<div style="text-align:center;color:var(--success);padding:14px"><i class="fas fa-shield-alt"></i> سجل نظيف</div>'
                        : userViolations.slice(0, 10).map(v => `
                            <div class="violation-card ${v.severity === 'critical' ? 'critical' : v.severity === 'major' ? 'major' : 'minor'}" style="margin-bottom:8px">
                                <div class="violation-icon ${v.severity === 'critical' ? 'critical' : v.severity === 'major' ? 'major' : 'minor'}"><i class="fas fa-exclamation-triangle"></i></div>
                                <div class="violation-body">
                                    <div class="violation-title">${escapeHtml(v.title)}</div>
                                    <div class="violation-meta">${formatDateTime(v.created_at)} • ${v.status}</div>
                                </div>
                            </div>
                        `).join('')}
                </div>
                <div style="display:flex;gap:10px;margin-top:14px">
                    <button class="btn btn-secondary" onclick="closeModal('detailsModal')" style="flex:1;justify-content:center">إغلاق</button>
                    <button class="btn btn-warning" onclick="closeModal('detailsModal');openAddViolation('${userId}')" style="flex:1;justify-content:center">
                        <i class="fas fa-exclamation-triangle"></i> إضافة مخالفة
                    </button>
                </div>
            </div>
        </div>
    `;
    renderModal(html);
};

async function checkAdmin() {
    try {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) { window.location.href = 'admin-login.html'; return null; }
        const { data: admin } = await sb.from('admins').select('*').eq('user_id', session.user.id).maybeSingle();
        if (!admin) { await sb.auth.signOut(); window.location.href = 'admin-login.html'; return null; }
        return admin;
    } catch (e) { window.location.href = 'admin-login.html'; return null; }
}

async function loadAll() {
    try {
        const _results = await Promise.allSettled([
            sb.from('student').select('*').order('created_at', { ascending: false }),
            sb.from('penalties').select('*').eq('target_type', 'student').order('created_at', { ascending: false })
        ]);
            const studentsRes = _results[0].status === 'fulfilled' ? _results[0].value : { data: null, error: _results[0].reason };
            const violationsRes = _results[1].status === 'fulfilled' ? _results[1].value : { data: null, error: _results[1].reason };
            

        allStudents = studentsRes.data || [];
        allViolations = violationsRes.data || [];

        // Calculate strikes
        strikesMap = {};
        allViolations.forEach(v => {
            if (v.status === 'active' && ['major', 'critical', 'moderate'].includes(v.severity)) {
                strikesMap[v.target_user_id] = (strikesMap[v.target_user_id] || 0) + 1;
            }
        });

        // Pending companies badge
        const { data: pendingCompanies } = await sb.from('companies').select('user_id').eq('status', 'pending');
        const badge = document.getElementById('pendingBadge');
        if (pendingCompanies && pendingCompanies.length > 0) {
            badge.textContent = pendingCompanies.length;
            badge.style.display = 'inline-block';
        }

        renderTrainees();
        updateStats();
    } catch (err) {
        console.error('═══════════ LOAD ERROR ═══════════');
            console.error('Page:', window.location.pathname);
            console.error('Error:', err);
            console.error('Code:', err?.code);
            console.error('Message:', err?.message);
            console.error('Details:', err?.details);
            console.error('Hint:', err?.hint);
            console.error('═════════════════════════════════');
        showToast('خطأ في تحميل البيانات', 'error');
    }
}

async function init() {
    const admin = await checkAdmin();
    if (!admin) return;
    await loadAll();
    document.getElementById('loadingOverlay').classList.add('hidden');
}

document.addEventListener('DOMContentLoaded', () => {
    // Safety: hide loading overlay after 10s no matter what
    setTimeout(() => {
        const el = document.getElementById('loadingOverlay');
        if (el && !el.classList.contains('hidden')) {
            el.classList.add('hidden');
            console.warn('Loading timeout - showing UI anyway');
        }
    }, 10000);
    init();
    document.getElementById('searchTrainee').addEventListener('input', renderTrainees);
    document.getElementById('filterStrikes').addEventListener('change', renderTrainees);
    document.getElementById('filterSort').addEventListener('change', renderTrainees);
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            const modals = document.querySelectorAll('.modal.active');
            if (modals.length > 0) closeModal(modals[modals.length - 1].id);
        }
    });
});
    </script>
</body>
