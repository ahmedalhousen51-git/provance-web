<style>
:root { --primary: #ef4444; --secondary: #dc2626; --gradient: linear-gradient(135deg, #ef4444, #dc2626); --bg: #0a0e27; --card: rgba(255,255,255,0.04); --card-hover: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.08); --text: #fff; --text-muted: #94a3b8; --error: #ef4444; --success: #10b981; --warning: #f59e0b; --info: #4facfe; }

body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.bg-anim { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 20% 20%, rgba(239,68,68,0.08), transparent 45%), radial-gradient(circle at 80% 80%, rgba(220,38,38,0.06), transparent 45%), var(--bg); }

.sidebar { width: 260px; background: rgba(20,18,40,0.7); backdrop-filter: blur(20px); border-left: 1px solid var(--border); padding: 24px 16px; position: fixed; inset: 0 0 0 auto; z-index: 100; transition: transform .3s; display: flex; flex-direction: column; }
.sidebar-logo { padding: 8px 4px 18px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
.logo-wrapper { display: flex; align-items: center; gap: 10px; padding: 4px; }
.logo-icon { width: 42px; height: 42px; }
.logo-icon svg { width: 100%; height: 100%; }
.logo-text { display: flex; flex-direction: column; gap: 2px; }
.logo-brand { font-size: 1.15rem; font-weight: 900; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.logo-tagline { font-size: 0.68rem; color: var(--text-muted); font-weight: 600; }
.admin-badge { background: var(--gradient); color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 0.78rem; font-weight: 800; text-align: center; margin-bottom: 14px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; color: var(--text-muted); text-decoration: none; border-radius: 10px; font-size: 0.92rem; font-weight: 600; margin-bottom: 4px; transition: all .2s; }
.nav-item:hover { background: var(--card); color: var(--text); }
.nav-item.active { background: var(--gradient); color: #fff; }
.nav-item i { width: 18px; }
.main { flex: 1; margin-right: 260px; padding: 24px; min-width: 0; }
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; gap: 14px; flex-wrap: wrap; }
.menu-toggle { display: none; background: var(--card); border: 1px solid var(--border); color: var(--text); width: 42px; height: 42px; border-radius: 10px; cursor: pointer; }
.topbar-title { font-size: 1.5rem; font-weight: 800; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 22px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }

.filters { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }
.filter-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 10px; font-family: inherit; font-weight: 600; cursor: pointer; font-size: 0.85rem; }

.search-input { flex: 1; min-width: 200px; padding: 10px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: inherit; font-size: 0.92rem; }

.violations-list { display: flex; flex-direction: column; gap: 12px; }

.violation-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
.violator-info { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 200px; }
.violator-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--gradient); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 1.1rem; flex-shrink: 0; }

.badge-severity-critical { background: rgba(239,68,68,0.25); color: #ef4444; }

.badge-status-reviewing { background: rgba(79,172,254,0.15); color: #4facfe; }
.badge-status-resolved { background: rgba(16,185,129,0.15); color: #10b981; }
.badge-status-dismissed { background: rgba(148,163,184,0.15); color: #94a3b8; }

.violation-title { font-weight: 700; margin-bottom: 6px; }

.violation-actions { display: flex; gap: 8px; flex-wrap: wrap; padding-top: 10px; border-top: 1px solid var(--border); }
.btn { padding: 8px 14px; border-radius: 8px; font-weight: 700; font-family: inherit; font-size: 0.82rem; cursor: pointer; border: 1px solid; display: inline-flex; align-items: center; gap: 5px; }

.btn-review { background: rgba(79,172,254,0.15); color: #4facfe; border-color: rgba(79,172,254,0.3); }
.btn-dismiss { background: rgba(148,163,184,0.15); color: #94a3b8; border-color: rgba(148,163,184,0.3); }

.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }

.loading-overlay { position: fixed; inset: 0; background: rgba(10,14,39,0.95); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity .3s; }
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-spinner { width: 60px; height: 60px; border: 4px solid var(--card); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 14px 24px; border-radius: 12px; color: #fff; font-weight: 700; z-index: 9999; }

.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }

.modal-content { background: var(--bg); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; padding: 24px; }

.form-group { margin-bottom: 14px; }
.form-label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; }
.form-input, .form-textarea, .form-select { width: 100%; padding: 11px 14px; background: rgba(255,255,255,0.03); border: 2px solid var(--border); border-radius: 10px; color: var(--text); font-family: inherit; font-size: 0.92rem; }
.form-textarea { resize: vertical; min-height: 80px; }
.form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: var(--primary); }

@media (max-width: 1024px) {

<script>
const SUPABASE_URL = 'https://jrwazyrdzmbcnddpxxrf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyd2F6eXJkem1iY25kZHB4eHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzUyMzksImV4cCI6MjA5MjExMTIzOX0.KaZt3Xb-9zjjwlSYnCvQQVxzDgbcOxdmnpg9wsUsqQI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: true, autoRefreshToken: true, storage: window.localStorage } });

let allViolations = [];
let currentFilter = 'all';
let currentSearch = '';
let pendingActionId = null;
let pendingActionStatus = null;

function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function formatDate(d) { if (!d) return '-'; return new Date(d).toLocaleString('ar-EG', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
function getInitial(name) { return (name || '?').charAt(0).toUpperCase(); }

function showToast(msg, type='info') {
    const t = document.createElement('div');
    const c = { error:'#ef4444', success:'#10b981', warning:'#f59e0b', info:'#4facfe' };
    t.className = 'toast'; t.style.background = c[type] || c.info; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 4000);
}

window.closeModal = (id) => {
    document.getElementById(id).classList.remove('active');
};

window.logoutAdmin = async (e) => {
    if (e) e.preventDefault();
    if (!confirm('هل تريد تسجيل الخروج؟')) return;
    try { await sb.auth.signOut(); } catch {}
    localStorage.clear();
    window.location.href = 'admin-login.html';
};

const VIOLATION_TYPES = {
    no_show: 'عدم حضور',
    late_arrival: 'تأخير',
    no_response: 'عدم رد',
    cancellation: 'إلغاء',
    unprofessional: 'سلوك غير مهني',
    breach_contract: 'إخلال بالعقد',
    late_payment: 'تأخر في الدفع',
    no_evaluation: 'عدم تقييم',
    other: 'أخرى'
};

const SEVERITY_LABELS = { minor: 'بسيطة', moderate: 'متوسطة', major: 'كبيرة', critical: 'حرجة' };
const STATUS_LABELS = { pending: 'قيد الانتظار', reviewing: 'قيد المراجعة', resolved: 'تم حلها', dismissed: 'تم تجاهلها', escalated: 'تم تصعيدها' };

async function loadAll() {
    try {
        const { data: sessData } = await sb.auth.getSession();
        if (!sessData || !sessData.session) { window.location.href = 'admin-login.html'; return; }
        
        const { data: admin } = await sb.from('admins').select('user_id, role, permissions, is_active').eq('user_id', sessData.session.user.id).maybeSingle();
        if (!admin) { showToast('غير مصرح', 'error'); setTimeout(() => window.location.href = 'admin-login.html', 1500); return; }
        if (!admin.is_active) { await sb.auth.signOut(); window.location.href = 'admin-login.html'; return; }
        
        const { data, error } = await sb.from('violations').select('*').order('reported_at', { ascending: false });
        
        if (error) {
            console.error('Load error:', error);
            if (error.message && (error.message.includes('violations') || error.message.includes('relation'))) {
                document.getElementById('violationsList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle" style="color:#f59e0b"></i>
                        <h3>⚠️ شغّل SQL Migration 45 الأول!</h3>
                        <p>جدول violations غير موجود في DB</p>
                    </div>
                `;
                document.getElementById('loadingOverlay').classList.add('hidden');
                return;
            }
            showToast('خطأ: ' + error.message, 'error');
            return;
        }
        
        allViolations = data || [];
        updateStats();
        renderViolations();
        document.getElementById('loadingOverlay').classList.add('hidden');
    } catch (err) {
        console.error(err);
        showToast('خطأ في التحميل', 'error');
        document.getElementById('loadingOverlay').classList.add('hidden');
    }
}

function updateStats() {
    document.getElementById('statTotal').textContent = allViolations.length;
    document.getElementById('statPending').textContent = allViolations.filter(v => v.status === 'pending').length;
    document.getElementById('statReviewing').textContent = allViolations.filter(v => v.status === 'reviewing').length;
    document.getElementById('statResolved').textContent = allViolations.filter(v => v.status === 'resolved').length;
    document.getElementById('statCritical').textContent = allViolations.filter(v => v.severity === 'critical').length;
}

window.setFilter = (filter, e) => {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    const activeBtn = document.querySelector(`.filter-btn[data-filter="${filter}"]`);
    if (activeBtn) activeBtn.classList.add('active');
    renderViolations();
};

function renderViolations() {
    let list = allViolations.slice();
    
    // Filter
    if (currentFilter === 'pending') list = list.filter(v => v.status === 'pending');
    else if (currentFilter === 'reviewing') list = list.filter(v => v.status === 'reviewing');
    else if (currentFilter === 'resolved') list = list.filter(v => v.status === 'resolved');
    else if (currentFilter === 'student') list = list.filter(v => v.violator_type === 'student');
    else if (currentFilter === 'company') list = list.filter(v => v.violator_type === 'company');
    
    // Search
    if (currentSearch) {
        const q = currentSearch.toLowerCase();
        list = list.filter(v => 
            (v.violator_name || '').toLowerCase().includes(q) ||
            (v.title || '').toLowerCase().includes(q) ||
            (v.description || '').toLowerCase().includes(q) ||
            (VIOLATION_TYPES[v.violation_type] || '').includes(q)
        );
    }
    
    const container = document.getElementById('violationsList');
    
    if (list.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-shield-alt" style="color:#10b981"></i>
                <h3>✅ لا توجد تجاوزات</h3>
                <p>${currentFilter === 'all' ? 'سجل نظيف!' : 'لا توجد نتائج للفلتر المحدد'}</p>
            </div>
        `;
        return;
    }
    
    container.innerHTML = list.map(v => {
        const typeIcon = v.violator_type === 'student' ? 'fa-user-graduate' : 'fa-building';
        const severityClass = `badge-severity-${v.severity}`;
        const statusClass = `badge-status-${v.status}`;
        const cardClass = v.severity === 'critical' || v.severity === 'major' ? v.severity : '';
        
        let actions = '';
        if (v.status === 'pending') {
            actions += `<button class="btn btn-review" onclick="changeStatus('${v.id}', 'reviewing')"><i class="fas fa-eye"></i> ابدأ المراجعة</button>`;
        }
        if (v.status === 'pending' || v.status === 'reviewing') {
            actions += `<button class="btn btn-resolve" onclick="changeStatus('${v.id}', 'resolved')"><i class="fas fa-check"></i> حل</button>`;
            actions += `<button class="btn btn-dismiss" onclick="changeStatus('${v.id}', 'dismissed')"><i class="fas fa-times"></i> تجاهل</button>`;
            actions += `<button class="btn btn-escalate" onclick="changeStatus('${v.id}', 'escalated')"><i class="fas fa-exclamation"></i> تصعيد</button>`;
        }
        if (v.violator_type === 'company') {
            actions += `<a href="admin-campany.html" class="btn btn-penalty" style="text-decoration:none"><i class="fas fa-gavel"></i> فتح صفحة الشركة</a>`;
        } else {
            actions += `<a href="admin-trainees.html" class="btn btn-penalty" style="text-decoration:none"><i class="fas fa-gavel"></i> فتح صفحة الطالب</a>`;
        }
        
        return `
            <div class="violation-card ${cardClass}">
                <div class="violation-header">
                    <div class="violator-info">
                        <div class="violator-avatar">${escapeHtml(getInitial(v.violator_name))}</div>
                        <div>
                            <div class="violator-name">${escapeHtml(v.violator_name || '(غير معروف)')}</div>
                            <div class="violator-type"><i class="fas ${typeIcon}"></i> ${v.violator_type === 'student' ? 'طالب' : 'شركة'}</div>
                        </div>
                    </div>
                    <div class="violation-badges">
                        <span class="badge badge-type">${VIOLATION_TYPES[v.violation_type] || v.violation_type}</span>
                        <span class="badge ${severityClass}">${SEVERITY_LABELS[v.severity] || v.severity}</span>
                        <span class="badge ${statusClass}">${STATUS_LABELS[v.status] || v.status}</span>
                    </div>
                </div>
                <div class="violation-title">${escapeHtml(v.title)}</div>
                ${v.description ? `<div class="violation-desc">${escapeHtml(v.description)}</div>` : ''}
                ${v.affected_name ? `<div class="violation-desc">📌 المتأثر: <strong>${escapeHtml(v.affected_name)}</strong> (${v.affected_type === 'student' ? 'طالب' : 'شركة'})</div>` : ''}
                ${v.admin_notes ? `<div class="violation-desc" style="background:rgba(79,172,254,0.05);padding:10px;border-radius:8px;border-right:3px solid #4facfe"><strong>📝 ملاحظة الإدارة:</strong> ${escapeHtml(v.admin_notes)}</div>` : ''}
                ${v.action_taken ? `<div class="violation-desc" style="background:rgba(16,185,129,0.05);padding:10px;border-radius:8px;border-right:3px solid #10b981"><strong>✅ الإجراء:</strong> ${escapeHtml(v.action_taken)}</div>` : ''}
                <div class="violation-meta">
                    <span><i class="fas fa-clock"></i> حدث: ${formatDate(v.occurred_at)}</span>
                    <span><i class="fas fa-bell"></i> تم الإبلاغ: ${formatDate(v.reported_at)}</span>
                    ${v.resolved_at ? `<span><i class="fas fa-check-circle"></i> تم الحل: ${formatDate(v.resolved_at)}</span>` : ''}
                </div>
                <div class="violation-actions">${actions}</div>
            </div>
        `;
    }).join('');
}

window.changeStatus = (id, newStatus) => {
    pendingActionId = id;
    pendingActionStatus = newStatus;
    
    const titleMap = {
        reviewing: 'بدء مراجعة التجاوز',
        resolved: 'حل التجاوز',
        dismissed: 'تجاهل التجاوز',
        escalated: 'تصعيد التجاوز'
    };
    
    document.getElementById('actionTitle').textContent = titleMap[newStatus] || 'معالجة التجاوز';
    document.getElementById('adminNotes').value = '';
    document.getElementById('actionTaken').value = '';
    document.getElementById('actionModal').classList.add('active');
};

document.getElementById('confirmActionBtn').addEventListener('click', async () => {
    if (!pendingActionId || !pendingActionStatus) return;
    
    const notes = document.getElementById('adminNotes').value.trim();
    const actionTaken = document.getElementById('actionTaken').value.trim();
    
    try {
        const { data: sessData } = await sb.auth.getSession();
        const adminId = sessData?.session?.user?.id;
        
        const updates = {
            status: pendingActionStatus,
            updated_at: new Date().toISOString()
        };
        if (notes) updates.admin_notes = notes;
        if (actionTaken) updates.action_taken = actionTaken;
        if (pendingActionStatus === 'resolved' || pendingActionStatus === 'dismissed') {
            updates.resolved_by = adminId;
            updates.resolved_at = new Date().toISOString();
        }
        
        const { error } = await sb.from('violations').update(updates).eq('id', pendingActionId);
        if (error) {
            showToast('خطأ: ' + error.message, 'error');
            return;
        }
        
        showToast('✅ تم تحديث الحالة', 'success');
        closeModal('actionModal');
        await loadAll();
    } catch (err) {
        showToast('خطأ: ' + err.message, 'error');
    }
});

// Search
document.getElementById('searchInput').addEventListener('input', (e) => {
    currentSearch = e.target.value;
    renderViolations();
});

// Init
document.addEventListener('DOMContentLoaded', loadAll);

// Safety timeout
setTimeout(() => {
    const el = document.getElementById('loadingOverlay');
    if (el && !el.classList.contains('hidden')) el.classList.add('hidden');
}, 10000);

// Auto-refresh كل 30 ثانية
setInterval(() => {
    if (document.visibilityState === 'visible') loadAll();
}, 30000);

document.addEventListener('visibilitychange', () => {
    if (!document.hidden) loadAll();
});
</script>
</body>
</html>
