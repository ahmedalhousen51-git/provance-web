:root { --primary: #ef4444; --secondary: #dc2626; --gradient: linear-gradient(135deg, #ef4444, #dc2626); --bg: #0a0e27; --bg-2: #1a1535; --card: rgba(255,255,255,0.04); --card-hover: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.08); --text: #fff; --text-muted: #94a3b8; --text-dim: rgba(148,163,184,0.6); --error: #ef4444; --success: #10b981; --warning: #f59e0b; --info: #4facfe; --penalty: #ff9800; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
.bg-anim { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 20% 20%, rgba(239,68,68,0.08), transparent 45%), radial-gradient(circle at 80% 80%, rgba(220,38,38,0.06), transparent 45%), var(--bg); }

.sidebar { width: 260px; background: rgba(20,18,40,0.7); backdrop-filter: blur(20px); border-left: 1px solid var(--border); padding: 24px 16px; position: fixed; inset: 0 0 0 auto; z-index: 100; transition: transform .3s; display: flex; flex-direction: column; }
.sidebar-logo {
            padding: 8px 4px 18px;

        }
        .logo-tagline {

            color: var(--text-muted);

        }
.admin-badge { background: var(--gradient); color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 0.78rem; font-weight: 800; text-align: center; margin-bottom: 14px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; color: var(--text-muted); text-decoration: none; border-radius: 10px; font-size: 0.92rem; font-weight: 600; margin-bottom: 4px; transition: all .2s; }
.nav-item:hover { background: var(--card); color: var(--text); }
.nav-item.active { background: var(--gradient); color: #fff; }
.nav-item i { width: 18px; }
.nav-badge { margin-right: auto; background: rgba(255,255,255,0.2); color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 800; }
.main { flex: 1; margin-right: 260px; padding: 24px; min-width: 0; }
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; gap: 14px; flex-wrap: wrap; }
.menu-toggle { display: none; background: var(--card); border: 1px solid var(--border); color: var(--text); width: 42px; height: 42px; border-radius: 10px; cursor: pointer; }
.topbar-title { font-size: 1.5rem; font-weight: 800; }
.topbar-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 18px; }
.stat-mini { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; display: flex; align-items: center; gap: 11px; }
.stat-mini-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.05rem; color: #fff; flex-shrink: 0; }
.stat-mini-icon.red { background: var(--gradient); }
.stat-mini-icon.success { background: linear-gradient(135deg, #10b981, #059669); }
.stat-mini-icon.warning { background: linear-gradient(135deg, #f59e0b, #f97316); }
.stat-mini-icon.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
.stat-mini-icon.info { background: linear-gradient(135deg, #4facfe, #00f2fe); }
.stat-mini-icon.penalty { background: linear-gradient(135deg, #ff9800, #f57c00); }
.stat-mini-num { font-size: 1.4rem; font-weight: 800; line-height: 1; }
.stat-mini-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; }
.tabs-container { display: flex; gap: 8px; margin-bottom: 22px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 6px; overflow-x: auto; }
.tab-btn { padding: 11px 18px; background: none; border: none; color: var(--text-muted); font-family: inherit; font-size: 0.92rem; font-weight: 700; border-radius: 10px; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 7px; transition: all .2s; }
.tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.tab-btn.active { background: var(--gradient); color: #fff; box-shadow: 0 6px 16px rgba(239,68,68,0.3); }
.tab-badge { background: rgba(255,255,255,0.15); padding: 1px 8px; border-radius: 10px; font-size: 0.72rem; }
.tab-content { display: none; animation: fadeIn .3s; }
.tab-content.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.filters-bar { display: flex; gap: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 18px; flex-wrap: wrap; }
.filters-bar input, .filters-bar select { padding: 9px 14px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.9rem; }
.filters-bar input { flex: 1; min-width: 200px; }
.filters-bar input:focus, .filters-bar select:focus { outline: none; border-color: var(--primary); }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px; border: none; border-radius: 10px; font-weight: 700; font-family: inherit; font-size: 0.88rem; cursor: pointer; transition: all .2s; text-decoration: none; white-space: nowrap; }
.btn-primary { background: var(--gradient); color: #fff; }
.btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(239,68,68,0.4); }
.btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
.btn-secondary:hover { background: var(--card-hover); }
.btn-success { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
.btn-success:hover { background: rgba(16,185,129,0.25); }
.btn-warning { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
.btn-warning:hover { background: rgba(245,158,11,0.25); }
.btn-danger { background: rgba(239,68,68,0.1); color: var(--error); border: 1px solid rgba(239,68,68,0.3); }
.btn-danger:hover { background: rgba(239,68,68,0.2); }
.btn-info { background: rgba(79,172,254,0.15); color: var(--info); border: 1px solid rgba(79,172,254,0.3); }
.btn-info:hover { background: rgba(79,172,254,0.25); }
.btn-penalty { background: rgba(255,152,0,0.15); color: var(--penalty); border: 1px solid rgba(255,152,0,0.3); }
.btn-penalty:hover { background: rgba(255,152,0,0.25); }
.btn-sm { padding: 7px 12px; font-size: 0.8rem; }
.companies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 14px; }
.company-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; display: flex; flex-direction: column; gap: 12px; transition: all .25s; position: relative; }
.company-card:hover { border-color: var(--primary); transform: translateY(-3px); }
.company-card.has-penalties { border-color: rgba(255,152,0,0.4); }
.company-card.suspended { border-color: var(--warning); background: rgba(245,158,11,0.04); }
.company-card.suspended::after { content: 'معلقة'; position: absolute; top: 12px; left: 12px; background: var(--warning); color: #fff; padding: 3px 10px; border-radius: 12px; font-size: 0.72rem; font-weight: 800; }
.company-header { display: flex; align-items: center; gap: 12px; }
.company-avatar { width: 56px; height: 56px; border-radius: 14px; background: var(--gradient); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 1.3rem; flex-shrink: 0; overflow: hidden; }
.company-avatar img { width: 100%; height: 100%; object-fit: cover; }
.company-info { flex: 1; min-width: 0; }
.company-name { font-weight: 800; font-size: 1.05rem; }
.company-field { color: var(--text-muted); font-size: 0.84rem; margin-top: 2px; }
.status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 12px; font-size: 0.74rem; font-weight: 800; }
.status-pending { background: rgba(245,158,11,0.15); color: var(--warning); }
.status-approved { background: rgba(16,185,129,0.15); color: var(--success); }
.status-rejected { background: rgba(239,68,68,0.15); color: var(--error); }
.company-meta { display: flex; gap: 10px; flex-wrap: wrap; font-size: 0.82rem; color: var(--text-muted); padding: 10px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.company-meta span { display: flex; align-items: center; gap: 4px; }
.company-meta i { color: var(--primary); }
.penalties-info { background: rgba(255,152,0,0.05); border: 1px solid rgba(255,152,0,0.2); border-radius: 8px; padding: 8px; font-size: 0.82rem; color: var(--penalty); display: flex; align-items: center; gap: 6px; }
.company-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: auto; }
.company-actions .btn { flex: 1; justify-content: center; padding: 9px; min-width: 90px; font-size: 0.82rem; }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; animation: fadeIn .25s; }
.modal.active { display: flex; }
.modal-content { background: var(--bg-2); border: 1px solid var(--border); border-radius: 22px; width: 100%; max-width: 700px; max-height: 92vh; overflow-y: auto; padding: 28px; position: relative; animation: slideUp .3s ease-out; }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.modal-content::-webkit-scrollbar { width: 6px; }
.modal-content::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
.modal-title { font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
.modal-title i { color: var(--primary); }
.modal-close { background: var(--card); border: 1px solid var(--border); color: var(--text); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; }
.modal-close:hover { background: var(--card-hover); transform: rotate(90deg); }
.field { margin-bottom: 16px; }
.field label { display: block; color: var(--text); font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; }
.field label i { color: var(--primary); margin-left: 4px; }
.field label .req { color: var(--error); }
.field input, .field select, .field textarea { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.03); border: 2px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.95rem; font-family: inherit; transition: all .2s; }
.field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--primary); background: rgba(255,255,255,0.06); }
.modal-section { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
.modal-section-title { font-size: 0.94rem; font-weight: 800; display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.modal-section-title i { color: var(--primary); }
.info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
.info-item { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 10px; padding: 10px; }
.info-label { color: var(--text-muted); font-size: 0.76rem; display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
.info-label i { color: var(--primary); }
.info-value { font-weight: 700; font-size: 0.92rem; word-break: break-word; }
.detail-tabs { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 6px; }
.detail-tab { padding: 8px 14px; background: var(--card); border: 1px solid var(--border); color: var(--text-muted); border-radius: 10px; cursor: pointer; font-family: inherit; font-size: 0.82rem; font-weight: 700; white-space: nowrap; transition: all .2s; }
.detail-tab.active { background: var(--gradient); color: #fff; border-color: transparent; }
.detail-content { display: none; }
.detail-content.active { display: block; }
.field-section { background: rgba(239,68,68,0.04); border: 1px solid rgba(239,68,68,0.15); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
.field-section h4 { color: var(--primary); font-size: 0.95rem; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.penalty-card { background: rgba(255,152,0,0.05); border: 1px solid rgba(255,152,0,0.2); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
.penalty-card.warning-type { background: rgba(245,158,11,0.05); border-color: rgba(245,158,11,0.2); }
.penalty-card.expired { opacity: 0.6; background: rgba(128,128,128,0.05); border-color: rgba(128,128,128,0.2); }
.penalty-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.penalty-type-badge { padding: 3px 10px; border-radius: 12px; font-size: 0.74rem; font-weight: 800; }
.penalty-type-badge.warning { background: rgba(245,158,11,0.2); color: var(--warning); }
.penalty-type-badge.fine { background: rgba(255,152,0,0.2); color: var(--penalty); }
.penalty-type-badge.suspension { background: rgba(239,68,68,0.2); color: var(--error); }
.penalty-type-badge.termination { background: rgba(127,29,29,0.3); color: #fca5a5; }
.empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--text-muted); background: var(--card); border: 1px solid var(--border); border-radius: 16px; }
.empty-state i { font-size: 4rem; color: rgba(148,163,184,0.3); margin-bottom: 16px; display: block; }
.empty-state h3 { color: var(--text); margin-bottom: 6px; font-size: 1.1rem; }
.loading-overlay { position: fixed; inset: 0; background: rgba(10,14,39,0.95); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity .3s; }
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-spinner { width: 60px; height: 60px; border: 4px solid var(--card); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 14px 24px; border-radius: 12px; color: #fff; font-weight: 700; z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
/* ===== Dept Requests ===== */
.dept-requests-grid { display: flex; flex-direction: column; gap: 14px; }
.dept-req-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; transition: all .25s; }
.dept-req-card:hover { border-color: var(--warning); transform: translateY(-2px); }
.dept-req-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
.dept-req-icon { width: 48px; height: 48px; border-radius: 12px; background: linear-gradient(135deg,#f59e0b,#f97316); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.1rem; flex-shrink: 0; }
.dept-req-info { flex: 1; min-width: 0; }
.dept-req-name { font-size: 1.1rem; font-weight: 800; }
.dept-req-company { color: var(--text-muted); font-size: 0.84rem; margin-top: 2px; }
.dept-req-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 8px; margin-bottom: 14px; }
.dept-req-detail-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; }
.dept-req-detail-label { color: var(--text-muted); font-size: 0.74rem; display: flex; align-items: center; gap: 4px; margin-bottom: 3px; }
.dept-req-detail-label i { color: var(--primary); }
.dept-req-detail-value { font-weight: 700; font-size: 0.88rem; }
.dept-req-long { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; font-size: 0.84rem; color: var(--text-muted); line-height: 1.6; }
.dept-req-long strong { color: var(--text); display: block; margin-bottom: 4px; font-size: 0.82rem; }
.dept-req-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.dept-req-actions .btn { flex: 1; justify-content: center; min-width: 100px; }
.system-tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 12px; font-size: 0.74rem; font-weight: 800; }
.system-tag.first-time { background: rgba(16,185,129,0.15); color: var(--success); }
.system-tag.once-trained { background: rgba(79,172,254,0.15); color: var(--info); }
.system-tag.twice-trained { background: rgba(239,68,68,0.15); color: var(--error); }
@media (max-width: 1024px) {
    .sidebar { transform: translateX(100%); width: 280px; }
    .sidebar.open { transform: translateX(0); }
    .main { margin-right: 0; }
    .menu-toggle { display: flex; align-items: center; justify-content: center; }
}
@media (max-width: 600px) {
    .modal-content { padding: 20px; max-height: 95vh; border-radius: 18px; }
    .topbar-title { font-size: 1.2rem; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .companies-grid { grid-template-columns: 1fr; }
}
    </style>

// ========== Helpers ==========
function escapeHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function safeJSON(value, fallback) {
    if (!value) return fallback;
    if (typeof value === 'object') return value;
    try { return JSON.parse(value); } catch (e) { return fallback; }
}
function formatDate(d) {
    if (!d) return '-';
    try { return new Date(d).toLocaleDateString('ar-EG'); } catch (e) { return '-'; }
}
function getInitial(name) { return (name || '?').charAt(0).toUpperCase(); }
function getCurrencyText(c) {
    return { EGP:'جنيه', USD:'دولار', EUR:'يورو', SAR:'ريال' }[c] || c || '';
}
function getDurationText(d) {
    const map = { '2-weeks':'أسبوعين','3-weeks':'3 أسابيع','1-month':'شهر','1.5-months':'شهر ونصف','2-months':'شهرين','2.5-months':'شهرين ونصف' };
    const val = map[d] || d || '-';
    return map[d] ? val : String(val).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function getPenaltyTypeText(t) {
    return { warning:'إنذار', fine:'غرامة', suspension:'تعليق', termination:'إنهاء التعاقد' }[t] || 'عقوبة';
}

function showToast(msg, type = 'info') {
    const t = document.createElement('div');
    const colors = { error:'#ef4444', success:'#10b981', warning:'#f59e0b', info:'#4facfe' };
    t.className = 'toast';
    t.style.background = colors[type] || colors.info;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 4000);
}

async function loadCompanies(retryCount = 0) {
    const grid = document.getElementById('companiesGrid');
    
    // نحاول حتى 3 مرات
    const MAX_RETRIES = 2;
    
    try {
        // Timeout protection: لو الـ query طول أكتر من 15 ثانية، نلغيها
        const queryPromise = sb.from('companies')
            .select('*')
            .order('created_at', { ascending: false });
        
        const timeoutPromise = new Promise((_, reject) => 
            setTimeout(() => reject(new Error('Request timeout بعد 15 ثانية')), 15000)
        );
        
        const result = await Promise.race([queryPromise, timeoutPromise]);
        const { data, error } = result;
        
        if (error) { 
            console.error('Load error:', error);
            // retry لو في فرصة
            if (retryCount < MAX_RETRIES) {
                console.log(`Retry ${retryCount + 1}/${MAX_RETRIES}...`);
                await new Promise(r => setTimeout(r, 1000 * (retryCount + 1)));
                return loadCompanies(retryCount + 1);
            }
            
            if (grid) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:60px 20px">
                        <i class="fas fa-exclamation-triangle" style="font-size:3rem;color:#f59e0b;margin-bottom:14px;display:block"></i>
                        <h3 style="color:var(--text);margin-bottom:8px">⚠️ فشل تحميل البيانات</h3>
                        <p style="color:var(--text-muted);margin-bottom:16px">${error.message || 'مشكلة في الاتصال بقاعدة البيانات'}</p>
                        <button onclick="loadCompanies()" style="background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-family:inherit;font-weight:700;cursor:pointer">
                            <i class="fas fa-sync-alt"></i> إعادة المحاولة
                        </button>
                    </div>
                `;
            }
            return; 
        }
        
        const list = data || [];
        console.log('Loaded', list.length, 'companies');
        
        allCompanies = list.map(normalizeCompany);
        updateStats();
        renderCompanies();
    } catch (e) { 
        console.error('Catch:', e);
        
        // retry لو في فرصة
        if (retryCount < MAX_RETRIES) {
            console.log(`Retry ${retryCount + 1}/${MAX_RETRIES} after error...`);
            await new Promise(r => setTimeout(r, 1500 * (retryCount + 1)));
            return loadCompanies(retryCount + 1);
        }
        
        if (grid) {
            grid.innerHTML = `
                <div style="grid-column:1/-1;text-align:center;padding:60px 20px">
                    <i class="fas fa-wifi" style="font-size:3rem;color:#f59e0b;margin-bottom:14px;display:block"></i>
                    <h3 style="color:var(--text);margin-bottom:8px">⚠️ مشكلة في الاتصال</h3>
                    <p style="color:var(--text-muted);margin-bottom:16px">${e.message || 'تأكد من الإنترنت وحاول مرة أخرى'}</p>
                    <button onclick="loadCompanies()" style="background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-family:inherit;font-weight:700;cursor:pointer">
                        <i class="fas fa-sync-alt"></i> إعادة المحاولة
                    </button>
                </div>
            `;
        }
    }
}

        // 1. جيب بيانات الطلب
        const req = allDeptRequests.find(r => r.id === reqId);
        if (!req) { showToast('الطلب مش موجود', 'error'); return; }
        const newDetails = req.data || {};

        // 2. جيب بيانات الشركة الحالية
        const { data: companyRow, error: compErr } = await sb.from('companies')
            .select('training_fields, training_details')
            .eq('user_id', companyUserId).maybeSingle();
        if (compErr) { showToast('خطأ في جلب بيانات الشركة: ' + compErr.message, 'error'); return; }

        let fields = [];
        let details = {};
        try { fields = JSON.parse(companyRow.training_fields || '[]'); } catch(e) { fields = companyRow.training_fields || []; }
        try { details = JSON.parse(companyRow.training_details || '{}'); } catch(e) { details = companyRow.training_details || {}; }
        if (!Array.isArray(fields)) fields = [];

        // 3. أضف القسم لو مش موجود
        if (!fields.includes(fieldName)) fields.push(fieldName);
        details[fieldName] = newDetails;

        // 4. حدّث جدول الشركات
        const { error: upErr } = await sb.from('companies').update({
            training_fields: fields,
            training_details: details,
            updated_at: new Date().toISOString()
        }).eq('user_id', companyUserId);
        if (upErr) { showToast('خطأ في تحديث الشركة: ' + upErr.message, 'error'); return; }

        // 5. أنشئ أو حدّث internship
        const companyData = allCompanies.find(c => c.id === companyUserId);
        if (companyData) {
            let location = companyData.location;
            if (newDetails.branchId && companyData.branches) {
                const branch = companyData.branches.find(b => b.id === newDetails.branchId);
                if (branch) location = (branch.city ? branch.city + ' - ' : '') + (branch.fullAddress || branch.name || location);
            }
            const internshipData = {
                company_user_id: companyUserId,
                company_name: companyData.name,
                company_location: location,
                title: fieldName, field: fieldName,
                description: newDetails.knowledgeBenefits || '',
                duration: getDurationText(newDetails.duration),
                max_applicants: parseInt(newDetails.count) || 10,
                current_applicants: 0,
                trainee_type: newDetails.traineeSystem || 'first-time',
                requirements: newDetails.trainingRequirements || '',
                knowledge_benefits: newDetails.knowledgeBenefits || '',
                financial_benefits: newDetails.financialBenefits || '',
                salary_min: parseFloat(newDetails.minSalary) || 0,
                salary_max: parseFloat(newDetails.maxSalary) || 0,
                salary_currency: newDetails.currency || 'EGP',
                status: 'active',
                updated_at: new Date().toISOString()
            };
            const { data: existingInternship } = await sb.from('internships')
                .select('id').eq('company_user_id', companyUserId).eq('field', fieldName).maybeSingle();
            if (existingInternship) {
                await sb.from('internships').update(internshipData).eq('id', existingInternship.id);
            } else {
                internshipData.created_at = new Date().toISOString();
                await sb.from('internships').insert(internshipData);
            }
        }

        // 6. حدّث حالة الطلب
        await sb.from('pending_approvals').update({
            status: 'approved',
            reviewed_at: new Date().toISOString()
        }).eq('id', reqId);

        // 7. إشعار للشركة
        try {
            await sb.from('notifications').insert({
                user_id: companyUserId,
                user_type: 'company',
                type: 'dept_approved',
                title: 'تمت الموافقة على قسمك',
                message: `تمت الموافقة على إضافة قسم "${fieldName}" — سيظهر في صفحة فرص التدريب الآن`,
                link: 'company-requests-control.html'
            });
        } catch(e) { /* ignore */ }

        showToast('✅ تمت الموافقة وإضافة القسم بنجاح', 'success');
        await loadDeptRequests();
        await loadCompanies();
    } catch (e) {
        showToast('خطأ: ' + e.message, 'error');
    }
};

window.rejectDeptRequest = async (reqId) => {
    const reason = prompt('سبب الرفض (اختياري):');
    if (reason === null) return; // ضغط إلغاء

    const req = allDeptRequests.find(r => r.id === reqId);
    try {
        await sb.from('pending_approvals').update({
            status: 'rejected',
            rejection_reason: reason || '',
            reviewed_at: new Date().toISOString()
        }).eq('id', reqId);

        // إشعار للشركة
        if (req) {
            try {
                await sb.from('notifications').insert({
                    user_id: req.company_user_id,
                    user_type: 'company',
                    type: 'dept_rejected',
                    title: 'تم رفض طلب القسم',
                    message: `تم رفض طلب إضافة قسم "${req.item_name}"${reason ? '. السبب: ' + reason : ''}`,
                    link: 'company-requests-control.html'
                });
            } catch(e) { /* ignore */ }
        }

        showToast('❌ تم رفض الطلب', 'warning');
        await loadDeptRequests();
    } catch (e) {
        showToast('خطأ: ' + e.message, 'error');
    }
};

function renderCompanies() {
    const search = (document.getElementById('searchInput').value || '').toLowerCase().trim();
    let list = [...allCompanies];

    if (search) {
        list = list.filter(c =>
            c.name.toLowerCase().includes(search) ||
            (c.email || '').toLowerCase().includes(search) ||
            c.field.toLowerCase().includes(search)
        );
    }

    if (currentFilter === 'penalties') list = list.filter(c => c.penalties && c.penalties.length > 0);
    else if (currentFilter !== 'all') list = list.filter(c => c.status === currentFilter);

    const grid = document.getElementById('companiesGrid');
    if (list.length === 0) {
        grid.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-building"></i>
                <h3>لا توجد شركات</h3>
                <p>${search ? 'لم يتم العثور على نتائج' : 'لا توجد شركات في هذا القسم'}</p>
            </div>`;
        return;
    }

    grid.innerHTML = list.map(c => createCard(c)).join('');
}

function createCard(c) {
    const photo = c.logo
        ? `<img src="${escapeHtml(c.logo)}" alt="">`
        : `<span>${getInitial(c.name)}</span>`;

    let statusBadge = '';
    if (c.status === 'pending') statusBadge = '<span class="status-badge status-pending"><i class="fas fa-clock"></i> قيد المراجعة</span>';
    else if (c.status === 'approved') {
        if (c.suspended) statusBadge = '<span class="status-badge status-pending"><i class="fas fa-pause"></i> معلقة</span>';
        else statusBadge = '<span class="status-badge status-approved"><i class="fas fa-check"></i> معتمدة</span>';
    }
    else if (c.status === 'rejected') statusBadge = '<span class="status-badge status-rejected"><i class="fas fa-times"></i> مرفوضة</span>';

    const penaltiesInfo = c.penalties && c.penalties.length > 0
        ? `<div class="penalties-info"><i class="fas fa-gavel"></i> ${c.penalties.length} عقوبة/إنذار</div>`
        : '';

    return `
        <div class="company-card ${c.penalties && c.penalties.length > 0 ? 'has-penalties' : ''} ${c.suspended ? 'suspended' : ''}">
            <div class="company-header">
                <div class="company-avatar">${photo}</div>
                <div class="company-info">
                    <div class="company-name">${escapeHtml(c.name)}</div>
                    <div class="company-field">${escapeHtml(c.field)}</div>
                    <div style="margin-top:5px">${statusBadge}</div>
                </div>
            </div>

            <div class="company-meta">
                <span><i class="fas fa-envelope"></i> ${escapeHtml((c.email || '-').substring(0, 25))}${c.email && c.email.length > 25 ? '...' : ''}</span>
                <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(c.location)}</span>
                <span><i class="fas fa-calendar"></i> ${formatDate(c.registeredAt)}</span>
            </div>

            ${penaltiesInfo}

            <div class="company-actions">
                <button class="btn btn-info btn-sm" onclick="viewDetails('${c.id}')">
                    <i class="fas fa-eye"></i> التفاصيل
                </button>
                ${c.status === 'pending' ? `
                    <button class="btn btn-success btn-sm" onclick="openApprove('${c.id}')">
                        <i class="fas fa-check"></i> اعتماد
                    </button>
                    <button class="btn btn-danger btn-sm" onclick="openReject('${c.id}')">
                        <i class="fas fa-times"></i> رفض
                    </button>
                ` : ''}
                ${c.status === 'approved' && !c.suspended ? `
                    <button class="btn btn-penalty btn-sm" onclick="openPenalty('${c.id}')">
                        <i class="fas fa-gavel"></i> عقاب
                    </button>
                ` : ''}
            </div>
        </div>
    `;
}

window.confirmPenalty = async () => {
    const type = document.getElementById('penType').value;
    const reason = document.getElementById('penReason').value.trim();
    const amount = document.getElementById('penAmount').value;
    const currency = document.getElementById('penCurrency').value;
    const duration = document.getElementById('penDuration').value;

    if (!type || !reason) { showToast('املأ الحقول المطلوبة', 'error'); return; }
    if (type === 'fine' && (!amount || parseFloat(amount) <= 0)) { showToast('أدخل قيمة الغرامة', 'error'); return; }
    if (type === 'suspension' && (!duration || parseInt(duration) <= 0)) { showToast('أدخل المدة', 'error'); return; }

    const c = allCompanies.find(x => x.id === selectedId);
    if (!c) return;

    const penalty = {
        id: 'pen-' + Date.now(),
        type, reason,
        date: new Date().toISOString().split('T')[0],
        status: 'active'
    };
    if (type === 'fine') { penalty.amount = parseFloat(amount); penalty.currency = currency; }
    if (type === 'suspension') {
        penalty.duration = parseInt(duration);
        const endDate = new Date();
        endDate.setDate(endDate.getDate() + parseInt(duration));
        penalty.endDate = endDate.toISOString().split('T')[0];
    }

    const newPenalties = [...(c.penalties || []), penalty];
    const updateData = { penalties: newPenalties, updated_at: new Date().toISOString() };
    if (type === 'suspension') { updateData.suspended = true; updateData.suspended_until = penalty.endDate; }

    try {
        const { error } = await sb.from('companies').update(updateData).eq('user_id', c.id);
        if (error) {
            // معالجة خاصة لو الـ column مش موجود
            if (error.message && (error.message.includes('penalties') || error.message.includes('column'))) {
                showToast('⚠️ شغّل SQL Migration 38 الأول! (columns مفقودة)', 'error');
                console.error('Missing columns. Run 38_companies_penalties_admin_permissions.sql');
                return;
            }
            showToast('خطأ: ' + error.message, 'error');
            return;
        }
        showToast('✅ تم إضافة العقوبة', 'warning');
        const companyId = c.id;
        closeModal('penaltyModal');
        closeModal('detailsModal');
        await loadCompanies();
        
        // أعد فتح details modal بعد قليل عشان البيانات الجديدة تتعرض
        setTimeout(() => { 
            if (typeof window.viewDetails === 'function') {
                window.viewDetails(companyId);
                // افتح tab العقوبات تلقائياً
                setTimeout(() => {
                    const penTab = document.querySelector('[onclick*="penalties"]');
                    if (penTab) penTab.click();
                }, 150);
            }
        }, 200);
    } catch (e) { 
        console.error(e);
        showToast('خطأ: ' + e.message, 'error'); 
    }
};

// ========== Unsuspend Company ==========
window.unsuspendCompany = async (companyId) => {
    if (!confirm('هل تريد فك التعليق عن هذه الشركة؟ ستصبح فعالة مرة أخرى.')) return;
    const c = allCompanies.find(x => x.id === companyId);
    if (!c) return;
    
    // تحديث الـ suspension في الـ penalties النشطة (نخليها expired)
    const updatedPenalties = (c.penalties || []).map(p => {
        if (p.type === 'suspension' && p.status === 'active') {
            return { ...p, status: 'expired', expired_at: new Date().toISOString().split('T')[0] };
        }
        return p;
    });
    
    try {
        const { error } = await sb.from('companies').update({
            suspended: false,
            suspended_until: null,
            penalties: updatedPenalties,
            updated_at: new Date().toISOString()
        }).eq('user_id', c.id);
        
        if (error) {
            if (error.message && error.message.includes('column')) {
                showToast('⚠️ شغّل SQL Migration 40 الأول!', 'error');
                return;
            }
            showToast('خطأ: ' + error.message, 'error');
            return;
        }
        
        // تأكد إن الـ internships رجعت active (في حالة كانت paused لأي سبب)
        try {
            await sb.from('internships').update({ status: 'active' }).eq('company_user_id', companyId).neq('status', 'closed');
        } catch(e) { console.warn('Could not reactivate internships:', e); }
        
        showToast('✅ تم فك التعليق - الشركة فعالة الآن + التدريبات نشطة', 'success');
        
        // إشعار للشركة
        try {
            await sb.from('notifications').insert({
                user_id: companyId,
                user_type: 'company',
                type: 'unsuspended',
                title: '✅ تم فك التعليق',
                message: 'تم رفع التعليق عن حسابك ورجعت التدريبات نشطة. مرحباً بعودتك!',
                link: 'company-dashboard.html'
            });
        } catch(e) {}
        
        closeModal('detailsModal');
        await loadCompanies();
        // أعد فتح details + tab العقوبات
        setTimeout(() => { 
            viewDetails(companyId);
            setTimeout(() => {
                const penTab = document.querySelector('[onclick*="penalties"]');
                if (penTab) penTab.click();
            }, 150);
        }, 200);
    } catch (e) {
        console.error(e);
        showToast('خطأ: ' + e.message, 'error');
    }
};

// ========== Cancel / Delete Penalty ==========
window.cancelPenalty = async (companyId, penaltyId) => {
    if (!confirm('هل تريد إلغاء هذه العقوبة؟ ستصبح غير فعالة لكن تبقى في السجل.')) return;
    const c = allCompanies.find(x => x.id === companyId);
    if (!c || !c.penalties) return;
    
    const updatedPenalties = c.penalties.map(p => 
        p.id === penaltyId ? { ...p, status: 'cancelled', cancelled_at: new Date().toISOString() } : p
    );
    
    // لو العقوبة كانت suspension، ارفع الـ suspended flag
    const cancelledPenalty = c.penalties.find(p => p.id === penaltyId);
    const updateData = { penalties: updatedPenalties, updated_at: new Date().toISOString() };
    
    if (cancelledPenalty && cancelledPenalty.type === 'suspension') {
        // شوف لو في suspensions تانية نشطة
        const stillSuspended = updatedPenalties.some(p => p.type === 'suspension' && p.status !== 'cancelled' && p.status !== 'expired');
        if (!stillSuspended) {
            updateData.suspended = false;
            updateData.suspended_until = null;
        }
    }
    
    // أمان إضافي: لو مفيش أي suspension نشطة، فك التعليق
    const hasActiveSuspension = updatedPenalties.some(p => p.type === 'suspension' && p.status !== 'cancelled' && p.status !== 'expired');
    if (!hasActiveSuspension && c.suspended) {
        updateData.suspended = false;
        updateData.suspended_until = null;
    }
    
    try {
        const { error } = await sb.from('companies').update(updateData).eq('user_id', c.id);
        if (error) {
            if (error.message && error.message.includes('column')) {
                showToast('⚠️ شغّل SQL Migration 38 الأول!', 'error');
                return;
            }
            showToast('خطأ: ' + error.message, 'error');
            return;
        }
        showToast('✅ تم إلغاء العقوبة', 'success');
        closeModal('detailsModal');
        await loadCompanies();
        // أعد فتح details + افتح tab العقوبات
        setTimeout(() => { 
            viewDetails(companyId);
            setTimeout(() => {
                const penTab = document.querySelector('[onclick*="penalties"]');
                if (penTab) penTab.click();
            }, 150);
        }, 200);
    } catch (e) {
        showToast('خطأ في الاتصال', 'error');
    }
};

window.deletePenalty = async (companyId, penaltyId) => {
    if (!confirm('هل أنت متأكد من الحذف النهائي؟ لا يمكن التراجع.')) return;
    const c = allCompanies.find(x => x.id === companyId);
    if (!c || !c.penalties) return;
    
    const updatedPenalties = c.penalties.filter(p => p.id !== penaltyId);
    const updateData = { penalties: updatedPenalties, updated_at: new Date().toISOString() };
    
    // لو العقوبة المحذوفة كانت suspension، شوف لو في suspensions تانية نشطة
    const deletedPenalty = c.penalties.find(p => p.id === penaltyId);
    if (deletedPenalty && deletedPenalty.type === 'suspension') {
        const stillSuspended = updatedPenalties.some(p => p.type === 'suspension' && p.status !== 'cancelled' && p.status !== 'expired');
        if (!stillSuspended) {
            updateData.suspended = false;
            updateData.suspended_until = null;
        }
    }
    
    // أمان إضافي: لو مفيش أي suspension penalties نشطة في الـ array، فك التعليق
    const hasActiveSuspension = updatedPenalties.some(p => p.type === 'suspension' && p.status !== 'cancelled' && p.status !== 'expired');
    if (!hasActiveSuspension && c.suspended) {
        updateData.suspended = false;
        updateData.suspended_until = null;
    }
    
    try {
        const { error } = await sb.from('companies').update(updateData).eq('user_id', c.id);
        if (error) {
            if (error.message && error.message.includes('column')) {
                showToast('⚠️ شغّل SQL Migration 38 الأول!', 'error');
                return;
            }
            showToast('خطأ: ' + error.message, 'error');
            return;
        }
        showToast('🗑️ تم حذف العقوبة نهائياً', 'success');
        closeModal('detailsModal');
        await loadCompanies();
        setTimeout(() => { 
            viewDetails(companyId);
            setTimeout(() => {
                const penTab = document.querySelector('[onclick*="penalties"]');
                if (penTab) penTab.click();
            }, 150);
        }, 200);
    } catch (e) {
        showToast('خطأ في الاتصال', 'error');
    }
};

window.exportCSV = () => {

    let csv = '\uFEFFاسم الشركة,المجال,البريد,الموقع,الحالة,سعر التدريب,تاريخ التسجيل\n';
    allCompanies.forEach(c => {
        const status = c.status === 'approved' ? 'معتمدة' : c.status === 'rejected' ? 'مرفوضة' : 'قيد المراجعة';
        csv += `"${c.name}","${c.field}","${c.email}","${c.location}","${status}","${c.trainingPrice || '-'}","${formatDate(c.registeredAt)}"\n`;
    });
    const link = document.createElement('a');
    link.href = encodeURI('data:text/csv;charset=utf-8,' + csv);
    link.download = `companies_${Date.now()}.csv`;
    link.click();
    showToast('تم التصدير', 'success');
};

async function init() {

    // Hide loading أول ما checkAdmin يخلص (السرعة المرئية)

    loadDeptRequestsBadge();
}

async function loadDeptRequestsBadge() {
    try {
        const { data, error } = await sb.from('pending_approvals')
            .select('id', { count: 'exact', head: false })
            .eq('type', 'department')
            .eq('status', 'pending');
        if (!error && data) {
            const badge = document.getElementById('badgeDeptRequests');
            if (badge) {
                badge.textContent = data.length;
                if (data.length > 0) badge.style.background = 'rgba(245,158,11,0.6)';
            }
        }
    } catch(e) { /* ignore */ }
}

document.addEventListener('DOMContentLoaded', () => {
    // Safety: hide loading overlay after 6s no matter what
    setTimeout(() => {
        const el = document.getElementById('loadingOverlay');
        if (el && !el.classList.contains('hidden')) {
            el.classList.add('hidden');
            console.warn('Loading timeout - showing UI anyway');
        }
    }, 6000);
    init();
    let st;
    document.getElementById('searchInput').addEventListener('input', () => {
        clearTimeout(st);
        st = setTimeout(renderCompanies, 300);
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            const modals = document.querySelectorAll('.modal.active');
            if (modals.length > 0) closeModal(modals[modals.length - 1].id);
        }
    });
});
    </script>
</body>
</html>
