<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>إدارة الشركات - ProVance</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ef4444; --secondary: #dc2626;
            --gradient: linear-gradient(135deg, #ef4444, #dc2626);
            --bg: #0a0e27; --bg-2: #1a1535;
            --card: rgba(255,255,255,0.04); --card-hover: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.08);
            --text: #fff; --text-muted: #94a3b8;
            --error: #ef4444; --success: #10b981; --warning: #f59e0b; --info: #4facfe;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .bg-anim {
            position: fixed; inset: 0; z-index: -1;
            background:
                radial-gradient(circle at 20% 20%, rgba(239,68,68,0.08), transparent 45%),
                radial-gradient(circle at 80% 80%, rgba(220,38,38,0.06), transparent 45%),
                var(--bg);
        }
        .layout { display: flex; min-height: 100vh; }
        .sidebar {
            width: 260px; background: rgba(20,18,40,0.7);
            backdrop-filter: blur(20px); border-left: 1px solid var(--border);
            padding: 24px 16px; position: fixed; inset: 0 0 0 auto;
            z-index: 100; transition: transform .3s;
            display: flex; flex-direction: column;
        }
        .sidebar-logo {
            display: flex; align-items: center; gap: 10px;
            padding: 0 8px 20px; border-bottom: 1px solid var(--border);
            margin-bottom: 16px; justify-content: center;
        }
        .sidebar-logo img { height: 32px; max-width: 100%; }
        .admin-badge {
            background: var(--gradient); color: #fff;
            padding: 5px 12px; border-radius: 14px;
            font-size: 0.75rem; font-weight: 800;
            text-align: center; margin-bottom: 14px;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 14px; color: var(--text-muted);
            text-decoration: none; border-radius: 10px;
            font-size: 0.92rem; font-weight: 600;
            margin-bottom: 4px; transition: all .2s;
        }
        .nav-item:hover { background: var(--card); color: var(--text); }
        .nav-item.active { background: var(--gradient); color: #fff; }
        .nav-item i { width: 18px; }
        .main { flex: 1; margin-right: 260px; padding: 24px; min-width: 0; }
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 22px; gap: 14px; flex-wrap: wrap;
        }
        .menu-toggle {
            display: none; background: var(--card); border: 1px solid var(--border);
            color: var(--text); width: 42px; height: 42px;
            border-radius: 10px; cursor: pointer;
        }
        .topbar-title { font-size: 1.5rem; font-weight: 800; }

        /* Stats Mini */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-mini {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 11px;
        }
        .stat-mini-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: #fff;
        }
        .stat-mini-icon.purple { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .stat-mini-icon.success { background: linear-gradient(135deg, #10b981, #059669); }
        .stat-mini-icon.warning { background: linear-gradient(135deg, #f59e0b, #f97316); }
        .stat-mini-icon.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .stat-mini-num { font-size: 1.4rem; font-weight: 800; line-height: 1; }
        .stat-mini-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; }

        /* Filters */
        .filters {
            display: flex; gap: 10px; margin-bottom: 18px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px;
            flex-wrap: wrap;
        }
        .filters input, .filters select {
            padding: 9px 14px; background: rgba(255,255,255,0.04);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); font-family: inherit; font-size: 0.9rem;
        }
        .filters input { flex: 1; min-width: 200px; }
        .filters input:focus, .filters select:focus {
            outline: none; border-color: var(--primary);
        }

        /* Table */
        .companies-list {
            display: flex; flex-direction: column; gap: 12px;
        }
        .company-row {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            gap: 14px;
            align-items: center;
            transition: all .2s;
        }
        .company-row:hover {
            border-color: var(--primary);
            background: var(--card-hover);
        }
        .company-row.pending {
            border-right: 3px solid var(--warning);
        }
        .company-logo {
            width: 50px; height: 50px;
            border-radius: 12px;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 800;
            font-size: 1.2rem;
            flex-shrink: 0;
            overflow: hidden;
        }
        .company-logo img { width: 100%; height: 100%; object-fit: cover; }
        .company-body { flex: 1; min-width: 0; }
        .company-name { font-weight: 800; font-size: 1rem; }
        .company-meta {
            display: flex; flex-wrap: wrap; gap: 12px;
            color: var(--text-muted); font-size: 0.82rem; margin-top: 5px;
        }
        .company-meta span { display: flex; align-items: center; gap: 4px; }
        .company-meta i { color: var(--primary); }

        .company-status {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 14px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 6px;
        }
        .status-pending { background: rgba(245,158,11,0.15); color: var(--warning); }
        .status-approved { background: rgba(16,185,129,0.15); color: var(--success); }
        .status-rejected { background: rgba(239,68,68,0.15); color: var(--error); }
        .status-suspended { background: rgba(148,163,184,0.15); color: var(--text-muted); }

        .company-actions {
            display: flex; gap: 6px; flex-shrink: 0;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 8px 14px; border: none; border-radius: 9px;
            font-weight: 700; font-family: inherit; font-size: 0.82rem;
            cursor: pointer; transition: all .2s; text-decoration: none;
            white-space: nowrap;
        }
        .btn-primary { background: var(--gradient); color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(239,68,68,0.4); }
        .btn-success {
            background: rgba(16,185,129,0.15); color: var(--success);
            border: 1px solid rgba(16,185,129,0.3);
        }
        .btn-success:hover { background: rgba(16,185,129,0.25); }
        .btn-danger {
            background: rgba(239,68,68,0.1); color: var(--error);
            border: 1px solid rgba(239,68,68,0.3);
        }
        .btn-danger:hover { background: rgba(239,68,68,0.2); }
        .btn-secondary {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
        }
        .btn-secondary:hover { background: var(--card-hover); }
        .btn-warning {
            background: rgba(245,158,11,0.1); color: var(--warning);
            border: 1px solid rgba(245,158,11,0.3);
        }
        .btn-warning:hover { background: rgba(245,158,11,0.2); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
        }
        .empty-state i {
            font-size: 4rem;
            color: rgba(148,163,184,0.3);
            margin-bottom: 16px;
        }

        /* Modal */
        .modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 200;
            display: none;
            align-items: center; justify-content: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--bg-2); border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%; max-width: 700px;
            max-height: 90vh; overflow-y: auto;
            padding: 28px;
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .modal-title { font-size: 1.2rem; font-weight: 800; }
        .modal-close {
            background: var(--card); border: 1px solid var(--border);
            color: var(--text); width: 36px; height: 36px;
            border-radius: 50%; cursor: pointer;
        }
        .detail-row {
            display: flex; justify-content: space-between;
            padding: 8px 0; border-bottom: 1px solid var(--border);
            font-size: 0.92rem; gap: 12px;
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-row .label { color: var(--text-muted); }
        .detail-row .value { font-weight: 600; text-align: left; word-break: break-word; }
        .detail-row .value a { color: var(--primary); text-decoration: none; }
        .detail-section-title {
            font-size: 0.95rem;
            font-weight: 800;
            margin: 16px 0 8px;
            color: var(--primary);
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }
        .field { margin-bottom: 12px; }
        .field label {
            display: block; color: var(--text-muted);
            font-size: 0.88rem; font-weight: 600; margin-bottom: 6px;
        }
        .field textarea {
            width: 100%; padding: 12px 14px;
            background: rgba(255,255,255,0.04);
            border: 2px solid var(--border);
            border-radius: 10px; color: var(--text);
            font-size: 0.92rem; font-family: inherit;
            resize: vertical; min-height: 80px;
        }
        .field textarea:focus { outline: none; border-color: var(--primary); }

        @media (max-width: 1024px) {
            .sidebar { transform: translateX(100%); width: 280px; }
            .sidebar.open { transform: translateX(0); }
            .main { margin-right: 0; }
            .menu-toggle { display: flex; align-items: center; justify-content: center; }
        }
        @media (max-width: 768px) {
            .company-row { flex-direction: column; align-items: flex-start; }
            .company-actions { width: 100%; }
            .company-actions .btn { flex: 1; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="bg-anim"></div>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <img src="assets/logo.png" alt="ProVance" onerror="this.style.display='none'">
            </div>
            <div class="admin-badge"><i class="fas fa-shield-alt"></i><span>أدمن</span></div>
            <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> الرئيسية</a>
            <a href="admin-campany.html" class="nav-item active"><i class="fas fa-building"></i> الشركات</a>
            <a href="admin-trainees.html" class="nav-item"><i class="fas fa-user-graduate"></i> الطلاب</a>
            <a href="admin-notification.html" class="nav-item"><i class="fas fa-bell"></i> الإشعارات</a>
            <a href="#" onclick="logoutAdmin(event)" class="nav-item" style="margin-top:auto; color:var(--error)">
                <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
            </a>
        </aside>

        <main class="main">
            <div class="topbar">
                <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="topbar-title">
                    <i class="fas fa-building" style="color:var(--primary)"></i> إدارة الشركات
                </h1>
            </div>

            <div class="stats-row">
                <div class="stat-mini">
                    <div class="stat-mini-icon purple"><i class="fas fa-building"></i></div>
                    <div>
                        <div class="stat-mini-num" id="statTotal">0</div>
                        <div class="stat-mini-label">إجمالي الشركات</div>
                    </div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-icon warning"><i class="fas fa-clock"></i></div>
                    <div>
                        <div class="stat-mini-num" id="statPending">0</div>
                        <div class="stat-mini-label">قيد المراجعة</div>
                    </div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-icon success"><i class="fas fa-check-circle"></i></div>
                    <div>
                        <div class="stat-mini-num" id="statApproved">0</div>
                        <div class="stat-mini-label">معتمدة</div>
                    </div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-icon error"><i class="fas fa-times-circle"></i></div>
                    <div>
                        <div class="stat-mini-num" id="statRejected">0</div>
                        <div class="stat-mini-label">مرفوضة</div>
                    </div>
                </div>
            </div>

            <div class="filters">
                <input type="text" id="searchInput" placeholder="🔍 ابحث بالاسم، البريد، أو المجال...">
                <select id="statusFilter">
                    <option value="">كل الحالات</option>
                    <option value="pending">قيد المراجعة</option>
                    <option value="approved">معتمدة</option>
                    <option value="rejected">مرفوضة</option>
                    <option value="suspended">موقوفة</option>
                </select>
            </div>

            <div class="companies-list" id="companiesList">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>جاري التحميل...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Details Modal -->
    <div class="modal" id="detailsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">تفاصيل الشركة</h3>
                <button class="modal-close" onclick="closeDetailsModal()"><i class="fas fa-times"></i></button>
            </div>
            <div id="detailsContent"></div>
        </div>
    </div>

    <!-- Reject Modal -->
    <div class="modal" id="rejectModal">
        <div class="modal-content" style="max-width:480px">
            <div class="modal-header">
                <h3 class="modal-title">رفض طلب الشركة</h3>
                <button class="modal-close" onclick="closeRejectModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="field">
                <label>سبب الرفض (سيظهر للشركة)</label>
                <textarea id="rejectReason" rows="3" placeholder="اكتب سبب الرفض بشكل واضح..."></textarea>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-secondary" onclick="closeRejectModal()" style="flex:1; justify-content:center; padding:12px;">إلغاء</button>
                <button class="btn btn-danger" onclick="confirmReject()" style="flex:1; justify-content:center; padding:12px;">
                    <i class="fas fa-times-circle"></i> تأكيد الرفض
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
    (function() {
        'use strict';
        let allCompanies = [];
        let rejectingId = null;
        let rejectingName = '';

        const STATUS_LABELS = {
            'pending': '⏳ قيد المراجعة',
            'approved': '✓ معتمدة',
            'rejected': '✕ مرفوضة',
            'suspended': '⏸ موقوفة'
        };

        function getInitial(name) {
            return (name || '?').trim().charAt(0).toUpperCase();
        }

        function renderList(items) {
            const list = document.getElementById('companiesList');
            if (items.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-building"></i>
                        <h3>لا توجد شركات</h3>
                    </div>
                `;
                return;
            }

            list.innerHTML = items.map(c => {
                const status = c.status || 'pending';
                const logo = c.logo
                    ? `<img src="${c.logo}" alt="${c.company_name}">`
                    : `<span>${getInitial(c.company_name)}</span>`;
                const safeName = window.ProVance.escapeHtml(c.company_name).replace(/'/g, "&#39;");

                return `
                    <div class="company-row ${status === 'pending' ? 'pending' : ''}">
                        <div class="company-logo">${logo}</div>
                        <div class="company-body">
                            <div class="company-name">${window.ProVance.escapeHtml(c.company_name || '-')}</div>
                            <div class="company-meta">
                                <span><i class="fas fa-envelope"></i> <span style="direction:ltr">${c.email || '-'}</span></span>
                                <span><i class="fas fa-briefcase"></i> ${window.ProVance.escapeHtml(c.company_field || '-')}</span>
                                <span><i class="fas fa-map-marker-alt"></i> ${window.ProVance.escapeHtml(c.company_location || '-')}</span>
                                <span><i class="fas fa-calendar"></i> ${window.ProVance.timeAgo(c.created_at)}</span>
                            </div>
                            <span class="company-status status-${status}">${STATUS_LABELS[status] || status}</span>
                        </div>
                        <div class="company-actions">
                            <button class="btn btn-secondary" onclick="showDetails('${c.user_id}')">
                                <i class="fas fa-eye"></i> عرض
                            </button>
                            ${status === 'pending' ? `
                                <button class="btn btn-success" onclick="approveCompany('${c.user_id}', '${safeName}')">
                                    <i class="fas fa-check"></i> موافقة
                                </button>
                                <button class="btn btn-danger" onclick="openRejectModal('${c.user_id}', '${safeName}')">
                                    <i class="fas fa-times"></i> رفض
                                </button>
                            ` : ''}
                            ${status === 'approved' ? `
                                <button class="btn btn-warning" onclick="suspendCompany('${c.user_id}', '${safeName}')">
                                    <i class="fas fa-pause"></i> إيقاف
                                </button>
                            ` : ''}
                            ${status === 'suspended' ? `
                                <button class="btn btn-success" onclick="reactivateCompany('${c.user_id}', '${safeName}')">
                                    <i class="fas fa-play"></i> تفعيل
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const status = document.getElementById('statusFilter').value;

            let filtered = allCompanies;
            if (status) filtered = filtered.filter(c => c.status === status);
            if (search) {
                filtered = filtered.filter(c =>
                    (c.company_name || '').toLowerCase().includes(search) ||
                    (c.email || '').toLowerCase().includes(search) ||
                    (c.company_field || '').toLowerCase().includes(search)
                );
            }
            renderList(filtered);
        }

        function updateStats() {
            const total = allCompanies.length;
            const pending = allCompanies.filter(c => c.status === 'pending').length;
            const approved = allCompanies.filter(c => c.status === 'approved').length;
            const rejected = allCompanies.filter(c => c.status === 'rejected').length;

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statPending').textContent = pending;
            document.getElementById('statApproved').textContent = approved;
            document.getElementById('statRejected').textContent = rejected;
        }

        async function loadCompanies() {
            const sb = window.ProVance.sb;
            const { data, error } = await sb.from('companies')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error(error);
                window.ProVance.showToast('خطأ في تحميل الشركات', 'error');
                return;
            }
            allCompanies = data || [];
            updateStats();
            applyFilters();
        }

        window.showDetails = (userId) => {
            const c = allCompanies.find(c => c.user_id === userId);
            if (!c) return;

            const trainingFields = Array.isArray(c.training_fields) ? c.training_fields : [];
            const branches = Array.isArray(c.branch_locations) ? c.branch_locations : [];

            const content = document.getElementById('detailsContent');
            content.innerHTML = `
                <div style="text-align:center; margin-bottom: 20px;">
                    <div class="company-logo" style="width: 80px; height: 80px; margin: 0 auto 10px; font-size: 2rem;">
                        ${c.logo ? `<img src="${c.logo}" alt="${c.company_name}">` : getInitial(c.company_name)}
                    </div>
                    <h3 style="font-size: 1.3rem; font-weight: 800;">${window.ProVance.escapeHtml(c.company_name || '-')}</h3>
                    <span class="company-status status-${c.status || 'pending'}" style="margin-top: 6px;">
                        ${STATUS_LABELS[c.status || 'pending']}
                    </span>
                </div>

                ${c.company_bio ? `
                <div class="detail-section-title"><i class="fas fa-align-right"></i> النبذة</div>
                <div style="color: var(--text-muted); line-height: 1.7; font-size: 0.92rem;">${window.ProVance.escapeHtml(c.company_bio)}</div>
                ` : ''}

                <div class="detail-section-title"><i class="fas fa-info-circle"></i> المعلومات الأساسية</div>
                <div class="detail-row"><span class="label">المجال</span><span class="value">${window.ProVance.escapeHtml(c.company_field || '-')}</span></div>
                <div class="detail-row"><span class="label">المدينة</span><span class="value">${window.ProVance.escapeHtml(c.company_location || '-')}</span></div>
                <div class="detail-row"><span class="label">عدد الموظفين</span><span class="value">${c.employees_count || '-'}</span></div>
                ${branches.length > 0 ? `<div class="detail-row"><span class="label">الفروع</span><span class="value">${branches.length} فرع: ${branches.map(b => window.ProVance.escapeHtml(b)).join('، ')}</span></div>` : ''}
                ${c.is_startup ? `<div class="detail-row"><span class="label">الشركة</span><span class="value">🚀 ناشئة (Startup)</span></div>` : ''}

                <div class="detail-section-title"><i class="fas fa-address-book"></i> الاتصال</div>
                <div class="detail-row"><span class="label">البريد</span><span class="value" style="direction:ltr">${c.email || '-'}</span></div>
                <div class="detail-row"><span class="label">الهاتف</span><span class="value" style="direction:ltr">${c.primary_phone || '-'}</span></div>
                ${c.secondary_phone ? `<div class="detail-row"><span class="label">هاتف ثانوي</span><span class="value" style="direction:ltr">${c.secondary_phone}</span></div>` : ''}
                ${c.whatsapp ? `<div class="detail-row"><span class="label">واتساب</span><span class="value" style="direction:ltr">${c.whatsapp}</span></div>` : ''}
                ${c.inquiry_email ? `<div class="detail-row"><span class="label">بريد الاستفسارات</span><span class="value" style="direction:ltr">${c.inquiry_email}</span></div>` : ''}
                ${c.website ? `<div class="detail-row"><span class="label">الموقع</span><span class="value"><a href="${c.website}" target="_blank">${c.website}</a></span></div>` : ''}
                ${c.linkedin ? `<div class="detail-row"><span class="label">LinkedIn</span><span class="value"><a href="${c.linkedin}" target="_blank">رابط</a></span></div>` : ''}
                ${c.facebook ? `<div class="detail-row"><span class="label">Facebook</span><span class="value"><a href="${c.facebook}" target="_blank">رابط</a></span></div>` : ''}

                ${trainingFields.length > 0 ? `
                <div class="detail-section-title"><i class="fas fa-graduation-cap"></i> التدريب</div>
                <div class="detail-row"><span class="label">المجالات</span><span class="value">${trainingFields.map(f => window.ProVance.escapeHtml(f)).join('، ')}</span></div>
                <div class="detail-row"><span class="label">السعر</span><span class="value">${c.training_price || 'مجاني'}</span></div>
                <div class="detail-row"><span class="label">مدة الرد</span><span class="value">${c.max_response_days || '-'} أيام</span></div>
                ` : ''}

                <div class="detail-section-title"><i class="fas fa-history"></i> النشاط</div>
                <div class="detail-row"><span class="label">تاريخ التقديم</span><span class="value">${window.ProVance.formatDateTime(c.created_at)}</span></div>
                ${c.approved_at ? `<div class="detail-row"><span class="label">تاريخ الاعتماد</span><span class="value">${window.ProVance.formatDateTime(c.approved_at)}</span></div>` : ''}
                ${c.rejection_reason ? `<div class="detail-row" style="background: rgba(239,68,68,0.05); padding:10px; border-radius:8px; flex-direction: column; gap: 4px;"><span class="label">سبب الرفض:</span><span class="value">${window.ProVance.escapeHtml(c.rejection_reason)}</span></div>` : ''}
            `;

            document.getElementById('detailsModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.closeDetailsModal = () => {
            document.getElementById('detailsModal').classList.remove('active');
            document.body.style.overflow = '';
        };

        window.approveCompany = async (userId, name) => {
            const ok = await window.ProVance.confirmModal({
                title: 'الموافقة على الشركة',
                message: `هل تريد قبول "${name}"؟`,
                confirmText: 'نعم، قبول'
            });
            if (!ok) return;

            try {
                const sb = window.ProVance.sb;
                await sb.from('companies').update({
                    status: 'approved',
                    approved_at: new Date().toISOString(),
                    rejection_reason: null
                }).eq('user_id', userId);

                await window.ProVance.sendNotification({
                    userId,
                    userType: 'company',
                    title: '🎉 تم اعتماد شركتك',
                    message: 'مبروك! تم اعتماد شركتك على المنصة. يمكنك الآن إضافة فرص تدريب',
                    type: 'success',
                    actionUrl: 'company-dashboard.html'
                });

                window.ProVance.showToast('تم القبول ✓', 'success');
                await loadCompanies();
            } catch (err) {
                console.error(err);
                window.ProVance.showToast('حدث خطأ', 'error');
            }
        };

        window.openRejectModal = (userId, name) => {
            rejectingId = userId;
            rejectingName = name;
            document.getElementById('rejectReason').value = '';
            document.getElementById('rejectModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.closeRejectModal = () => {
            document.getElementById('rejectModal').classList.remove('active');
            document.body.style.overflow = '';
        };

        window.confirmReject = async () => {
            const reason = document.getElementById('rejectReason').value.trim();
            if (!rejectingId) return;

            try {
                const sb = window.ProVance.sb;
                await sb.from('companies').update({
                    status: 'rejected',
                    rejection_reason: reason || 'لم يُحدد سبب'
                }).eq('user_id', rejectingId);

                await window.ProVance.sendNotification({
                    userId: rejectingId,
                    userType: 'company',
                    title: 'تم رفض طلب شركتك',
                    message: `للأسف لم يتم اعتماد طلبك${reason ? '. السبب: ' + reason : ''}`,
                    type: 'error'
                });

                window.ProVance.showToast('تم رفض الشركة', 'info');
                closeRejectModal();
                await loadCompanies();
            } catch (err) {
                console.error(err);
                window.ProVance.showToast('حدث خطأ', 'error');
            }
        };

        window.suspendCompany = async (userId, name) => {
            const ok = await window.ProVance.confirmModal({
                title: 'إيقاف الشركة',
                message: `هل تريد إيقاف "${name}"؟ لن تستطيع نشر فرص جديدة`,
                confirmText: 'نعم، إيقاف'
            });
            if (!ok) return;

            try {
                const sb = window.ProVance.sb;
                await sb.from('companies').update({ status: 'suspended' }).eq('user_id', userId);
                await window.ProVance.sendNotification({
                    userId,
                    userType: 'company',
                    title: 'تم إيقاف حساب شركتك',
                    message: 'تم إيقاف حساب شركتك مؤقتاً. للاستفسار تواصل مع الإدارة',
                    type: 'warning'
                });
                window.ProVance.showToast('تم الإيقاف', 'warning');
                await loadCompanies();
            } catch (err) {
                console.error(err);
                window.ProVance.showToast('حدث خطأ', 'error');
            }
        };

        window.reactivateCompany = async (userId, name) => {
            const ok = await window.ProVance.confirmModal({
                title: 'إعادة تفعيل',
                message: `هل تريد إعادة تفعيل "${name}"؟`
            });
            if (!ok) return;

            try {
                const sb = window.ProVance.sb;
                await sb.from('companies').update({ status: 'approved' }).eq('user_id', userId);
                await window.ProVance.sendNotification({
                    userId,
                    userType: 'company',
                    title: '✅ تم إعادة تفعيل حسابك',
                    message: 'تم إعادة تفعيل حساب شركتك بنجاح',
                    type: 'success'
                });
                window.ProVance.showToast('تم التفعيل', 'success');
                await loadCompanies();
            } catch (err) {
                console.error(err);
                window.ProVance.showToast('حدث خطأ', 'error');
            }
        };

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('statusFilter').addEventListener('change', applyFilters);

        window.logoutAdmin = async (e) => {
            e.preventDefault();
            const ok = await window.ProVance.confirmModal({
                title: 'تسجيل الخروج',
                message: 'هل تريد تسجيل الخروج؟'
            });
            if (ok) await window.ProVance.logout('admin-login.html');
        };

        async function init() {
            const ok = await window.ProVance.requireAdminAuth();
            if (!ok) return;
            await loadCompanies();

            const sb = window.ProVance.sb;
            sb.channel('admin-companies')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'companies' }, () => {
                    loadCompanies();
                })
                .subscribe();
        }
        init();
    })();
    </script>
</body>
</html>
