<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <link rel="preconnect" href="https://jrwazyrdzmbcnddpxxrf.supabase.co" crossorigin>
    <title>طلباتي - ProVance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
:root {
    --primary:#4facfe; --secondary:#00f2fe;
    --gradient:linear-gradient(135deg,#4facfe,#00f2fe);
    --bg:#0a0e27; --bg-2:#1a1535;
    --card:rgba(255,255,255,0.04); --card-hover:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.15);
    --text:#fff; --text-muted:#94a3b8;
    --error:#ef4444; --success:#10b981; --warning:#f59e0b; --info:#4facfe;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.bg-anim{position:fixed;inset:0;z-index:-1;background:radial-gradient(circle at 20% 20%,rgba(79,172,254,0.08),transparent 45%),radial-gradient(circle at 80% 80%,rgba(0,242,254,0.06),transparent 45%),var(--bg)}
.layout{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:260px;background:rgba(20,18,40,0.7);backdrop-filter:blur(20px);border-left:1px solid var(--border);padding:24px 16px;position:fixed;inset:0 0 0 auto;z-index:100;display:flex;flex-direction:column}
.sidebar-logo{padding:8px 4px 18px;margin-bottom:16px;border-bottom:1px solid var(--border)}
.logo-text{font-size:1.4rem;font-weight:900;background:var(--gradient);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 14px;color:var(--text-muted);text-decoration:none;border-radius:10px;font-size:0.92rem;font-weight:600;margin-bottom:4px;transition:all .2s}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:var(--gradient);color:#fff}
.nav-item i{width:18px}
.nav-badge{margin-right:auto;background:var(--error);color:#fff;font-size:0.7rem;font-weight:700;padding:2px 8px;border-radius:10px;min-width:20px;text-align:center}
.nav-badge:empty{display:none}
.sidebar-footer{padding:14px;border-top:1px solid var(--border);margin-top:auto}

/* Main */
.main{margin-right:260px;flex:1;padding:28px 24px;max-width:1000px}
.page-header{margin-bottom:28px}
.page-title{font-size:1.5rem;font-weight:900;display:flex;align-items:center;gap:10px}
.page-title i{color:var(--primary)}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center}
.stat-num{font-size:1.8rem;font-weight:900;margin-bottom:4px}
.stat-label{color:var(--text-muted);font-size:0.82rem;font-weight:600}

/* Filter tabs */
.filter-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-tab{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text-muted);font-size:0.85rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.filter-tab.active,.filter-tab:hover{background:var(--gradient);color:#fff;border-color:transparent}

/* Application card */
.app-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px;transition:border-color .2s;position:relative}
.app-card:hover{border-color:var(--border-strong)}
.app-card-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
.company-logo{width:48px;height:48px;border-radius:12px;background:var(--bg-2,#1a1535);display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:var(--primary);flex-shrink:0;overflow:hidden}
.company-logo img{width:100%;height:100%;object-fit:cover;border-radius:12px}
.app-info{flex:1;min-width:0}
.app-title{font-size:1rem;font-weight:800;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.app-company{color:var(--text-muted);font-size:0.85rem;font-weight:600}
.app-date{color:var(--text-muted);font-size:0.78rem;margin-top:4px}

/* Status badges */
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:0.78rem;font-weight:700}
.status-pending{background:rgba(245,158,11,0.15);color:#fbbf24}
.status-accepted,.status-interview_scheduled{background:rgba(16,185,129,0.15);color:#34d399}
.status-rejected{background:rgba(239,68,68,0.15);color:#f87171}
.status-completed{background:rgba(79,172,254,0.15);color:#60a5fa}
.status-withdrawn{background:rgba(148,163,184,0.15);color:#94a3b8}

/* Details section */
.app-details{border-top:1px solid var(--border);padding-top:12px;margin-top:4px}
.detail-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:0.85rem;color:var(--text-muted)}
.detail-row i{color:var(--primary);width:16px;flex-shrink:0;margin-top:2px}
.detail-row span{color:var(--text)}

/* Rejection reason box */
.rejection-box{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:12px;margin-top:10px}
.rejection-box-title{color:#f87171;font-weight:700;font-size:0.85rem;margin-bottom:4px}
.rejection-box-text{color:var(--text-muted);font-size:0.85rem;line-height:1.6}

/* Interview box */
.interview-box{background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.2);border-radius:10px;padding:12px;margin-top:10px}
.interview-box-title{color:#34d399;font-weight:700;font-size:0.85rem;margin-bottom:6px}

/* Action buttons */
.app-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-weight:700;font-size:0.82rem;cursor:pointer;border:none;font-family:inherit;transition:all .2s;text-decoration:none}
.btn-primary{background:var(--gradient);color:#fff}
.btn-secondary{background:var(--card);border:1px solid var(--border);color:var(--text-muted)}
.btn-danger{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state i{font-size:3rem;margin-bottom:16px;opacity:0.4}
.empty-state h3{font-size:1.1rem;margin-bottom:8px}

/* Loading */
.skeleton{background:linear-gradient(90deg,var(--card) 25%,rgba(255,255,255,0.06) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:10px;height:120px;margin-bottom:14px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Hamburger */
.hamburger{display:none;position:fixed;top:16px;left:16px;z-index:200;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;cursor:pointer;color:var(--text)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99}

@media(max-width:768px){
    .hamburger{display:flex}
    .sidebar{transform:translateX(100%)}
    .sidebar.open{transform:translateX(0)}
    .overlay.open{display:block}
    .main{margin-right:0;padding:70px 16px 24px}
    .stats-row{grid-template-columns:repeat(2,1fr)}
}
    </style>
</head>
<body>
<div class="bg-anim"></div>
<button class="hamburger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <span class="logo-text">ProVance</span>
        </div>
        <nav>
            <a href="student-dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> الرئيسية</a>
            <a href="student-internship.html" class="nav-item"><i class="fas fa-search"></i> فرص التدريب</a>
            <a href="student-applications.html" class="nav-item active"><i class="fas fa-file-alt"></i> طلباتي</a>
            <a href="student-profile.html" class="nav-item"><i class="fas fa-user"></i> ملفي</a>
            <a href="student-payments.html" class="nav-item"><i class="fas fa-credit-card"></i> المدفوعات</a>
            <a href="student-support.html" class="nav-item"><i class="fas fa-headset"></i> التواصل مع الإدارة</a>
            <a href="student-notifications.html" class="nav-item"><i class="fas fa-bell"></i> الإشعارات <span class="nav-badge" id="notifBadge" style="display:none"></span></a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" onclick="logoutStudent(event)" class="nav-item" style="color:var(--error)">
                <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
        <div class="page-header">
            <h1 class="page-title"><i class="fas fa-file-alt"></i> طلباتي</h1>
            <p style="color:var(--text-muted);font-size:0.9rem;margin-top:6px">تتبع حالة طلبات التدريب الخاصة بك</p>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-num" id="statTotal" style="color:var(--primary)">0</div>
                <div class="stat-label">إجمالي الطلبات</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="statPending" style="color:#fbbf24">0</div>
                <div class="stat-label">قيد المراجعة</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="statAccepted" style="color:#34d399">0</div>
                <div class="stat-label">مقبول / مقابلة</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="statRejected" style="color:#f87171">0</div>
                <div class="stat-label">مرفوض</div>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">الكل</button>
            <button class="filter-tab" data-filter="pending">قيد المراجعة</button>
            <button class="filter-tab" data-filter="interview_scheduled">مقابلة</button>
            <button class="filter-tab" data-filter="accepted">مقبول</button>
            <button class="filter-tab" data-filter="rejected">مرفوض</button>
            <button class="filter-tab" data-filter="completed">مكتمل</button>
        </div>

        <!-- Applications List -->
        <div id="appsList">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton" style="height:80px"></div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
(async () => {
    'use strict';

    // ── Auth ──────────────────────────────────────────────────────
    const authResult = await window.ProVance.requireStudentAuth();
    if (!authResult) return;
    const { session, student } = authResult;
    const userId = session.user.id;

    let allApps  = [];
    let filter   = 'all';

    const sb = await window.ProVance.waitForSupabaseClient();

    // ── Load notification badge ───────────────────────────────────
    try {
        const cnt = await window.ProVance.getUnreadNotificationsCount(userId);
        const b   = document.getElementById('notifBadge');
        if (b && cnt > 0) { b.textContent = cnt; b.style.display = 'inline-block'; }
    } catch(e) {}

    // ── Load applications ─────────────────────────────────────────
    async function loadApps() {
        const { data, error } = await sb
            .from('applications')
            .select('id, company_user_id, company_name, company_logo, internship_id, internship_title, application_message, status, rejection_reason, interview_date, interview_location, interview_notes, created_at, updated_at')
            .eq('student_user_id', userId)
            .order('created_at', { ascending: false });

        if (error) {
            document.getElementById('appsList').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>حدث خطأ في التحميل</h3><p>' + error.message + '</p></div>';
            return;
        }

        allApps = data || [];
        updateStats();
        renderApps();
    }

    function updateStats() {
        document.getElementById('statTotal').textContent    = allApps.length;
        document.getElementById('statPending').textContent  = allApps.filter(a => a.status === 'pending').length;
        document.getElementById('statAccepted').textContent = allApps.filter(a => ['accepted','interview_scheduled'].includes(a.status)).length;
        document.getElementById('statRejected').textContent = allApps.filter(a => a.status === 'rejected').length;
    }

    function renderApps() {
        const list = document.getElementById('appsList');
        const apps = filter === 'all' ? allApps : allApps.filter(a => a.status === filter);

        if (!apps.length) {
            list.innerHTML = '<div class="empty-state">' +
                '<i class="fas fa-folder-open"></i>' +
                '<h3>' + (filter === 'all' ? 'لم تقدم على أي فرصة بعد' : 'لا توجد طلبات بهذه الحالة') + '</h3>' +
                '<p>' + (filter === 'all' ? 'ابدأ بتصفح فرص التدريب المتاحة' : '') + '</p>' +
                (filter === 'all' ? '<a href="student-internship.html" class="btn btn-primary" style="margin-top:16px;display:inline-flex"><i class="fas fa-search"></i> تصفح الفرص</a>' : '') +
                '</div>';
            return;
        }

        list.innerHTML = apps.map(a => renderCard(a)).join('');
    }

    function renderCard(a) {
        const statusLabels = {
            pending:             ['قيد المراجعة',   'status-pending',   'fas fa-clock'],
            interview_scheduled: ['تمت جدولة مقابلة','status-accepted',  'fas fa-calendar-check'],
            accepted:            ['مقبول',           'status-accepted',   'fas fa-check-circle'],
            rejected:            ['مرفوض',           'status-rejected',   'fas fa-times-circle'],
            completed:           ['مكتمل',           'status-completed',  'fas fa-award'],
            withdrawn:           ['منسحب',           'status-withdrawn',  'fas fa-minus-circle']
        };
        const [label, cls, icon] = statusLabels[a.status] || ['غير معروف','status-pending','fas fa-question'];

        const logoHtml = a.company_logo
            ? '<img src="' + esc(a.company_logo) + '" alt="">'
            : '<i class="fas fa-building"></i>';

        const interviewHtml = a.interview_date ? `
            <div class="interview-box">
                <div class="interview-box-title"><i class="fas fa-calendar-check"></i> تفاصيل المقابلة</div>
                <div class="detail-row"><i class="fas fa-clock"></i><span>${new Date(a.interview_date).toLocaleString('ar-EG')}</span></div>
                ${a.interview_location ? '<div class="detail-row"><i class="fas fa-map-marker-alt"></i><span>' + esc(a.interview_location) + '</span></div>' : ''}
                ${a.interview_notes   ? '<div class="detail-row"><i class="fas fa-sticky-note"></i><span>'  + esc(a.interview_notes)   + '</span></div>' : ''}
            </div>` : '';

        const rejectionHtml = a.status === 'rejected' && a.rejection_reason ? `
            <div class="rejection-box">
                <div class="rejection-box-title"><i class="fas fa-info-circle"></i> سبب الرفض</div>
                <div class="rejection-box-text">${esc(a.rejection_reason)}</div>
            </div>` : '';

        const msgHtml = a.application_message
            ? '<div class="detail-row"><i class="fas fa-comment-dots"></i><span>' + esc(a.application_message.substring(0, 120)) + (a.application_message.length > 120 ? '...' : '') + '</span></div>'
            : '';

        const withdrawBtn = a.status === 'pending'
            ? '<button class="btn btn-danger" onclick="withdrawApp(\'' + a.id + '\')"><i class="fas fa-times"></i> سحب الطلب</button>'
            : '';

        return `
        <div class="app-card" id="card-${a.id}">
            <div class="app-card-header">
                <div class="company-logo">${logoHtml}</div>
                <div class="app-info">
                    <div class="app-title">${esc(a.internship_title || 'فرصة تدريب')}</div>
                    <div class="app-company"><i class="fas fa-building" style="font-size:0.75rem"></i> ${esc(a.company_name || '-')}</div>
                    <div class="app-date"><i class="fas fa-calendar-alt" style="font-size:0.72rem"></i> تقديم: ${new Date(a.created_at).toLocaleDateString('ar-EG')}</div>
                </div>
                <span class="status-badge ${cls}"><i class="${icon}"></i> ${label}</span>
            </div>
            <div class="app-details">
                ${msgHtml}
                ${interviewHtml}
                ${rejectionHtml}
                <div class="app-actions">
                    <a href="student-internship.html" class="btn btn-secondary"><i class="fas fa-search"></i> فرص أخرى</a>
                    ${withdrawBtn}
                </div>
            </div>
        </div>`;
    }

    // ── Withdraw ──────────────────────────────────────────────────
    window.withdrawApp = async (id) => {
        if (!confirm('هل تريد سحب هذا الطلب؟')) return;
        try {
            const { error } = await sb.from('applications')
                .update({ status: 'withdrawn', updated_at: new Date().toISOString() })
                .eq('id', id)
                .eq('student_user_id', userId);
            if (error) throw error;
            window.ProVance.showToast('تم سحب الطلب', 'success');
            await loadApps();
        } catch(e) {
            window.ProVance.showToast('خطأ: ' + e.message, 'error');
        }
    };

    // ── Filter tabs ───────────────────────────────────────────────
    document.querySelectorAll('.filter-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filter = btn.dataset.filter;
            renderApps();
        });
    });

    // ── Helpers ───────────────────────────────────────────────────
    function esc(s) {
        if (!s) return '';
        return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    window.logoutStudent = async (e) => {
        e.preventDefault();
        await window.ProVance.logout('student-login.html');
    };

    window.toggleSidebar = () => {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('open');
    };

    // ── Start ─────────────────────────────────────────────────────
    await loadApps();

    // Real-time updates
    try {
        sb.channel('student-apps')
            .on('postgres_changes', {
                event: '*', schema: 'public', table: 'applications',
                filter: 'student_user_id=eq.' + userId
            }, () => loadApps())
            .subscribe();
    } catch(e) {}

})();
</script>
</body>
</html>
