<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>طلباتي - ProVance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
:root{--primary:#4facfe;--gradient:linear-gradient(135deg,#4facfe,#00f2fe);--bg:#0a0e27;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--text:#fff;--muted:#94a3b8;--err:#ef4444;--ok:#10b981}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.bg{position:fixed;inset:0;z-index:-1;background:radial-gradient(circle at 20% 20%,rgba(79,172,254,.08),transparent 45%),radial-gradient(circle at 80% 80%,rgba(0,242,254,.06),transparent 45%),var(--bg)}
.layout{display:flex;min-height:100vh}
.sidebar{width:260px;background:rgba(20,18,40,.7);backdrop-filter:blur(20px);border-left:1px solid var(--border);padding:24px 16px;position:fixed;inset:0 0 0 auto;z-index:100;transition:transform .3s;display:flex;flex-direction:column}
.logo-wrap{display:flex;align-items:center;gap:10px;padding-bottom:18px;margin-bottom:4px;border-bottom:1px solid var(--border)}
.logo-brand{font-weight:900;font-size:1.1rem;background:var(--gradient);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:.7rem;color:var(--muted)}
.nav-a{display:flex;align-items:center;gap:10px;padding:12px 14px;color:var(--muted);text-decoration:none;border-radius:10px;font-size:.92rem;font-weight:600;margin-bottom:4px;transition:all .2s}
.nav-a:hover{background:var(--card);color:var(--text)}
.nav-a.on{background:var(--gradient);color:#fff}
.nav-a i{width:18px;text-align:center}
.main{margin-right:260px;flex:1;padding:28px 24px}
.topbar{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.hbtn{display:none;width:40px;height:40px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--muted);cursor:pointer;align-items:center;justify-content:center}
h1{font-size:1.4rem;font-weight:900;display:flex;align-items:center;gap:10px}
h1 i{color:var(--primary)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center}
.sn{font-size:1.8rem;font-weight:900;margin-bottom:4px}
.sl{color:var(--muted);font-size:.8rem;font-weight:600}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.tab.on,.tab:hover{background:var(--gradient);color:#fff;border-color:transparent}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px}
.ctop{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
.clogo{width:48px;height:48px;border-radius:12px;background:#1a1535;display:flex;align-items:center;justify-content:center;color:var(--primary);font-size:1.3rem;flex-shrink:0;overflow:hidden}
.clogo img{width:100%;height:100%;object-fit:cover;border-radius:12px}
.ci{flex:1;min-width:0}
.ct{font-size:1rem;font-weight:800;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc{color:var(--muted);font-size:.85rem}
.cd{color:var(--muted);font-size:.78rem;margin-top:3px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:.78rem;font-weight:700;white-space:nowrap}
.bp{background:rgba(245,158,11,.15);color:#fbbf24}
.ba{background:rgba(16,185,129,.15);color:#34d399}
.br{background:rgba(239,68,68,.15);color:#f87171}
.bc{background:rgba(79,172,254,.15);color:#60a5fa}
.bw{background:rgba(148,163,184,.15);color:#94a3b8}
.cbody{border-top:1px solid var(--border);padding-top:12px}
.row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:.85rem;color:var(--muted)}
.row i{color:var(--primary);width:16px;flex-shrink:0;margin-top:2px}
.row span{color:var(--text)}
.box{border-radius:10px;padding:12px;margin-top:10px}
.bok{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2)}
.bok-t{color:#34d399;font-weight:700;font-size:.85rem;margin-bottom:6px}
.berr{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2)}
.berr-t{color:#f87171;font-weight:700;font-size:.85rem;margin-bottom:4px}
.berr-b{color:var(--muted);font-size:.85rem;line-height:1.6}
.acts{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-weight:700;font-size:.82rem;cursor:pointer;border:none;font-family:inherit;text-decoration:none;transition:all .2s}
.btn-s{background:var(--card);border:1px solid var(--border);color:var(--muted)}
.btn-d{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171}
.empty{text-align:center;padding:60px 20px;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:16px}
.empty i{font-size:3.5rem;opacity:.3;display:block;margin-bottom:16px}
.empty h3{color:var(--text);margin-bottom:8px}
.skel{background:linear-gradient(90deg,var(--card) 25%,rgba(255,255,255,.06) 50%,var(--card) 75%);background-size:200% 100%;animation:sh 1.4s infinite;border-radius:14px;height:110px;margin-bottom:14px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
@media(max-width:1024px){.sidebar{transform:translateX(100%)}.sidebar.open{transform:translateX(0)}.main{margin-right:0}.hbtn{display:flex}}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}.main{padding:70px 14px 24px}}
    </style>
</head>
<body>
<div class="bg"></div>
<div class="layout">
  <aside class="sidebar" id="sidebarEl">
    <div class="logo-wrap">
      <div style="width:42px;height:42px;flex-shrink:0">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4facfe"/><stop offset="100%" stop-color="#00f2fe"/></linearGradient></defs><path d="M16 2 L28 8 V20 Q28 26 16 30 Q4 26 4 20 V8 Z" fill="url(#g)" stroke="#fff" stroke-width=".5" opacity=".95"/><text x="16" y="20" text-anchor="middle" font-family="Cairo,sans-serif" font-size="14" font-weight="900" fill="#fff">P</text></svg>
      </div>
      <div><div class="logo-brand">ProVance</div><div class="logo-sub">منصة التدريب</div></div>
    </div>
    <a href="student-dashboard.html"    class="nav-a"><i class="fas fa-th-large"></i> الرئيسية</a>
    <a href="student-internship.html"   class="nav-a"><i class="fas fa-search"></i> فرص التدريب</a>
    <a href="student-applications.html" class="nav-a on"><i class="fas fa-file-alt"></i> طلباتي</a>
    <a href="student-profile.html"      class="nav-a"><i class="fas fa-user"></i> ملفي</a>
    <a href="student-payments.html"     class="nav-a"><i class="fas fa-credit-card"></i> المدفوعات</a>
    <a href="student-support.html"      class="nav-a"><i class="fas fa-headset"></i> التواصل مع الإدارة</a>
    <a href="student-notifications.html" class="nav-a"><i class="fas fa-bell"></i> الإشعارات</a>
    <a href="#" onclick="doLogout(event)" class="nav-a" style="margin-top:auto;color:var(--err)"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</a>
  </aside>
  <main class="main">
    <div class="topbar">
      <button class="hbtn" onclick="document.getElementById('sidebarEl').classList.toggle('open')"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-file-alt"></i> طلباتي</h1>
    </div>
    <div class="stats">
      <div class="sc"><div class="sn" id="sT" style="color:var(--primary)">-</div><div class="sl">إجمالي</div></div>
      <div class="sc"><div class="sn" id="sP" style="color:#fbbf24">-</div><div class="sl">قيد المراجعة</div></div>
      <div class="sc"><div class="sn" id="sA" style="color:#34d399">-</div><div class="sl">مقبول / مقابلة</div></div>
      <div class="sc"><div class="sn" id="sR" style="color:#f87171">-</div><div class="sl">مرفوض</div></div>
    </div>
    <div class="tabs">
      <button class="tab on" data-f="all">الكل</button>
      <button class="tab" data-f="pending">قيد المراجعة</button>
      <button class="tab" data-f="interview_scheduled">مقابلة</button>
      <button class="tab" data-f="accepted">مقبول</button>
      <button class="tab" data-f="rejected">مرفوض</button>
      <button class="tab" data-f="completed">مكتمل</button>
    </div>
    <div id="list"><div class="skel"></div><div class="skel"></div></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
// نفس الـ pattern بالظبط من student-internship.html
// ═══════════════════════════════════════════════════════════
let studentUserId = null;
let all = [], filter = 'all';

function esc(s) {
    return String(s||'').replace(/[&<>"']/g,
        c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function loadAll() {
    // نفس منطق الـ client initialization من student-internship
    let sb = null;
    if (window.ProVance?.waitForSupabaseClient) {
        try { sb = await window.ProVance.waitForSupabaseClient(15000); } catch(e) {}
    }
    if (!sb && typeof supabase !== 'undefined' && supabase.createClient) {
        try {
            sb = supabase.createClient(
                'https://jrwazyrdzmbcnddpxxrf.supabase.co',
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyd2F6eXJkem1iY25kZHB4eHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzUyMzksImV4cCI6MjA5MjExMTIzOX0.KaZt3Xb-9zjjwlSYnCvQQVxzDgbcOxdmnpg9wsUsqQI',
                { auth: { persistSession: true, storage: window.localStorage } }
            );
        } catch(e) {}
    }
    if (!sb) {
        if (!window._pageRetried) {
            window._pageRetried = true;
            setTimeout(() => location.reload(), 3000);
        }
        return;
    }

    // نفس getSession من student-internship
    const session = await sb.auth.getSession();
    const userId = session?.data?.session?.user?.id;
    if (!userId) {
        window.location.href = 'student-login.html';
        return;
    }
    studentUserId = userId;

    // جيب الطلبات
    const { data, error } = await sb
        .from('applications')
        .select('id,company_name,company_logo,internship_title,application_message,status,rejection_reason,interview_date,interview_location,interview_notes,created_at')
        .eq('student_user_id', studentUserId)
        .order('created_at', { ascending: false });

    if (error) {
        document.getElementById('list').innerHTML =
            '<div class="empty"><i class="fas fa-exclamation-triangle"></i><h3>خطأ في التحميل</h3><p>' + esc(error.message) + '</p></div>';
        return;
    }
    all = data || [];
    stats();
    render();

    // Withdraw handler
    window.doWithdraw = async (id) => {
        if (!confirm('هل تريد سحب هذا الطلب؟')) return;
        const { error: e } = await sb.from('applications')
            .update({ status:'withdrawn', updated_at: new Date().toISOString() })
            .eq('id', id).eq('student_user_id', studentUserId);
        if (e) { alert('خطأ: ' + e.message); return; }
        await loadAll();
    };

    // Logout
    window.doLogout = async (ev) => {
        ev.preventDefault();
        if (!confirm('هل تريد تسجيل الخروج؟')) return;
        try { await sb.auth.signOut(); } catch {}
        localStorage.clear();
        window.location.href = 'student-login.html';
    };
}

function stats() {
    document.getElementById('sT').textContent = all.length;
    document.getElementById('sP').textContent = all.filter(a=>a.status==='pending').length;
    document.getElementById('sA').textContent = all.filter(a=>['accepted','interview_scheduled'].includes(a.status)).length;
    document.getElementById('sR').textContent = all.filter(a=>a.status==='rejected').length;
}

function render() {
    const items = filter==='all' ? all : all.filter(a=>a.status===filter);
    const el = document.getElementById('list');
    if (!items.length) {
        el.innerHTML = '<div class="empty"><i class="fas fa-folder-open"></i>' +
            '<h3>' + (filter==='all' ? 'لم تقدم على أي فرصة بعد' : 'لا توجد طلبات') + '</h3>' +
            (filter==='all' ? '<a href="student-internship.html" class="btn" style="background:var(--gradient);color:#fff;margin-top:16px;display:inline-flex"><i class="fas fa-search"></i> تصفح الفرص</a>' : '') +
            '</div>';
        return;
    }
    const M = {
        pending:             ['قيد المراجعة','bp','fa-clock'],
        interview_scheduled: ['مقابلة جُدولت','ba','fa-calendar-check'],
        accepted:            ['مقبول','ba','fa-check-circle'],
        rejected:            ['مرفوض','br','fa-times-circle'],
        completed:           ['مكتمل','bc','fa-award'],
        withdrawn:           ['منسحب','bw','fa-minus-circle']
    };
    el.innerHTML = items.map(a => {
        const [lbl,cls,ico] = M[a.status] || ['غير معروف','bp','fa-question'];
        const logo = a.company_logo
            ? '<img src="'+esc(a.company_logo)+'" alt="">'
            : '<i class="fas fa-building"></i>';
        const iv = a.interview_date ? `
            <div class="box bok">
                <div class="bok-t"><i class="fas fa-calendar-check"></i> تفاصيل المقابلة</div>
                <div class="row"><i class="fas fa-clock"></i><span>${new Date(a.interview_date).toLocaleString('ar-EG')}</span></div>
                ${a.interview_location?'<div class="row"><i class="fas fa-map-marker-alt"></i><span>'+esc(a.interview_location)+'</span></div>':''}
                ${a.interview_notes?'<div class="row"><i class="fas fa-sticky-note"></i><span>'+esc(a.interview_notes)+'</span></div>':''}
            </div>` : '';
        const rj = a.status==='rejected' && a.rejection_reason ? `
            <div class="box berr">
                <div class="berr-t"><i class="fas fa-info-circle"></i> سبب الرفض</div>
                <div class="berr-b">${esc(a.rejection_reason)}</div>
            </div>` : '';
        return `<div class="card"><div class="ctop">
            <div class="clogo">${logo}</div>
            <div class="ci">
                <div class="ct">${esc(a.internship_title||'فرصة تدريب')}</div>
                <div class="cc"><i class="fas fa-building" style="font-size:.75rem"></i> ${esc(a.company_name||'-')}</div>
                <div class="cd"><i class="fas fa-calendar-alt" style="font-size:.72rem"></i> ${new Date(a.created_at).toLocaleDateString('ar-EG')}</div>
            </div>
            <span class="badge ${cls}"><i class="fas ${ico}"></i> ${lbl}</span>
        </div><div class="cbody">
            ${a.application_message?'<div class="row"><i class="fas fa-comment-dots"></i><span>'+esc(a.application_message.substring(0,100))+(a.application_message.length>100?'...':'')+'</span></div>':''}
            ${iv}${rj}
            <div class="acts">
                <a href="student-internship.html" class="btn btn-s"><i class="fas fa-search"></i> فرص أخرى</a>
                ${a.status==='pending'?'<button class="btn btn-d" onclick="doWithdraw(\''+a.id+'\')"><i class="fas fa-times"></i> سحب الطلب</button>':''}
            </div>
        </div></div>`;
    }).join('');
}

document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
        t.classList.add('on');
        filter = t.dataset.f;
        render();
    });
});

// ── ابدأ ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', loadAll);
</script>
</body>
</html>
