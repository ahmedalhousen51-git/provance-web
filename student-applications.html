<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <link rel="preconnect" href="https://jrwazyrdzmbcnddpxxrf.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://jrwazyrdzmbcnddpxxrf.supabase.co">
    <title>طلباتي - ProVance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
:root {
    --primary: #4facfe; --secondary: #00f2fe;
    --gradient: linear-gradient(135deg, #4facfe, #00f2fe);
    --bg: #0a0e27; --bg-2: #1a1535;
    --card: rgba(255,255,255,0.04); --card-hover: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
    --text: #fff; --text-muted: #94a3b8;
    --error: #ef4444; --success: #10b981; --warning: #f59e0b; --info: #4facfe;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
.bg-anim { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 20% 20%, rgba(79,172,254,0.08), transparent 45%), radial-gradient(circle at 80% 80%, rgba(0,242,254,0.06), transparent 45%), var(--bg); }
.layout { display: flex; min-height: 100vh; }
.sidebar { width: 260px; background: rgba(20,18,40,0.7); backdrop-filter: blur(20px); border-left: 1px solid var(--border); padding: 24px 16px; position: fixed; inset: 0 0 0 auto; z-index: 100; transition: transform .3s; display: flex; flex-direction: column; }
.sidebar-logo { padding: 8px 4px 18px; margin-bottom: 4px; border-bottom: 1px solid var(--border); }
.logo-wrapper { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; filter: drop-shadow(0 4px 12px rgba(79,172,254,0.3)); }
.logo-brand { font-weight: 900; font-size: 1.1rem; background: var(--gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.logo-tagline { font-size: 0.72rem; color: var(--text-muted); }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; color: var(--text-muted); text-decoration: none; border-radius: 10px; font-size: 0.92rem; font-weight: 600; margin-bottom: 4px; transition: all .2s; }
.nav-item:hover { background: var(--card); color: var(--text); }
.nav-item.active { background: var(--gradient); color: #fff; }
.nav-item i { width: 18px; text-align: center; }
.nav-badge { margin-right: auto; background: var(--error); color: #fff; font-size: 0.7rem; font-weight: 700; padding: 2px 7px; border-radius: 10px; min-width: 20px; text-align: center; }
.nav-badge:empty { display: none; }
.main { margin-right: 260px; flex: 1; padding: 28px 24px; }
.topbar { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
.menu-toggle { display: none; width: 40px; height: 40px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text-muted); cursor: pointer; align-items: center; justify-content: center; }
.topbar-title { font-size: 1.4rem; font-weight: 900; display: flex; align-items: center; gap: 10px; }
.topbar-title i { color: var(--primary); }
/* Stats */
.stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 24px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; text-align: center; }
.stat-num { font-size: 1.8rem; font-weight: 900; margin-bottom: 4px; }
.stat-lbl { color: var(--text-muted); font-size: 0.8rem; font-weight: 600; }
/* Tabs */
.tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.tab { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--text-muted); font-size: 0.85rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .2s; }
.tab.active, .tab:hover { background: var(--gradient); color: #fff; border-color: transparent; }
/* Card */
.app-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 14px; }
.app-card:hover { border-color: var(--border-strong); }
.card-top { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
.co-logo { width: 48px; height: 48px; border-radius: 12px; background: var(--bg-2,#1a1535); display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1.3rem; flex-shrink: 0; overflow: hidden; }
.co-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
.app-info { flex: 1; min-width: 0; }
.app-title { font-size: 1rem; font-weight: 800; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.app-company { color: var(--text-muted); font-size: 0.85rem; }
.app-date { color: var(--text-muted); font-size: 0.78rem; margin-top: 3px; }
.status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; white-space: nowrap; }
.s-pending { background: rgba(245,158,11,0.15); color: #fbbf24; }
.s-accepted, .s-interview_scheduled { background: rgba(16,185,129,0.15); color: #34d399; }
.s-rejected { background: rgba(239,68,68,0.15); color: #f87171; }
.s-completed { background: rgba(79,172,254,0.15); color: #60a5fa; }
.s-withdrawn { background: rgba(148,163,184,0.15); color: #94a3b8; }
.card-body { border-top: 1px solid var(--border); padding-top: 12px; }
.info-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; font-size: 0.85rem; color: var(--text-muted); }
.info-row i { color: var(--primary); width: 16px; flex-shrink: 0; margin-top: 2px; }
.info-row span { color: var(--text); }
/* Boxes */
.interview-box { background: rgba(16,185,129,0.07); border: 1px solid rgba(16,185,129,0.2); border-radius: 10px; padding: 12px; margin-top: 10px; }
.interview-box-title { color: #34d399; font-weight: 700; font-size: 0.85rem; margin-bottom: 6px; }
.rejection-box { background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; padding: 12px; margin-top: 10px; }
.rejection-box-title { color: #f87171; font-weight: 700; font-size: 0.85rem; margin-bottom: 4px; }
.rejection-text { color: var(--text-muted); font-size: 0.85rem; line-height: 1.6; }
.actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; font-weight: 700; font-size: 0.82rem; cursor: pointer; border: none; font-family: inherit; text-decoration: none; transition: all .2s; }
.btn-primary { background: var(--gradient); color: #fff; }
.btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text-muted); }
.btn-danger { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #f87171; }
/* Empty */
.empty { text-align: center; padding: 60px 20px; color: var(--text-muted); background: var(--card); border: 1px solid var(--border); border-radius: 16px; }
.empty i { font-size: 3.5rem; opacity: 0.3; display: block; margin-bottom: 16px; }
.empty h3 { color: var(--text); margin-bottom: 8px; }
/* Skeleton */
.skel { background: linear-gradient(90deg,var(--card) 25%,rgba(255,255,255,0.06) 50%,var(--card) 75%); background-size: 200% 100%; animation: sh 1.4s infinite; border-radius: 14px; height: 110px; margin-bottom: 14px; }
@keyframes sh { 0%{background-position:200% 0}100%{background-position:-200% 0} }
@media (max-width: 1024px) {
    .sidebar { transform: translateX(100%); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-right: 0; }
    .menu-toggle { display: flex; }
}
@media (max-width: 600px) {
    .stats-row { grid-template-columns: repeat(2,1fr); }
    .main { padding: 70px 14px 24px; }
}
    </style>
</head>
<body>
<div class="bg-anim"></div>
<div class="layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="logo-wrapper">
                <div class="logo-icon">
                    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                        <defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4facfe"/><stop offset="100%" stop-color="#00f2fe"/></linearGradient></defs>
                        <path d="M16 2 L28 8 V20 Q28 26 16 30 Q4 26 4 20 V8 Z" fill="url(#lg)" stroke="#fff" stroke-width="0.5" opacity="0.95"/>
                        <text x="16" y="20" text-anchor="middle" font-family="Cairo,sans-serif" font-size="14" font-weight="900" fill="#fff">P</text>
                    </svg>
                </div>
                <div class="logo-text"><div class="logo-brand">ProVance</div><div class="logo-tagline">منصة التدريب</div></div>
            </div>
        </div>
        <a href="student-dashboard.html"    class="nav-item"><i class="fas fa-th-large"></i> الرئيسية</a>
        <a href="student-internship.html"   class="nav-item"><i class="fas fa-search"></i> فرص التدريب</a>
        <a href="student-applications.html" class="nav-item active"><i class="fas fa-file-alt"></i> طلباتي</a>
        <a href="student-profile.html"      class="nav-item"><i class="fas fa-user"></i> ملفي</a>
        <a href="student-payments.html"     class="nav-item"><i class="fas fa-credit-card"></i> المدفوعات</a>
        <a href="student-support.html"      class="nav-item"><i class="fas fa-headset"></i> التواصل مع الإدارة</a>
        <a href="student-notifications.html" class="nav-item"><i class="fas fa-bell"></i> الإشعارات</a>
        <a href="#" onclick="logoutStudent(event)" class="nav-item" style="margin-top:auto;color:var(--error)">
            <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
        </a>
    </aside>

    <main class="main">
        <div class="topbar">
            <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
                <i class="fas fa-bars"></i>
            </button>
            <h1 class="topbar-title"><i class="fas fa-file-alt"></i> طلباتي</h1>
        </div>

        <div class="stats-row">
            <div class="stat-card"><div class="stat-num" id="sTotal"  style="color:var(--primary)">-</div><div class="stat-lbl">إجمالي</div></div>
            <div class="stat-card"><div class="stat-num" id="sPending" style="color:#fbbf24">-</div><div class="stat-lbl">قيد المراجعة</div></div>
            <div class="stat-card"><div class="stat-num" id="sAccepted" style="color:#34d399">-</div><div class="stat-lbl">مقبول / مقابلة</div></div>
            <div class="stat-card"><div class="stat-num" id="sRejected" style="color:#f87171">-</div><div class="stat-lbl">مرفوض</div></div>
        </div>

        <div class="tabs">
            <button class="tab active" data-f="all">الكل</button>
            <button class="tab" data-f="pending">قيد المراجعة</button>
            <button class="tab" data-f="interview_scheduled">مقابلة</button>
            <button class="tab" data-f="accepted">مقبول</button>
            <button class="tab" data-f="rejected">مرفوض</button>
            <button class="tab" data-f="completed">مكتمل</button>
        </div>

        <div id="list">
            <div class="skel"></div>
            <div class="skel"></div>
            <div class="skel" style="height:70px"></div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
(async () => {
    // Auth
    const auth = await window.ProVance.requireStudentAuth();
    if (!auth) return;
    const uid = auth.session.user.id;
    const sb  = window.ProVance.sb;

    let all = [], filter = 'all';

    function esc(s) {
        return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    async function load() {
        const { data, error } = await sb
            .from('applications')
            .select('id, company_name, company_logo, internship_title, application_message, status, rejection_reason, interview_date, interview_location, interview_notes, created_at')
            .eq('student_user_id', uid)
            .order('created_at', { ascending: false });

        if (error) {
            document.getElementById('list').innerHTML = '<div class="empty"><i class="fas fa-exclamation-triangle"></i><h3>حدث خطأ في التحميل</h3><p>' + esc(error.message) + '</p></div>';
            return;
        }
        all = data || [];
        stats();
        render();
    }

    function stats() {
        document.getElementById('sTotal').textContent   = all.length;
        document.getElementById('sPending').textContent = all.filter(a => a.status === 'pending').length;
        document.getElementById('sAccepted').textContent = all.filter(a => ['accepted','interview_scheduled'].includes(a.status)).length;
        document.getElementById('sRejected').textContent = all.filter(a => a.status === 'rejected').length;
    }

    function render() {
        const items = filter === 'all' ? all : all.filter(a => a.status === filter);
        const list = document.getElementById('list');

        if (!items.length) {
            list.innerHTML = '<div class="empty">' +
                '<i class="fas fa-folder-open"></i>' +
                '<h3>' + (filter === 'all' ? 'لم تقدم على أي فرصة بعد' : 'لا توجد طلبات بهذه الحالة') + '</h3>' +
                (filter === 'all' ? '<a href="student-internship.html" class="btn btn-primary" style="margin-top:16px;display:inline-flex"><i class="fas fa-search"></i> تصفح الفرص</a>' : '') +
                '</div>';
            return;
        }

        list.innerHTML = items.map(a => {
            const statMap = {
                pending:             ['قيد المراجعة', 's-pending',   'fa-clock'],
                interview_scheduled: ['مقابلة جُدولت','s-accepted',  'fa-calendar-check'],
                accepted:            ['مقبول',          's-accepted',  'fa-check-circle'],
                rejected:            ['مرفوض',          's-rejected',  'fa-times-circle'],
                completed:           ['مكتمل',          's-completed', 'fa-award'],
                withdrawn:           ['منسحب',          's-withdrawn', 'fa-minus-circle']
            };
            const [lbl, cls, ico] = statMap[a.status] || ['غير معروف','s-pending','fa-question'];
            const logo = a.company_logo
                ? '<img src="' + esc(a.company_logo) + '" alt="">'
                : '<i class="fas fa-building"></i>';

            const interviewHtml = a.interview_date ? `
                <div class="interview-box">
                    <div class="interview-box-title"><i class="fas fa-calendar-check"></i> تفاصيل المقابلة</div>
                    <div class="info-row"><i class="fas fa-clock"></i><span>${new Date(a.interview_date).toLocaleString('ar-EG')}</span></div>
                    ${a.interview_location ? '<div class="info-row"><i class="fas fa-map-marker-alt"></i><span>' + esc(a.interview_location) + '</span></div>' : ''}
                    ${a.interview_notes   ? '<div class="info-row"><i class="fas fa-sticky-note"></i><span>'  + esc(a.interview_notes)   + '</span></div>' : ''}
                </div>` : '';

            const rejectionHtml = a.status === 'rejected' && a.rejection_reason ? `
                <div class="rejection-box">
                    <div class="rejection-box-title"><i class="fas fa-info-circle"></i> سبب الرفض</div>
                    <div class="rejection-text">${esc(a.rejection_reason)}</div>
                </div>` : '';

            return `<div class="app-card">
                <div class="card-top">
                    <div class="co-logo">${logo}</div>
                    <div class="app-info">
                        <div class="app-title">${esc(a.internship_title || 'فرصة تدريب')}</div>
                        <div class="app-company"><i class="fas fa-building" style="font-size:.75rem"></i> ${esc(a.company_name || '-')}</div>
                        <div class="app-date"><i class="fas fa-calendar-alt" style="font-size:.72rem"></i> ${new Date(a.created_at).toLocaleDateString('ar-EG')}</div>
                    </div>
                    <span class="status-badge ${cls}"><i class="fas ${ico}"></i> ${lbl}</span>
                </div>
                <div class="card-body">
                    ${a.application_message ? '<div class="info-row"><i class="fas fa-comment-dots"></i><span>' + esc(a.application_message.substring(0,100)) + (a.application_message.length > 100 ? '...' : '') + '</span></div>' : ''}
                    ${interviewHtml}
                    ${rejectionHtml}
                    <div class="actions">
                        <a href="student-internship.html" class="btn btn-secondary"><i class="fas fa-search"></i> فرص أخرى</a>
                        ${a.status === 'pending' ? '<button class="btn btn-danger" onclick="withdraw(\'' + a.id + '\')"><i class="fas fa-times"></i> سحب الطلب</button>' : ''}
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    window.withdraw = async (id) => {
        if (!confirm('هل تريد سحب هذا الطلب؟')) return;
        const { error } = await sb.from('applications')
            .update({ status: 'withdrawn', updated_at: new Date().toISOString() })
            .eq('id', id).eq('student_user_id', uid);
        if (error) { window.ProVance.showToast('خطأ: ' + error.message, 'error'); return; }
        window.ProVance.showToast('تم سحب الطلب', 'success');
        await load();
    };

    document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            t.classList.add('active');
            filter = t.dataset.f;
            render();
        });
    });

    window.logoutStudent = async (e) => {
        e.preventDefault();
        await window.ProVance.logout('student-login.html');
    };

    // Real-time
    try {
        sb.channel('my-apps').on('postgres_changes',
            { event: '*', schema: 'public', table: 'applications', filter: 'student_user_id=eq.' + uid },
            () => load()
        ).subscribe();
    } catch(e) {}

    await load();
})();
</script>
</body>
</html>
