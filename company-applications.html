<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://jrwazyrdzmbcnddpxxrf.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://jrwazyrdzmbcnddpxxrf.supabase.co">

    <title>طلبات التقديم - ProVance</title>

    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        :root {
            --primary: #ef4444;
            --primary-dark: #dc2626;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #ef4444;

            --bg: #0a0e27;
            --bg-card: rgba(255,255,255,0.04);
            --bg-hover: rgba(255,255,255,0.08);
            --border: rgba(255,255,255,0.1);

            --text: #ffffff;
            --text-muted: #94a3b8;

            --sidebar-w: 260px;
            --header-h: 72px;
            --radius: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ============================================================
         * Loading Overlay
         * ============================================================ */
        #loading {
            position: fixed; inset: 0;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity .4s, visibility .4s;
        }
        #loading.hidden { opacity: 0; visibility: hidden; }

        .spinner-wrap { text-align: center; }
        .spinner-box {
            width: 60px; height: 60px;
            margin: 0 auto 16px;
            border: 4px solid rgba(239,68,68,0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ============================================================
         * Sidebar
         * ============================================================ */
        .sidebar {
            position: fixed; top: 0; right: 0;
            width: var(--sidebar-w); height: 100vh;
            background: linear-gradient(180deg, #0f172a, #1e293b);
            border-left: 1px solid var(--border);
            display: flex; flex-direction: column;
            transition: transform .3s;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 22px 20px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
        }

        .sidebar-logo {
            padding: 8px 4px 18px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px;
        }
        .logo-icon {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            filter: drop-shadow(0 4px 12px rgba(239,68,68,0.3));
        }
        .logo-icon svg {
            width: 100%;
            height: 100%;
        }
        .logo-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }
        .logo-brand {
            font-size: 1.15rem;
            font-weight: 900;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
            line-height: 1;
        }
        .logo-tagline {
            font-size: 0.68rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .sidebar-brand { font-weight: 800; font-size: 1.1rem; }
        .sidebar-brand small { display: block; font-size: 0.72rem; color: var(--text-muted); font-weight: 500; }

        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
            overflow-y: auto;
        }

        .nav-section { margin-bottom: 20px; }
        .nav-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0 12px 8px;
        }

        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 11px 14px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 3px;
            transition: all .2s;
            font-weight: 600;
            font-size: 0.93rem;
            position: relative;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text);
        }

        .nav-item.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
        }

        .nav-item i { width: 20px; text-align: center; font-size: 0.95rem; }

        .nav-badge {
            margin-right: auto;
            background: var(--danger);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            min-width: 20px;
            text-align: center;
        }
        .nav-badge:empty { display: none; }

        .sidebar-footer {
            padding: 14px;
            border-top: 1px solid var(--border);
        }

        .logout-btn {
            width: 100%;
            padding: 12px;
            background: rgba(239,68,68,0.1);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            font-size: 0.93rem;
            transition: all .2s;
        }
        .logout-btn:hover { background: rgba(239,68,68,0.2); color: #fff; }

        /* ============================================================
         * Main Content
         * ============================================================ */
        .main {
            margin-right: var(--sidebar-w);
            min-height: 100vh;
        }

        .header {
            height: var(--header-h);
            background: rgba(10,14,39,0.8);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0;
            z-index: 100;
        }

        .header-title {
            display: flex; align-items: center; gap: 12px;
            font-size: 1.15rem; font-weight: 700;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.3rem;
            cursor: pointer;
            padding: 8px;
        }

        .user-box {
            display: flex; align-items: center; gap: 12px;
            padding: 6px 10px 6px 6px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50px;
        }

        .user-avatar {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            overflow: hidden;
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .user-info { line-height: 1.2; }
        .user-info .name { font-size: 0.87rem; font-weight: 700; }
        .user-info .role { font-size: 0.72rem; color: var(--text-muted); }

        /* ============================================================
         * Page Content
         * ============================================================ */
        .page { padding: 28px; }

        /* Welcome Card */
        .welcome {
            background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(118,75,162,0.08));
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: var(--radius);
            padding: 26px;
            margin-bottom: 24px;
            display: flex; gap: 22px; align-items: center; flex-wrap: wrap;
        }

        .welcome-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem;
            flex-shrink: 0;
        }

        .welcome-content { flex: 1; min-width: 260px; }
        .welcome-content h1 {
            font-size: 1.7rem; font-weight: 900;
            margin-bottom: 6px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .welcome-content p { color: var(--text-muted); margin-bottom: 14px; }

        .welcome-actions { display: flex; gap: 10px; flex-wrap: wrap; }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-family: inherit;
            font-size: 0.92rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex; align-items: center; gap: 8px;
            transition: all .2s;
        }
        .btn:hover { transform: translateY(-1px); }

        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); color: #fff; }
        .btn-outline { background: var(--bg-card); color: var(--text); border: 1px solid var(--border); }
        .btn-outline:hover { background: var(--bg-hover); }
        .btn-small { padding: 8px 14px; font-size: 0.85rem; }

        /* Stats Grid */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            display: flex; gap: 16px; align-items: center;
            cursor: pointer;
            transition: all .2s;
        }
        .stat-card:hover { transform: translateY(-3px); border-color: var(--primary); }

        .stat-icon {
            width: 52px; height: 52px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
            color: #fff;
            flex-shrink: 0;
        }
        .stat-icon.primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); }
        .stat-icon.success { background: linear-gradient(135deg, #10b981, #059669); }
        .stat-icon.warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .stat-icon.info    { background: linear-gradient(135deg, #ef4444, #dc2626); }

        .stat-value { font-size: 1.9rem; font-weight: 900; line-height: 1; margin-bottom: 4px; }
        .stat-label { font-size: 0.85rem; color: var(--text-muted); }

        /* Sections */
        .section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px;
            margin-bottom: 24px;
        }

        .section-head {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
        }

        .section-title {
            font-size: 1.1rem; font-weight: 800;
            display: flex; align-items: center; gap: 10px;
        }
        .section-title i { color: var(--primary); }

        /* Search Bar */
        .search-bar {
            position: relative;
            margin-bottom: 18px;
        }
        .search-bar i {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted);
        }
        .search-bar input {
            width: 100%;
            padding: 11px 44px 11px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.93rem;
        }
        .search-bar input:focus { outline: none; border-color: var(--primary); }

        /* Applications Grid */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 14px;
        }

        .app-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            transition: all .2s;
        }
        .app-card:hover { border-color: var(--primary); }

        .app-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .app-avatar {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            color: #fff;
            flex-shrink: 0;
            overflow: hidden;
            font-weight: 700;
        }
        .app-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .app-name { font-weight: 700; font-size: 0.98rem; }
        .app-sub  { font-size: 0.83rem; color: var(--text-muted); }

        .app-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 12px 0;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }
        .detail-row { font-size: 0.82rem; }
        .detail-row .lbl { color: var(--text-muted); }
        .detail-row .val { font-weight: 600; }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.76rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .status-pending  { background: rgba(245,158,11,0.15); color: #fbbf24; }
        .status-accepted { background: rgba(16,185,129,0.15); color: #34d399; }
        .status-rejected { background: rgba(239,68,68,0.15);  color: #f87171; }
        .status-interview { background: rgba(239,68,68,0.15); color: #f87171; }

        .app-actions { display: flex; gap: 8px; margin-top: 12px; }
        .app-actions .btn { flex: 1; justify-content: center; }

        /* Empty States */
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        .empty i { font-size: 2.8rem; margin-bottom: 12px; opacity: 0.4; }
        .empty h3 { font-size: 1.1rem; margin-bottom: 6px; color: var(--text); }

        /* Charts */
        .charts-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .chart-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }
        .chart-box h3 {
            font-size: 1rem; font-weight: 700;
            margin-bottom: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .chart-box h3 i { color: var(--primary); }
        .chart-container { position: relative; height: 260px; }

        /* Interviews List */
        .interview-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.02);
            border-radius: 10px;
            margin-bottom: 8px;
        }
        .interview-item:last-child { margin-bottom: 0; }

        .interview-avatar {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        .interview-info { flex: 1; min-width: 0; }
        .interview-info .n { font-weight: 700; font-size: 0.92rem; }
        .interview-info .f { font-size: 0.8rem; color: var(--text-muted); }

        .interview-time {
            font-size: 0.82rem;
            color: var(--info);
            font-weight: 600;
            white-space: nowrap;
        }

        /* Modals */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center; justify-content: center;
            z-index: 9998;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: #1e293b;
            border: 1px solid var(--border);
            border-radius: 16px;
            max-width: 500px; width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn .3s;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .modal-head {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-head h3 { font-size: 1.1rem; font-weight: 700; }
        .modal-close {
            background: none; border: none; color: var(--text-muted);
            font-size: 1.3rem; cursor: pointer;
        }

        .modal-body { padding: 22px 24px; }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; font-weight: 600; font-size: 0.9rem;
            margin-bottom: 6px; color: var(--text-muted);
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.93rem;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus { outline: none; border-color: var(--primary); }
        .form-group textarea { resize: vertical; min-height: 80px; }

        .modal-foot {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex; gap: 10px; justify-content: flex-end;
        }

        /* ============================================================
         * Mobile Responsive
         * ============================================================ */
        @media (max-width: 992px) {
            .charts-row { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(100%);
                box-shadow: -10px 0 30px rgba(0,0,0,.5);
            }
            .sidebar.open { transform: translateX(0); }
            .main { margin-right: 0; }
            .menu-toggle { display: block; }
            .page { padding: 18px; }
            .user-info { display: none; }
            .welcome-content h1 { font-size: 1.4rem; }
            .stats { grid-template-columns: 1fr 1fr; }
            .stat-value { font-size: 1.5rem; }
            .app-details { grid-template-columns: 1fr; }
        }

        @media (max-width: 480px) {
            .stats { grid-template-columns: 1fr; }
            .welcome { padding: 20px; }
            .welcome-icon { width: 56px; height: 56px; font-size: 1.6rem; }
        }

        /* Backdrop for mobile */
        .sidebar-backdrop {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        .sidebar-backdrop.show { display: block; }
    </style>
</head>
<body>
    <!-- Loading -->
    <div id="loading">
        <div class="spinner-wrap">
            <div class="spinner-box"></div>
            <p style="color: var(--text-muted)">جاري التحميل...</p>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main">
        <header class="header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="menu-toggle" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="header-title">
                    <i class="fas fa-file-alt" style="color: var(--primary);"></i>
                    طلبات التقديم
                </div>
            </div>

            <div class="user-box">
                <div class="user-avatar" id="headerAvatar">
                    <i class="fas fa-building"></i>
                </div>
                <div class="user-info">
                    <div class="name" id="headerName">جاري التحميل...</div>
                    <div class="role">شركة معتمدة</div>
                </div>
            </div>
        </header>

            <!-- Stats -->
            <div class="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:18px;padding:0 24px">
                <div class="stat-card" style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;align-items:center;gap:12px">
                    <div style="width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,#ef4444,#dc2626);display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:#fff"><i class="fas fa-file-alt"></i></div>
                    <div><div id="statTotal" style="font-size:1.5rem;font-weight:800;line-height:1">0</div><div style="font-size:0.82rem;color:var(--text-muted);margin-top:4px">إجمالي الطلبات</div></div>
                </div>
                <div class="stat-card" style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;align-items:center;gap:12px">
                    <div style="width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,#f59e0b,#f97316);display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:#fff"><i class="fas fa-clock"></i></div>
                    <div><div id="statPending" style="font-size:1.5rem;font-weight:800;line-height:1">0</div><div style="font-size:0.82rem;color:var(--text-muted);margin-top:4px">قيد المراجعة</div></div>
                </div>
                <div class="stat-card" style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;align-items:center;gap:12px">
                    <div style="width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:#fff"><i class="fas fa-check"></i></div>
                    <div><div id="statAccepted" style="font-size:1.5rem;font-weight:800;line-height:1">0</div><div style="font-size:0.82rem;color:var(--text-muted);margin-top:4px">مقبول</div></div>
                </div>
                <div class="stat-card" style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;align-items:center;gap:12px">

<script>
window.getSafeSupabase = async function() {

        try {

        const sb = window.ProVance && window.ProVance.sb;
        if (sb && typeof sb.from === 'function') return sb;
    } catch(e) {}
    if (typeof supabase !== 'undefined' && supabase.createClient) {
        try {
            return supabase.createClient(
                'https://jrwazyrdzmbcnddpxxrf.supabase.co',
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyd2F6eXJkem1iY25kZHB4eHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzUyMzksImV4cCI6MjA5MjExMTIzOX0.KaZt3Xb-9zjjwlSYnCvQQVxzDgbcOxdmnpg9wsUsqQI',
                { auth: { persistSession: true, storage: window.localStorage } }
            );
        } catch(e) {}
    }
    return null;
};

const esc = (s) => String(s||'').replace(/[&<>"\']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const showToast = (m, t) => {
    if (window.ProVance && window.ProVance.showToast) return window.ProVance.showToast(m, t);
    console.log('toast:', m);
};

let companyUserId = null;
let allApplications = [];
let currentFilter = 'all';

// Hide loading
function hideLoading() {
    const l = document.getElementById('loading');
    if (l) l.classList.add('hidden');
}

// Resilient auth: ينتظر session مع retry
async function waitForSession(sb, maxRetries = 5) {
    for (let i = 0; i < maxRetries; i++) {
        try {
            const { data: { session } } = await sb.auth.getSession();
            if (session && session.user) return session;
        } catch(e) {}
        await new Promise(r => setTimeout(r, 500));
    }
    return null;
}

async function loadAll() {
    const sb = await window.getSafeSupabase();
    if (!sb) {
        document.getElementById('appsList').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-muted)"><i class="fas fa-exclamation-triangle" style="font-size:3rem;color:var(--warning);margin-bottom:14px;display:block"></i><h3 style="color:var(--text)">فشل تحميل النظام</h3><p>تأكد من الاتصال بالإنترنت</p><button onclick="location.reload()" style="margin-top:14px;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-family:inherit;font-weight:700;cursor:pointer"><i class="fas fa-sync-alt"></i> إعادة المحاولة</button></div>';
        hideLoading();
        return;
    }
    
    const session = await waitForSession(sb);
    if (!session) {
        // ما نـ redirect على طول، نعرض رسالة
        document.getElementById('appsList').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-muted)"><i class="fas fa-lock" style="font-size:3rem;color:var(--warning);margin-bottom:14px;display:block"></i><h3 style="color:var(--text)">يرجى تسجيل الدخول</h3><p>الجلسة منتهية أو لم تسجل دخول</p><a href="company-login.html" style="display:inline-block;margin-top:14px;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;text-decoration:none;padding:10px 20px;border-radius:10px;font-weight:700"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</a></div>';
        hideLoading();
        return;
    }
    
    companyUserId = session.user.id;
    console.log('✓ Company user:', companyUserId);

    // حمّل اسم الشركة وحدّث الهيدر (كان بيفضل "جاري التحميل")
    try {
        const { data: comp } = await sb.from('companies').select('company_name, logo').eq('user_id', companyUserId).maybeSingle();
        const nameEl = document.getElementById('headerName');
        if (nameEl) nameEl.textContent = (comp && comp.company_name) || 'الشركة';
        const avatarEl = document.getElementById('headerAvatar');
        if (avatarEl && comp && comp.logo) {
            avatarEl.innerHTML = '<img src="' + String(comp.logo).replace(/"/g,'&quot;') + '" style="width:100%;height:100%;object-fit:cover;border-radius:inherit">';
        } else if (avatarEl) {
            avatarEl.textContent = ((comp && comp.company_name) || 'ش').charAt(0);
        }
    } catch(e) { 
        const nameEl = document.getElementById('headerName');
        if (nameEl) nameEl.textContent = 'الشركة';
        console.warn('company name load:', e); 
    }

    try {
        const { data, error } = await sb.from('applications')
            .select('id, student_user_id, student_name, student_email, student_photo, student_university, student_cv_url, internship_id, internship_title, application_message, status, rejection_reason, interview_date, interview_location, interview_notes, training_schedule, created_at, updated_at')
            .eq('company_user_id', companyUserId)
            .order('created_at', { ascending: false });
        
        hideLoading();
        
        if (error) {
            console.error('Load error:', error);
            document.getElementById('appsList').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-muted)"><i class="fas fa-exclamation-circle" style="font-size:3rem;color:var(--danger);margin-bottom:14px;display:block"></i><h3 style="color:var(--text)">خطأ في تحميل البيانات</h3><p>' + esc(error.message) + '</p><p style="font-size:0.85rem;margin-top:8px">Code: ' + (error.code || '-') + '</p><button onclick="loadAll()" style="margin-top:14px;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-family:inherit;font-weight:700;cursor:pointer"><i class="fas fa-sync-alt"></i> إعادة المحاولة</button></div>';
            return;
        }
        
        allApplications = data || [];
        console.log('✓ تم تحميل', allApplications.length, 'طلب');

        // auto-complete: أي تدريب انتهت مدته بدون ضغط زرار "إنهاء التدريب"
        const today = new Date(); today.setHours(0,0,0,0);
        const overdueApps = allApplications.filter(a =>
            a.status === 'in_training' &&
            a.training_schedule?.end_date &&
            new Date(a.training_schedule.end_date) < today
        );
        for (const a of overdueApps) {
            try {
                await sb.from('applications').update({ status: 'completed', updated_at: new Date().toISOString() }).eq('id', a.id);
                const { data: stu } = await sb.from('student').select('level').eq('user_id', a.student_user_id).maybeSingle();
                const levelUp = { beginner: 'intermediate', intermediate: 'advanced' };
                const newLvl = levelUp[stu?.level || 'beginner'];
                if (newLvl) await sb.from('student').update({ level: newLvl }).eq('user_id', a.student_user_id);
                a.status = 'completed';
                console.log('auto-completed:', a.id, '→ level:', newLvl);
            } catch(e) { console.warn('auto-complete failed:', a.id, e.message); }
        }

        updateStats();
        renderApps();
    } catch(err) {
        console.error('Load exception:', err);
        hideLoading();
        document.getElementById('appsList').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-muted)"><i class="fas fa-times-circle" style="font-size:3rem;color:var(--danger);margin-bottom:14px;display:block"></i><h3 style="color:var(--text)">خطأ غير متوقع</h3><p>' + esc(err.message) + '</p><button onclick="location.reload()" style="margin-top:14px;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-family:inherit;font-weight:700;cursor:pointer">إعادة التحميل</button></div>';
    }
}

function updateStats() {
    document.getElementById('statTotal').textContent = allApplications.length;
    document.getElementById('statPending').textContent = allApplications.filter(a => a.status === 'pending').length;
    document.getElementById('statAccepted').textContent = allApplications.filter(a => ['hired','in_training','completed','interview_scheduled','interview_done'].includes(a.status)).length;
    document.getElementById('statRejected').textContent = allApplications.filter(a => a.status === 'rejected').length;
}

window.filterApps = (filter) => {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => {
        const isActive = b.dataset.filter === filter;
        b.classList.toggle('active', isActive);
        if (isActive) {
            b.style.background = 'linear-gradient(135deg,#ef4444,#dc2626)';
            b.style.color = '#fff';
            b.style.border = 'none';
        } else {
            b.style.background = 'var(--bg-card)';
            b.style.color = 'var(--text-muted)';
            b.style.border = '1px solid var(--border)';
        }
    });
    renderApps();
};

function renderApps() {
    const list = document.getElementById('appsList');
    let apps = allApplications;
    if (currentFilter !== 'all') {
        if (currentFilter === 'hired') apps = apps.filter(a => ['hired','in_training','completed'].includes(a.status));
        else apps = apps.filter(a => a.status === currentFilter);
    }
    
    if (apps.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-muted)"><i class="fas fa-inbox" style="font-size:4rem;color:rgba(148,163,184,0.3);margin-bottom:14px;display:block"></i><h3 style="color:var(--text);margin-bottom:6px">لا توجد طلبات</h3><p>' + (currentFilter === 'all' ? 'لم يقدم أحد بعد على فرصكم' : 'لا توجد طلبات بهذه الحالة') + '</p></div>';
        return;
    }
    
    list.innerHTML = apps.map(a => {
        const initial = (a.student_name || '?').trim().charAt(0).toUpperCase();
        const avatar = a.student_photo 
            ? '<img src="' + esc(a.student_photo) + '" alt="" style="width:100%;height:100%;object-fit:cover">'
            : '<span>' + initial + '</span>';
        
        const STATUS_BADGES = {
            'pending': '<span style="background:rgba(245,158,11,0.15);color:#f59e0b;padding:4px 10px;border-radius:14px;font-size:0.78rem;font-weight:700"><i class="fas fa-clock"></i> قيد المراجعة</span>',
            'interview_scheduled': '<span style="background:rgba(239,68,68,0.15);color:#ef4444;padding:4px 10px;border-radius:14px;font-size:0.78rem;font-weight:700"><i class="fas fa-calendar"></i> مقابلة مجدولة</span>',
            'interview_done': '<span style="background:rgba(239,68,68,0.15);color:#ef4444;padding:4px 10px;border-radius:14px;font-size:0.78rem;font-weight:700"><i class="fas fa-check"></i> تمت المقابلة</span>',
            'hired': '<span style="background:rgba(16,185,129,0.15);color:#10b981;padding:4px 10px;border-radius:14px;font-size:0.78rem;font-weight:700"><i class="fas fa-check"></i> مقبول</span>',
            'in_training': '<span style="background:rgba(16,185,129,0.15);color:#10b981;padding:4px 10px;border-radius:14px;font-size:0.78rem;font-weight:700"><i class="fas fa-graduation-cap"></i> قيد التدريب</span>',
            'completed': '<span style="background:rgba(16,185,129,0.15);color:#10b981;padding:4px 10px;border-radius:14px;font-size:0.78rem;font-weight:700"><i class="fas fa-check-double"></i> أكمل</span>',
            'rejected': '<span style="background:rgba(239,68,68,0.15);color:#ef4444;padding:4px 10px;border-radius:14px;font-size:0.78rem;font-weight:700"><i class="fas fa-times"></i> مرفوض</span>'
        };
        const badge = STATUS_BADGES[a.status] || '<span style="background:rgba(148,163,184,0.15);color:#94a3b8;padding:4px 10px;border-radius:14px;font-size:0.78rem;font-weight:700">' + a.status + '</span>';
        
        const actions = a.status === 'pending' ?
            '<button onclick="acceptApp(\''+a.id+'\')" style="background:rgba(16,185,129,0.15);color:#10b981;border:1px solid rgba(16,185,129,0.3);padding:8px 14px;border-radius:10px;font-weight:700;font-family:inherit;font-size:0.85rem;cursor:pointer"><i class="fas fa-check"></i> قبول وجدولة المقابلة</button>' +
            '<button onclick="rejectApp(\''+a.id+'\')" style="background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3);padding:8px 14px;border-radius:10px;font-weight:700;font-family:inherit;font-size:0.85rem;cursor:pointer"><i class="fas fa-times"></i> رفض</button>'
            : a.status === 'interview_scheduled' ?
            '<button onclick="editInterview(\''+a.id+'\')" style="background:rgba(79,172,254,0.15);color:#4facfe;border:1px solid rgba(79,172,254,0.3);padding:8px 14px;border-radius:10px;font-weight:700;font-family:inherit;font-size:0.85rem;cursor:pointer"><i class="fas fa-edit"></i> تعديل الموعد</button>'
            : (a.status === 'accepted' || a.status === 'hired') ?
            '<button onclick="editTrainingSchedule(\''+a.id+'\')" style="background:rgba(16,185,129,0.15);color:#10b981;border:1px solid rgba(16,185,129,0.3);padding:8px 14px;border-radius:10px;font-weight:700;font-family:inherit;font-size:0.85rem;cursor:pointer"><i class="fas fa-calendar-alt"></i> تعديل جدول التدريب</button>'
            : a.status === 'in_training' ?
            '<button onclick="completeTraining(\''+a.id+'\')" style="background:rgba(16,185,129,0.15);color:#10b981;border:1px solid rgba(16,185,129,0.3);padding:8px 14px;border-radius:10px;font-weight:700;font-family:inherit;font-size:0.85rem;cursor:pointer"><i class="fas fa-flag-checkered"></i> إنهاء التدريب</button>'
            : '';
        
        return '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px">' +
            '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap">' +
                '<div style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#ef4444,#dc2626);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:1.3rem;overflow:hidden;flex-shrink:0">' + avatar + '</div>' +
                '<div style="flex:1;min-width:200px">' +
                    '<div style="font-weight:800;font-size:1.05rem">' + esc(a.student_name || 'بدون اسم') + '</div>' +
                    '<div style="color:var(--text-muted);font-size:0.85rem;margin-top:3px"><i class="fas fa-envelope" style="color:var(--primary);margin-left:4px"></i> ' + esc(a.student_email || '-') + 
                    (a.student_university ? '<span style="margin-right:10px"><i class="fas fa-university" style="color:var(--primary);margin-left:4px"></i> ' + esc(a.student_university) + '</span>' : '') + '</div>' +

            (a.rejection_reason ? '<div style="background:rgba(239,68,68,0.05);padding:10px;border-radius:8px;color:#fca5a5;font-size:0.88rem;margin-bottom:10px"><strong>سبب الرفض:</strong> ' + esc(a.rejection_reason) + '</div>' : '') +

            (a.status === 'accepted' && a.training_schedule ? '<div style="background:rgba(79,172,254,0.07);border:1px solid rgba(79,172,254,0.2);padding:10px;border-radius:8px;font-size:0.85rem;margin-bottom:10px"><strong style="color:var(--primary)">📅 جدول التدريب:</strong> يبدأ ' + (a.training_schedule.start_date||'-') + ' — ' + (a.training_schedule.training_days||[]).join('، ') + ' — ' + (a.training_schedule.daily_time||'') + '</div>' : '') +
            '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
                '<button onclick="viewDetails(\''+a.id+'\')" style="background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3);padding:8px 14px;border-radius:10px;font-weight:700;font-family:inherit;font-size:0.85rem;cursor:pointer"><i class="fas fa-eye"></i> عرض البيانات الكاملة</button>' +
                (a.student_cv_url ? '<a href="' + esc(a.student_cv_url) + '" target="_blank" style="background:var(--bg-card);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:10px;font-weight:700;font-size:0.85rem;text-decoration:none"><i class="fas fa-file-pdf"></i> تحميل CV</a>' : '') +
                actions +
            '</div>' +
        '</div>';
    }).join('');
}

async function loadStudentAISection(containerId, studentUserId, currentAppId) {
    const el = document.getElementById(containerId);
    if (!el) return;
    try {
        const sb = await window.getSafeSupabase();
        if (!sb) { el.remove(); return; }

        // جيب كل تدريبات الطالب + سجل الحضور
        const [appsRes, attRes] = await Promise.all([
            sb.from('applications')
              .select('id,company_name,company_logo,company_user_id,internship_title,status,training_schedule,training_start_date,training_end_date,created_at')
              .eq('student_user_id', studentUserId)
              .in('status', ['hired', 'in_training', 'completed'])
              .order('created_at', {ascending: false}),
            sb.from('attendance_logs')
              .select('id,application_id,company_user_id,scanned_at,status,attendance_type')
              .eq('student_user_id', studentUserId)
              .eq('attendance_type', 'daily_attendance')
        ]);

        const apps = appsRes.data || [];
        const attLogs = attRes.data || [];

        if (apps.length === 0) { el.innerHTML = ''; return; }

        function fmtDateLocal(d) {
            if (!d) return '-';
            try { return new Date(d).toLocaleDateString('ar-EG', {day:'2-digit',month:'2-digit',year:'numeric'}); }
            catch(e) { return String(d).slice(0,10); }
        }
        function initLocal(name) { return (name||'?').trim().charAt(0).toUpperCase(); }

        function calcAttLocal(app) {
            var logs = attLogs.filter(function(a) {
                if (a.application_id) return a.application_id === app.id;
                return a.company_user_id === app.company_user_id;
            });
            if (window.ProVance && window.ProVance.Att && window.ProVance.Att.calc) {
                var r = window.ProVance.Att.calc(app, logs);
                return { rate: r.rate, present: r.present, presentAll: r.presentAll,
                         absent: r.absent, late: r.late, bonusDays: r.bonusDays || 0, hasData: r.hasData };
            }
            // بدون ProVance.Att — حساب مبسط
            var sched = app.training_schedule || {};
            var startDate = sched.start_date || app.training_start_date || null;
            var endDate   = sched.end_date   || app.training_end_date   || null;
            var filtered = logs.filter(function(a) {
                if (!startDate || !a.scanned_at) return true;
                var d = new Date(a.scanned_at.slice(0,10));
                var start = new Date(startDate);
                var end = endDate ? new Date(endDate) : null;
                return d >= start && (end === null || d <= end);
            });
            var presentSet = new Set(filtered.filter(function(a){return a.status!=='absent';}).map(function(a){return a.scanned_at?a.scanned_at.slice(0,10):null;}).filter(Boolean));
            var absentSet  = new Set(filtered.filter(function(a){return a.status==='absent';}).map(function(a){return a.scanned_at?a.scanned_at.slice(0,10):null;}).filter(Boolean));
            var lateCount  = filtered.filter(function(a){return a.status==='late';}).length;
            var pDays = presentSet.size, aDays = absentSet.size;
            var rate = (pDays+aDays)>0 ? Math.min(100,Math.round(pDays/(pDays+aDays)*100)) : (pDays>0?100:0);
            return { rate, present: pDays, presentAll: pDays, absent: aDays, late: lateCount, bonusDays: 0, hasData: filtered.length>0 };
        }

        const cardsHtml = apps.map(function(app) {
            const sched = app.training_schedule || {};
            const startDate = sched.start_date || app.training_start_date || null;
            const endDate   = sched.end_date   || app.training_end_date   || null;

            let durationText = '-';
            if (startDate && endDate) {
                const days = Math.ceil((new Date(endDate)-new Date(startDate))/86400000)+1;
                durationText = days>=30 ? Math.round(days/30)+' شهر' : days+' يوم';
            }

            const att = calcAttLocal(app);
            const rateColor = att.rate>=75?'#10b981':att.rate>=50?'#f59e0b':'#ef4444';
            const isActive  = app.status==='in_training'||app.status==='hired';

            const statusBadge = isActive
                ? '<span style="display:inline-flex;align-items:center;gap:5px;background:rgba(16,185,129,0.12);color:#10b981;padding:4px 12px;border-radius:20px;font-size:0.72rem;font-weight:700"><span style="width:6px;height:6px;border-radius:50%;background:#10b981"></span>جاري التدريب</span>'
                : '<span style="background:rgba(79,172,254,0.12);color:#4facfe;padding:4px 12px;border-radius:20px;font-size:0.72rem;font-weight:700">✓ مكتمل</span>';

            const logo = app.company_logo
                ? '<img src="' + esc(app.company_logo) + '" alt="" style="width:100%;height:100%;object-fit:cover">'
                : '<span style="font-size:1.3rem;font-weight:800">' + initLocal(app.company_name) + '</span>';

            const circ   = +(2*Math.PI*22).toFixed(1);
            const offset = +(circ*(1-att.rate/100)).toFixed(1);

            const attRing = '<div style="position:relative;width:62px;height:62px;flex-shrink:0">' +
                '<svg viewBox="0 0 52 52" style="width:62px;height:62px;transform:rotate(-90deg)">' +
                '<circle cx="26" cy="26" r="22" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="4.5"/>' +
                '<circle cx="26" cy="26" r="22" fill="none" stroke="' + rateColor + '" stroke-width="4.5" stroke-dasharray="' + circ + '" stroke-dashoffset="' + offset + '" stroke-linecap="round"/>' +
                '</svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:0.74rem;font-weight:900;color:' + rateColor + '">' + att.rate + '%</div></div>';

            const attDetails = [
                '<span style="color:#10b981"><i class="fas fa-check"></i> ' + (att.present||att.presentAll||0) + ' حضر</span>',
                (att.absent||0)>0       ? '<span style="color:#ef4444"><i class="fas fa-times"></i> ' + att.absent + ' غياب</span>' : '',
                (att.bonusDays||0)>0    ? '<span style="color:#a855f7">+' + att.bonusDays + ' إضافي</span>' : '',
                (att.late||0)>0         ? '<span style="color:#f59e0b"><i class="fas fa-clock"></i> ' + att.late + ' تأخر</span>'  : ''
            ].filter(Boolean).join('<span style="opacity:0.3"> • </span>');

            const isCurrent = app.id === currentAppId;
            const borderColor = isActive ? 'rgba(16,185,129,0.25)' : isCurrent ? 'rgba(79,172,254,0.3)' : 'var(--border)';
            const topBar      = isActive ? 'linear-gradient(90deg,#10b981,#059669)' : isCurrent ? 'var(--gradient)' : 'rgba(255,255,255,0.06)';

            return '<div style="background:rgba(255,255,255,0.02);border:1px solid ' + borderColor + ';border-radius:18px;overflow:hidden;margin-bottom:14px">' +
                '<div style="height:4px;background:' + topBar + '"></div>' +
                '<div style="padding:16px">' +
                '<div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">' +
                '<div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,rgba(79,172,254,0.15),rgba(0,242,254,0.08));border:1px solid rgba(79,172,254,0.2);display:flex;align-items:center;justify-content:center;color:var(--primary);overflow:hidden;flex-shrink:0">' + logo + '</div>' +
                '<div style="flex:1;min-width:0">' +
                '<div style="font-weight:800;font-size:0.98rem;margin-bottom:2px">' + esc(app.company_name||'-') + '</div>' +
                '<div style="color:var(--text-muted);font-size:0.8rem;margin-bottom:6px">' + esc(app.internship_title||'') + '</div>' +
                statusBadge + '</div></div>' +
                '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">' +
                '<div style="background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:9px;text-align:center"><div style="font-size:0.62rem;color:var(--text-muted);margin-bottom:3px">📅 بدأ</div><div style="font-weight:700;font-size:0.78rem">' + fmtDateLocal(startDate) + '</div></div>' +
                '<div style="background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:9px;text-align:center"><div style="font-size:0.62rem;color:var(--text-muted);margin-bottom:3px">🏁 انتهى</div><div style="font-weight:700;font-size:0.78rem">' + (endDate ? fmtDateLocal(endDate) : (isActive ? '<span style="color:#10b981;font-size:0.7rem">جاري</span>' : '-')) + '</div></div>' +
                '<div style="background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:9px;text-align:center"><div style="font-size:0.62rem;color:var(--text-muted);margin-bottom:3px">⏱ المدة</div><div style="font-weight:700;font-size:0.78rem">' + durationText + '</div></div>' +
                '</div>' +
                '<div style="background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:14px">' +
                attRing +
                '<div style="flex:1;min-width:0"><div style="font-size:0.8rem;font-weight:700;margin-bottom:5px">سجل الحضور</div>' +
                '<div style="font-size:0.74rem;display:flex;flex-wrap:wrap;gap:8px;line-height:1.9">' + (attDetails||'<span style="color:var(--text-muted)">لا يوجد سجل بعد</span>') + '</div></div></div>' +
                '<div style="background:rgba(16,185,129,0.04);border:1px solid rgba(16,185,129,0.15);border-radius:10px;padding:9px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px">' +
                '<i class="fas fa-stamp" style="color:#10b981;font-size:0.85rem"></i>' +
                '<div style="font-size:0.78rem"><span style="color:var(--text-muted)">معتمد من </span><strong>' + esc(app.company_name||'-') + '</strong></div></div>' +
                '<button onclick="openSAIReport(\'' + app.id + '\',\'' + studentUserId + '\')" style="width:100%;background:var(--gradient);color:#fff;border:none;padding:13px;border-radius:12px;font-weight:700;font-family:inherit;font-size:0.92rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(79,172,254,0.2)"><i class="fas fa-file-alt"></i> عرض التقرير الكامل</button>' +
                '</div></div>';
        }).join('');

        el.innerHTML = '<div style="margin-top:12px"><div style="font-weight:800;font-size:0.95rem;margin-bottom:14px;color:#a855f7;display:flex;align-items:center;gap:8px"><i class="fas fa-briefcase"></i> سجل التدريبات (' + apps.length + ')</div>' + cardsHtml + '</div>';

    } catch(e) {
        console.warn('loadStudentAISection:', e);
        const el2 = document.getElementById(containerId);
        if (el2) el2.innerHTML = '';
    }
}

// ========== Modal: التقرير الكامل (3 تابات) ==========
window.openSAIReport = async function(appId, studentUserId) {
    const oldMod = document.getElementById('saiReportModal');
    if (oldMod) oldMod.remove();
    document.body.insertAdjacentHTML('beforeend',
        '<div id="saiReportModal" style="position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(6px);z-index:3000;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto" onclick="if(event.target===this){this.remove();document.body.style.overflow=\'\'}">' +
        '<div id="saiInner" style="background:var(--bg-2,#1a1535);border:1px solid rgba(255,255,255,0.08);border-radius:22px;width:100%;max-width:720px;padding:60px 24px;margin:auto;text-align:center">' +
        '<div style="font-size:2.5rem;opacity:0.4;margin-bottom:12px">⏳</div>' +
        '<div style="color:#94a3b8">جاري تحميل التقرير...</div>' +
        '</div></div>'
    );
    document.body.style.overflow = 'hidden';

    const escL = function(s){ return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); };
    const catL = {technical:'المهارات التقنية',soft_skills:'مهارات التواصل',performance:'الأداء العام',growth:'التطور والتعلم',personality:'الشخصية'};
    const catC = {technical:'#4facfe',soft_skills:'#10b981',performance:'#f093fb',growth:'#f59e0b',personality:'#a855f7'};

    try {
        const sb = await window.getSafeSupabase();
        if (!sb) { document.getElementById('saiReportModal')?.remove(); return; }

        const [allEvalsRes, allRecsRes, tasksRes, appRes] = await Promise.all([
            sb.from('ai_evaluations').select('*').eq('student_user_id', studentUserId).order('submitted_at',{ascending:false}),
            sb.from('career_recommendations').select('*').eq('student_user_id', studentUserId).eq('sent_to_student',true).order('created_at',{ascending:false}),
            sb.from('task_reports').select('*').eq('student_user_id', studentUserId).order('task_date',{ascending:false}),
            sb.from('applications').select('id,company_name,internship_title,status').eq('id', appId).maybeSingle()
        ]);

        const allEvals = allEvalsRes.data||[], allRecs = allRecsRes.data||[], allTasks = tasksRes.data||[];
        const app = appRes.data || {};

        const ev  = allEvals.find(function(e){return e.application_id===appId;}) || allEvals[0] || null;
        const rec = allRecs.find(function(r){return r.application_id===appId;})  || allRecs[0]  || null;
        const appTasks = allTasks.filter(function(t){return t.application_id===appId;});

        let templateQuestions = [];
        if (ev && ev.template_id) {
            try {
                const { data: tmpl } = await sb.from('ai_evaluation_templates').select('questions').eq('id', ev.template_id).maybeSingle();
                if (tmpl && Array.isArray(tmpl.questions)) templateQuestions = tmpl.questions;
            } catch(te) {}
        }

        const uid = 'ftr' + Math.random().toString(36).slice(2,8);

        // ── تاب المهام ──
        const statusMap = {
            completed:{icon:'fa-check-circle',color:'#10b981',label:'مكتملة'},
            partial:  {icon:'fa-minus-circle',color:'#f59e0b',label:'جزئية'},
            not_done: {icon:'fa-times-circle',color:'#ef4444',label:'لم تُنجز'}
        };
        let tasksHtml = '<div style="color:#94a3b8;text-align:center;padding:30px 10px"><i class="fas fa-clipboard-list" style="font-size:2rem;color:rgba(148,163,184,0.3);display:block;margin-bottom:10px"></i>لا توجد مهام مسجلة</div>';
        if (appTasks.length > 0) {
            tasksHtml = appTasks.map(function(task) {
                var st = statusMap[task.completion_status]||{icon:'fa-circle',color:'#94a3b8',label:task.completion_status||'-'};
                var stars = Array.from({length:5},function(_,i){return '<i class="fas fa-star" style="color:'+(i<(task.quality_rating||0)?'#f59e0b':'rgba(148,163,184,0.3)')+';font-size:0.78rem"></i>';}).join('');
                return '<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px;margin-bottom:10px">' +
                    '<div style="display:flex;align-items:flex-start;gap:10px"><div style="flex:1;min-width:0">' +
                    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">' +
                    '<i class="fas '+st.icon+'" style="color:'+st.color+'"></i>' +
                    '<span style="font-weight:700;font-size:0.9rem">'+st.label+'</span>' +
                    (task.task_date?'<span style="background:rgba(255,255,255,0.05);padding:2px 8px;border-radius:8px;font-size:0.74rem;color:#94a3b8">'+new Date(task.task_date).toLocaleDateString('ar-EG')+'</span>':'') +
                    (task.time_spent_hours?'<span style="background:rgba(79,172,254,0.1);color:#4facfe;padding:2px 8px;border-radius:8px;font-size:0.74rem">'+task.time_spent_hours+' ساعة</span>':'') +
                    '</div><div style="display:flex;gap:2px;margin-bottom:8px">'+stars+'</div>' +
                    (task.task_description?'<div style="color:#94a3b8;font-size:0.84rem;border-right:3px solid #4facfe;padding-right:10px;line-height:1.6">'+escL(task.task_description)+'</div>':'') +

                    questionsHtml+='</div>';
                });

            evalHtml='<div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px;margin-bottom:14px">' +

window.acceptApp = (appId) => {
    const app = allApplications.find(a => a.id === appId);
    if (!app) return;

    // اضبط الـ min date لليوم
    const todayStr = new Date().toISOString().slice(0, 10);
    const dayInput = document.getElementById('interviewDay');
    if (dayInput) dayInput.min = todayStr;

    // ملأ اسم المتقدم
    const nameEl = document.getElementById('acceptName');

// يحوّل 3 قوائم (ساعة 12 + دقيقة + ص/م) لصيغة 24 ساعة "HH:MM"
function build24hTime(hourId, minId, ampmId) {
    let h = parseInt(document.getElementById(hourId)?.value || '9', 10);
    const m = document.getElementById(minId)?.value || '00';
    const ampm = document.getElementById(ampmId)?.value || 'ص';
    if (ampm === 'م' && h !== 12) h += 12;       // مساءً: 1م=13 ... 11م=23 (12م تفضل 12)
    if (ampm === 'ص' && h === 12) h = 0;          // 12 صباحاً = منتصف الليل 00
    return String(h).padStart(2, '0') + ':' + m;
}

// يحوّل "HH:MM" (24h) لقيم الـ 3 قوائم {hour, minute, ampm}
function parse24hTime(t) {
    const [hh, mm] = (t || '09:00').split(':');
    let h = parseInt(hh, 10);
    const ampm = h >= 12 ? 'م' : 'ص';
    if (h === 0) h = 12;            // منتصف الليل
    else if (h > 12) h -= 12;       // مساءً
    return { hour: String(h), minute: mm || '00', ampm };
}

            .update({ status: 'interview_scheduled', interview_date: interviewDate, updated_at: new Date().toISOString() })

window.completeTraining = async (appId) => {
    const app = allApplications.find(a => a.id === appId);
    if (!app) return;
    if (!confirm('هل تريد إنهاء التدريب لهذا الطالب؟ سيتم ترقية مستواه تلقائياً.')) return;

    const sb = await window.getSafeSupabase();
    if (!sb) { showToast('فشل الاتصال', 'error'); return; }

    try {
        // 1. تحديث حالة الطلب إلى "مكتمل"
        const { error: appErr } = await sb.from('applications')
            .update({ status: 'completed', updated_at: new Date().toISOString() })
            .eq('id', appId);
        if (appErr) throw appErr;

        // 2. جلب مستوى الطالب الحالي
        const { data: studentData, error: stuErr } = await sb.from('student')
            .select('level')
            .eq('user_id', app.student_user_id)
            .maybeSingle();
        if (stuErr) console.warn('level fetch failed:', stuErr.message);

        // 3. حساب المستوى الجديد
        const levelUp = { beginner: 'intermediate', intermediate: 'advanced' };
        const currentLevel = studentData?.level || 'beginner';
        const newLevel = levelUp[currentLevel] || null;

        if (newLevel) {
            const { error: levelErr } = await sb.from('student')
                .update({ level: newLevel })
                .eq('user_id', app.student_user_id);
            if (levelErr) console.warn('level upgrade failed:', levelErr.message);
        }

        // 4. إشعار الطالب
        const levelNames = { beginner: 'المستوى الأول', intermediate: 'المستوى الثاني', advanced: 'المستوى الثالث' };
        if (window.ProVance && window.ProVance.sendNotification) {
            try {
                const levelMsg = newLevel
                    ? `🎖️ تهانينا! تم ترقية مستواك إلى "${levelNames[newLevel]}". يمكنك الآن التقدم لفرص أوسع.`
                    : '🎉 تهانينا على إتمام التدريب!';
                await window.ProVance.sendNotification({
                    userId: app.student_user_id,
                    userType: 'student',
                    title: '🎓 أكملت تدريبك بنجاح!',
                    message: levelMsg,
                    type: 'success',
                    link: 'student-applications.html'
                });
            } catch(e) { console.warn('notification failed:', e); }
        }

        // 5. تحديث الكاش المحلي
        const idx = allApplications.findIndex(a => a.id === appId);
        if (idx >= 0) allApplications[idx].status = 'completed';

        const upgradeMsg = newLevel ? ` وتمت ترقيته من "${levelNames[currentLevel]}" إلى "${levelNames[newLevel]}"` : '';
        showToast('✅ تم إنهاء التدريب' + upgradeMsg + ' وإرسال إشعار للطالب', 'success');
        await loadAll();
    } catch(err) {
        console.error('completeTraining error:', err);
        showToast('خطأ: ' + err.message, 'error');
    }
};

function renderModal(html) {
    // أزل أي modal موجود بنفس الـ id
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    const newModal = tmp.firstElementChild;
    if (newModal?.id) {
        const old = document.getElementById(newModal.id);
        if (old) old.remove();
    }
    document.body.insertAdjacentHTML('beforeend', html);
}

window.closeModal = (id) => {
    // ممكن يكون فيه أكتر من element بنفس الـ id (نسخة ثابتة + ديناميكية)
    const all = document.querySelectorAll('#' + id);
    all.forEach(el => {
        if (el.classList.contains('modal-overlay')) {
            // modal ثابت → اخفيه
            el.classList.remove('active');
        } else {
            // modal ديناميكي → امسحه من الـ DOM
            el.remove();
        }
    });
};

// Init
(async () => {
    await loadAll();
    
    const sb = await window.getSafeSupabase();
    if (sb && companyUserId) {
        try {
            sb.channel('company-apps-' + companyUserId)
                .on('postgres_changes', { event: '*', schema: 'public', table: 'applications', filter: 'company_user_id=eq.' + companyUserId }, () => loadAll())
                .subscribe();
        } catch(e) { console.warn('Realtime failed:', e); }
    }
    
    setInterval(loadAll, 30000);
    window.addEventListener('focus', loadAll);
})();
</script>
