<html lang="ar" dir="rtl">
<head>

    <style>

:root { --primary: #4facfe; --secondary: #00f2fe; --gradient: linear-gradient(135deg, #4facfe, #00f2fe); --bg: #0a0e27; --bg-2: #1a1535; --card: rgba(255,255,255,0.04); --card-hover: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.08); --text: #fff; --text-muted: #94a3b8; --text-dim: rgba(148,163,184,0.6); --error: #ef4444; --success: #10b981; --warning: #f59e0b; --info: #4facfe; --orange: #ff9800; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
.bg-anim { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 20% 20%, rgba(79,172,254,0.12), transparent 45%), radial-gradient(circle at 80% 80%, rgba(0,242,254,0.08), transparent 45%), var(--bg); }
.layout { display: flex; min-height: 100vh; }
.sidebar { width: 260px; background: rgba(20,18,40,0.7); backdrop-filter: blur(20px); border-left: 1px solid var(--border); padding: 24px 16px; position: fixed; inset: 0 0 0 auto; z-index: 100; transition: transform .3s; display: flex; flex-direction: column; }
.sidebar-logo { padding: 8px 4px 18px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
.logo-wrapper { display: flex; align-items: center; gap: 10px; padding: 4px; }
.logo-icon { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; filter: drop-shadow(0 4px 12px rgba(79,172,254,0.3)); }
.logo-icon svg { width: 100%; height: 100%; }
.logo-text { display: flex; flex-direction: column; gap: 2px; }
.logo-brand { font-size: 1.15rem; font-weight: 900; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -0.3px; line-height: 1; }
.logo-tagline { font-size: 0.68rem; color: var(--text-muted); font-weight: 600; }
.user-info-mini { padding: 12px 14px; background: rgba(79,172,254,0.05); border: 1px solid rgba(79,172,254,0.15); border-radius: 12px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
.user-info-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--gradient); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 0.95rem; }
.user-info-meta { flex: 1; min-width: 0; }
.user-info-name { font-weight: 700; font-size: 0.86rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.user-info-role { font-size: 0.72rem; color: var(--text-muted); }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; color: var(--text-muted); text-decoration: none; border-radius: 10px; font-size: 0.92rem; font-weight: 600; margin-bottom: 4px; transition: all .2s; }
.nav-item:hover { background: var(--card); color: var(--text); }
.nav-item.active { background: var(--gradient); color: #fff; }
.nav-item i { width: 18px; }
.nav-badge { margin-right: auto; background: rgba(255,255,255,0.2); color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 800; }
.main { flex: 1; margin-right: 260px; padding: 24px; min-width: 0; }
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; gap: 14px; flex-wrap: wrap; }
.menu-toggle { display: none; background: var(--card); border: 1px solid var(--border); color: var(--text); width: 42px; height: 42px; border-radius: 10px; cursor: pointer; }
.topbar-title { font-size: 1.5rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
.topbar-title i { color: var(--primary); }
.welcome-banner { background: linear-gradient(135deg, rgba(79,172,254,0.1), rgba(0,242,254,0.05)); border: 1px solid rgba(79,172,254,0.2); border-radius: 16px; padding: 22px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px; }
.welcome-icon { width: 60px; height: 60px; border-radius: 16px; background: var(--gradient); display: flex; align-items: center; justify-content: center; font-size: 1.6rem; color: #fff; flex-shrink: 0; }
.welcome-text h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 4px; }
.welcome-text p { color: var(--text-muted); font-size: 0.92rem; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 18px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; display: flex; align-items: center; gap: 14px; transition: all .2s; cursor: pointer; }
.stat-card:hover { transform: translateY(-3px); border-color: var(--primary); }
.stat-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: #fff; flex-shrink: 0; }
.stat-icon.primary { background: var(--gradient); }
.stat-icon.success { background: linear-gradient(135deg, #10b981, #059669); }
.stat-icon.warning { background: linear-gradient(135deg, #f59e0b, #f97316); }
.stat-icon.danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
.stat-num { font-size: 1.7rem; font-weight: 900; line-height: 1; }
.stat-label { font-size: 0.84rem; color: var(--text-muted); margin-top: 4px; }
.section { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 22px; margin-bottom: 18px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.section-title { font-size: 1.1rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
.section-title i { color: var(--primary); }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px; border: none; border-radius: 10px; font-weight: 700; font-family: inherit; font-size: 0.88rem; cursor: pointer; transition: all .2s; text-decoration: none; }
.btn-primary { background: var(--gradient); color: #fff; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(79,172,254,0.3); }
.btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
.btn-secondary:hover { background: var(--card-hover); }
.btn-sm { padding: 7px 12px; font-size: 0.82rem; }
.apps-list { display: flex; flex-direction: column; gap: 10px; }
.app-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; padding: 14px; display: flex; align-items: center; gap: 14px; transition: all .2s; }
.app-card:hover { border-color: var(--primary); }
.app-icon { width: 44px; height: 44px; border-radius: 12px; background: var(--gradient); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1rem; flex-shrink: 0; }
.app-info { flex: 1; min-width: 0; }
.app-title { font-weight: 800; font-size: 0.96rem; margin-bottom: 3px; }
.app-meta { color: var(--text-muted); font-size: 0.82rem; }
.status-badge { padding: 4px 10px; border-radius: 12px; font-size: 0.74rem; font-weight: 700; }
.status-pending { background: rgba(245,158,11,0.15); color: var(--warning); }
.status-accepted { background: rgba(16,185,129,0.15); color: var(--success); }
.status-rejected { background: rgba(239,68,68,0.15); color: var(--error); }
.status-interview { background: rgba(79,172,254,0.15); color: var(--info); }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
.empty-state i { font-size: 3rem; color: rgba(148,163,184,0.3); margin-bottom: 12px; display: block; }
.empty-state h3 { color: var(--text); font-size: 1rem; margin-bottom: 6px; }
.empty-state p { font-size: 0.84rem; margin-bottom: 14px; }
.actions-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
.action-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; padding: 18px; text-align: center; cursor: pointer; transition: all .2s; text-decoration: none; color: var(--text); }
.action-card:hover { transform: translateY(-3px); border-color: var(--primary); background: rgba(79,172,254,0.05); }
.action-icon { width: 56px; height: 56px; border-radius: 14px; background: var(--gradient); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.4rem; margin: 0 auto 10px; }
.action-title { font-weight: 800; font-size: 0.92rem; margin-bottom: 3px; }
.action-desc { font-size: 0.78rem; color: var(--text-muted); }
.loading-overlay { position: fixed; inset: 0; background: rgba(10,14,39,0.95); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity .3s; }
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-spinner { width: 60px; height: 60px; border: 4px solid var(--card); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 14px 24px; border-radius: 12px; color: #fff; font-weight: 700; z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
@media (max-width: 1024px) {
    .sidebar { transform: translateX(100%); width: 280px; }
    .sidebar.open { transform: translateX(0); }
    .main { margin-right: 0; }
    .menu-toggle { display: flex; align-items: center; justify-content: center; }
}
@media (max-width: 600px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .welcome-banner { flex-direction: column; text-align: center; }
    .topbar-title { font-size: 1.2rem; }
}

    /* إشعارات */
    .notif-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; display: flex; gap: 14px; align-items: flex-start; cursor: pointer; transition: all .2s; }
    .notif-card:hover { background: var(--card-hover); transform: translateY(-1px); }
    .notif-card.unread { border-right: 3px solid var(--primary); background: rgba(79,172,254,0.05); }
    .notif-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
    .notif-icon.success { background: rgba(16,185,129,0.15); color: #10b981; }
    .notif-icon.warning { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .notif-icon.error { background: rgba(239,68,68,0.15); color: #ef4444; }
    .notif-icon.info { background: rgba(79,172,254,0.15); color: #4facfe; }
    .notif-body { flex: 1; min-width: 0; }
    .notif-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
    .notif-msg { color: var(--text-muted); font-size: 0.85rem; line-height: 1.6; }
    .notif-time { color: var(--text-dim); font-size: 0.75rem; margin-top: 6px; }
    .notif-btn { background: rgba(255,255,255,0.06); border: none; color: var(--text-muted); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; flex-shrink: 0; }
    .notif-btn:hover { background: var(--primary); color: #fff; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state i { font-size: 3rem; margin-bottom: 14px; opacity: 0.4; }
    .notif-section-title { font-size: 0.9rem; font-weight: 700; color: var(--text-muted); margin: 18px 0 10px; }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; align-items: center; }
    .toolbar input, .toolbar select { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 10px; font-family: inherit; font-size: 0.85rem; }
    .toolbar input { flex: 1; min-width: 150px; }
    .mark-all-btn { background: var(--gradient); color: #fff; border: none; padding: 10px 18px; border-radius: 10px; font-weight: 700; font-family: inherit; cursor: pointer; font-size: 0.85rem; }
    </style>

        <main class="main">
            <div class="topbar">
                <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
                    <i class="fas fa-bars"></i>
                </button>

            <div class="page" style="padding:24px">

                    <input type="text" id="searchNotifs" placeholder="🔍 ابحث في الإشعارات...">
                    <select id="filterType">
                        <option value="all">كل الأنواع</option>

                    </select>
                    <button class="mark-all-btn" onclick="markAllRead()"><i class="fas fa-check-double"></i> تعليم الكل كمقروء</button>
                </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
    (function () {
        let userId = null;
        let allNotifications = [];
        let isInitialized = false;
        const esc = (s) => window.ProVance ? window.ProVance.escapeHtml(s) : String(s||'');

        window.logoutStudent = async (e) => {
            if (e) e.preventDefault();
            if (!confirm('تسجيل الخروج؟')) return;
            const sb = window.ProVance && window.ProVance.sb;
            try { if (sb) await sb.auth.signOut(); } catch(er) {}
            try { if (window.ProVance && window.ProVance.clearUserData) window.ProVance.clearUserData(); } catch(er) {}
            location.href = 'student-login.html';
        };

        function timeAgo(dateStr) {
            if (!dateStr) return '';
            const diff = Date.now() - new Date(dateStr).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'الآن';
            if (mins < 60) return 'منذ ' + mins + ' دقيقة';
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return 'منذ ' + hrs + ' ساعة';
            const days = Math.floor(hrs / 24);
            if (days < 30) return 'منذ ' + days + ' يوم';
            return new Date(dateStr).toLocaleDateString('ar-EG');
        }

        function iconFor(type) {
            return { success: 'check-circle', warning: 'exclamation-triangle', error: 'times-circle', info: 'info-circle' }[type] || 'bell';
        }

        function notifCard(n) {
            const type = n.type || 'info';
            return '<div class="notif-card ' + (n.is_read ? '' : 'unread') + '" onclick="handleClick(\'' + n.id + '\',\'' + esc(n.link || '') + '\')">' +
                '<div class="notif-icon ' + type + '"><i class="fas fa-' + iconFor(type) + '"></i></div>' +
                '<div class="notif-body">' +
                    '<div class="notif-title">' + esc(n.title || '') + '</div>' +
                    '<div class="notif-msg">' + esc(n.message || '') + '</div>' +
                    '<div class="notif-time"><i class="fas fa-clock"></i> ' + timeAgo(n.created_at) + '</div>' +
                '</div>' +
                (!n.is_read ? '<button class="notif-btn" onclick="event.stopPropagation();markRead(\'' + n.id + '\')" title="تعليم كمقروء"><i class="fas fa-check"></i></button>' : '') +
            '</div>';
        }

        function renderNotifs() {
            const list = document.getElementById('notifsList');
            const search = (document.getElementById('searchNotifs').value || '').toLowerCase();
            const ftype = document.getElementById('filterType').value;
            let filtered = allNotifications.slice();
            if (ftype !== 'all') filtered = filtered.filter(n => (n.type || 'info') === ftype);
            if (search) filtered = filtered.filter(n => (n.title + ' ' + n.message).toLowerCase().includes(search));

            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state"><i class="fas fa-bell-slash"></i><h3>لا توجد إشعارات</h3><p>هنا هتوصلك تنبيهات القبول والرفض والمقابلات</p></div>';
                return;
            }
            const unread = filtered.filter(n => !n.is_read);
            const read = filtered.filter(n => n.is_read);
            let html = '';
            if (unread.length) html += '<div class="notif-section-title">جديدة (' + unread.length + ')</div>' + unread.map(notifCard).join('');
            if (read.length) html += '<div class="notif-section-title">مقروءة</div>' + read.map(notifCard).join('');
            list.innerHTML = html;
        }

        window.handleClick = async (id, link) => {
            await markRead(id);
            if (link) window.location.href = link;
        };

        window.markRead = async (id) => {
            try {
                const sb = await getSb();
                if (!sb) return;
                await sb.from('notifications').update({ is_read: true, read_at: new Date().toISOString() }).eq('id', id);
                const n = allNotifications.find(x => x.id === id);
                if (n) n.is_read = true;
                renderNotifs();
            } catch (e) { console.warn(e); }
        };

        window.markAllRead = async () => {
            try {
                const sb = await getSb();
                if (!sb) return;
                await sb.from('notifications').update({ is_read: true, read_at: new Date().toISOString() }).eq('user_id', userId).eq('is_read', false);
                allNotifications.forEach(n => n.is_read = true);
                renderNotifs();
            } catch (e) { console.warn(e); }
        };

        const SUPA_URL = 'https://jrwazyrdzmbcnddpxxrf.supabase.co';
        const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyd2F6eXJkem1iY25kZHB4eHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzUyMzksImV4cCI6MjA5MjExMTIzOX0.KaZt3Xb-9zjjwlSYnCvQQVxzDgbcOxdmnpg9wsUsqQI';

        async function getSb() {
            if (window.ProVance?.waitForSupabaseClient) {
                try { const c = await window.ProVance.waitForSupabaseClient(6000); if (c) return c; } catch(e) {}
            }
            if (window.ProVance?.sb) return window.ProVance.sb;
            if (typeof supabase !== 'undefined' && supabase.createClient) {
                try { return supabase.createClient(SUPA_URL, SUPA_KEY, { auth: { persistSession: true, storage: window.localStorage } }); } catch(e) {}
            }
            return null;
        }

        async function loadAll() {
            const sb = await getSb();
            if (!sb) {
                document.getElementById('notifsList').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle" style="color:var(--warning)"></i><h3>تعذر الاتصال</h3><p>أعد تحميل الصفحة</p><button onclick="location.reload()" style="margin-top:12px;background:linear-gradient(135deg,#4facfe,#00f2fe);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-family:inherit;font-weight:700;cursor:pointer"><i class="fas fa-sync-alt"></i> إعادة المحاولة</button></div>';
                return;
            }
            try {
                const { data: { session } } = await sb.auth.getSession();
                if (!session) { window.location.href = 'student-login.html'; return; }
                userId = session.user.id;

                const { data } = await sb.from('notifications').select('*')
                    .eq('user_id', userId).eq('user_type', 'student')
                    .order('created_at', { ascending: false }).limit(50);
                allNotifications = data || [];
                renderNotifs();

                if (!isInitialized) {
                    isInitialized = true;
                    sb.channel('snotifs-' + userId)
                        .on('postgres_changes', { event: '*', schema: 'public', table: 'notifications', filter: 'user_id=eq.' + userId }, () => loadAll())
                        .subscribe();
                    document.getElementById('searchNotifs').addEventListener('input', renderNotifs);
                    document.getElementById('filterType').addEventListener('change', renderNotifs);
                }
            } catch (err) { console.error(err); 
                document.getElementById('notifsList').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>خطأ في التحميل</h3></div>';
            }
        }

        loadAll();
    })();
    </script>
