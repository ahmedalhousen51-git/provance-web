<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <link rel="preconnect" href="https://jrwazyrdzmbcnddpxxrf.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://jrwazyrdzmbcnddpxxrf.supabase.co">

    <title>إشعارات الطالب - ProVance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
:root { --primary: #4facfe; --secondary: #00f2fe; --gradient: linear-gradient(135deg, #4facfe, #00f2fe); --bg: #0a0e27; --bg-2: #1a1535; --card: rgba(255,255,255,0.04); --card-hover: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.08); --text: #fff; --text-muted: #94a3b8; --text-dim: rgba(148,163,184,0.6); --error: #ef4444; --success: #10b981; --warning: #f59e0b; --info: #4facfe; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
.bg-anim { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 20% 20%, #4facfe15, transparent 45%), radial-gradient(circle at 80% 80%, #00f2fe10, transparent 45%), var(--bg); }
.layout { display: flex; min-height: 100vh; }
.sidebar { width: 260px; background: rgba(20,18,40,0.7); backdrop-filter: blur(20px); border-left: 1px solid var(--border); padding: 24px 16px; position: fixed; inset: 0 0 0 auto; z-index: 100; transition: transform .3s; display: flex; flex-direction: column; }
.sidebar-logo {
            padding: 8px 4px 18px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px;
        }
        .logo-icon {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            filter: drop-shadow(0 4px 12px rgba(79,172,254,0.3));
        }
        .logo-icon svg {
            width: 100%;
            height: 100%;
        }
        .logo-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .logo-brand {
            font-size: 1.15rem;
            font-weight: 900;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
            line-height: 1;
        }
        .logo-tagline {
            font-size: 0.68rem;
            color: var(--text-muted);
            font-weight: 600;
        }
.admin-badge { background: var(--gradient); color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 0.78rem; font-weight: 800; text-align: center; margin-bottom: 14px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; color: var(--text-muted); text-decoration: none; border-radius: 10px; font-size: 0.92rem; font-weight: 600; margin-bottom: 4px; transition: all .2s; }
.nav-item:hover { background: var(--card); color: var(--text); }
.nav-item.active { background: var(--gradient); color: #fff; }
.nav-item i { width: 18px; }
.main { flex: 1; margin-right: 260px; padding: 24px; min-width: 0; }
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; gap: 14px; flex-wrap: wrap; }
.menu-toggle { display: none; background: var(--card); border: 1px solid var(--border); color: var(--text); width: 42px; height: 42px; border-radius: 10px; cursor: pointer; }
.topbar-title { font-size: 1.5rem; font-weight: 800; }
.topbar-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 18px; }
.stat-mini { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; display: flex; align-items: center; gap: 11px; }
.stat-mini-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.05rem; color: #fff; flex-shrink: 0; }
.stat-mini-icon.primary { background: var(--gradient); }
.stat-mini-icon.success { background: linear-gradient(135deg, #10b981, #059669); }
.stat-mini-icon.warning { background: linear-gradient(135deg, #f59e0b, #f97316); }
.stat-mini-icon.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
.stat-mini-num { font-size: 1.4rem; font-weight: 800; line-height: 1; }
.stat-mini-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; }
.tabs-container { display: flex; gap: 8px; margin-bottom: 22px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 6px; overflow-x: auto; }
.tab-btn { padding: 11px 18px; background: none; border: none; color: var(--text-muted); font-family: inherit; font-size: 0.92rem; font-weight: 700; border-radius: 10px; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 7px; transition: all .2s; }
.tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.tab-btn.active { background: var(--gradient); color: #fff; }
.tab-badge { background: rgba(255,255,255,0.15); padding: 1px 8px; border-radius: 10px; font-size: 0.72rem; }
.tab-content { display: none; animation: fadeIn .3s; }
.tab-content.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px; border: none; border-radius: 10px; font-weight: 700; font-family: inherit; font-size: 0.88rem; cursor: pointer; transition: all .2s; text-decoration: none; white-space: nowrap; }
.btn-primary { background: var(--gradient); color: #fff; }
.btn-primary:hover:not(:disabled) { transform: translateY(-2px); }
.btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
.btn-secondary:hover { background: var(--card-hover); }
.btn-danger { background: rgba(239,68,68,0.1); color: var(--error); border: 1px solid rgba(239,68,68,0.3); }
.btn-info { background: rgba(79,172,254,0.15); color: var(--info); border: 1px solid rgba(79,172,254,0.3); }
.btn-sm { padding: 7px 12px; font-size: 0.8rem; }
.notif-list { display: flex; flex-direction: column; gap: 8px; }
.notif-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; display: flex; align-items: flex-start; gap: 12px; transition: all .2s; cursor: pointer; }
.notif-card:hover { background: var(--card-hover); border-color: var(--primary); transform: translateX(-3px); }
.notif-card.unread { background: rgba(79,172,254,0.04); border-color: rgba(79,172,254,0.2); position: relative; }
.notif-card.unread::after { content: ''; position: absolute; top: 14px; left: 14px; width: 8px; height: 8px; background: var(--info); border-radius: 50%; box-shadow: 0 0 8px var(--info); animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.notif-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.1rem; flex-shrink: 0; }
.notif-icon.success { background: linear-gradient(135deg, #10b981, #059669); }
.notif-icon.warning { background: linear-gradient(135deg, #f59e0b, #f97316); }
.notif-icon.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
.notif-icon.info { background: linear-gradient(135deg, #4facfe, #00f2fe); }
.notif-icon.primary { background: var(--gradient); }
.notif-body { flex: 1; min-width: 0; }
.notif-title { font-weight: 800; font-size: 0.96rem; margin-bottom: 3px; }
.notif-message { color: var(--text-muted); font-size: 0.86rem; line-height: 1.5; }
.notif-meta { display: flex; gap: 10px; margin-top: 6px; font-size: 0.78rem; color: var(--text-dim); flex-wrap: wrap; }
.notif-meta i { color: var(--primary); }
.notif-actions { display: flex; gap: 4px; flex-shrink: 0; }
.notif-btn { background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text-muted); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; }
.notif-btn:hover { color: var(--text); background: var(--card-hover); }
.notif-btn.delete:hover { background: rgba(239,68,68,0.15); color: var(--error); border-color: rgba(239,68,68,0.3); }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); background: var(--card); border: 1px solid var(--border); border-radius: 16px; }
.empty-state i { font-size: 4rem; color: rgba(148,163,184,0.3); margin-bottom: 16px; display: block; }
.empty-state h3 { color: var(--text); margin-bottom: 6px; font-size: 1.1rem; }
.filters-bar { display: flex; gap: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 18px; flex-wrap: wrap; }
.filters-bar input, .filters-bar select { padding: 9px 14px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.9rem; }
.filters-bar input { flex: 1; min-width: 200px; }
.filters-bar input:focus, .filters-bar select:focus { outline: none; border-color: var(--primary); }
@media (max-width: 1024px) {
    .sidebar { transform: translateX(100%); width: 280px; }
    .sidebar.open { transform: translateX(0); }
    .main { margin-right: 0; }
    .menu-toggle { display: flex; align-items: center; justify-content: center; }
}
@media (max-width: 600px) { .topbar-title { font-size: 1.2rem; } .stats-row { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="logo-wrapper">

    <script>
(function() {
    'use strict';

    if (!window.ProVance) { window.ProVance = {}; }
    if (typeof window.ProVance.escapeHtml !== 'function') {
        window.ProVance.escapeHtml = (s) => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    if (typeof window.ProVance.showToast !== 'function') {
        window.ProVance.showToast = (msg, type) => {
            const t = document.createElement('div');
            const c = { error:'#ef4444', success:'#10b981', warning:'#f59e0b', info:'#4facfe' };
            t.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:' + (c[type]||'#4facfe') + ';color:#fff;padding:14px 24px;border-radius:12px;font-family:Cairo,sans-serif;font-weight:700;z-index:9999;';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        };
    }
    if (typeof window.ProVance.confirmModal !== 'function') {
        window.ProVance.confirmModal = async ({title, message}) => confirm((title||'') + '\n' + (message||''));
    }

    console.log('✅ Notifications initialized');

    const esc = window.ProVance.escapeHtml;
    let userId = null;
    let allNotifications = [];

    window.logoutStudent = async (e) => {
        e.preventDefault();
        const ok = await window.ProVance.confirmModal({title: 'تسجيل الخروج', message: 'هل تريد تسجيل الخروج؟'});
        if (ok) {
            if (window.ProVance.logout) await window.ProVance.logout('student-login.html');
            else window.location.href = 'student-login.html';
        }
    };

    function formatDate(d) { if (!d) return '-'; return new Date(d).toLocaleDateString('ar-EG'); }
    function timeAgo(d) {
        if (!d) return '';
        const diff = Date.now() - new Date(d).getTime();
        const mins = Math.floor(diff/60000);
        if (mins < 1) return 'الآن';
        if (mins < 60) return mins + ' دقيقة';
        const hrs = Math.floor(mins/60);
        if (hrs < 24) return hrs + ' ساعة';
        return Math.floor(hrs/24) + ' يوم';
    }

    window.switchTab = (e, tabName) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        e.currentTarget.classList.add('active');
        document.getElementById('tab-' + tabName).classList.add('active');
    };

    function getIconType(type) {
        return ['success', 'warning', 'error', 'info'].includes(type) ? type : 'primary';
    }

    function getIconName(type) {
        return { 'success': 'check-circle', 'warning': 'exclamation-triangle', 'error': 'times-circle', 'info': 'info-circle' }[type] || 'bell';
    }

    function renderNotifCard(n) {
        const type = getIconType(n.type);
        const icon = getIconName(n.type);
        return '<div class="notif-card ' + (n.is_read ? '' : 'unread') + '" onclick="handleNotifClick(\'' + n.id + '\', \'' + esc(n.link || '') + '\')">' +
            '<div class="notif-icon ' + type + '"><i class="fas fa-' + icon + '"></i></div>' +
            '<div class="notif-body">' +
                '<div class="notif-title">' + esc(n.title || '-') + '</div>' +
                '<div class="notif-message">' + esc(n.message || '') + '</div>' +
                '<div class="notif-meta"><i class="fas fa-clock"></i> ' + timeAgo(n.created_at) + ' • ' + formatDate(n.created_at) + '</div>' +
            '</div>' +
            '<div class="notif-actions" onclick="event.stopPropagation()">' +
                (!n.is_read ? '<button class="notif-btn" onclick="markRead(\'' + n.id + '\')" title="تعليم كمقروء"><i class="fas fa-check"></i></button>' : '') +
                '<button class="notif-btn delete" onclick="deleteNotif(\'' + n.id + '\')" title="حذف"><i class="fas fa-trash"></i></button>' +
            '</div>' +
        '</div>';
    }

    function renderNotifs() {
        const search = document.getElementById('searchNotifs').value.toLowerCase().trim();
        const typeFilter = document.getElementById('filterType').value;

        let filtered = allNotifications.slice();

        if (search) {
            filtered = filtered.filter(n =>
                (n.title || '').toLowerCase().includes(search) ||
                (n.message || '').toLowerCase().includes(search)
            );
        }

        if (typeFilter) filtered = filtered.filter(n => n.type === typeFilter);

        const unread = filtered.filter(n => !n.is_read);
        const read = filtered.filter(n => n.is_read);

        document.getElementById('allCount').textContent = filtered.length;
        document.getElementById('unreadCount').textContent = unread.length;
        document.getElementById('readCount').textContent = read.length;

        document.getElementById('allList').innerHTML = filtered.length === 0
            ? '<div class="empty-state"><i class="fas fa-bell-slash"></i><h3>لا توجد إشعارات</h3></div>'
            : filtered.map(renderNotifCard).join('');

        document.getElementById('unreadList').innerHTML = unread.length === 0
            ? '<div class="empty-state"><i class="fas fa-envelope-open"></i><h3>كل إشعاراتك مقروءة 🎉</h3></div>'
            : unread.map(renderNotifCard).join('');

        document.getElementById('readList').innerHTML = read.length === 0
            ? '<div class="empty-state"><i class="fas fa-bell-slash"></i><h3>لا توجد إشعارات مقروءة</h3></div>'
            : read.map(renderNotifCard).join('');
    }

    function updateStats() {
        const total = allNotifications.length;
        const unread = allNotifications.filter(n => !n.is_read).length;
        const read = total - unread;
        const today = new Date(); today.setHours(0,0,0,0);
        const todayCount = allNotifications.filter(n => new Date(n.created_at) >= today).length;

        document.getElementById('statTotal').textContent = total;
        document.getElementById('statUnread').textContent = unread;
        document.getElementById('statRead').textContent = read;
        document.getElementById('statToday').textContent = todayCount;
    }

    window.handleNotifClick = async (id, link) => {
        await markRead(id);
        if (link && link !== 'undefined') window.location.href = link;
    };

    window.markRead = async (id) => {
        try {
            await window.ProVance.sb.from('notifications').update({ is_read: true, read_at: new Date().toISOString() }).eq('id', id);
            window.dispatchEvent(new CustomEvent('reload-notifs'));
        } catch (err) { console.error(err); }
    };

    window.markAllRead = async () => {
        const ok = await window.ProVance.confirmModal({title: 'تعليم الكل كمقروء', message: 'هل تريد تعليم كل الإشعارات كمقروءة؟'});
        if (!ok) return;
        try {
            await window.ProVance.sb.from('notifications').update({ is_read: true, read_at: new Date().toISOString() }).eq('user_id', userId).eq('is_read', false);
            window.ProVance.showToast('تم ✓', 'success');
            window.dispatchEvent(new CustomEvent('reload-notifs'));
        } catch (err) { window.ProVance.showToast('حدث خطأ', 'error'); }
    };

    window.deleteNotif = async (id) => {
        const ok = await window.ProVance.confirmModal({title: 'حذف الإشعار', message: 'هل تريد حذف هذا الإشعار؟'});
        if (!ok) return;
        try {
            await window.ProVance.sb.from('notifications').delete().eq('id', id);
            window.ProVance.showToast('تم الحذف', 'success');
            window.dispatchEvent(new CustomEvent('reload-notifs'));
        } catch (err) { window.ProVance.showToast('حدث خطأ', 'error'); }
    };

    window.clearAll = async () => {
        const ok = await window.ProVance.confirmModal({title: 'مسح كل الإشعارات', message: 'هل تريد حذف كل الإشعارات؟ لا يمكن التراجع.'});
        if (!ok) return;
        try {
            await window.ProVance.sb.from('notifications').delete().eq('user_id', userId);
            window.ProVance.showToast('تم المسح', 'success');
            window.dispatchEvent(new CustomEvent('reload-notifs'));
        } catch (err) { window.ProVance.showToast('حدث خطأ', 'error'); }
    };

    let isInitialized = false;
    async function loadAll() {
        const sb = window.ProVance.sb;
        if (!sb) return;
        try {
            const session = await sb.auth.getSession();
            const uid = session?.data?.session?.user?.id;
            if (!uid) {
                window.location.href = 'student-login.html';
                return;
            }
            userId = uid;

            const { data } = await sb.from('notifications').select('*').eq('user_id', uid).eq('user_type', 'student').order('created_at', { ascending: false }).limit(200);
            allNotifications = data || [];

            updateStats();
            renderNotifs();

            if (!isInitialized) {
                isInitialized = true;
                sb.channel('notifs-' + uid)
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'notifications', filter: 'user_id=eq.' + uid }, () => loadAll())
                    .subscribe();

                window.addEventListener('reload-notifs', loadAll);

                document.getElementById('searchNotifs').addEventListener('input', renderNotifs);
                document.getElementById('filterType').addEventListener('change', renderNotifs);
            }
        } catch (err) { console.error(err); }
    }

    loadAll();
})();
    </script>
</body>
</html>
