<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://jrwazyrdzmbcnddpxxrf.supabase.co" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root { --primary: #4facfe; --secondary: #00f2fe; --gradient: linear-gradient(135deg, #4facfe, #00f2fe); --bg: #0a0e27; --card: rgba(255,255,255,0.04); --card-hover: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.08); --text: #fff; --text-muted: #94a3b8; --error: #ef4444; --success: #10b981; --warning: #f59e0b; }
* { margin:0; padding:0; box-sizing: border-box; }
body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.bg-anim { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 20% 20%, rgba(79,172,254,0.08), transparent 45%), radial-gradient(circle at 80% 80%, rgba(0,242,254,0.06), transparent 45%), var(--bg); }
.container { max-width: 480px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; }
.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.back-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); width: 44px; height: 44px; border-radius: 12px; cursor: pointer; font-size: 1.1rem; }
.page-title { font-size: 1.2rem; font-weight: 800; }
.tab-row { display: flex; gap: 8px; margin-bottom: 20px; background: var(--card); padding: 4px; border-radius: 12px; }
.tab-btn { flex: 1; padding: 12px 8px; background: transparent; border: none; color: var(--text-muted); font-weight: 700; cursor: pointer; border-radius: 8px; font-family: inherit; font-size: 0.9rem; }
.tab-btn.active { background: var(--gradient); color: #fff; }
.scanner-area { background: var(--card); border: 2px dashed var(--border); border-radius: 18px; padding: 40px 20px; text-align: center; margin-bottom: 18px; min-height: 320px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
.scanner-icon { width: 110px; height: 110px; background: var(--gradient); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 3rem; }
.scanner-msg { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; max-width: 320px; }
.btn-primary { width: 100%; padding: 14px; background: var(--gradient); color: #fff; border: none; border-radius: 12px; font-weight: 800; font-size: 1rem; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-secondary { width: 100%; padding: 12px; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
.code-input { width: 100%; padding: 16px 18px; background: rgba(255,255,255,0.03); border: 2px solid var(--border); border-radius: 12px; color: var(--text); font-family: monospace; font-size: 1.1rem; letter-spacing: 2px; text-align: center; margin-bottom: 14px; text-transform: uppercase; }
.code-input:focus { outline: none; border-color: var(--primary); }
#qr-video { width: 100%; border-radius: 14px; background: #000; max-height: 400px; }
.result-card { background: var(--card); border: 2px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 14px; }
.result-card.success { border-color: rgba(16,185,129,0.4); background: rgba(16,185,129,0.05); }
.result-card.error { border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.05); }
.result-icon { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 14px; }
.result-icon.success { background: rgba(16,185,129,0.2); color: #10b981; }
.result-icon.error { background: rgba(239,68,68,0.2); color: #ef4444; }
.result-title { font-size: 1.1rem; font-weight: 800; text-align: center; margin-bottom: 8px; }
.result-detail { color: var(--text-muted); text-align: center; font-size: 0.92rem; line-height: 1.7; }
.result-detail strong { color: var(--text); }
.recent-scans { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-top: 16px; }
.recent-scans h3 { font-size: 1rem; font-weight: 800; margin-bottom: 10px; }
.scan-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
.scan-item:last-child { border-bottom: none; }
.scan-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.scan-info { flex: 1; padding: 0 10px; }
.scan-type { font-weight: 700; font-size: 0.88rem; }
.scan-time { font-size: 0.74rem; color: var(--text-muted); }
.scan-result { font-size: 0.78rem; padding: 3px 8px; border-radius: 6px; font-weight: 700; }
.scan-result.success { background: rgba(16,185,129,0.15); color: #10b981; }
.scan-result.error { background: rgba(239,68,68,0.15); color: #ef4444; }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 14px 24px; border-radius: 12px; color: #fff; font-weight: 700; z-index: 9999; max-width: 90vw; text-align: center; }
.loading-overlay { position: fixed; inset: 0; background: rgba(10,14,39,0.95); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity .3s; }
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-spinner { width: 60px; height: 60px; border: 4px solid var(--card); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="bg-anim"></div>
<div class="container">
<div class="top-bar">
<button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i></button>
<div class="page-title"><i class="fas fa-qrcode" style="color:var(--primary)"></i> مسح QR Code</div>
<div style="width:44px"></div>
</div>

<div class="tab-row">
<button class="tab-btn" id="tabCamera" onclick="switchTab('camera')"><i class="fas fa-camera"></i> الكاميرا</button>

<!-- Camera Scanner -->

<div class="scanner-area" id="scannerArea">
<div class="scanner-icon"><i class="fas fa-qrcode"></i></div>
<div class="scanner-msg">اضغط "بدء المسح" وصوّر الـ QR Code اللي عرضته الشركة</div>
<div style="font-size:0.78rem;color:var(--text-muted);margin-top:8px;padding:10px;background:rgba(79,172,254,0.05);border:1px solid rgba(79,172,254,0.15);border-radius:10px;line-height:1.6">
<i class="fas fa-info-circle" style="color:#4facfe"></i> <strong>ملاحظات مهمة:</strong><br>
• المتصفح هيطلب إذن للكاميرا - اضغط "السماح"<br>
• لو ما اشتغلتش، استخدم "ارفع صورة" أو "اكتب الكود"
</div>
</div>
<button class="btn-primary" id="startScanBtn" onclick="startScanner()"><i class="fas fa-camera"></i> بدء المسح</button>
<video id="qr-video" class="hidden" playsinline autoplay muted></video>
<input type="file" id="photoInput" accept="image/*" capture="environment" onchange="scanFromImage(event)" style="display:none">
<button class="btn-secondary" onclick="document.getElementById('photoInput').click()" style="margin-top:8px;background:linear-gradient(135deg,#4facfe,#00f2fe);color:#fff;border:none;font-weight:800"><i class="fas fa-image"></i> أو ارفع صورة الـ QR</button>
<button class="btn-secondary hidden" id="stopScanBtn" onclick="stopScanner()" style="margin-top:10px"><i class="fas fa-times"></i> إيقاف</button>
</div>

<!-- Code Input -->
<div id="codeSection">
<div class="scanner-area" style="padding:28px 20px;min-height:auto">
<div class="scanner-icon" style="background:linear-gradient(135deg,#10b981,#059669)"><i class="fas fa-keyboard"></i></div>
<div class="scanner-msg">اكتب الكود اللي ظاهر تحت الـ QR عند الشركة</div>
</div>
<input type="text" id="codeInput" class="code-input" placeholder="DAY-XXXXXXXX" maxlength="32" autocomplete="off" autocapitalize="characters">
<button class="btn-primary" onclick="submitCode()"><i class="fas fa-check"></i> تأكيد الحضور</button>
<div style="text-align:center;margin-top:14px">
  <button onclick="switchTab('camera')" style="background:none;border:none;color:var(--primary);font-family:inherit;font-size:0.88rem;font-weight:700;cursor:pointer;text-decoration:underline">
    <i class="fas fa-camera"></i> أو افتح الكاميرا لمسح الكود
  </button>
</div>
</div>

<!-- Result Area -->
<div id="resultArea"></div>

<!-- Recent Scans -->
<div class="recent-scans" id="recentScansContainer">
<h3><i class="fas fa-history" style="color:var(--primary)"></i> آخر العمليات</h3>
<div id="recentScansList">
<div style="text-align:center;color:var(--text-muted);padding:14px;font-size:0.88rem">لا توجد عمليات سابقة</div>
</div>
</div>
</div>

<div class="loading-overlay hidden" id="loadingOverlay"><div class="loading-spinner"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="supabase-config.js"></script>
<script>
const SUPABASE_URL = 'https://jrwazyrdzmbcnddpxxrf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyd2F6eXJkem1iY25kZHB4eHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzUyMzksImV4cCI6MjA5MjExMTIzOX0.KaZt3Xb-9zjjwlSYnCvQQVxzDgbcOxdmnpg9wsUsqQI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: true, autoRefreshToken: true, storage: window.localStorage } });

let studentUserId = null;
let studentData = null;
let scanning = false;
let videoStream = null;
let processing = false;
let loopRunning = false;
let scanInterval = null;

function showToast(msg, type='info') {
    const t = document.createElement('div');
    const c = { error:'#ef4444', success:'#10b981', warning:'#f59e0b', info:'#4facfe' };
    t.className = 'toast'; t.style.background = c[type] || c.info; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 4000);
}

function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

window.switchTab = (tab) => {
    document.getElementById('tabCamera').classList.toggle('active', tab === 'camera');
    document.getElementById('tabCode').classList.toggle('active', tab === 'code');
    document.getElementById('cameraSection').classList.toggle('hidden', tab !== 'camera');
    document.getElementById('codeSection').classList.toggle('hidden', tab !== 'code');
    if (tab !== 'camera' && scanning) stopScanner();
};

window.startScanner = async () => {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showCameraFallback('الـ browser ده مش بيدعم الكاميرا. استخدم Chrome أو Safari.');
        return;
    }
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        showCameraFallback('الكاميرا محتاجة HTTPS - استخدم الإدخال اليدوي.');
        return;
    }
    try {
        const constraints = [
            { video: { facingMode: { exact: 'environment' } } },
            { video: { facingMode: 'environment' } },
            { video: { facingMode: 'user' } },
            { video: true }
        ];
        let lastError = null;
        for (const c of constraints) {
            try {
                videoStream = await navigator.mediaDevices.getUserMedia(c);
                if (videoStream) break;
            } catch (e) { lastError = e; console.warn('Camera attempt failed:', c, e.name); }
        }
        if (!videoStream) throw lastError || new Error('فشل فتح الكاميرا');

        const video = document.getElementById('qr-video');
        video.srcObject = videoStream;
        video.setAttribute('playsinline', 'true');
        video.setAttribute('autoplay', 'true');
        video.setAttribute('muted', 'true');
        video.muted = true;
        video.classList.remove('hidden');

        await new Promise((resolve) => { video.onloadedmetadata = resolve; setTimeout(resolve, 2000); });
        try { await video.play(); } catch (playErr) { console.warn('Video play failed:', playErr); }

        document.getElementById('scannerArea').classList.add('hidden');
        document.getElementById('startScanBtn').classList.add('hidden');
        document.getElementById('stopScanBtn').classList.remove('hidden');

        scanning = true;
        // ابدأ المسح أول ما الفيديو يبدأ فعلاً يعرض frames
        if (video.readyState >= video.HAVE_CURRENT_DATA && video.videoWidth > 0) {
            scanLoop(video);
        } else {
            video.addEventListener('playing', () => { if (scanning) scanLoop(video); }, { once: true });
            // احتياطي: لو الـ event ماجاش، ابدأ بعد ثانية
            setTimeout(() => { if (scanning) scanLoop(video); }, 1000);
        }
    } catch (err) {
        console.error('Camera error:', err.name, err.message);
        let errMsg = 'فشل فتح الكاميرا';
        if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') errMsg = '🚫 تم رفض إذن الكاميرا. روح Settings → السماح بالكاميرا';
        else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') errMsg = '📵 مفيش كاميرا في الجهاز';
        else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') errMsg = '⚠️ الكاميرا مستخدمة من app تاني - اقفله وحاول تاني';
        else if (err.name === 'OverconstrainedError') errMsg = '⚠️ مشكلة في إعدادات الكاميرا';
        else if (err.name === 'SecurityError') errMsg = '🔒 المتصفح بيمنع الكاميرا - استخدم HTTPS';
        showCameraFallback(errMsg);
    }
};

function showCameraFallback(reason) {
    const scannerArea = document.getElementById('scannerArea');
    const startBtn = document.getElementById('startScanBtn');
    if (scannerArea) {
        scannerArea.innerHTML = `
            <div class="scanner-icon" style="background:linear-gradient(135deg,#f59e0b,#f97316)"><i class="fas fa-exclamation-triangle"></i></div>
            <div class="scanner-msg" style="color:#f59e0b;font-weight:700">${reason}</div>
            <div style="display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px">
                <button class="btn-secondary" onclick="document.getElementById('photoInput').click()" style="background:linear-gradient(135deg,#4facfe,#00f2fe);color:#fff;border:none;font-weight:800"><i class="fas fa-image"></i> ارفع صورة من الجهاز</button>
                <button class="btn-secondary" onclick="switchTab('code')" style="background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;font-weight:800"><i class="fas fa-keyboard"></i> اكتب الكود يدوياً</button>
                <button class="btn-secondary" onclick="startScanner()"><i class="fas fa-redo"></i> حاول الكاميرا تاني</button>
            </div>`;
    }
    if (startBtn) startBtn.classList.add('hidden');
}

window.scanFromImage = async (event) => {
    const file = event.target.files[0];
    if (!file) return;
    try {
        const img = new Image();
        const reader = new FileReader();
        reader.onload = (e) => {
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                let w = img.width, h = img.height;
                const maxDim = 1200;
                if (w > maxDim || h > maxDim) {
                    if (w > h) { h = h * maxDim / w; w = maxDim; } else { w = w * maxDim / h; h = maxDim; }
                }
                canvas.width = w; canvas.height = h;
                ctx.drawImage(img, 0, 0, w, h);
                const imageData = ctx.getImageData(0, 0, w, h);
                const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'attemptBoth' });
                if (code && code.data) { processQR(code.data); }
                else { showToast('❌ مفيش QR Code في الصورة - جرب صورة أوضح', 'error'); }
            };
            img.onerror = () => showToast('❌ فشل قراءة الصورة', 'error');
            img.src = e.target.result;
        };
        reader.onerror = () => showToast('❌ فشل قراءة الملف', 'error');
        reader.readAsDataURL(file);
    } catch (err) { showToast('❌ خطأ: ' + err.message, 'error'); }
    finally { event.target.value = ''; }
};

window.stopScanner = () => {
    scanning = false;
    loopRunning = false;
    if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
    const ss = document.getElementById('scanStatus'); if (ss) ss.style.display = 'none';
    if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
    document.getElementById('qr-video').classList.add('hidden');
    document.getElementById('scannerArea').classList.remove('hidden');
    document.getElementById('startScanBtn').classList.remove('hidden');
    document.getElementById('stopScanBtn').classList.add('hidden');
};

function scanLoop(video) {
    if (!scanning || loopRunning) return;
    loopRunning = true;
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let frames = 0;

    // مؤشر بصري حي
    let statusEl = document.getElementById('scanStatus');
    if (!statusEl) {
        statusEl = document.createElement('div');
        statusEl.id = 'scanStatus';
        statusEl.style.cssText = 'text-align:center;padding:10px;margin-top:10px;background:rgba(79,172,254,.1);border:1px solid rgba(79,172,254,.3);border-radius:10px;color:#4facfe;font-weight:700;font-size:.9rem';
        const vid = document.getElementById('qr-video');
        if (vid && vid.parentNode) vid.parentNode.insertBefore(statusEl, vid.nextSibling);
    }
    statusEl.style.display = 'block';

    if (scanInterval) clearInterval(scanInterval);
    scanInterval = setInterval(() => {
        if (!scanning) { clearInterval(scanInterval); loopRunning = false; return; }
        if (video.readyState >= 2 && video.videoWidth > 0 && video.videoHeight > 0) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            try {
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'attemptBoth' });
                frames++;
                if (code && code.data) {
                    console.log('✅ QR detected:', code.data);
                    statusEl.textContent = '✅ تم التقاط الكود!';
                    statusEl.style.color = '#10b981';
                    clearInterval(scanInterval);
                    stopScanner();
                    processQR(code.data);
                    return;
                }
                // حدّث المؤشر كل شوية
                if (frames % 5 === 0) {
                    statusEl.innerHTML = '<i class="fas fa-search"></i> جاري البحث عن الكود... وجّه الكاميرا للـ QR (' + frames + ')';
                }
            } catch (e) { console.warn('scan frame error:', e); }
        } else {
            statusEl.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري تشغيل الكاميرا...';
        }
    }, 200); // 5 مرات في الثانية
}

window.submitCode = () => {
    const code = document.getElementById('codeInput').value.trim().toUpperCase();
    if (!code) { showToast('اكتب الكود', 'warning'); return; }
    processQR(code);
};

async function processQR(qrData) {
    if (processing) return;
    processing = true;
    document.getElementById('loadingOverlay').classList.remove('hidden');

    try {
        // الـ QR ممكن يكون JSON أو string مباشر
        let qrCode = qrData;
        try { const parsed = JSON.parse(qrData); if (parsed.code) qrCode = parsed.code; } catch(e) {
            const m = qrData.match(/[A-Z]+-[A-Z0-9]+/i);
            if (m) qrCode = m[0];
        }
        qrCode = qrCode.trim().toUpperCase();

        // 1. جيب الـ QR
        const { data: qr, error: qrError } = await sb.from('qr_codes').select('*').eq('code', qrCode).maybeSingle();
        if (qrError || !qr) {
            showResult('error', '❌ كود غير صحيح', 'الكود ده غير موجود أو غلط');
            return;
        }

        // 2. تأكد من الحالة والصلاحية
        const now = new Date();
        if (qr.status !== 'active') {
            showResult('error', '⏰ كود ' + (qr.status === 'cancelled' ? 'ملغي' : 'منتهي'), 'الكود ده مش صالح للاستخدام دلوقتي');
            return;
        }
        if (new Date(qr.valid_until) < now) {
            showResult('error', '⏰ انتهت صلاحية الكود', 'الكود ده انتهت صلاحيته');
            try { await sb.from('qr_codes').update({ status: 'expired' }).eq('id', qr.id); } catch(e) {}
            return;
        }

        // 3. تأكد إن الطالب مش ماسح قبل كده النهارده لنفس الكود
        const todayStart = new Date(); todayStart.setHours(0,0,0,0);
        const { data: existing } = await sb.from('attendance_logs')
            .select('id').eq('student_user_id', studentUserId).eq('qr_code_id', qr.id)
            .gte('scanned_at', todayStart.toISOString()).maybeSingle();
        if (existing) {
            showResult('error', '✋ سجّلت قبل كده', 'إنت بالفعل سجّلت على الكود ده النهارده');
            return;
        }

        // 4. احسب الغرض والتأخير
        const purpose = qr.metadata?.purpose || (qr.qr_type === 'interview_checkin' ? 'interview' : 'attendance');
        const attendanceType = purpose === 'interview' ? 'interview' : 'daily_attendance';
        const department = qr.metadata?.department || null;
        const validFrom = new Date(qr.valid_from);
        const delayMinutes = Math.max(0, Math.round((now - validFrom) / 60000));
        const status = delayMinutes <= 15 ? 'on_time' : 'late';

        // 5. سجّل في attendance_logs (نفس الجدول اللي الشركة بتقرأ منه)
        const fullRow = {
            qr_code_id:      qr.id,
            company_user_id: qr.company_user_id,
            student_user_id: studentUserId,
            student_name:    studentData?.full_name || null,
            student_photo:   studentData?.photo || null,
            attendance_type: attendanceType,
            purpose:         purpose,
            department:      department,
            status:          status,
            delay_minutes:   delayMinutes,
            scanned_at:      now.toISOString()
        };

        let { error: insErr } = await sb.from('attendance_logs').insert(fullRow);

        // لو فشل بسبب عمود ناقص، جرّب بالأعمدة الأساسية بس
        if (insErr) {
            console.warn('Full insert failed, trying minimal:', insErr.message);
            const minimalRow = {
                qr_code_id:      qr.id,
                company_user_id: qr.company_user_id,
                student_user_id: studentUserId,
                student_name:    studentData?.full_name || null,
                attendance_type: attendanceType,
                status:          status,
                delay_minutes:   delayMinutes,
                scanned_at:      now.toISOString()
            };
            const retry = await sb.from('attendance_logs').insert(minimalRow);
            insErr = retry.error;
        }

        if (insErr) {
            console.error('Insert failed:', insErr);
            showResult('error', '❌ خطأ في التسجيل', insErr.message + ' — صوّر الشاشة وابعتها للدعم');
            return;
        }

        // 6. حدّث عداد المسحات
        try {
            await sb.from('qr_codes').update({
                scans_count: (qr.scans_count || 0) + 1,
                last_scanned_at: now.toISOString()
            }).eq('id', qr.id);
        } catch(e) {}

        // 7. إشعار للشركة
        if (window.ProVance?.sendNotification) {
            await window.ProVance.sendNotification({
                userId:   qr.company_user_id,
                userType: 'company',
                title:    purpose === 'interview' ? '🎯 طالب وصل للمقابلة' : '✅ تسجيل حضور جديد',
                message:  `${studentData?.full_name || 'طالب'} سجّل ${purpose === 'interview' ? 'حضوره للمقابلة' : 'حضوره'}${status === 'late' ? ' (متأخر ' + delayMinutes + ' دقيقة)' : ''}`,
                type:     status === 'late' ? 'warning' : 'success',
                link:     'company-QR_Code.html'
            });
        }

        // 8. لو مقابلة، حدّث حالة الطلب
        if (purpose === 'interview') {
            try {
                await sb.from('applications').update({ status: 'interview_done', updated_at: now.toISOString() })
                    .eq('student_user_id', studentUserId).eq('company_user_id', qr.company_user_id)
                    .eq('status', 'interview_scheduled');
            } catch(e) {}
        }

        const purposeLabel = purpose === 'interview' ? 'حضور المقابلة' : 'الحضور';
        let detail = `<strong>الشركة:</strong> ${escapeHtml(qr.company_name || '')}<br>`;
        if (department) detail += `<strong>القسم:</strong> ${escapeHtml(department)}<br>`;
        detail += `<strong>الوقت:</strong> ${now.toLocaleString('ar-EG')}`;
        if (status === 'late') detail += `<br><span style="color:#f59e0b">⏰ متأخر ${delayMinutes} دقيقة</span>`;

        showResult('success', '✅ تم تسجيل ' + purposeLabel + ' بنجاح', detail);
        loadRecentScans();
    } catch (err) {
        console.error('Process QR error:', err);
        showResult('error', '❌ حدث خطأ', err.message || 'فشل معالجة الكود');
    } finally {
        processing = false;
        document.getElementById('loadingOverlay').classList.add('hidden');
    }
}

function showResult(type, title, detail) {
    const html = `
        <div class="result-card ${type}">
            <div class="result-icon ${type}"><i class="fas fa-${type === 'success' ? 'check' : 'times'}"></i></div>
            <div class="result-title">${title}</div>
            <div class="result-detail">${detail}</div>
            <button class="btn-secondary" onclick="document.getElementById('resultArea').innerHTML=''" style="margin-top:14px"><i class="fas fa-times"></i> إغلاق</button>
        </div>`;
    document.getElementById('resultArea').innerHTML = html;
    const inp = document.getElementById('codeInput');
    if (inp) inp.value = '';
}

async function loadRecentScans() {
    try {
        const { data } = await sb.from('attendance_logs')
            .select('*').eq('student_user_id', studentUserId)
            .order('scanned_at', { ascending: false }).limit(5);
        const list = document.getElementById('recentScansList');
        if (!data || data.length === 0) {
            list.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:14px;font-size:0.88rem">لا توجد عمليات سابقة</div>';
            return;
        }
        const labels = { attendance: 'حضور تدريب', interview: 'مقابلة', daily_attendance: 'حضور تدريب' };
        const icons  = { attendance: 'fa-clipboard-check', interview: 'fa-handshake', daily_attendance: 'fa-clipboard-check' };
        const colors = { attendance: '#10b981', interview: '#4facfe', daily_attendance: '#10b981' };
        list.innerHTML = data.map(s => {
            const purpose = s.purpose || s.attendance_type || 'attendance';
            const ok = s.status === 'on_time' || s.status === 'late';
            return `
                <div class="scan-item">
                    <div class="scan-icon" style="background:${colors[purpose]||'#4facfe'}20;color:${colors[purpose]||'#4facfe'}"><i class="fas ${icons[purpose]||'fa-qrcode'}"></i></div>
                    <div class="scan-info">
                        <div class="scan-type">${labels[purpose]||'مسح'}${s.department ? ' - ' + escapeHtml(s.department) : ''}</div>
                        <div class="scan-time">${new Date(s.scanned_at).toLocaleString('ar-EG', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' })}${s.status==='late' ? ' • متأخر' : ''}</div>
                    </div>
                    <span class="scan-result ${ok ? 'success' : 'error'}">${ok ? '✓' : '✗'}</span>
                </div>`;
        }).join('');
    } catch(e) { console.warn('Could not load scans:', e); }
}

async function init() {
    try {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) { window.location.href = 'student-login.html'; return; }
        studentUserId = session.user.id;
        const { data: student } = await sb.from('student').select('full_name, email, photo').eq('user_id', studentUserId).maybeSingle();
        studentData = student;
        await loadRecentScans();
    } catch (err) { console.error(err); showToast('خطأ في التحميل', 'error'); }
}

document.addEventListener('DOMContentLoaded', init);
document.getElementById('codeInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') submitCode(); });
</script>
</body>
</html>
