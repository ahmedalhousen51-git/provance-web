<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>مسح QR - ProVance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root { --primary:#4facfe; --secondary:#00d2ff; --gradient:linear-gradient(135deg,#00d2ff,#00a8ff); --bg:#0b1120; --bg-2:#070a14; --card:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.08); --text:#fff; --text-muted:#94a3b8; --error:#ef4444; --success:#10b981; --warning:#f59e0b; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:linear-gradient(160deg,#0b1120,#070a14); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }
.container { max-width:520px; margin:0 auto; padding:16px; }
.top-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
.back-btn { width:44px; height:44px; border-radius:12px; background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--text); cursor:pointer; font-size:1rem; }
.page-title { font-size:1.15rem; font-weight:800; display:flex; align-items:center; gap:8px; }
.tab-row { display:flex; gap:8px; margin-bottom:18px; background:var(--card); padding:5px; border-radius:14px; border:1px solid var(--border); }
.tab-btn { flex:1; padding:13px 8px; background:transparent; border:none; color:var(--text-muted); font-weight:700; cursor:pointer; border-radius:10px; font-family:inherit; font-size:0.92rem; display:flex; align-items:center; justify-content:center; gap:7px; transition:all .2s; }
.tab-btn.active { background:var(--gradient); color:#fff; box-shadow:0 4px 14px rgba(0,168,255,0.35); }
.card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:22px; margin-bottom:14px; }
.scan-box { border:2px dashed rgba(255,255,255,0.18); border-radius:16px; padding:30px 20px; text-align:center; }
.scan-icon { width:72px; height:72px; border-radius:20px; background:var(--gradient); display:flex; align-items:center; justify-content:center; font-size:1.8rem; color:#fff; margin:0 auto 16px; }
.scan-icon.warn { background:linear-gradient(135deg,#f59e0b,#f97316); }
.scan-icon.green { background:linear-gradient(135deg,#10b981,#059669); }
.msg { color:var(--text); font-weight:700; font-size:1rem; margin-bottom:6px; }
.msg-sub { color:var(--text-muted); font-size:0.82rem; line-height:1.7; margin-top:8px; }
.btn { width:100%; padding:14px; border:none; border-radius:12px; font-family:inherit; font-weight:800; font-size:0.95rem; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; margin-top:10px; transition:transform .15s; }
.btn:active { transform:scale(0.98); }
.btn-primary { background:var(--gradient); color:#fff; }
.btn-green { background:linear-gradient(135deg,#10b981,#059669); color:#fff; }
.btn-ghost { background:rgba(255,255,255,0.06); color:var(--text); border:1px solid var(--border); }
.btn-row { display:flex; gap:10px; }
.btn-row .btn { flex:1; }
#qr-video { width:100%; border-radius:14px; margin-top:12px; display:none; background:#000; max-height:340px; object-fit:cover; }
#qr-video.show { display:block; }
.scan-status { text-align:center; color:var(--secondary); font-size:0.85rem; margin-top:10px; font-weight:700; min-height:20px; }
.code-input { width:100%; padding:15px; background:var(--bg-2); border:2px solid var(--border); border-radius:12px; color:var(--text); font-family:inherit; font-size:1.1rem; text-align:center; letter-spacing:2px; font-weight:700; margin-top:14px; }
.code-input:focus { outline:none; border-color:var(--secondary); }
.hidden { display:none !important; }
.result-card { border-radius:16px; padding:22px; text-align:center; margin-bottom:14px; animation:pop .3s; }
@keyframes pop { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
.result-card.success { background:rgba(16,185,129,0.12); border:1px solid rgba(16,185,129,0.4); }
.result-card.error { background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.4); }
.result-icon { width:64px; height:64px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.6rem; margin:0 auto 12px; }
.result-icon.success { background:var(--success); color:#fff; }
.result-icon.error { background:var(--error); color:#fff; }
.result-title { font-size:1.1rem; font-weight:800; margin-bottom:8px; }
.result-detail { color:var(--text-muted); font-size:0.88rem; line-height:1.8; }
.recent { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:18px; }
.recent h3 { font-size:0.95rem; font-weight:800; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.scan-item { display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--border); }
.scan-item:last-child { border-bottom:none; }
.scan-i { width:40px; height:40px; border-radius:11px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.scan-info { flex:1; min-width:0; }
.scan-type { font-weight:700; font-size:0.88rem; }
.scan-time { color:var(--text-muted); font-size:0.75rem; margin-top:2px; }
.scan-result { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.8rem; }
.scan-result.success { background:rgba(16,185,129,0.15); color:#10b981; }
.scan-result.error { background:rgba(239,68,68,0.15); color:#ef4444; }
.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); padding:14px 24px; border-radius:12px; color:#fff; font-weight:700; z-index:9999; max-width:90vw; text-align:center; box-shadow:0 8px 24px rgba(0,0,0,0.3); }
.overlay { position:fixed; inset:0; background:rgba(7,10,20,0.95); display:flex; align-items:center; justify-content:center; z-index:9998; }
.overlay.hidden { display:none !important; }
.spinner { width:52px; height:52px; border:5px solid rgba(0,168,255,0.2); border-top-color:var(--secondary); border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i></button>
        <div class="page-title"><i class="fas fa-qrcode" style="color:var(--secondary)"></i> مسح QR Code</div>
        <div style="width:44px"></div>
    </div>

    <div class="tab-row">
        <button class="tab-btn active" id="tabCamera" onclick="switchTab('camera')"><i class="fas fa-camera"></i> الكاميرا</button>
        <button class="tab-btn" id="tabCode" onclick="switchTab('code')"><i class="fas fa-keyboard"></i> إدخال الكود</button>
    </div>

    <!-- ===== Camera ===== -->
    <div id="cameraSection">
        <div class="card">
            <div class="scan-box" id="scanBox">
                <div class="scan-icon"><i class="fas fa-qrcode"></i></div>
                <div class="msg">امسح الـ QR Code</div>
                <div class="msg-sub">وجّه الكاميرا للكود اللي عند الشركة، أو صوّره</div>
            </div>
            <video id="qr-video" playsinline autoplay muted></video>
            <div class="scan-status" id="scanStatus"></div>

            <div class="btn-row">
                <button class="btn btn-primary" id="startScanBtn" onclick="startScanner()"><i class="fas fa-play"></i> مسح مباشر</button>
                <button class="btn btn-green" onclick="document.getElementById('cameraInput').click()"><i class="fas fa-camera"></i> صوّر الـ QR</button>
            </div>
            <button class="btn btn-ghost hidden" id="stopScanBtn" onclick="stopScanner()"><i class="fas fa-stop"></i> إيقاف</button>
            <button class="btn btn-ghost" onclick="document.getElementById('photoInput').click()"><i class="fas fa-image"></i> ارفع صورة من المعرض</button>

            <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="scanFromImage(event)" style="display:none">
            <input type="file" id="photoInput" accept="image/*" onchange="scanFromImage(event)" style="display:none">
        </div>
    </div>

    <!-- ===== Manual Code ===== -->
    <div id="codeSection" class="hidden">
        <div class="card">
            <div class="scan-box">
                <div class="scan-icon green"><i class="fas fa-keyboard"></i></div>
                <div class="msg">اكتب الكود يدوياً</div>
                <div class="msg-sub">الكود ظاهر تحت الـ QR عند الشركة</div>
            </div>
            <input type="text" id="codeInput" class="code-input" placeholder="INT-XXXXXXXX" maxlength="32" autocomplete="off" autocapitalize="characters">
            <button class="btn btn-primary" onclick="submitCode()"><i class="fas fa-check"></i> تأكيد الحضور</button>
        </div>
    </div>

    <!-- ===== Result ===== -->
    <div id="resultArea"></div>

    <!-- ===== Recent ===== -->
    <div class="recent">
        <h3><i class="fas fa-history" style="color:var(--secondary)"></i> آخر العمليات</h3>
        <div id="recentScansList">
            <div style="text-align:center;color:var(--text-muted);padding:14px;font-size:0.88rem">لا توجد عمليات سابقة</div>
        </div>
    </div>
</div>

<div class="overlay hidden" id="loadingOverlay"><div class="spinner"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="supabase-config.js"></script>
<script>
const SUPABASE_URL = 'https://jrwazyrdzmbcnddpxxrf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyd2F6eXJkem1iY25kZHB4eHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzUyMzksImV4cCI6MjA5MjExMTIzOX0.KaZt3Xb-9zjjwlSYnCvQQVxzDgbcOxdmnpg9wsUsqQI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: true, autoRefreshToken: true, storage: window.localStorage } });

let studentUserId = null, studentData = null;
let videoStream = null, scanning = false, scanInterval = null, processing = false;

function esc(s) { const d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }
function showToast(msg, type) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.style.background = type === 'error' ? '#ef4444' : type === 'success' ? '#10b981' : type === 'warning' ? '#f59e0b' : '#00a8ff';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 4000);
}

window.switchTab = (tab) => {
    document.getElementById('tabCamera').classList.toggle('active', tab === 'camera');
    document.getElementById('tabCode').classList.toggle('active', tab === 'code');
    document.getElementById('cameraSection').classList.toggle('hidden', tab !== 'camera');
    document.getElementById('codeSection').classList.toggle('hidden', tab !== 'code');
    if (tab !== 'camera') stopScanner();
};

// ===== الكاميرا =====
window.startScanner = async () => {
    if (typeof jsQR === 'undefined') { showToast('مكتبة QR لسه بتحمّل، استنى ثانية وحاول تاني', 'warning'); return; }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showToast('متصفحك مش بيدعم الكاميرا، استخدم "صوّر الـ QR" أو الإدخال اليدوي', 'warning');
        return;
    }
    const video = document.getElementById('qr-video');
    try {
        videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = videoStream;
        video.classList.add('show');
        await video.play();
        scanning = true;
        document.getElementById('startScanBtn').classList.add('hidden');
        document.getElementById('stopScanBtn').classList.remove('hidden');
        document.getElementById('scanStatus').textContent = '🔍 جاري البحث عن الكود...';
        startScanLoop(video);
    } catch (err) {
        console.error('camera:', err.name, err.message);
        let m = 'فشل فتح الكاميرا';
        if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') m = '🚫 إذن الكاميرا مرفوض. من إعدادات المتصفح اسمح بالكاميرا، أو استخدم "صوّر الـ QR"';
        else if (err.name === 'NotFoundError') m = '📵 مفيش كاميرا في الجهاز';
        else if (err.name === 'NotReadableError') m = '⚠️ الكاميرا مستخدمة من تطبيق تاني';
        showToast(m, 'error');
    }
};

function startScanLoop(video) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    if (scanInterval) clearInterval(scanInterval);
    scanInterval = setInterval(() => {
        if (!scanning || video.readyState !== video.HAVE_ENOUGH_DATA) return;
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        try {
            const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'attemptBoth' });
            if (code && code.data) {
                document.getElementById('scanStatus').textContent = '✅ تم التقاط الكود!';
                stopScanner();
                processQR(code.data);
            }
        } catch (e) {}
    }, 200);
}

window.stopScanner = () => {
    scanning = false;
    if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
    if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
    const video = document.getElementById('qr-video');
    if (video) { video.classList.remove('show'); video.srcObject = null; }
    document.getElementById('startScanBtn').classList.remove('hidden');
    document.getElementById('stopScanBtn').classList.add('hidden');
};

// ===== رفع/تصوير صورة =====
window.scanFromImage = (event) => {
    const file = event.target.files[0];
    if (!file) return;
    if (typeof jsQR === 'undefined') { showToast('مكتبة QR لسه بتحمّل', 'warning'); return; }
    const overlay = document.getElementById('loadingOverlay');
    overlay.classList.remove('hidden');
    const reader = new FileReader();
    reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            let w = img.width, h = img.height, max = 1400;
            if (w > max || h > max) { if (w > h) { h = h * max / w; w = max; } else { w = w * max / h; h = max; } }
            canvas.width = w; canvas.height = h;
            ctx.drawImage(img, 0, 0, w, h);
            const data = ctx.getImageData(0, 0, w, h);
            const code = jsQR(data.data, data.width, data.height, { inversionAttempts: 'attemptBoth' });
            overlay.classList.add('hidden');
            if (code && code.data) processQR(code.data);
            else showToast('❌ مفيش QR واضح في الصورة، قرّب وصوّر تاني', 'error');
        };
        img.onerror = () => { overlay.classList.add('hidden'); showToast('فشل قراءة الصورة', 'error'); };
        img.src = e.target.result;
    };
    reader.onerror = () => { overlay.classList.add('hidden'); showToast('فشل قراءة الملف', 'error'); };
    reader.readAsDataURL(file);
    event.target.value = '';
};

// ===== إدخال يدوي =====
window.submitCode = () => {
    const code = (document.getElementById('codeInput').value || '').trim();
    if (!code) { showToast('اكتب الكود الأول', 'warning'); return; }
    processQR(code);
};

// ===== المعالجة (القلب) =====
async function processQR(qrData) {
    if (processing) return;
    processing = true;

    if (!studentUserId) {
        processing = false;
        return showResult('error', '⚠️ مش مسجّل دخول', 'لازم تكون داخل بحساب طالب على نفس الجهاز. سجّل دخول وحاول تاني.');
    }

    document.getElementById('loadingOverlay').classList.remove('hidden');
    try {
        // استخراج الكود — لو JSON خد .code، غير كده خد النص كامل
        let qrCode = qrData;
        try {
            const p = JSON.parse(qrData);
            if (p && p.code) qrCode = p.code;
        } catch (e) {
            // مش JSON — النص هو الكود نفسه (زي INT-ABC123)
            qrCode = qrData;
        }
        qrCode = String(qrCode).trim().toUpperCase();

        // 1) هات الكود
        const { data: qr, error: qrErr } = await sb.from('qr_codes').select('*').eq('code', qrCode).maybeSingle();
        if (qrErr) return showResult('error', '❌ خطأ في قراءة الكود', 'تفاصيل: ' + qrErr.message);
        if (!qr) return showResult('error', '❌ كود غير موجود', 'الكود "' + qrCode + '" مش موجود. تأكد إنه صح.');

        // 2) الحالة
        if (qr.status && qr.status !== 'active') return showResult('error', '⏰ الكود غير نشط', 'اطلب كود جديد من الشركة.');

        // 3) الصلاحية (+10 ثوانٍ سماح)
        const now = new Date();
        if (qr.valid_until) {
            const vu = new Date(qr.valid_until); vu.setSeconds(vu.getSeconds() + 10);
            if (vu < now) { try { await sb.from('qr_codes').update({ status: 'expired' }).eq('id', qr.id); } catch (e) {} return showResult('error', '⏰ انتهت صلاحية الكود', 'اطلب كود جديد من الشركة.'); }
        }

        // 4) مكرر النهارده؟
        const dayStart = new Date(); dayStart.setHours(0, 0, 0, 0);
        try {
            const { data: ex } = await sb.from('attendance_logs').select('id')
                .eq('student_user_id', studentUserId).eq('qr_code_id', qr.id)
                .gte('scanned_at', dayStart.toISOString()).maybeSingle();
            if (ex) return showResult('error', '✋ سجّلت قبل كده', 'إنت سجّلت على الكود ده النهارده.');
        } catch (e) {}

        // 5) الغرض والتأخير
        const purpose = (qr.metadata && qr.metadata.purpose) || (qr.qr_type === 'interview' ? 'interview' : 'attendance');
        const dept = (qr.metadata && qr.metadata.department) || null;
        const vf = qr.valid_from ? new Date(qr.valid_from) : now;
        const delay = Math.max(0, Math.round((now - vf) / 60000));
        const status = delay <= 15 ? 'on_time' : 'late';

        // 6) سجّل الحضور
        const baseRow = {
            qr_code_id: qr.id, company_user_id: qr.company_user_id, student_user_id: studentUserId,
            student_name: (studentData && studentData.full_name) || null, status: status, scanned_at: now.toISOString()
        };
        const fullRow = Object.assign({}, baseRow, {
            student_photo: (studentData && studentData.photo) || null,
            attendance_type: purpose === 'interview' ? 'interview' : 'daily_attendance',
            purpose: purpose, department: dept, delay_minutes: delay
        });

        let insErr = (await sb.from('attendance_logs').insert(fullRow)).error;
        if (insErr) insErr = (await sb.from('attendance_logs').insert(baseRow)).error;
        if (insErr) return showResult('error', '❌ تعذّر تسجيل الحضور', 'السبب: ' + insErr.message + '<br><br>دي مشكلة صلاحيات (RLS). شغّل RUN_THIS_ALL_IN_ONE.sql في Supabase.');

        // 7) عداد
        try { await sb.from('qr_codes').update({ scans_count: (qr.scans_count || 0) + 1, last_scanned_at: now.toISOString() }).eq('id', qr.id); } catch (e) {}

        // 8) إشعار للشركة
        try {
            if (window.ProVance && window.ProVance.sendNotification) {
                await window.ProVance.sendNotification({
                    userId: qr.company_user_id, userType: 'company',
                    title: purpose === 'interview' ? '🎯 طالب وصل للمقابلة' : '✅ تسجيل حضور جديد',
                    message: ((studentData && studentData.full_name) || 'طالب') + (purpose === 'interview' ? ' وصل للمقابلة' : ' سجّل حضوره') + (status === 'late' ? ' (متأخر ' + delay + ' دقيقة)' : ''),
                    type: status === 'late' ? 'warning' : 'success', link: 'company-QR_Code.html'
                });
            }
        } catch (e) {}

        // 9) لو مقابلة، علّم الطلب
        if (purpose === 'interview') {
            try {
                await sb.from('applications').update({ status: 'interview_done', updated_at: now.toISOString() })
                    .eq('student_user_id', studentUserId).eq('company_user_id', qr.company_user_id).eq('status', 'interview_scheduled');
            } catch (e) {}
        }

        // 10) نجاح
        let detail = '<strong>الشركة:</strong> ' + esc(qr.company_name || '') + '<br>';
        if (dept) detail += '<strong>القسم:</strong> ' + esc(dept) + '<br>';
        detail += '<strong>الوقت:</strong> ' + now.toLocaleString('ar-EG');
        if (status === 'late') detail += '<br><span style="color:#f59e0b">⏰ متأخر ' + delay + ' دقيقة</span>';
        showResult('success', '✅ تم تسجيل ' + (purpose === 'interview' ? 'حضور المقابلة' : 'الحضور'), detail);
        try { loadRecentScans(); } catch (e) {}
    } catch (err) {
        console.error(err);
        showResult('error', '❌ حدث خطأ', (err && err.message) || 'فشل المعالجة');
    } finally {
        processing = false;
        document.getElementById('loadingOverlay').classList.add('hidden');
    }
}

function showResult(type, title, detail) {
    document.getElementById('loadingOverlay').classList.add('hidden');
    processing = false;
    const area = document.getElementById('resultArea');
    area.innerHTML = '<div class="result-card ' + type + '">' +
        '<div class="result-icon ' + type + '"><i class="fas fa-' + (type === 'success' ? 'check' : 'times') + '"></i></div>' +
        '<div class="result-title">' + title + '</div>' +
        '<div class="result-detail">' + detail + '</div></div>';
    try { area.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch (e) {}
    const inp = document.getElementById('codeInput'); if (inp) inp.value = '';
}

async function loadRecentScans() {
    try {
        const { data } = await sb.from('attendance_logs').select('*')
            .eq('student_user_id', studentUserId).order('scanned_at', { ascending: false }).limit(5);
        const list = document.getElementById('recentScansList');
        if (!data || data.length === 0) { list.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:14px;font-size:0.88rem">لا توجد عمليات سابقة</div>'; return; }
        const labels = { attendance: 'حضور تدريب', interview: 'مقابلة', daily_attendance: 'حضور تدريب' };
        const icons = { attendance: 'fa-clipboard-check', interview: 'fa-handshake', daily_attendance: 'fa-clipboard-check' };
        const colors = { attendance: '#10b981', interview: '#4facfe', daily_attendance: '#10b981' };
        list.innerHTML = data.map(s => {
            const p = s.purpose || s.attendance_type || 'attendance';
            const ok = s.status === 'on_time' || s.status === 'late';
            return '<div class="scan-item"><div class="scan-i" style="background:' + (colors[p] || '#4facfe') + '20;color:' + (colors[p] || '#4facfe') + '"><i class="fas ' + (icons[p] || 'fa-qrcode') + '"></i></div>' +
                '<div class="scan-info"><div class="scan-type">' + (labels[p] || 'مسح') + (s.department ? ' - ' + esc(s.department) : '') + '</div>' +
                '<div class="scan-time">' + new Date(s.scanned_at).toLocaleString('ar-EG', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' }) + (s.status === 'late' ? ' • متأخر' : '') + '</div></div>' +
                '<span class="scan-result ' + (ok ? 'success' : 'error') + '">' + (ok ? '✓' : '✗') + '</span></div>';
        }).join('');
    } catch (e) { console.warn('recent:', e); }
}

async function init() {
    try {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) { window.location.href = 'student-login.html'; return; }
        studentUserId = session.user.id;
        const { data: student } = await sb.from('student').select('full_name, email, photo').eq('user_id', studentUserId).maybeSingle();
        studentData = student;
        await loadRecentScans();
    } catch (err) { console.error(err); showToast('خطأ في التحميل', 'error'); }
}

document.getElementById('codeInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') submitCode(); });
init();
</script>
</body>
</html>
