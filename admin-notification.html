<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>إشعارات الإدمن - ProVance</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
:root { --primary: #ef4444; --secondary: #dc2626; --gradient: linear-gradient(135deg, #ef4444, #dc2626); --bg: #0a0e27; --bg-2: #1a1535; --card: rgba(255,255,255,0.04); --card-hover: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.08); --text: #fff; --text-muted: #94a3b8; --text-dim: rgba(148,163,184,0.6); --error: #ef4444; --success: #10b981; --warning: #f59e0b; --info: #4facfe; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.bg-anim { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 20% 20%, rgba(239,68,68,0.08), transparent 45%), radial-gradient(circle at 80% 80%, rgba(220,38,38,0.06), transparent 45%), var(--bg); }
.layout { display: flex; min-height: 100vh; }
.sidebar { width: 260px; background: rgba(20,18,40,0.7); backdrop-filter: blur(20px); border-left: 1px solid var(--border); padding: 24px 16px; position: fixed; inset: 0 0 0 auto; z-index: 100; transition: transform .3s; display: flex; flex-direction: column; }
.sidebar-logo { display: flex; align-items: center; justify-content: center; padding: 0 8px 20px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
.sidebar-logo .text-logo { font-size: 1.5rem; font-weight: 900; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.admin-badge { background: var(--gradient); color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 0.78rem; font-weight: 800; text-align: center; margin-bottom: 14px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; color: var(--text-muted); text-decoration: none; border-radius: 10px; font-size: 0.92rem; font-weight: 600; margin-bottom: 4px; transition: all .2s; }
.nav-item:hover { background: var(--card); color: var(--text); }
.nav-item.active { background: var(--gradient); color: #fff; }
.nav-item i { width: 18px; }
.nav-badge { margin-right: auto; background: rgba(255,255,255,0.2); color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 800; }
.main { flex: 1; margin-right: 260px; padding: 24px; min-width: 0; }
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; gap: 14px; flex-wrap: wrap; }
.menu-toggle { display: none; background: var(--card); border: 1px solid var(--border); color: var(--text); width: 42px; height: 42px; border-radius: 10px; cursor: pointer; }
.topbar-title { font-size: 1.5rem; font-weight: 800; }
.topbar-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 18px; }
.stat-mini { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; display: flex; align-items: center; gap: 11px; }
.stat-mini-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.05rem; color: #fff; flex-shrink: 0; }
.stat-mini-icon.primary { background: var(--gradient); }
.stat-mini-icon.success { background: linear-gradient(135deg, #10b981, #059669); }
.stat-mini-icon.warning { background: linear-gradient(135deg, #f59e0b, #f97316); }
.stat-mini-icon.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
.stat-mini-icon.info { background: linear-gradient(135deg, #4facfe, #00f2fe); }
.stat-mini-num { font-size: 1.4rem; font-weight: 800; line-height: 1; }
.stat-mini-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; }
.tabs-container { display: flex; gap: 8px; margin-bottom: 22px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 6px; overflow-x: auto; }
.tab-btn { padding: 11px 18px; background: none; border: none; color: var(--text-muted); font-family: inherit; font-size: 0.92rem; font-weight: 700; border-radius: 10px; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 7px; transition: all .2s; }
.tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.tab-btn.active { background: var(--gradient); color: #fff; }
.tab-badge { background: rgba(255,255,255,0.15); padding: 1px 8px; border-radius: 10px; font-size: 0.72rem; }
.tab-content { display: none; animation: fadeIn .3s; }
.tab-content.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px; border: none; border-radius: 10px; font-weight: 700; font-family: inherit; font-size: 0.88rem; cursor: pointer; transition: all .2s; text-decoration: none; white-space: nowrap; }
.btn-primary { background: var(--gradient); color: #fff; }
.btn-primary:hover { transform: translateY(-2px); }
.btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
.btn-secondary:hover { background: var(--card-hover); }
.btn-danger { background: rgba(239,68,68,0.1); color: var(--error); border: 1px solid rgba(239,68,68,0.3); }
.btn-info { background: rgba(79,172,254,0.15); color: var(--info); border: 1px solid rgba(79,172,254,0.3); }
.btn-warning { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
.btn-success { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
.btn-sm { padding: 7px 12px; font-size: 0.8rem; }
.notif-list { display: flex; flex-direction: column; gap: 8px; }
.notif-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; display: flex; align-items: flex-start; gap: 12px; transition: all .2s; cursor: pointer; }
.notif-card:hover { background: var(--card-hover); border-color: var(--primary); transform: translateX(-3px); }
.notif-card.unread { background: rgba(79,172,254,0.04); border-color: rgba(79,172,254,0.2); position: relative; }
.notif-card.unread::after { content: ''; position: absolute; top: 14px; left: 14px; width: 8px; height: 8px; background: var(--info); border-radius: 50%; box-shadow: 0 0 8px var(--info); animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.notif-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.1rem; flex-shrink: 0; }
.notif-icon.success { background: linear-gradient(135deg, #10b981, #059669); }
.notif-icon.warning { background: linear-gradient(135deg, #f59e0b, #f97316); }
.notif-icon.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
.notif-icon.info { background: linear-gradient(135deg, #4facfe, #00f2fe); }
.notif-icon.primary { background: var(--gradient); }
.notif-body { flex: 1; min-width: 0; }
.notif-title { font-weight: 800; font-size: 0.96rem; margin-bottom: 3px; }
.notif-message { color: var(--text-muted); font-size: 0.86rem; line-height: 1.5; }
.notif-meta { display: flex; gap: 10px; margin-top: 6px; font-size: 0.78rem; color: var(--text-dim); flex-wrap: wrap; }
.notif-meta i { color: var(--primary); }
.notif-actions { display: flex; gap: 4px; flex-shrink: 0; }
.notif-btn { background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text-muted); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; }
.notif-btn:hover { color: var(--text); background: var(--card-hover); }
.notif-btn.delete:hover { background: rgba(239,68,68,0.15); color: var(--error); }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); background: var(--card); border: 1px solid var(--border); border-radius: 16px; }
.empty-state i { font-size: 4rem; color: rgba(148,163,184,0.3); margin-bottom: 16px; display: block; }
.empty-state h3 { color: var(--text); margin-bottom: 6px; font-size: 1.1rem; }
.filters-bar { display: flex; gap: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 18px; flex-wrap: wrap; }
.filters-bar input, .filters-bar select { padding: 9px 14px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.9rem; }
.filters-bar input { flex: 1; min-width: 200px; }
.filters-bar input:focus, .filters-bar select:focus { outline: none; border-color: var(--primary); }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; animation: fadeIn .25s; }
.modal.active { display: flex; }
.modal-content { background: var(--bg-2); border: 1px solid var(--border); border-radius: 22px; width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; padding: 28px; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
.modal-title { font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
.modal-title i { color: var(--primary); }
.modal-close { background: var(--card); border: 1px solid var(--border); color: var(--text); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: var(--card-hover); transform: rotate(90deg); }
.field { margin-bottom: 16px; }
.field label { display: block; color: var(--text); font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; }
.field label .req { color: var(--error); }
.field input, .field select, .field textarea { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.03); border: 2px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.95rem; font-family: inherit; }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--primary); }
.field textarea { resize: vertical; min-height: 80px; }
.recipient-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.recipient-btn { padding: 14px; background: rgba(255,255,255,0.02); border: 2px solid var(--border); border-radius: 10px; color: var(--text); font-family: inherit; font-size: 0.86rem; font-weight: 700; cursor: pointer; transition: all .2s; text-align: center; }
.recipient-btn:hover, .recipient-btn.selected { border-color: var(--primary); background: rgba(239,68,68,0.1); color: var(--primary); }
.loading-overlay { position: fixed; inset: 0; background: rgba(10,14,39,0.95); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity .3s; }
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-spinner { width: 60px; height: 60px; border: 4px solid var(--card); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 14px 24px; border-radius: 12px; color: #fff; font-weight: 700; z-index: 9999; }
@media (max-width: 1024px) {
    .sidebar { transform: translateX(100%); width: 280px; }
    .sidebar.open { transform: translateX(0); }
    .main { margin-right: 0; }
    .menu-toggle { display: flex; align-items: center; justify-content: center; }
}
@media (max-width: 600px) { .topbar-title { font-size: 1.2rem; } .stats-row { grid-template-columns: 1fr 1fr; } .recipient-buttons { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="bg-anim"></div>
    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo"><div class="text-logo">ProVance</div></div>
            <div class="admin-badge"><i class="fas fa-shield-alt"></i> ADMIN PANEL</div>
            <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> الرئيسية</a>
            <a href="admin-campany.html" class="nav-item"><i class="fas fa-building"></i> الشركات <span class="nav-badge" id="pendingBadge" style="display:none">0</span></a>
            <a href="admin-trainees.html" class="nav-item"><i class="fas fa-users"></i> المتدربين</a>
            <a href="admin-users.html" class="nav-item"><i class="fas fa-user-shield"></i> الأدمن</a>
            <a href="admin-notification.html" class="nav-item active"><i class="fas fa-bell"></i> الإشعارات</a>
            <a href="#" onclick="logoutAdmin(event)" class="nav-item" style="margin-top:auto; color:var(--error)">
                <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
            </a>
        </aside>
        <main class="main">
            <div class="topbar">
                <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="topbar-title"><i class="fas fa-bell" style="color:var(--primary)"></i> إدارة الإشعارات</h1>
                <div class="topbar-actions">
                    <button class="btn btn-primary btn-sm" onclick="openSendModal()">
                        <i class="fas fa-paper-plane"></i> إرسال إشعار

            <div class="stats-row">
                <div class="stat-mini">
                    <div class="stat-mini-icon primary"><i class="fas fa-bell"></i></div>
                    <div>
                        <div class="stat-mini-num" id="statTotal">0</div>

                    </div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-icon warning"><i class="fas fa-envelope"></i></div>
                    <div>
                        <div class="stat-mini-num" id="statUnread">0</div>
                        <div class="stat-mini-label">غير مقروءة</div>
                    </div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-icon success"><i class="fas fa-check"></i></div>
                    <div>
                        <div class="stat-mini-num" id="statRead">0</div>
                        <div class="stat-mini-label">مقروءة</div>

                </div>
                <div class="stat-mini">
                    <div class="stat-mini-icon info"><i class="fas fa-clock"></i></div>
                    <div>
                        <div class="stat-mini-num" id="statToday">0</div>
                        <div class="stat-mini-label">إشعارات اليوم</div>
                    </div>
                </div>
            </div>

            <div class="tabs-container">
                <button class="tab-btn active" data-tab="all" onclick="switchTab(event, 'all')">
                    <i class="fas fa-list"></i> كل الإشعارات <span class="tab-badge" id="allCount">0</span>
                </button>
                <button class="tab-btn" data-tab="mine" onclick="switchTab(event, 'mine')">
                    <i class="fas fa-user-shield"></i> إشعاراتي <span class="tab-badge" id="mineCount">0</span>
                </button>
                <button class="tab-btn" data-tab="students" onclick="switchTab(event, 'students')">
                    <i class="fas fa-users"></i> للمتدربين <span class="tab-badge" id="studentsCount">0</span>
                </button>
                <button class="tab-btn" data-tab="companies" onclick="switchTab(event, 'companies')">
                    <i class="fas fa-building"></i> للشركات <span class="tab-badge" id="companiesCount">0</span>
                </button>
            </div>

            <div class="filters-bar">
                <input type="text" id="searchInput" placeholder="🔍 ابحث في الإشعارات...">
                <select id="filterType">
                    <option value="">كل الأنواع</option>
                    <option value="info">معلومات</option>
                    <option value="success">نجاح</option>
                    <option value="warning">تحذير</option>
                    <option value="error">خطأ</option>
                </select>
                <select id="filterStatus">
                    <option value="">كل الحالات</option>
                    <option value="unread">غير مقروء</option>
                    <option value="read">مقروء</option>
                </select>
            </div>

            <div id="tab-all" class="tab-content active"><div class="notif-list" id="allList"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>جاري التحميل...</p></div></div></div>
            <div id="tab-mine" class="tab-content"><div class="notif-list" id="mineList"></div></div>
            <div id="tab-students" class="tab-content"><div class="notif-list" id="studentsList"></div></div>
            <div id="tab-companies" class="tab-content"><div class="notif-list" id="companiesList"></div></div>
        </main>
    </div>

    <div id="modalsContainer"></div>
    <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
const SUPABASE_URL = 'https://jrwazyrdzmbcnddpxxrf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyd2F6eXJkem1iY25kZHB4eHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzUyMzksImV4cCI6MjA5MjExMTIzOX0.KaZt3Xb-9zjjwlSYnCvQQVxzDgbcOxdmnpg9wsUsqQI';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, storage: window.localStorage }
});

let currentAdmin = null;
let allNotifications = [];
let currentTab = 'all';
let selectedRecipientType = null;

function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function formatDate(d) { if (!d) return '-'; return new Date(d).toLocaleDateString('ar-EG'); }
function timeAgo(d) {
    if (!d) return '';
    const diff = Date.now() - new Date(d).getTime();
    const mins = Math.floor(diff/60000);
    if (mins < 1) return 'الآن';
    if (mins < 60) return 'منذ ' + mins + ' د';
    const hrs = Math.floor(mins/60);
    if (hrs < 24) return 'منذ ' + hrs + ' س';
    const days = Math.floor(hrs/24);
    if (days < 30) return 'منذ ' + days + ' يوم';
    return formatDate(d);
}

function showToast(msg, type = 'info') {
    const t = document.createElement('div');
    const colors = { error:'#ef4444', success:'#10b981', warning:'#f59e0b', info:'#4facfe' };
    t.className = 'toast';
    t.style.background = colors[type] || colors.info;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 4000);
}

function renderModal(html) {
    document.getElementById('modalsContainer').innerHTML = html;
    document.body.style.overflow = 'hidden';
}
window.closeModal = (id) => {
    const el = document.getElementById(id);
    if (el) el.remove();
    if (document.querySelectorAll('.modal').length === 0) document.body.style.overflow = '';
};

window.logoutAdmin = async (e) => {
    e.preventDefault();
    if (!confirm('هل أنت متأكد من تسجيل الخروج؟')) return;
    await sb.auth.signOut();
    localStorage.clear();
    window.location.href = 'index.html';
};

window.switchTab = (e, tabName) => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    e.currentTarget.classList.add('active');
    document.getElementById('tab-' + tabName).classList.add('active');
    currentTab = tabName;
};

async function checkAdmin() {
    try {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) { window.location.href = 'admin-login.html'; return null; }
        const { data: admin } = await sb.from('admins').select('*').eq('user_id', session.user.id).maybeSingle();
        if (!admin) { await sb.auth.signOut(); window.location.href = 'admin-login.html'; return null; }
        return admin;
    } catch (e) { window.location.href = 'admin-login.html'; return null; }
}

function getIconType(type) {
    return ['success', 'warning', 'error', 'info'].includes(type) ? type : 'primary';
}
function getIconName(type) {
    return { 'success': 'check-circle', 'warning': 'exclamation-triangle', 'error': 'times-circle', 'info': 'info-circle' }[type] || 'bell';
}
function getUserTypeLabel(type) {
    return { 'admin': '👤 أدمن', 'student': '🎓 متدرب', 'company': '🏢 شركة' }[type] || type;
}

function renderNotifCard(n) {
    const type = getIconType(n.type);
    const icon = getIconName(n.type);
    return `
        <div class="notif-card ${n.is_read ? '' : 'unread'}">
            <div class="notif-icon ${type}"><i class="fas fa-${icon}"></i></div>
            <div class="notif-body">
                <div class="notif-title">${escapeHtml(n.title || '-')}</div>
                <div class="notif-message">${escapeHtml(n.message || '')}</div>
                <div class="notif-meta">
                    <span><i class="fas fa-clock"></i> ${timeAgo(n.created_at)}</span>
                    <span><i class="fas fa-user"></i> ${getUserTypeLabel(n.user_type)}</span>
                    <span><i class="fas fa-calendar"></i> ${formatDate(n.created_at)}</span>
                </div>
            </div>
            <div class="notif-actions">
                ${!n.is_read ? `<button class="notif-btn" onclick="markRead('${n.id}')" title="تعليم كمقروء"><i class="fas fa-check"></i></button>` : ''}
                <button class="notif-btn delete" onclick="deleteNotif('${n.id}')" title="حذف"><i class="fas fa-trash"></i></button>
            </div>
        </div>
    `;
}

function applyFilters(list) {
    const search = (document.getElementById('searchInput').value || '').toLowerCase().trim();
    const typeFilter = document.getElementById('filterType').value;
    const statusFilter = document.getElementById('filterStatus').value;

    let filtered = list.slice();
    if (search) {
        filtered = filtered.filter(n =>
            (n.title || '').toLowerCase().includes(search) ||
            (n.message || '').toLowerCase().includes(search)
        );
    }
    if (typeFilter) filtered = filtered.filter(n => n.type === typeFilter);
    if (statusFilter === 'unread') filtered = filtered.filter(n => !n.is_read);
    else if (statusFilter === 'read') filtered = filtered.filter(n => n.is_read);
    return filtered;
}

function render() {
    const all = applyFilters(allNotifications);
    const mine = applyFilters(allNotifications.filter(n => n.user_type === 'admin' && n.user_id === currentAdmin.user_id));
    const students = applyFilters(allNotifications.filter(n => n.user_type === 'student'));
    const companies = applyFilters(allNotifications.filter(n => n.user_type === 'company'));

    document.getElementById('allCount').textContent = all.length;
    document.getElementById('mineCount').textContent = mine.length;
    document.getElementById('studentsCount').textContent = students.length;
    document.getElementById('companiesCount').textContent = companies.length;

    const renderList = (id, list) => {
        const el = document.getElementById(id);
        if (list.length === 0) {
            el.innerHTML = '<div class="empty-state"><i class="fas fa-bell-slash"></i><h3>لا توجد إشعارات</h3></div>';
        } else {
            el.innerHTML = list.map(renderNotifCard).join('');
        }
    };

    renderList('allList', all);
    renderList('mineList', mine);
    renderList('studentsList', students);
    renderList('companiesList', companies);
}

function updateStats() {
    const total = allNotifications.length;
    const unread = allNotifications.filter(n => !n.is_read).length;
    const today = new Date(); today.setHours(0,0,0,0);
    const todayCount = allNotifications.filter(n => new Date(n.created_at) >= today).length;

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statUnread').textContent = unread;
    document.getElementById('statRead').textContent = total - unread;
    document.getElementById('statToday').textContent = todayCount;
}

async function loadAll() {
    try {
        // اعرض كل الإشعارات في النظام (للأدمن super)
        const { data, error } = await sb.from('notifications')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(500);
        if (error) { showToast('خطأ: ' + error.message, 'error'); return; }
        allNotifications = data || [];

        // Pending companies badge
        const { data: pending } = await sb.from('companies').select('user_id').eq('status', 'pending');
        const badge = document.getElementById('pendingBadge');
        if (pending && pending.length > 0) {
            badge.textContent = pending.length;
            badge.style.display = 'inline-block';
        }

        updateStats();
        render();
    } catch (e) { showToast('خطأ في الاتصال', 'error'); }
}

window.markRead = async (id) => {
    try {
        await sb.from('notifications').update({ is_read: true, read_at: new Date().toISOString() }).eq('id', id);
        await loadAll();
    } catch (err) { showToast('خطأ', 'error'); }
};

window.deleteNotif = async (id) => {
    if (!confirm('هل تريد حذف هذا الإشعار؟')) return;
    try {
        await sb.from('notifications').delete().eq('id', id);
        showToast('تم الحذف', 'success');
        await loadAll();
    } catch (err) { showToast('خطأ', 'error'); }
};

// ============ Send Notification Modal ============
window.openSendModal = () => {
    selectedRecipientType = null;
    const html = `
        <div class="modal active" id="sendModal">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="modal-title"><i class="fas fa-paper-plane"></i><span>إرسال إشعار جديد</span></div>
                    <button class="modal-close" onclick="closeModal('sendModal')"><i class="fas fa-times"></i></button>
                </div>

                <div class="field">
                    <label><i class="fas fa-users"></i> المستلمين <span class="req">*</span></label>
                    <div class="recipient-buttons">
                        <button class="recipient-btn" onclick="selectRecipient(this, 'all_students')">
                            <i class="fas fa-users"></i><br>كل المتدربين
                        </button>
                        <button class="recipient-btn" onclick="selectRecipient(this, 'all_companies')">
                            <i class="fas fa-building"></i><br>كل الشركات
                        </button>
                        <button class="recipient-btn" onclick="selectRecipient(this, 'all_admins')">
                            <i class="fas fa-user-shield"></i><br>كل الأدمنز
                        </button>
                    </div>
                </div>

                <div class="field">
                    <label><i class="fas fa-heading"></i> العنوان <span class="req">*</span></label>
                    <input type="text" id="notifTitle" placeholder="مثال: إعلان مهم">
                </div>

                <div class="field">
                    <label><i class="fas fa-comment"></i> الرسالة <span class="req">*</span></label>
                    <textarea id="notifMessage" rows="4" placeholder="نص الإشعار..."></textarea>
                </div>

                <div class="field">
                    <label><i class="fas fa-tag"></i> النوع</label>
                    <select id="notifType">
                        <option value="info">ℹ️ معلومات</option>
                        <option value="success">✅ نجاح</option>
                        <option value="warning">⚠️ تحذير</option>
                        <option value="error">❌ خطأ</option>
                    </select>
                </div>

                <div style="display:flex;gap:10px;margin-top:16px">
                    <button class="btn btn-secondary" onclick="closeModal('sendModal')" style="flex:1;justify-content:center">إلغاء</button>
                    <button class="btn btn-primary" onclick="confirmSend()" style="flex:1;justify-content:center">
                        <i class="fas fa-paper-plane"></i> إرسال
                    </button>
                </div>
            </div>
        </div>
    `;
    renderModal(html);
};

window.selectRecipient = (el, type) => {
    document.querySelectorAll('.recipient-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedRecipientType = type;
};

window.confirmSend = async () => {
    const title = document.getElementById('notifTitle').value.trim();
    const message = document.getElementById('notifMessage').value.trim();
    const type = document.getElementById('notifType').value;

    if (!selectedRecipientType) { showToast('اختار المستلمين', 'error'); return; }
    if (!title || !message) { showToast('املأ الحقول', 'error'); return; }

    try {
        let userType, table;
        if (selectedRecipientType === 'all_students') { userType = 'student'; table = 'student'; }
        else if (selectedRecipientType === 'all_companies') { userType = 'company'; table = 'companies'; }
        else if (selectedRecipientType === 'all_admins') { userType = 'admin'; table = 'admins'; }

        // اجمع الـ user_ids
        const { data: users, error: usersErr } = await sb.from(table).select('user_id');
        if (usersErr) { showToast('خطأ: ' + usersErr.message, 'error'); return; }
        if (!users || users.length === 0) { showToast('لا يوجد مستخدمين', 'warning'); return; }

        // اعمل notification لكل واحد
        const notifs = users.map(u => ({
            user_id: u.user_id,
            user_type: userType,
            title, message, type,
            is_read: false
        }));

        const { error: insertErr } = await sb.from('notifications').insert(notifs);
        if (insertErr) { showToast('خطأ: ' + insertErr.message, 'error'); return; }

        showToast(`✅ تم إرسال ${notifs.length} إشعار`, 'success');
        closeModal('sendModal');
        await loadAll();
    } catch (err) {
        showToast('خطأ: ' + err.message, 'error');
    }
};

async function init() {
    currentAdmin = await checkAdmin();
    if (!currentAdmin) return;
    await loadAll();
    document.getElementById('loadingOverlay').classList.add('hidden');
}

document.addEventListener('DOMContentLoaded', () => {
    init();
    let st;
    document.getElementById('searchInput').addEventListener('input', () => {
        clearTimeout(st);
        st = setTimeout(render, 300);
    });
    document.getElementById('filterType').addEventListener('change', render);
    document.getElementById('filterStatus').addEventListener('change', render);
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            const modals = document.querySelectorAll('.modal.active');
            if (modals.length > 0) closeModal(modals[modals.length - 1].id);
        }
    });
});
    </script>
</body>
