<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>الإشعارات - الأدمن - ProVance</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ef4444; --secondary: #dc2626;
            --gradient: linear-gradient(135deg, #ef4444, #dc2626);
            --bg: #0a0e27; --bg-2: #1a1535;
            --card: rgba(255,255,255,0.04); --card-hover: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.08);
            --text: #fff; --text-muted: #94a3b8;
            --error: #ef4444; --success: #10b981; --warning: #f59e0b; --info: #4facfe;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .bg-anim {
            position: fixed; inset: 0; z-index: -1;
            background:
                radial-gradient(circle at 20% 20%, rgba(239,68,68,0.08), transparent 45%),
                radial-gradient(circle at 80% 80%, rgba(220,38,38,0.06), transparent 45%),
                var(--bg);
        }
        .layout { display: flex; min-height: 100vh; }
        .sidebar {
            width: 260px; background: rgba(20,18,40,0.7);
            backdrop-filter: blur(20px); border-left: 1px solid var(--border);
            padding: 24px 16px; position: fixed; inset: 0 0 0 auto;
            z-index: 100; transition: transform .3s;
            display: flex; flex-direction: column;
        }
        .sidebar-logo {
            display: flex; align-items: center; gap: 10px;
            padding: 0 8px 20px; border-bottom: 1px solid var(--border);
            margin-bottom: 16px; justify-content: center;
        }
        .sidebar-logo img { height: 32px; max-width: 100%; }
        .admin-badge {
            background: var(--gradient); color: #fff;
            padding: 5px 12px; border-radius: 14px;
            font-size: 0.75rem; font-weight: 800;
            text-align: center; margin-bottom: 14px;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 14px; color: var(--text-muted);
            text-decoration: none; border-radius: 10px;
            font-size: 0.92rem; font-weight: 600;
            margin-bottom: 4px; transition: all .2s;
        }
        .nav-item:hover { background: var(--card); color: var(--text); }
        .nav-item.active { background: var(--gradient); color: #fff; }
        .nav-item i { width: 18px; }
        .main { flex: 1; margin-right: 260px; padding: 24px; min-width: 0; }
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 22px; gap: 14px; flex-wrap: wrap;
        }
        .menu-toggle {
            display: none; background: var(--card); border: 1px solid var(--border);
            color: var(--text); width: 42px; height: 42px;
            border-radius: 10px; cursor: pointer;
        }
        .topbar-title { font-size: 1.5rem; font-weight: 800; }

        /* Layout: 2 columns */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }
        @media (max-width: 1024px) { .grid-2 { grid-template-columns: 1fr; } }

        .panel {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 22px;
        }
        .panel-title {
            display: flex; align-items: center; gap: 10px;
            font-size: 1.1rem; font-weight: 800;
            margin-bottom: 18px; padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .panel-title i { color: var(--primary); }

        /* Send Form */
        .field { margin-bottom: 14px; }
        .field label {
            display: block; color: var(--text);
            font-size: 0.92rem; font-weight: 600; margin-bottom: 8px;
        }
        .field input, .field select, .field textarea {
            width: 100%; padding: 12px 14px;
            background: rgba(255,255,255,0.03);
            border: 2px solid var(--border);
            border-radius: 10px; color: var(--text);
            font-size: 0.95rem; font-family: inherit;
            transition: all .2s;
        }
        .field textarea { resize: vertical; min-height: 100px; }
        .field input:focus, .field select:focus, .field textarea:focus {
            outline: none; border-color: var(--primary);
        }
        .field-hint {
            color: var(--text-muted);
            font-size: 0.78rem;
            margin-top: 5px;
        }

        .radio-cards {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }
        @media (max-width: 600px) { .radio-cards { grid-template-columns: 1fr 1fr; } }
        .radio-cards input[type="radio"] {
            position: absolute; opacity: 0; width: 0; height: 0;
        }
        .radio-card {
            display: flex; flex-direction: column;
            align-items: center; gap: 4px;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border: 2px solid var(--border);
            border-radius: 10px; cursor: pointer;
            transition: all .2s;
            text-align: center;
        }
        .radio-card:hover {
            background: rgba(255,255,255,0.05);
        }
        .radio-cards input[type="radio"]:checked + .radio-card {
            border-color: var(--primary);
            background: rgba(239,68,68,0.08);
        }
        .radio-card-icon { font-size: 1.1rem; color: var(--primary); }
        .radio-card-title { font-weight: 700; font-size: 0.85rem; }

        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 18px; border: none; border-radius: 10px;
            font-weight: 700; font-family: inherit; font-size: 0.92rem;
            cursor: pointer; transition: all .2s; text-decoration: none;
        }
        .btn-primary { background: var(--gradient); color: #fff; }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(239,68,68,0.4);
        }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-secondary {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
        }
        .btn-secondary:hover { background: var(--card-hover); }
        .btn-danger {
            background: rgba(239,68,68,0.1); color: var(--error);
            border: 1px solid rgba(239,68,68,0.3);
        }
        .btn-danger:hover { background: rgba(239,68,68,0.2); }

        .send-btn {
            width: 100%; justify-content: center; padding: 14px;
        }

        /* Notifications List */
        .notifications {
            display: flex; flex-direction: column; gap: 10px;
            max-height: 600px; overflow-y: auto;
        }
        .notif {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 12px; padding: 14px;
            display: flex; gap: 12px;
            transition: all .2s;
            cursor: pointer;
        }
        .notif:hover { background: var(--card-hover); }
        .notif.unread {
            background: rgba(239,68,68,0.04);
            border-color: rgba(239,68,68,0.2);
        }
        .notif-icon {
            width: 38px; height: 38px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.95rem; color: #fff;
            flex-shrink: 0;
        }
        .notif-icon.success { background: linear-gradient(135deg, #10b981, #059669); }
        .notif-icon.warning { background: linear-gradient(135deg, #f59e0b, #f97316); }
        .notif-icon.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .notif-icon.info { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .notif-icon.default { background: var(--gradient); }
        .notif-body { flex: 1; min-width: 0; }
        .notif-title { font-weight: 700; font-size: 0.92rem; margin-bottom: 3px; }
        .notif-msg { color: var(--text-muted); font-size: 0.85rem; line-height: 1.5; }
        .notif-time {
            color: rgba(148,163,184,0.6); font-size: 0.75rem;
            margin-top: 5px;
            display: flex; align-items: center; gap: 5px;
        }
        .notif-actions { display: flex; gap: 5px; }
        .notif-action {
            width: 28px; height: 28px;
            background: var(--card); border: 1px solid var(--border);
            color: var(--text-muted); border-radius: 7px;
            cursor: pointer; font-size: 0.75rem;
            display: flex; align-items: center; justify-content: center;
        }
        .notif-action:hover { color: var(--text); background: var(--card-hover); }

        .empty-state {
            text-align: center; padding: 40px 20px;
            color: var(--text-muted);
        }
        .empty-state i {
            font-size: 3rem;
            color: rgba(148,163,184,0.3);
            margin-bottom: 12px;
            display: block;
        }

        .stats-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .stats-tab {
            padding: 8px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 20px;
            font-size: 0.85rem; font-weight: 700;
            cursor: pointer;
            transition: all .2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stats-tab:hover { color: var(--text); }
        .stats-tab.active {
            background: var(--gradient); color: #fff;
            border-color: transparent;
        }
        .tab-count {
            background: rgba(255,255,255,0.15);
            padding: 1px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
        }

        @media (max-width: 1024px) {
            .sidebar { transform: translateX(100%); width: 280px; }
            .sidebar.open { transform: translateX(0); }
            .main { margin-right: 0; }
            .menu-toggle { display: flex; align-items: center; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="bg-anim"></div>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <img src="assets/logo.png" alt="ProVance" onerror="this.style.display='none'">
            </div>
            <div class="admin-badge"><i class="fas fa-shield-alt"></i><span>أدمن</span></div>
            <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> الرئيسية</a>
            <a href="admin-campany.html" class="nav-item"><i class="fas fa-building"></i> الشركات</a>
            <a href="admin-trainees.html" class="nav-item"><i class="fas fa-user-graduate"></i> الطلاب</a>
            <a href="admin-notification.html" class="nav-item active"><i class="fas fa-bell"></i> الإشعارات</a>
            <a href="#" onclick="logoutAdmin(event)" class="nav-item" style="margin-top:auto; color:var(--error)">
                <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
            </a>
        </aside>

        <main class="main">
            <div class="topbar">
                <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="topbar-title">
                    <i class="fas fa-bell" style="color:var(--primary)"></i> الإشعارات
                </h1>
            </div>

            <div class="grid-2">
                <!-- Send Notification Panel -->
                <div class="panel">
                    <div class="panel-title">
                        <i class="fas fa-paper-plane"></i> إرسال إشعار
                    </div>

                    <div class="field">
                        <label>المستلم</label>
                        <div class="radio-cards">
                            <label>
                                <input type="radio" name="recipient" value="all_students" checked>
                                <div class="radio-card">
                                    <span class="radio-card-icon"><i class="fas fa-user-graduate"></i></span>
                                    <span class="radio-card-title">كل الطلاب</span>
                                </div>
                            </label>
                            <label>
                                <input type="radio" name="recipient" value="all_companies">
                                <div class="radio-card">
                                    <span class="radio-card-icon"><i class="fas fa-building"></i></span>
                                    <span class="radio-card-title">كل الشركات</span>
                                </div>
                            </label>
                            <label>
                                <input type="radio" name="recipient" value="specific">
                                <div class="radio-card">
                                    <span class="radio-card-icon"><i class="fas fa-user"></i></span>
                                    <span class="radio-card-title">شخص معين</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="field" id="specificField" style="display:none;">
                        <label>اختر المستخدم</label>
                        <select id="specificUser">
                            <option value="">جاري التحميل...</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>نوع الإشعار</label>
                        <select id="notifType">
                            <option value="info">معلومات</option>
                            <option value="success">نجاح</option>
                            <option value="warning">تحذير</option>
                            <option value="error">خطأ</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>عنوان الإشعار *</label>
                        <input type="text" id="notifTitle" placeholder="مثال: تحديث جديد على المنصة">
                    </div>

                    <div class="field">
                        <label>الرسالة *</label>
                        <textarea id="notifMessage" placeholder="اكتب رسالة الإشعار..."></textarea>
                    </div>

                    <div class="field">
                        <label>رابط (اختياري)</label>
                        <input type="text" id="notifUrl" placeholder="مثال: company-dashboard.html">
                        <div class="field-hint">صفحة المستخدم اللي يروح ليها لما يضغط على الإشعار</div>
                    </div>

                    <button class="btn btn-primary send-btn" id="sendBtn" onclick="sendNotification()">
                        <i class="fas fa-paper-plane"></i>
                        <span>إرسال الإشعار</span>
                    </button>
                </div>

                <!-- My Notifications Panel -->
                <div class="panel">
                    <div class="panel-title">
                        <i class="fas fa-inbox"></i> إشعاراتي
                    </div>

                    <div class="stats-tabs">
                        <button class="stats-tab active" data-filter="" onclick="switchTab(event, '')">
                            الكل <span class="tab-count" id="countAll">0</span>
                        </button>
                        <button class="stats-tab" data-filter="unread" onclick="switchTab(event, 'unread')">
                            غير مقروءة <span class="tab-count" id="countUnread">0</span>
                        </button>
                    </div>

                    <div style="display:flex; gap:8px; margin-bottom:14px;">
                        <button class="btn btn-secondary" onclick="markAllRead()" style="flex:1; justify-content:center; padding:10px;">
                            <i class="fas fa-check-double"></i> قراءة الكل
                        </button>
                    </div>

                    <div class="notifications" id="notificationsList">
                        <div class="empty-state">
                            <i class="fas fa-spinner fa-spin"></i>
                            <p>جاري التحميل...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
    (function() {
        'use strict';
        let adminUserId = null;
        let allNotifs = [];
        let currentFilter = '';
        let allUsers = []; // {id, name, type}

        // إخفاء/إظهار حقل اختيار المستخدم
        document.querySelectorAll('input[name="recipient"]').forEach(r => {
            r.addEventListener('change', () => {
                const isSpecific = document.querySelector('input[name="recipient"]:checked').value === 'specific';
                document.getElementById('specificField').style.display = isSpecific ? 'block' : 'none';
                if (isSpecific && allUsers.length === 0) loadAllUsers();
            });
        });

        async function loadAllUsers() {
            const sb = window.ProVance.sb;
            try {
                const [studentsRes, companiesRes] = await Promise.all([
                    sb.from('student').select('user_id, full_name'),
                    sb.from('companies').select('user_id, company_name').eq('status', 'approved')
                ]);

                allUsers = [];
                (studentsRes.data || []).forEach(s => {
                    allUsers.push({ id: s.user_id, name: '🎓 ' + (s.full_name || '-'), type: 'student' });
                });
                (companiesRes.data || []).forEach(c => {
                    allUsers.push({ id: c.user_id, name: '🏢 ' + (c.company_name || '-'), type: 'company' });
                });

                const select = document.getElementById('specificUser');
                select.innerHTML = '<option value="">-- اختر مستخدم --</option>' +
                    allUsers.map(u => `<option value="${u.id}|${u.type}">${window.ProVance.escapeHtml(u.name)}</option>`).join('');
            } catch (err) {
                console.error(err);
            }
        }

        window.sendNotification = async () => {
            const recipient = document.querySelector('input[name="recipient"]:checked').value;
            const type = document.getElementById('notifType').value;
            const title = document.getElementById('notifTitle').value.trim();
            const message = document.getElementById('notifMessage').value.trim();
            const url = document.getElementById('notifUrl').value.trim() || null;

            if (!title) {
                window.ProVance.showToast('⚠️ اكتب عنوان للإشعار', 'warning');
                document.getElementById('notifTitle').focus();
                return;
            }
            if (!message) {
                window.ProVance.showToast('⚠️ اكتب رسالة الإشعار', 'warning');
                document.getElementById('notifMessage').focus();
                return;
            }

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>جاري الإرسال...</span>';

            try {
                const sb = window.ProVance.sb;
                let usersToNotify = [];

                if (recipient === 'all_students') {
                    const { data } = await sb.from('student').select('user_id');
                    usersToNotify = (data || []).map(s => ({ user_id: s.user_id, user_type: 'student' }));
                } else if (recipient === 'all_companies') {
                    const { data } = await sb.from('companies').select('user_id').eq('status', 'approved');
                    usersToNotify = (data || []).map(c => ({ user_id: c.user_id, user_type: 'company' }));
                } else if (recipient === 'specific') {
                    const sel = document.getElementById('specificUser').value;
                    if (!sel) {
                        window.ProVance.showToast('⚠️ اختر المستخدم', 'warning');
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-paper-plane"></i> <span>إرسال الإشعار</span>';
                        return;
                    }
                    const [userId, userType] = sel.split('|');
                    usersToNotify = [{ user_id: userId, user_type: userType }];
                }

                if (usersToNotify.length === 0) {
                    window.ProVance.showToast('⚠️ لا يوجد مستلمون', 'warning');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i> <span>إرسال الإشعار</span>';
                    return;
                }

                const notifications = usersToNotify.map(u => ({
                    user_id: u.user_id,
                    user_type: u.user_type,
                    title,
                    message,
                    type,
                    action_url: url
                }));

                const { error } = await sb.from('notifications').insert(notifications);
                if (error) throw error;

                window.ProVance.showToast(`✅ تم إرسال ${usersToNotify.length} إشعار`, 'success');

                // مسح النموذج
                document.getElementById('notifTitle').value = '';
                document.getElementById('notifMessage').value = '';
                document.getElementById('notifUrl').value = '';
            } catch (err) {
                console.error(err);
                window.ProVance.showToast('حدث خطأ في الإرسال', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> <span>إرسال الإشعار</span>';
            }
        };

        // ===== My Notifications =====
        const TYPE_ICONS = {
            'success': 'check-circle',
            'error': 'exclamation-circle',
            'warning': 'exclamation-triangle',
            'info': 'info-circle'
        };

        function renderNotifications(items) {
            const list = document.getElementById('notificationsList');
            if (items.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-bell-slash"></i>
                        <p>لا توجد إشعارات</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = items.map(n => {
                const cls = ['success', 'error', 'warning', 'info'].includes(n.type) ? n.type : 'default';
                const icon = TYPE_ICONS[n.type] || 'bell';
                return `
                    <div class="notif ${n.is_read ? '' : 'unread'}" onclick="handleClick('${n.id}', '${n.action_url || ''}')">
                        <div class="notif-icon ${cls}"><i class="fas fa-${icon}"></i></div>
                        <div class="notif-body">
                            <div class="notif-title">${window.ProVance.escapeHtml(n.title || '-')}</div>
                            <div class="notif-msg">${window.ProVance.escapeHtml(n.message || '')}</div>
                            <div class="notif-time">
                                <i class="fas fa-clock"></i> ${window.ProVance.timeAgo(n.created_at)}
                            </div>
                        </div>
                        <div class="notif-actions" onclick="event.stopPropagation()">
                            ${!n.is_read ? `<button class="notif-action" onclick="markRead('${n.id}')" title="قراءة"><i class="fas fa-check"></i></button>` : ''}
                            <button class="notif-action" onclick="deleteNotif('${n.id}')" title="حذف"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function applyFilter() {
            const filtered = currentFilter === 'unread'
                ? allNotifs.filter(n => !n.is_read)
                : allNotifs;
            renderNotifications(filtered);
        }

        async function loadMyNotifications() {
            const sb = window.ProVance.sb;
            const { data, error } = await sb.from('notifications')
                .select('*')
                .eq('user_id', adminUserId)
                .order('created_at', { ascending: false })
                .limit(100);

            if (error) {
                console.error(error);
                return;
            }
            allNotifs = data || [];
            document.getElementById('countAll').textContent = allNotifs.length;
            document.getElementById('countUnread').textContent = allNotifs.filter(n => !n.is_read).length;
            applyFilter();
        }

        window.switchTab = (e, filter) => {
            currentFilter = filter;
            document.querySelectorAll('.stats-tab').forEach(t => t.classList.remove('active'));
            e.currentTarget.classList.add('active');
            applyFilter();
        };

        window.markRead = async (id) => {
            try {
                const sb = window.ProVance.sb;
                await sb.from('notifications').update({ is_read: true, read_at: new Date().toISOString() }).eq('id', id);
                const n = allNotifs.find(x => x.id === id);
                if (n) { n.is_read = true; }
                document.getElementById('countUnread').textContent = allNotifs.filter(n => !n.is_read).length;
                applyFilter();
            } catch (err) { console.error(err); }
        };

        window.markAllRead = async () => {
            const unread = allNotifs.filter(n => !n.is_read);
            if (unread.length === 0) {
                window.ProVance.showToast('لا توجد إشعارات غير مقروءة', 'info');
                return;
            }
            try {
                const sb = window.ProVance.sb;
                await sb.from('notifications')
                    .update({ is_read: true, read_at: new Date().toISOString() })
                    .eq('user_id', adminUserId)
                    .eq('is_read', false);
                allNotifs.forEach(n => n.is_read = true);
                document.getElementById('countUnread').textContent = 0;
                applyFilter();
                window.ProVance.showToast('تم وضع علامة قراءة على الكل', 'success');
            } catch (err) {
                console.error(err);
                window.ProVance.showToast('حدث خطأ', 'error');
            }
        };

        window.deleteNotif = async (id) => {
            const ok = await window.ProVance.confirmModal({
                title: 'حذف الإشعار',
                message: 'هل تريد حذف هذا الإشعار؟',
                type: 'danger'
            });
            if (!ok) return;
            try {
                const sb = window.ProVance.sb;
                await sb.from('notifications').delete().eq('id', id);
                allNotifs = allNotifs.filter(n => n.id !== id);
                document.getElementById('countAll').textContent = allNotifs.length;
                document.getElementById('countUnread').textContent = allNotifs.filter(n => !n.is_read).length;
                applyFilter();
                window.ProVance.showToast('تم الحذف', 'success');
            } catch (err) {
                console.error(err);
                window.ProVance.showToast('حدث خطأ', 'error');
            }
        };

        window.handleClick = async (id, actionUrl) => {
            await markRead(id);
            if (actionUrl) {
                setTimeout(() => window.location.href = actionUrl, 200);
            }
        };

        window.logoutAdmin = async (e) => {
            e.preventDefault();
            const ok = await window.ProVance.confirmModal({
                title: 'تسجيل الخروج',
                message: 'هل تريد تسجيل الخروج؟'
            });
            if (ok) await window.ProVance.logout('admin-login.html');
        };

        async function init() {
            const ok = await window.ProVance.requireAdminAuth();
            if (!ok) return;
            const session = await window.ProVance.getSession();
            adminUserId = session.user.id;

            await loadMyNotifications();

            const sb = window.ProVance.sb;
            sb.channel('admin-notif-' + adminUserId)
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications', filter: `user_id=eq.${adminUserId}` }, () => {
                    loadMyNotifications();
                })
                .subscribe();
        }
        init();
    })();
    </script>
</body>
</html>
