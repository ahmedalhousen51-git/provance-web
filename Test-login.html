<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار تسجيل - ProVance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tahoma', sans-serif; }
        body {
            background: #0f0c29;
            color: #fff;
            padding: 20px;
            min-height: 100vh;
            line-height: 1.6;
        }
        .container { max-width: 700px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #4facfe;
            font-size: 1.5rem;
        }
        .form-group {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 14px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
        }
        input, select {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .log {
            background: #1a1535;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 14px;
            margin-top: 14px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-all;
            min-height: 200px;
            max-height: 500px;
            overflow-y: auto;
        }
        .log .info { color: #4facfe; }
        .log .success { color: #10b981; }
        .log .error { color: #ef4444; font-weight: bold; }
        .log .warn { color: #f59e0b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 اختبار تسجيل مباشر (Register)</h1>

        <div class="form-group">
            <label>📧 إيميل جديد (لازم يكون مش مسجل قبل كده):</label>
            <input type="email" id="email" placeholder="newemail@example.com" />
        </div>

        <div class="form-group">
            <label>🔒 كلمة المرور (على الأقل 6 حروف):</label>
            <input type="password" id="password" placeholder="مثال: Test1234!" />
        </div>

        <div class="form-group">
            <label>🎯 نوع الحساب:</label>
            <select id="accountType">
                <option value="company">شركة</option>
                <option value="student">طالب</option>
            </select>
        </div>

        <div class="form-group">
            <label>🏢 اسم (الشركة أو الطالب):</label>
            <input type="text" id="name" placeholder="اسم الشركة أو الطالب" />
        </div>

        <button onclick="testRegister()" id="registerBtn">🚀 جرب التسجيل</button>

        <div class="log" id="log">⏳ في انتظار البدء...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://jrwazyrdzmbcnddpxxrf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyd2F6eXJkem1iY25kZHB4eHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzUyMzksImV4cCI6MjA5MjExMTIzOX0.KaZt3Xb-9zjjwlSYnCvQQVxzDgbcOxdmnpg9wsUsqQI';

        function log(msg, type) {
            const el = document.getElementById('log');
            const time = new Date().toLocaleTimeString('ar-EG');
            const cls = type || 'info';
            el.innerHTML += `\n<span class="${cls}">[${time}] ${msg}</span>`;
            el.scrollTop = el.scrollHeight;
        }

        async function testRegister() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const accountType = document.getElementById('accountType').value;
            const name = document.getElementById('name').value.trim();
            const btn = document.getElementById('registerBtn');

            if (!email || !password || !name) {
                alert('املأ كل الحقول');
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ جاري الاختبار...';
            document.getElementById('log').innerHTML = '⏳ جاري التشغيل...';

            try {
                // 1. شيك إن المكتبة موجودة
                log('1️⃣ شيك على مكتبة Supabase...', 'info');
                if (typeof supabase === 'undefined' || !supabase.createClient) {
                    log('❌ مكتبة Supabase مش موجودة!', 'error');
                    btn.disabled = false;
                    btn.textContent = '🔄 جرب تاني';
                    return;
                }
                log('✓ المكتبة موجودة', 'success');

                // 2. عمل client
                log('2️⃣ إنشاء Supabase client...', 'info');
                const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                if (!sb || !sb.auth) {
                    log('❌ فشل إنشاء client', 'error');
                    btn.disabled = false;
                    btn.textContent = '🔄 جرب تاني';
                    return;
                }
                log('✓ Client اتعمل', 'success');

                // 3. signup
                log('3️⃣ محاولة Signup...', 'info');
                log('   البريد: ' + email, 'info');
                const signupResult = await sb.auth.signUp({ email, password });

                if (signupResult.error) {
                    log('❌ فشل الـ Signup:', 'error');
                    log('   الرسالة: ' + signupResult.error.message, 'error');
                    log('   Status: ' + (signupResult.error.status || 'N/A'), 'warn');
                    btn.disabled = false;
                    btn.textContent = '🔄 جرب تاني';
                    return;
                }

                if (!signupResult.data || !signupResult.data.user) {
                    log('❌ مفيش user في الرد', 'error');
                    log('   الرد: ' + JSON.stringify(signupResult.data).substring(0, 200), 'warn');
                    btn.disabled = false;
                    btn.textContent = '🔄 جرب تاني';
                    return;
                }

                const userId = signupResult.data.user.id;
                log('✅ Signup نجح!', 'success');
                log('   User ID: ' + userId, 'success');
                log('   Email confirmed: ' + (signupResult.data.user.email_confirmed_at ? 'نعم' : 'لأ'), 'info');

                // 4. حفظ البيانات في الجدول المناسب
                log('4️⃣ حفظ البيانات في جدول ' + accountType + '...', 'info');

                let insertResult;
                if (accountType === 'company') {
                    insertResult = await sb.from('companies').insert({
                        user_id: userId,
                        company_name: name,
                        email: email,
                        company_field: 'IT',
                        primary_phone: '01000000000',
                        status: 'pending',
                        agreed_at: new Date().toISOString()
                    });
                } else {
                    insertResult = await sb.from('student').insert({
                        user_id: userId,
                        full_name: name,
                        email: email,
                        phone: '01000000000'
                    });
                }

                if (insertResult.error) {
                    log('❌ فشل حفظ البيانات!', 'error');
                    log('   الرسالة: ' + insertResult.error.message, 'error');
                    log('   Code: ' + (insertResult.error.code || 'N/A'), 'warn');
                    log('   Hint: ' + (insertResult.error.hint || 'N/A'), 'warn');
                    log('   Details: ' + (insertResult.error.details || 'N/A'), 'warn');

                    if (insertResult.error.message.includes('row-level security')) {
                        log('💡 المشكلة: الـ RLS policies مش بتسمح بالحفظ', 'warn');
                        log('   الحل: شغّل ملف 13_FIX_register_rls.sql', 'warn');
                    } else if (insertResult.error.message.includes('column')) {
                        log('💡 المشكلة: عمود مش موجود في الجدول', 'warn');
                    } else if (insertResult.error.message.includes('duplicate')) {
                        log('💡 المشكلة: البيانات مكررة', 'warn');
                    }
                    btn.disabled = false;
                    btn.textContent = '🔄 جرب تاني';
                    return;
                }

                log('🎉 الحفظ نجح!', 'success');

                // 5. اختبار signin
                log('5️⃣ اختبار تسجيل الدخول...', 'info');
                const loginResult = await sb.auth.signInWithPassword({ email, password });
                if (loginResult.error) {
                    log('❌ فشل تسجيل الدخول: ' + loginResult.error.message, 'error');
                } else {
                    log('✅ تسجيل الدخول نجح!', 'success');
                    log('\n🎉 كل حاجة اشتغلت! دلوقتي تقدر تسجل بنفس الإيميل ده', 'success');
                }

                await sb.auth.signOut();

            } catch (err) {
                log('❌ خطأ غير متوقع:', 'error');
                log('   ' + err.message, 'error');
                if (err.stack) log('   ' + err.stack.substring(0, 300), 'warn');
            }

            btn.disabled = false;
            btn.textContent = '🔄 جرب مرة تانية';
        }

        window.addEventListener('load', function() {
            log('📱 الصفحة تحمّلت', 'info');
            if (typeof supabase !== 'undefined' && supabase.createClient) {
                log('✓ مكتبة Supabase جاهزة', 'success');
            } else {
                log('⚠️ مكتبة Supabase لسه بتلوّد...', 'warn');
            }
        });
    </script>
</body>
</html>
