<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://jrwazyrdzmbcnddpxxrf.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://jrwazyrdzmbcnddpxxrf.supabase.co">

    <title>تأكيد البريد - ProVance</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary:#4facfe; --secondary:#00f2fe; --gradient: linear-gradient(135deg, #4facfe, #00f2fe); --bg:#0a0e27; --card:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.1); --text:#fff; --text-muted:#94a3b8; --success:#10b981; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .bg-anim { position:fixed; inset:0; z-index:-1; background:radial-gradient(circle at 20% 20%,rgba(79,172,254,0.15),transparent 45%),radial-gradient(circle at 80% 80%,rgba(0,242,254,0.12),transparent 45%),var(--bg); }
        .card { width:100%; max-width:480px; background:var(--card); border:1px solid var(--border); border-radius:24px; padding:48px 36px; backdrop-filter:blur(20px); box-shadow:0 30px 80px rgba(0,0,0,0.5); text-align:center; }
        .icon { width:100px; height:100px; margin:0 auto 24px; background:var(--gradient); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2.8rem; color:#fff; box-shadow:0 20px 50px rgba(79,172,254,0.4); }
        h1 { font-size:1.7rem; font-weight:800; margin-bottom:14px; }
        p { color:var(--text-muted); line-height:1.7; margin-bottom:24px; font-size:0.95rem; }
        .email { color:var(--primary); direction:ltr; display:inline-block; font-weight:700; }
        .btn { display:inline-flex; align-items:center; gap:8px; padding:14px 28px; background:var(--gradient); color:#fff; border:none; border-radius:12px; font-weight:700; font-family:inherit; font-size:1rem; cursor:pointer; text-decoration:none; transition:all .2s; }
        .btn:hover { transform:translateY(-2px); box-shadow:0 12px 30px rgba(79,172,254,0.4); }
        .info { background:rgba(79,172,254,0.08); border:1px solid rgba(79,172,254,0.2); border-radius:12px; padding:14px; margin:16px 0; font-size:0.85rem; color:var(--text-muted); text-align:right; }
        .info i { color:var(--primary); }
    </style>
</head>
<body>
    <div class="bg-anim"></div>
    <div style="position: absolute; top: 20px; right: 20px; left: 20px; display: flex; justify-content: center; z-index: 10;">
        <a href="index.html" style="display: inline-flex; align-items: center; text-decoration: none;">
            <img src="assets/logo.png" alt="ProVance" style="height: 40px;" onerror="this.style.display='none'">
        </a>
    </div>

    <div class="card">
        <div class="icon"><i class="fas fa-envelope-open-text"></i></div>
        <h1>تأكيد البريد الإلكتروني</h1>
        <p>أرسلنا رابط التأكيد إلى بريدك:<br><span class="email" id="userEmail">-</span></p>
        <div class="info">
            <i class="fas fa-info-circle"></i>
            <strong>الخطوات:</strong>
            <ol style="margin-top:8px; padding-right:20px; line-height:1.8;">
                <li>افتح بريدك الإلكتروني</li>
                <li>اضغط على رابط التأكيد</li>
                <li>سيتم تحويلك تلقائياً للموقع</li>
            </ol>
        </div>
        <p style="font-size:0.85rem;">لم يصلك البريد؟ تحقق من مجلد <strong>Spam</strong> أو الرسائل غير المهمة</p>
        <a href="student-login.html" class="btn"><i class="fas fa-arrow-right"></i><span>العودة لتسجيل الدخول</span></a>
    </div>
    <script>
        const email = localStorage.getItem('pendingEmail') || localStorage.getItem('userEmail') || 'بريدك المسجل';
        document.getElementById('userEmail').textContent = email;
    </script>
</body>
</html>
