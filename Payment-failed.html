<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فشل الدفع - ProVance</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root { --primary:#4facfe; --secondary:#00f2fe; --gradient: linear-gradient(135deg, #4facfe, #00f2fe); --error:#ef4444; --bg:#0a0e27; --card:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.1); --text:#fff; --text-muted:#94a3b8; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.bg-anim { position:fixed; inset:0; z-index:-1; background:radial-gradient(circle at 20% 20%,rgba(239,68,68,0.15),transparent 45%),radial-gradient(circle at 80% 80%,rgba(79,172,254,0.12),transparent 45%),var(--bg); }
.card { width:100%; max-width:480px; background:var(--card); border:1px solid var(--border); border-radius:24px; padding:48px 36px; backdrop-filter:blur(20px); box-shadow:0 30px 80px rgba(0,0,0,0.5); text-align:center; }
.icon { width:110px; height:110px; margin:0 auto 24px; background: linear-gradient(135deg, #ef4444, #dc2626); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:3rem; color:#fff; box-shadow:0 20px 50px rgba(239,68,68,0.4); }
h1 { font-size:2rem; font-weight:900; margin-bottom:14px; color: var(--error); }
.subtitle { color:var(--text-muted); line-height:1.7; margin-bottom:24px; font-size:1rem; }
.error-box { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2); border-radius:12px; padding:14px; margin-bottom:24px; font-size:0.9rem; text-align:right; }
.btn { display:inline-flex; align-items:center; gap:8px; padding:14px 28px; background:var(--gradient); color:#fff; border:none; border-radius:12px; font-weight:700; font-family:inherit; font-size:1rem; cursor:pointer; text-decoration:none; transition:all .2s; margin: 5px; }
.btn:hover { transform:translateY(-2px); box-shadow:0 12px 30px rgba(79,172,254,0.4); }
.btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
</style>
</head>
<body>
<div class="bg-anim"></div>
<div class="card">
    <div class="icon"><i class="fas fa-times"></i></div>
    <h1>لم يكتمل الدفع</h1>
    <p class="subtitle">حدثت مشكلة أثناء معالجة الدفع. مفيش أي مبلغ اتخصم من حسابك.</p>
    
    <div class="error-box" id="errorBox" style="display:none">
        <strong style="color: var(--error)">السبب:</strong>
        <p id="errorMsg" style="margin-top: 6px; color: var(--text-muted)">-</p>
    </div>
    
    <p style="color:var(--text-muted);font-size:0.88rem;margin-bottom:20px">جرب طريقة دفع تانية أو حاول لاحقاً</p>
    
    <a href="student-payments.html" class="btn"><i class="fas fa-redo"></i> حاول مرة تانية</a>
    <a href="student-support.html" class="btn btn-secondary"><i class="fas fa-headset"></i> تواصل معنا</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const errMsg = params.get('data.message') || params.get('error') || params.get('message');
if (errMsg) {
    document.getElementById('errorBox').style.display = 'block';
    document.getElementById('errorMsg').textContent = errMsg;
}
</script>
</body>
</html>
