<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور - ProVance</title>
    <link rel="stylesheet" href="forgot-password-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Background Animation -->
    <div class="bg-animation">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="forgot-container">
        <div class="forgot-card">
            <!-- Back Button -->
            <a href="company-login.html" class="back-btn">
                <i class="fas fa-arrow-right"></i>
                رجوع
            </a>

            <!-- Icon -->
            <div class="forgot-icon">
                <i class="fas fa-key"></i>
            </div>

            <!-- Header -->
            <div class="forgot-header">
                <h1>استعادة كلمة المرور</h1>
                <p>أدخل البريد الإلكتروني المرتبط بحسابك وسنرسل لك رابطاً لإعادة تعيين كلمة المرور</p>
            </div>

            <!-- Form -->
            <form class="forgot-form" id="forgotPasswordForm">
                <div class="input-group">
                    <label for="resetEmail">
                        <i class="fas fa-envelope"></i>
                        البريد الإلكتروني
                    </label>
                    <input 
                        type="email" 
                        id="resetEmail" 
                        name="resetEmail"
                        placeholder="company@example.com"
                        required
                    >
                    <span class="error-message" id="emailError"></span>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">إرسال رابط الاستعادة</span>
                    <span class="btn-icon"><i class="fas fa-paper-plane"></i></span>
                    <span class="btn-loader">
                        <i class="fas fa-spinner fa-spin"></i>
                    </span>
                </button>

                <div class="info-box">
                    <i class="fas fa-info-circle"></i>
                    <p>لم تستلم الرسالة؟ تحقق من مجلد البريد المزعج أو <a href="#" id="resendLink">أعد الإرسال</a></p>
                </div>
            </form>

            <!-- Success Message -->
            <div class="success-message" id="successMessage">
                <div class="success-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h3>تم إرسال الرابط بنجاح!</h3>
                <p>تحقق من بريدك الإلكتروني <strong id="sentEmail"></strong></p>
                <p class="small-text">قد يستغرق وصول الرسالة بضع دقائق</p>
                <a href="company-login.html" class="back-login-btn">
                    <i class="fas fa-arrow-right"></i>
                    العودة لتسجيل الدخول
                </a>
            </div>
        </div>
    </div>

    <script src="forgot-password-script.js"></script>
</body>
</html>
