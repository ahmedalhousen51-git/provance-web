<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعيين كلمة مرور جديدة - Provance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        :root {
            --primary: #1a2a6c;
            --secondary: #b21f1f;
            --accent: #fdbb2d;
            --light: #f8f9fa;
            --dark: #343a40;
            --gradient: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .floating-shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 8s infinite ease-in-out;
        }

        .shape-1 { width: 300px; height: 300px; top: 10%; left: 5%; animation-delay: 0s; }
        .shape-2 { width: 200px; height: 200px; top: 70%; left: 80%; animation-delay: 2s; }
        .shape-3 { width: 150px; height: 150px; top: 20%; left: 85%; animation-delay: 4s; }
        .shape-4 { width: 250px; height: 250px; top: 65%; left: 10%; animation-delay: 6s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            33% { transform: translateY(-20px) rotate(5deg) scale(1.05); }
            66% { transform: translateY(10px) rotate(-5deg) scale(0.95); }
        }

        .reset-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            padding: 50px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
            margin: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: containerSlide 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes containerSlide {
            from { opacity: 0; transform: translateY(60px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-section { margin-bottom: 30px; }

        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            display: inline-block;
            animation: logoGlow 3s infinite alternate;
        }

        @keyframes logoGlow {
            0% { filter: drop-shadow(0 0 5px rgba(253, 187, 45, 0.3)); }
            100% { filter: drop-shadow(0 0 15px rgba(253, 187, 45, 0.6)); }
        }

        .reset-title {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .reset-subtitle {
            font-size: 1.1rem;
            color: #666;
            max-width: 400px;
            margin: 0 auto 30px;
            line-height: 1.6;
        }

        .reset-form {
            margin-bottom: 30px;
            text-align: right;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
            text-align: right;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(26, 42, 108, 0.1);
            transform: translateY(-2px);
            background: white;
        }

        .password-toggle {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .error {
            color: #dc3545;
            font-size: 14px;
            margin-top: 5px;
            text-align: right;
            display: none;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
            display: none;
        }

        .password-strength {
            margin-top: 10px;
            height: 5px;
            border-radius: 5px;
            background: #e0e0e0;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
            border-radius: 5px;
        }

        .strength-weak { background: #dc3545; width: 25%; }
        .strength-medium { background: #ffc107; width: 50%; }
        .strength-good { background: #28a745; width: 75%; }
        .strength-strong { background: #20c997; width: 100%; }

        .password-requirements {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
            text-align: right;
        }

        .requirement {
            display: flex;
            align-items: center;
            margin-bottom: 3px;
        }

        .requirement i {
            margin-left: 5px;
            font-size: 0.7rem;
        }

        .requirement.valid { color: #28a745; }
        .requirement.invalid { color: #dc3545; }

        .btn {
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 10px 25px rgba(26, 42, 108, 0.3);
            width: 100%;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px rgba(26, 42, 108, 0.4);
        }

        .btn:active { transform: translateY(0) scale(1); }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s;
        }

        .btn:hover::before { left: 100%; }

        .back-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .back-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: var(--secondary);
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .reset-container { padding: 30px 20px; margin: 15px; }
            .logo { font-size: 2.8rem; }
            .reset-title { font-size: 1.7rem; }
            .reset-subtitle { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>
        <div class="floating-shape shape-3"></div>
        <div class="floating-shape shape-4"></div>
    </div>

    <div class="reset-container">
        <div class="logo-section">
            <div class="logo">بروفانس</div>
            <h1 class="reset-title">تعيين كلمة مرور جديدة</h1>
            <p class="reset-subtitle">اختر كلمة مرور قوية وآمنة لحساب شركتك</p>
        </div>
        
        <div class="success-message" id="successMessage">
            <i class="fas fa-check-circle"></i> تم تعيين كلمة المرور الجديدة بنجاح!
        </div>
        
        <form class="reset-form" id="resetForm">
            <div class="form-group">
                <label for="newPassword">كلمة المرور الجديدة</label>
                <input type="password" id="newPassword" placeholder="أدخل كلمة المرور الجديدة" required>
                <button type="button" class="password-toggle" id="toggleNewPassword">
                    <i class="far fa-eye"></i>
                </button>
                <div class="error" id="newPasswordError">كلمة المرور يجب أن تكون 8 أحرف على الأقل وتحتوي على أرقام وحروف</div>
                
                <div class="password-strength">
                    <div class="password-strength-bar" id="passwordStrengthBar"></div>
                </div>
                
                <div class="password-requirements">
                    <div class="requirement" id="lengthReq">
                        <i class="fas fa-circle"></i> 8 أحرف على الأقل
                    </div>
                    <div class="requirement" id="numberReq">
                        <i class="fas fa-circle"></i> تحتوي على رقم واحد على الأقل
                    </div>
                    <div class="requirement" id="letterReq">
                        <i class="fas fa-circle"></i> تحتوي على حرف كبير واحد على الأقل
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">تأكيد كلمة المرور</label>
                <input type="password" id="confirmPassword" placeholder="أعد إدخال كلمة المرور الجديدة" required>
                <button type="button" class="password-toggle" id="toggleConfirmPassword">
                    <i class="far fa-eye"></i>
                </button>
                <div class="error" id="confirmPasswordError">كلمة المرور غير متطابقة</div>
            </div>
            
            <button type="submit" class="btn" id="resetBtn">تعيين كلمة المرور</button>
        </form>
        
        <div class="back-link">
            <a href="company-login.html"><i class="fas fa-arrow-right"></i> العودة إلى تسجيل الدخول</a>
        </div>
    </div>

    <script>
        const SB_URL = 'https://jrwazyrdzmbcnddpxxrf.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyd2F6eXJkem1iY25kZHB4eHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzUyMzksImV4cCI6MjA5MjExMTIzOX0.KaZt3Xb-9zjjwlSYnCvQQVxzDgbcOxdmnpg9wsUsqQI';
        const sb = (window.ProVance && window.ProVance.sb) || window.supabase.createClient(SB_URL, SB_KEY, { auth: { persistSession: true, autoRefreshToken: true, storage: window.localStorage } });

        // انتظار جلسة الاسترداد من Supabase
        let recoveryReady = false;
        sb.auth.onAuthStateChange((event, session) => {
            if (event === 'PASSWORD_RECOVERY') { recoveryReady = true; }
        });
        sb.auth.getSession().then(({ data: { session } }) => {
            if (session) recoveryReady = true;
        });

        document.addEventListener('DOMContentLoaded', function () {
            // إظهار/إخفاء كلمة المرور
            document.getElementById('toggleNewPassword').addEventListener('click', function () {
                const inp = document.getElementById('newPassword');
                const icon = this.querySelector('i');
                inp.type = inp.type === 'password' ? 'text' : 'password';
                icon.classList.toggle('fa-eye'); icon.classList.toggle('fa-eye-slash');
            });
            document.getElementById('toggleConfirmPassword').addEventListener('click', function () {
                const inp = document.getElementById('confirmPassword');
                const icon = this.querySelector('i');
                inp.type = inp.type === 'password' ? 'text' : 'password';
                icon.classList.toggle('fa-eye'); icon.classList.toggle('fa-eye-slash');
            });

            // قوة كلمة المرور
            document.getElementById('newPassword').addEventListener('input', function () {
                const pw = this.value;
                const bar = document.getElementById('passwordStrengthBar');
                const lengthReq = document.getElementById('lengthReq');
                const numberReq = document.getElementById('numberReq');
                const letterReq = document.getElementById('letterReq');
                const hasLen = pw.length >= 8;
                const hasNum = /[0-9]/.test(pw);
                const hasUpper = /[A-Z]/.test(pw);
                lengthReq.className = 'requirement ' + (hasLen ? 'valid' : 'invalid');
                numberReq.className = 'requirement ' + (hasNum ? 'valid' : 'invalid');
                letterReq.className = 'requirement ' + (hasUpper ? 'valid' : 'invalid');
                const score = [hasLen, hasNum, hasUpper].filter(Boolean).length;
                bar.className = 'password-strength-bar';
                bar.style.width = (score * 33.33) + '%';
                if (score === 1) bar.style.background = '#ef4444';
                else if (score === 2) bar.style.background = '#f59e0b';
                else if (score === 3) bar.style.background = '#10b981';
            });

            function showErr(id, msg) {
                const el = document.getElementById(id + 'Error');
                if (el) { if (msg) el.textContent = msg; el.style.display = 'block'; }
            }
            function hideErr(id) {
                const el = document.getElementById(id + 'Error');
                if (el) el.style.display = 'none';
            }

            // إرسال النموذج
            document.getElementById('resetForm').addEventListener('submit', async function (e) {
                e.preventDefault();
                const password = document.getElementById('newPassword').value;
                const confirm = document.getElementById('confirmPassword').value;
                hideErr('newPassword'); hideErr('confirmPassword');

                let ok = true;
                if (password.length < 8 || !/[0-9]/.test(password) || !/[A-Z]/.test(password)) {
                    showErr('newPassword'); ok = false;
                }
                if (password !== confirm) { showErr('confirmPassword'); ok = false; }
                if (!ok) return;

                const btn = document.getElementById('resetBtn');
                const orig = btn.textContent;
                btn.disabled = true;
                btn.textContent = 'جاري الحفظ...';

                try {
                    if (!recoveryReady) {
                        const { data: { session } } = await sb.auth.getSession();
                        if (!session) {
                            alert('رابط إعادة التعيين غير صالح أو منتهي. اطلب رابطاً جديداً من صفحة نسيت كلمة المرور');
                            btn.disabled = false; btn.textContent = orig;
                            return;
                        }
                    }
                    const { error } = await sb.auth.updateUser({ password });
                    if (error) {
                        let msg = 'حدث خطأ، حاول مرة أخرى';
                        if (error.message && error.message.includes('expired')) msg = 'انتهت صلاحية الرابط. اطلب رابط جديد';
                        if (error.message && error.message.includes('session')) msg = 'الرابط غير صالح أو منتهي. اطلب رابط جديد من صفحة نسيت كلمة المرور';
                        alert(msg);
                        btn.disabled = false; btn.textContent = orig;
                        return;
                    }

                    // نجح
                    document.getElementById('resetForm').style.display = 'none';
                    document.getElementById('successMessage').classList.add('show');
                    await sb.auth.signOut();
                    setTimeout(() => { window.location.href = 'company-login.html'; }, 2500);
                } catch (err) {
                    alert('خطأ في الاتصال، حاول مرة أخرى');
                    btn.disabled = false; btn.textContent = orig;
                }
            });
        });
    </script>
</body>
</html>
