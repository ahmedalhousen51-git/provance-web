<style>
:root { --primary: #ef4444; --secondary: #dc2626; --gradient: linear-gradient(135deg, #ef4444, #dc2626); --bg: #0a0e27; --bg-2: #1a1535; --card: rgba(255,255,255,0.04); --card-hover: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.08); --text: #fff; --text-muted: #94a3b8; --error: #ef4444; --success: #10b981; --warning: #f59e0b; --info: #4facfe; }
* { margin:0; padding:0; box-sizing: border-box; }
body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.bg-anim { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 20% 20%, rgba(239,68,68,0.08), transparent 45%), radial-gradient(circle at 80% 80%, rgba(220,38,38,0.06), transparent 45%), var(--bg); }
.layout { display: flex; min-height: 100vh; }
.sidebar { width: 260px; background: rgba(20,18,40,0.7); backdrop-filter: blur(20px); border-left: 1px solid var(--border); padding: 24px 16px; position: fixed; inset: 0 0 0 auto; z-index: 100; transition: transform .3s; display: flex; flex-direction: column; }
.sidebar-logo { padding: 8px 4px 18px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
.logo-wrapper { display: flex; align-items: center; gap: 10px; padding: 4px; }
.logo-icon { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; filter: drop-shadow(0 4px 12px rgba(239,68,68,0.3)); }
.logo-icon svg { width: 100%; height: 100%; }
.logo-text { display: flex; flex-direction: column; gap: 2px; }
.logo-brand { font-size: 1.15rem; font-weight: 900; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.logo-tagline { font-size: 0.68rem; color: var(--text-muted); font-weight: 600; }
.admin-badge { background: var(--gradient); color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 0.78rem; font-weight: 800; text-align: center; margin-bottom: 14px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; color: var(--text-muted); text-decoration: none; border-radius: 10px; font-size: 0.92rem; font-weight: 600; margin-bottom: 4px; transition: all .2s; }
.nav-item:hover { background: var(--card); color: var(--text); }
.nav-item.active { background: var(--gradient); color: #fff; }
.nav-item i { width: 18px; }
.main { flex: 1; margin-right: 260px; padding: 24px; min-width: 0; }
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; gap: 14px; flex-wrap: wrap; }
.menu-toggle { display: none; background: var(--card); border: 1px solid var(--border); color: var(--text); width: 42px; height: 42px; border-radius: 10px; cursor: pointer; }
.topbar-title { font-size: 1.5rem; font-weight: 800; }
.chat-layout { display: grid; grid-template-columns: 320px 1fr; gap: 14px; height: calc(100vh - 130px); }
.threads-panel { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; }
.threads-header { padding: 14px; border-bottom: 1px solid var(--border); font-weight: 800; }
.threads-list { flex: 1; overflow-y: auto; }
.thread-item { padding: 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: all .2s; }
.thread-item:hover { background: var(--card-hover); }
.thread-item.active { background: rgba(239,68,68,0.1); border-right: 4px solid var(--primary); }
.thread-company { font-weight: 800; font-size: 0.95rem; margin-bottom: 4px; }
.thread-preview { color: var(--text-muted); font-size: 0.82rem; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; }
.thread-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; font-size: 0.74rem; color: var(--text-muted); }
.unread-badge { background: var(--primary); color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 800; }
.chat-panel { background: var(--card); border: 1px solid var(--border); border-radius: 14px; display: flex; flex-direction: column; overflow: hidden; }
.chat-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.chat-header .company-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--gradient); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; overflow: hidden; }
.chat-messages { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 12px; }
.msg { padding: 12px 14px; border-radius: 12px; max-width: 75%; word-wrap: break-word; }
.msg.outgoing { background: var(--gradient); color: #fff; align-self: flex-start; border-bottom-right-radius: 4px; }
.msg.incoming { background: rgba(255,255,255,0.05); border: 1px solid var(--border); align-self: flex-end; border-bottom-left-radius: 4px; }
.msg-sender { font-size: 0.78rem; opacity: 0.85; font-weight: 700; margin-bottom: 4px; }
.msg-body { line-height: 1.6; white-space: pre-wrap; }
.msg-time { font-size: 0.7rem; opacity: 0.7; margin-top: 6px; text-align: left; }
.chat-input-area { padding: 14px; border-top: 1px solid var(--border); }
.send-form { display: flex; gap: 10px; align-items: flex-end; }
.send-input { flex: 1; min-height: 48px; max-height: 150px; padding: 12px 14px; background: rgba(255,255,255,0.03); border: 2px solid var(--border); border-radius: 10px; color: var(--text); font-family: inherit; font-size: 0.92rem; resize: none; }
.send-input:focus { outline: none; border-color: var(--primary); }
.send-btn { background: var(--gradient); color: #fff; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: inherit; }
.empty-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); }
.empty-chat i { font-size: 4rem; color: rgba(148,163,184,0.3); margin-bottom: 14px; }
.loading-overlay { position: fixed; inset: 0; background: rgba(10,14,39,0.95); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity .3s; }
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-spinner { width: 60px; height: 60px; border: 4px solid var(--card); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 14px 24px; border-radius: 12px; color: #fff; font-weight: 700; z-index: 9999; }
.no-permission { display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:24px; }
.no-permission i { font-size: 5rem; color: var(--warning); margin-bottom: 18px; }
.no-permission h2 { font-size:1.4rem;font-weight:800;margin-bottom:10px; }
.no-permission p { color:var(--text-muted);max-width:420px;line-height:1.6; margin-bottom: 18px; }
.no-permission a { background:var(--gradient);color:#fff;text-decoration:none;padding:11px 22px;border-radius:10px;font-weight:700; }
@media (max-width: 1024px) {
.sidebar { transform: translateX(100%); width: 280px; }
.sidebar.open { transform: translateX(0); }
.main { margin-right: 0; }
.menu-toggle { display: flex; align-items: center; justify-content: center; }
}
@media (max-width: 900px) {
.chat-layout { grid-template-columns: 1fr; height: auto; }
.threads-panel { max-height: 300px; }
.chat-panel { min-height: 500px; }
}
</style>

<script>
const SUPABASE_URL = 'https://jrwazyrdzmbcnddpxxrf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyd2F6eXJkem1iY25kZHB4eHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzUyMzksImV4cCI6MjA5MjExMTIzOX0.KaZt3Xb-9zjjwlSYnCvQQVxzDgbcOxdmnpg9wsUsqQI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
auth: { persistSession: true, autoRefreshToken: true, storage: window.localStorage }
});
let adminUserId = null;
let allMessages = [];
let studentsMap = {};
let activeStudentId = null;
function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function formatDate(d) { if (!d) return ''; return new Date(d).toLocaleString('ar-EG', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' }); }
function showToast(msg, type = 'info') {
const t = document.createElement('div');
const c = { error:'#ef4444', success:'#10b981', warning:'#f59e0b', info:'#4facfe' };
t.className = 'toast'; t.style.background = c[type] || c.info; t.textContent = msg;
document.body.appendChild(t);
setTimeout(() => t.remove(), 4000);
}
window.logoutAdmin = async (e) => {
if (e) e.preventDefault();
if (!confirm('هل تريد تسجيل الخروج؟')) return;
try { await sb.auth.signOut(); } catch {}
localStorage.clear();
window.location.href = 'admin-login.html';
};

// إخفاء الـ links اللي مفيش صلاحية ليها
function hideUnauthorizedNavLinks(adminCheck) {
    if (!adminCheck) return;
    const isSuper = adminCheck.is_super_admin === true || adminCheck.role === 'super_admin';
    const perms = adminCheck.permissions || {};
    
    if (!isSuper && perms.reply_to_students !== true) {
        const link = document.getElementById('navStudentSupport');
        if (link) link.style.display = 'none';
    }
    if (!isSuper && perms.reply_to_companies !== true) {
        const link = document.getElementById('navCompanySupport');
        if (link) link.style.display = 'none';
    }
}

function showNoPermission(action) {
    document.getElementById('loadingOverlay').classList.add('hidden');
    document.getElementById('mainContent').innerHTML = `
        <div class="no-permission">
            <i class="fas fa-lock"></i>
            <h2>ليس لديك صلاحية</h2>
            <p>صلاحية "${action}" غير مفعلة لحسابك. تواصل مع السوبر أدمن لتفعيلها.</p>
            <a href="admin-dashboard.html"><i class="fas fa-arrow-left"></i> العودة للوحة التحكم</a>
        </div>
    `;
}

async function loadAll() {
    try {
        const { data: sessData } = await sb.auth.getSession();
        if (!sessData || !sessData.session) {
            window.location.href = 'admin-login.html';
            return;
        }
        adminUserId = sessData.session.user.id;
        
        const { data: adminCheck } = await sb.from('admins').select('*').eq('user_id', adminUserId).maybeSingle();
        if (!adminCheck) {
            showToast('غير مصرح', 'error');
            setTimeout(() => window.location.href = 'admin-login.html', 1500);
            return;
        }
        
        // إخفاء الـ links حسب الصلاحيات
        hideUnauthorizedNavLinks(adminCheck);
        
        // تحقق من صلاحية الرد على الطلاب
        const isSuper = adminCheck.is_super_admin === true || adminCheck.role === 'super_admin';
        const perms = adminCheck.permissions || {};
        const canReply = isSuper || perms.reply_to_students === true;
        
        if (!canReply) {
            showNoPermission('الرد على دعم الطلاب');
            return;
        }
        
        // نجلب فقط الرسائل المتعلقة بالطلاب
        const results = await Promise.allSettled([
            sb.from('support_messages').select('*').or('sender_type.eq.student,recipient_type.eq.student').order('created_at', { ascending: true }),
            sb.from('student').select('user_id, full_name, photo')
        ]);
        
        if (results[0].status === 'rejected' || (results[0].value && results[0].value.error)) {
            const err = results[0].value?.error || results[0].reason;
            if (err && err.message && err.message.includes('support_messages')) {
                showToast('⚠️ شغّل SQL migration 37 الأول', 'warning');
            }
            allMessages = [];
        } else {
            allMessages = results[0].value.data || [];
        }
        
        if (results[1].status === 'fulfilled') {
            (results[1].value.data || []).forEach(s => { studentsMap[s.user_id] = s; });
        }
        
        renderThreads();
        document.getElementById('loadingOverlay').classList.add('hidden');
    } catch (err) {
        console.error(err);
        showToast('خطأ: ' + err.message, 'error');
        document.getElementById('loadingOverlay').classList.add('hidden');
    }
}

function renderThreads() {
    const threadsByStudent = {};
    allMessages.forEach(m => {
        const studentId = m.sender_type === 'student' ? m.sender_id : (m.recipient_type === 'student' ? m.recipient_id : null);
        if (!studentId) return;
        if (!threadsByStudent[studentId]) threadsByStudent[studentId] = [];
        threadsByStudent[studentId].push(m);
    });
    
    const list = document.getElementById('threadsList');
    const students = Object.keys(threadsByStudent);
    
    if (students.length === 0) {
        list.innerHTML = '<div class="empty-chat" style="height:200px;flex:none"><i class="fas fa-inbox"></i><p>لا توجد محادثات</p></div>';
        return;
    }
    
    list.innerHTML = students.map(studentId => {
        const msgs = threadsByStudent[studentId];
        const lastMsg = msgs[msgs.length - 1];
        const unreadCount = msgs.filter(m => m.sender_type === 'student' && !m.is_read).length;
        const student = studentsMap[studentId];
        const studentName = student ? student.full_name : '(غير معروف)';
        return `
            <div class="thread-item ${activeStudentId === studentId ? 'active' : ''}" onclick="openThread('${studentId}')">
                <div class="thread-company">
                    <i class="fas fa-user-graduate"></i> ${escapeHtml(studentName)}
                </div>
                <div class="thread-preview">${escapeHtml(lastMsg.message.substring(0, 80))}</div>
                <div class="thread-meta">
                    <span>${formatDate(lastMsg.created_at)}</span>
                    ${unreadCount > 0 ? `<span class="unread-badge">${unreadCount}</span>` : ''}
                </div>
            </div>
        `;
    }).join('');
}

window.openThread = async (studentId) => {
    activeStudentId = studentId;
    renderThreads();
    renderChat();
    const studentMsgs = allMessages.filter(m => m.sender_id === studentId && m.sender_type === 'student' && !m.is_read);
    if (studentMsgs.length > 0) {
        const ids = studentMsgs.map(m => m.id);
        await sb.from('support_messages').update({ is_read: true }).in('id', ids);
        studentMsgs.forEach(m => m.is_read = true);
        renderThreads();
    }
};

function renderChat() {
    const container = document.getElementById('chatContent');
    if (!activeStudentId) {
        container.innerHTML = `
            <div class="empty-chat">
                <i class="fas fa-comment-dots"></i>
                <p>اختر محادثة من القائمة لعرض الرسائل</p>
            </div>`;
        return;
    }
    
    const student = studentsMap[activeStudentId];
    const studentName = student ? student.full_name : '(غير معروف)';
    const initial = (studentName || '?').charAt(0).toUpperCase();
    const photo = student && student.photo && !String(student.photo).startsWith('preset:') ? student.photo : null;
    const avatarHtml = photo 
        ? `<img src="${escapeHtml(photo)}" alt="" style="width:100%;height:100%;object-fit:cover">` 
        : escapeHtml(initial);
    const messages = allMessages.filter(m => 
        (m.sender_id === activeStudentId && m.sender_type === 'student') ||
        (m.recipient_id === activeStudentId && m.recipient_type === 'student')
    );
    
    container.innerHTML = `
        <div class="chat-header">
            <div class="company-avatar">${avatarHtml}</div>
            <div style="flex:1">
                <div style="font-weight:800">${escapeHtml(studentName)}</div>
                <div style="color:var(--text-muted);font-size:0.82rem">🎓 طالب</div>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages">
            ${messages.map(m => {
                const isAdmin = m.sender_type === 'admin';
                return `
                    <div class="msg ${isAdmin ? 'outgoing' : 'incoming'}">
                        <div class="msg-sender">
                            <i class="fas fa-${isAdmin ? 'user-shield' : 'user-graduate'}"></i>
                            ${isAdmin ? 'أنت (إدارة ProVance)' : escapeHtml(studentName)}
                        </div>
                        <div class="msg-body">${escapeHtml(m.message)}</div>
                        <div class="msg-time">${formatDate(m.created_at)}</div>
                    </div>
                `;
            }).join('')}
        </div>
        <div class="chat-input-area">
            <form class="send-form" onsubmit="sendReply(event)">
                <textarea id="replyInput" class="send-input" placeholder="اكتب ردك للطالب..." rows="2"></textarea>
                <button type="submit" class="send-btn">
                    <i class="fas fa-paper-plane"></i>
                    إرسال
                </button>
            </form>
        </div>
    `;
    
    setTimeout(() => {
        const msgsEl = document.getElementById('chatMessages');
        if (msgsEl) msgsEl.scrollTop = msgsEl.scrollHeight;
    }, 50);
}

window.sendReply = async (e) => {
    e.preventDefault();
    if (!activeStudentId) return;
    const input = document.getElementById('replyInput');
    const message = input.value.trim();
    if (!message) return;
    
    try {
        const { error } = await sb.from('support_messages').insert({
            sender_id: adminUserId,
            sender_type: 'admin',
            recipient_id: activeStudentId,
            recipient_type: 'student',
            message: message,
            is_read: false,
            created_at: new Date().toISOString()
        });
        if (error) {
            showToast('خطأ: ' + error.message, 'error');
            return;
        }
        try {
            await sb.from('notifications').insert({
                user_id: activeStudentId,
                user_type: 'student',
                type: 'support_reply',
                title: '💬 رد من إدارة ProVance',
                message: message.substring(0, 100) + (message.length > 100 ? '...' : ''),
                link: 'student-support.html'
            });
        } catch(e) {}
        input.value = '';
        showToast('✅ تم الإرسال', 'success');
        await loadAll();
        renderChat();
    } catch (err) {
        showToast('خطأ: ' + err.message, 'error');
    }
};

document.addEventListener('DOMContentLoaded', loadAll);
setTimeout(() => {
    const el = document.getElementById('loadingOverlay');
    if (el && !el.classList.contains('hidden')) el.classList.add('hidden');
}, 12000);
document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && e.target.id === 'replyInput') {
        e.preventDefault();
        document.querySelector('.send-form').requestSubmit();
    }
});
</script>
</body>
</html>
