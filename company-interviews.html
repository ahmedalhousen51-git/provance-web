<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>المقابلات - ProVance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #f093fb; --secondary: #f5576c;
            --gradient: linear-gradient(135deg, #f093fb, #f5576c);
            --bg: #0a0e27; --bg-2: #1a1535;
            --card: rgba(255,255,255,0.04); --card-hover: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
            --text: #fff; --text-muted: #94a3b8; --text-dim: rgba(148,163,184,0.6);
            --error: #ef4444; --success: #10b981; --warning: #f59e0b; --info: #4facfe;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

        .bg-anim {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 20% 20%, rgba(240,147,251,0.08), transparent 45%),
                        radial-gradient(circle at 80% 80%, rgba(245,87,108,0.06), transparent 45%),
                        var(--bg);
        }

        .layout { display: flex; min-height: 100vh; }
        .sidebar {
            width: 260px; background: rgba(20,18,40,0.7);
            backdrop-filter: blur(20px); border-left: 1px solid var(--border);
            padding: 24px 16px; position: fixed; inset: 0 0 0 auto;
            z-index: 100; transition: transform .3s;
            display: flex; flex-direction: column;
        }
        .sidebar-logo {
            display: flex; align-items: center; justify-content: center;
            padding: 0 8px 20px; margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-logo img { height: 32px; max-width: 100%; }
        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 14px; color: var(--text-muted);
            text-decoration: none; border-radius: 10px;
            font-size: 0.92rem; font-weight: 600; margin-bottom: 4px;
            transition: all .2s;
        }
        .nav-item:hover { background: var(--card); color: var(--text); }
        .nav-item.active { background: var(--gradient); color: #fff; }
        .nav-item i { width: 18px; }

        .main { flex: 1; margin-right: 260px; padding: 24px; min-width: 0; }
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 22px; gap: 14px; flex-wrap: wrap;
        }
        .menu-toggle {
            display: none; background: var(--card); border: 1px solid var(--border);
            color: var(--text); width: 42px; height: 42px;
            border-radius: 10px; cursor: pointer;
        }
        .topbar-title { font-size: 1.5rem; font-weight: 800; }

        /* Tabs */
        .tabs-container {
            display: flex; gap: 8px; margin-bottom: 22px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; padding: 6px;
            overflow-x: auto;
        }
        .tab-btn {
            padding: 11px 18px; background: none; border: none;
            color: var(--text-muted); font-family: inherit;
            font-size: 0.92rem; font-weight: 700;
            border-radius: 10px; cursor: pointer;
            white-space: nowrap;
            display: flex; align-items: center; gap: 7px;
            transition: all .2s;
        }
        .tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }
        .tab-btn.active {
            background: var(--gradient); color: #fff;
            box-shadow: 0 6px 16px rgba(240,147,251,0.3);
        }
        .tab-badge {
            background: rgba(255,255,255,0.15);
            padding: 1px 8px; border-radius: 10px;
            font-size: 0.72rem;
        }
        .tab-content { display: none; animation: fadeIn .3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px; margin-bottom: 18px;
        }
        .stat-mini {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 14px;
            display: flex; align-items: center; gap: 11px;
            transition: all .2s;
        }
        .stat-mini:hover { border-color: var(--primary); }
        .stat-mini-icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: #fff; flex-shrink: 0;
        }
        .stat-mini-icon.purple { background: var(--gradient); }
        .stat-mini-icon.success { background: linear-gradient(135deg, #10b981, #059669); }
        .stat-mini-icon.warning { background: linear-gradient(135deg, #f59e0b, #f97316); }
        .stat-mini-icon.info { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .stat-mini-icon.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .stat-mini-num { font-size: 1.4rem; font-weight: 800; line-height: 1; }
        .stat-mini-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; }

        /* Filters */
        .filters-bar {
            display: flex; gap: 10px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px;
            margin-bottom: 18px; flex-wrap: wrap;
        }
        .filters-bar input, .filters-bar select {
            padding: 9px 14px; background: rgba(255,255,255,0.04);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); font-family: inherit; font-size: 0.9rem;
        }
        .filters-bar input { flex: 1; min-width: 200px; }
        .filters-bar input:focus, .filters-bar select:focus {
            outline: none; border-color: var(--primary);
        }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 16px; border: none; border-radius: 10px;
            font-weight: 700; font-family: inherit; font-size: 0.88rem;
            cursor: pointer; transition: all .2s; text-decoration: none;
            white-space: nowrap;
        }
        .btn-primary { background: var(--gradient); color: #fff; }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(240,147,251,0.4);
        }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
        .btn-secondary:hover { background: var(--card-hover); }
        .btn-success { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
        .btn-success:hover { background: rgba(16,185,129,0.25); }
        .btn-warning { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
        .btn-danger { background: rgba(239,68,68,0.1); color: var(--error); border: 1px solid rgba(239,68,68,0.3); }
        .btn-danger:hover { background: rgba(239,68,68,0.2); }
        .btn-info { background: rgba(79,172,254,0.15); color: var(--info); border: 1px solid rgba(79,172,254,0.3); }
        .btn-sm { padding: 7px 12px; font-size: 0.8rem; }

        /* Interview Cards Grid */
        .interviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 14px;
        }
        .interview-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 18px;
            display: flex; flex-direction: column; gap: 12px;
            transition: all .25s;
            position: relative;
        }
        .interview-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(240,147,251,0.15);
        }
        .interview-card.upcoming { border-color: rgba(79,172,254,0.4); }
        .interview-card.live { border-color: var(--success); }
        .interview-card.expired { opacity: 0.7; }
        .interview-card.expired::after {
            content: 'انتهت'; position: absolute; top: 10px; left: 10px;
            background: rgba(239,68,68,0.15); color: var(--error);
            padding: 4px 10px; border-radius: 8px;
            font-size: 0.74rem; font-weight: 700;
        }
        .interview-card-header {
            display: flex; align-items: center; gap: 12px;
        }
        .student-avatar {
            width: 52px; height: 52px; border-radius: 50%;
            background: var(--gradient);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 800; font-size: 1.2rem;
            flex-shrink: 0; overflow: hidden;
        }
        .student-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .student-info { flex: 1; min-width: 0; }
        .student-name { font-weight: 800; font-size: 1rem; }
        .student-pos { color: var(--text-muted); font-size: 0.82rem; margin-top: 3px; }

        .interview-meta {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            padding: 10px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        .meta-item {
            display: flex; flex-direction: column; gap: 2px;
            font-size: 0.84rem;
        }
        .meta-item .label {
            color: var(--text-muted); font-size: 0.74rem;
        }
        .meta-item .value {
            font-weight: 700; color: var(--text);
        }
        .meta-item .value i { color: var(--primary); margin-left: 4px; }

        .countdown {
            background: rgba(79,172,254,0.08);
            border: 1px solid rgba(79,172,254,0.25);
            border-radius: 10px;
            padding: 10px 14px;
            display: flex; align-items: center; justify-content: space-between;
            gap: 10px;
        }
        .countdown.danger {
            background: rgba(239,68,68,0.08);
            border-color: rgba(239,68,68,0.25);
        }
        .countdown.success {
            background: rgba(16,185,129,0.08);
            border-color: rgba(16,185,129,0.25);
        }
        .countdown-label {
            font-size: 0.82rem; color: var(--text-muted);
        }
        .countdown-time {
            font-size: 1.05rem; font-weight: 800;
            color: var(--info);
        }
        .countdown.danger .countdown-time { color: var(--error); }
        .countdown.success .countdown-time { color: var(--success); }

        .interview-actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .interview-actions .btn { flex: 1; justify-content: center; padding: 9px; min-width: 100px; }

        /* Status Badges */
        .status-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 10px; border-radius: 14px;
            font-size: 0.74rem; font-weight: 700;
        }
        .status-badge.scheduled { background: rgba(79,172,254,0.15); color: var(--info); }
        .status-badge.attended { background: rgba(16,185,129,0.15); color: var(--success); }
        .status-badge.missed { background: rgba(239,68,68,0.15); color: var(--error); }
        .status-badge.late { background: rgba(245,158,11,0.15); color: var(--warning); }
        .status-badge.pending { background: rgba(148,163,184,0.15); color: var(--text-muted); }
        .status-badge.live { background: rgba(16,185,129,0.2); color: var(--success); animation: pulse 2s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Modals */
        .modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            z-index: 200; display: none;
            align-items: center; justify-content: center;
            padding: 20px;
            animation: fadeIn .25s;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--bg-2); border: 1px solid var(--border);
            border-radius: 22px;
            width: 100%; max-width: 600px;
            max-height: 92vh; overflow-y: auto;
            padding: 28px; position: relative;
            animation: slideUp .3s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .modal-content::-webkit-scrollbar { width: 6px; }
        .modal-content::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 22px; padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .modal-title {
            font-size: 1.25rem; font-weight: 800;
            display: flex; align-items: center; gap: 10px;
        }
        .modal-title i { color: var(--primary); }
        .modal-close {
            background: var(--card); border: 1px solid var(--border);
            color: var(--text); width: 36px; height: 36px;
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all .2s;
        }
        .modal-close:hover { background: var(--card-hover); transform: rotate(90deg); }

        /* Form Fields */
        .field { margin-bottom: 16px; }
        .field label {
            display: block; color: var(--text);
            font-size: 0.9rem; font-weight: 600; margin-bottom: 8px;
        }
        .field label i { color: var(--primary); margin-left: 4px; }
        .field label .req { color: var(--error); }
        .field input, .field select, .field textarea {
            width: 100%; padding: 12px 14px;
            background: rgba(255,255,255,0.03);
            border: 2px solid var(--border);
            border-radius: 10px; color: var(--text);
            font-size: 0.95rem; font-family: inherit;
            transition: all .2s;
        }
        .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
        .field input:focus, .field select:focus, .field textarea:focus {
            outline: none; border-color: var(--primary);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 0 4px rgba(240,147,251,0.1);
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }

        /* QR Display */
        .qr-display-card {
            background: linear-gradient(135deg, rgba(240,147,251,0.08), rgba(245,87,108,0.04));
            border: 1px solid rgba(240,147,251,0.2);
            border-radius: 18px;
            padding: 24px;
            text-align: center;
        }
        .qr-canvas-wrap {
            background: #fff;
            padding: 16px;
            border-radius: 14px;
            display: inline-block;
            margin: 14px 0;
        }
        .qr-canvas-wrap img, .qr-canvas-wrap canvas {
            display: block;
            max-width: 240px;
            width: 100%;
            height: auto;
        }
        .qr-info {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            margin-top: 14px;
            font-size: 0.9rem;
            text-align: right;
        }
        .qr-info-row {
            display: flex; justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px dashed var(--border);
        }
        .qr-info-row:last-child { border-bottom: none; }
        .qr-info-row .label { color: var(--text-muted); }
        .qr-info-row .value { font-weight: 700; }

        .qr-validity {
            margin-top: 12px;
            padding: 10px 14px;
            background: rgba(245,158,11,0.08);
            border: 1px solid rgba(245,158,11,0.25);
            border-radius: 10px;
            color: var(--warning);
            font-size: 0.86rem;
            font-weight: 700;
            display: flex; align-items: center; gap: 8px;
            justify-content: center;
        }

        .copy-link-btn {
            background: rgba(255,255,255,0.05);
            border: 1px dashed var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text);
            font-family: 'Courier New', monospace;
            font-size: 0.84rem;
            cursor: pointer;
            transition: all .2s;
            display: flex; align-items: center; gap: 8px;
            margin-top: 10px;
            width: 100%;
            text-align: center;
            justify-content: center;
        }
        .copy-link-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--primary);
        }

        /* Calendar View */
        .calendar-wrap {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; padding: 18px;
        }
        .calendar-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px;
        }
        .calendar-month {
            font-size: 1.1rem; font-weight: 800;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .calendar-day-header {
            text-align: center;
            padding: 8px;
            font-weight: 700;
            font-size: 0.82rem;
            color: var(--text-muted);
        }
        .calendar-day {
            aspect-ratio: 1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all .2s;
            font-size: 0.88rem;
            position: relative;
        }
        .calendar-day:hover {
            background: rgba(255,255,255,0.05);
            border-color: var(--primary);
        }
        .calendar-day.today {
            background: rgba(240,147,251,0.1);
            border-color: var(--primary);
            font-weight: 800;
        }
        .calendar-day.has-interview {
            border-color: var(--info);
        }
        .calendar-day.has-interview::after {
            content: '';
            width: 6px; height: 6px;
            background: var(--info);
            border-radius: 50%;
            position: absolute; bottom: 4px;
        }
        .calendar-day.empty {
            opacity: 0.3;
            cursor: default;
        }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px;
        }
        .empty-state i {
            font-size: 4rem;
            color: rgba(148,163,184,0.3);
            margin-bottom: 16px;
            display: block;
        }
        .empty-state h3 { color: var(--text); margin-bottom: 6px; font-size: 1.1rem; }

        /* Late Reports */
        .late-report-card {
            background: rgba(239,68,68,0.05);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex; align-items: flex-start; gap: 12px;
        }
        .late-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; flex-shrink: 0;
        }
        .late-body { flex: 1; min-width: 0; }
        .late-title { font-weight: 700; font-size: 0.94rem; }
        .late-reason { color: var(--text-muted); font-size: 0.86rem; margin-top: 4px; }
        .late-meta { display: flex; gap: 12px; margin-top: 6px; font-size: 0.78rem; color: var(--text-muted); }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake { animation: shake .35s; }

        @media (max-width: 1024px) {
            .sidebar { transform: translateX(100%); width: 280px; }
            .sidebar.open { transform: translateX(0); }
            .main { margin-right: 0; }
            .menu-toggle { display: flex; align-items: center; justify-content: center; }
        }
        @media (max-width: 600px) {
            .modal-content { padding: 20px; max-height: 95vh; border-radius: 18px; }
            .topbar-title { font-size: 1.2rem; }
            .stats-row { grid-template-columns: 1fr 1fr; }
            .interview-meta { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-anim"></div>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <img src="assets/logo.png" alt="ProVance" onerror="this.style.display='none'">
            </div>
            <a href="company-dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> الرئيسية</a>
            <a href="company-trainers.html" class="nav-item"><i class="fas fa-users"></i> المتدربين</a>
            <a href="company-requests-control.html" class="nav-item"><i class="fas fa-envelope-open-text"></i> الطلبات</a>
            <a href="company-interviews.html" class="nav-item active"><i class="fas fa-calendar-check"></i> المقابلات</a>
            <a href="company-QR_Code.html" class="nav-item"><i class="fas fa-qrcode"></i> الحضور (QR)</a>
            <a href="company-profile.html" class="nav-item"><i class="fas fa-building"></i> ملف الشركة</a>
            <a href="company-notifications.html" class="nav-item"><i class="fas fa-bell"></i> الإشعارات</a>
            <a href="#" onclick="logoutCompany(event)" class="nav-item" style="margin-top:auto; color:var(--error)">
                <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
            </a>
        </aside>

        <main class="main">
            <div class="topbar">
                <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="topbar-title">
                    <i class="fas fa-calendar-check" style="color:var(--primary)"></i> إدارة المقابلات
                </h1>
                <button class="btn btn-primary" onclick="openScheduleModal()">
                    <i class="fas fa-plus"></i> جدولة مقابلة جديدة
                </button>
            </div>

            <!-- Tabs -->
            <div class="tabs-container">
                <button class="tab-btn active" data-tab="upcoming" onclick="switchTab(event, 'upcoming')">
                    <i class="fas fa-clock"></i> قادمة
                    <span class="tab-badge" id="upcomingCount">0</span>
                </button>
                <button class="tab-btn" data-tab="today" onclick="switchTab(event, 'today')">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
// ============================================================
// ProVance: Interviews Management
// ============================================================
(function() {
    'use strict';

    // Safety Fallbacks
    if (!window.ProVance) {
        console.error('⚠️ supabase-config.js مش متحمل');
        window.ProVance = {};
    }
    if (typeof window.ProVance.escapeHtml !== 'function') {
        window.ProVance.escapeHtml = (s) => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    if (typeof window.ProVance.showToast !== 'function') {
        window.ProVance.showToast = (msg, type) => {
            const t = document.createElement('div');
            const c = { error:'#ef4444', success:'#10b981', warning:'#f59e0b', info:'#4facfe' };
            t.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:' + (c[type]||'#4facfe') + ';color:#fff;padding:14px 24px;border-radius:12px;font-family:Cairo,sans-serif;font-weight:700;z-index:9999;';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        };
    }
    if (typeof window.ProVance.confirmModal !== 'function') {
        window.ProVance.confirmModal = async ({title, message}) => confirm((title||'') + '\n' + (message||''));
    }

    console.log('✅ Interviews app initialized');

    // STATE
    let companyUserId = null;
    let allInterviews = [];      // applications with interview_scheduled
    let allQrCodes = [];          // qr_codes
    let allLateReports = [];      // late_reports
    let countdownTimers = [];     // active countdowns

    // Helpers
    function getInitial(name) { return (name || '?').trim().charAt(0).toUpperCase(); }
    function escapeHtml(s) { return window.ProVance.escapeHtml(s); }

    function renderModal(html) {
        document.getElementById('modalsContainer').innerHTML = html;
        document.body.style.overflow = 'hidden';
    }
    window.closeModal = (id) => {
        const el = document.getElementById(id);
        if (el) el.remove();
        if (document.querySelectorAll('.modal').length === 0) {
            document.body.style.overflow = '';
        }
    };

    // Format Helpers
    function formatDateTimeAr(d) {
        if (!d) return '-';
        const dt = new Date(d);
        return dt.toLocaleString('ar-EG', {
            day: '2-digit', month: '2-digit', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
        });
    }
    function formatTimeAr(d) {
        if (!d) return '-';
        return new Date(d).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
    }
    function getCountdown(target) {
        if (!target) return null;
        const diff = new Date(target).getTime() - Date.now();
        if (diff < 0) return { expired: true, text: 'انتهى الوقت' };
        const hours = Math.floor(diff / 3600000);
        const mins = Math.floor((diff % 3600000) / 60000);
        const secs = Math.floor((diff % 60000) / 1000);
        return {
            expired: false,
            hours, mins, secs,
            text: hours > 0 ? `${hours}س ${mins}د` : `${mins}د ${secs}ث`,
            urgent: diff < 30 * 60 * 1000  // أقل من 30 دقيقة
        };
    }

    // TABS
    window.switchTab = (e, tabName) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        e.currentTarget.classList.add('active');
        document.getElementById('tab-' + tabName).classList.add('active');
    };

    window.logoutCompany = async (e) => {
        e.preventDefault();
        const ok = await window.ProVance.confirmModal({title: 'تسجيل الخروج', message: 'هل تريد تسجيل الخروج؟'});
        if (ok) {
            if (window.ProVance.logout) await window.ProVance.logout('company-login.html');
            else window.location.href = 'company-login.html';
        }
    };

    // STATS
    function updateStats() {
        const now = Date.now();
        const upcoming = allInterviews.filter(i => i.interview_date && new Date(i.interview_date).getTime() > now);
        const past = allInterviews.filter(i => i.interview_date && new Date(i.interview_date).getTime() <= now);
        const attended = past.filter(i => i.status === 'interview_done' || i.status === 'accepted' || i.status === 'hired' || i.status === 'in_training' || i.status === 'completed');
        const missed = past.filter(i => i.status === 'interview_scheduled');

        document.getElementById('statTotal').textContent = allInterviews.length;
        document.getElementById('statUpcoming').textContent = upcoming.length;
        document.getElementById('statAttended').textContent = attended.length;
        document.getElementById('statMissed').textContent = missed.length;

        // Today's count
        const today = new Date(); today.setHours(0,0,0,0);
        const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
        const todayInts = allInterviews.filter(i => {
            if (!i.interview_date) return false;
            const d = new Date(i.interview_date);
            return d >= today && d < tomorrow;
        });

        document.getElementById('upcomingCount').textContent = upcoming.length;
        document.getElementById('todayCount').textContent = todayInts.length;
        document.getElementById('pastCount').textContent = past.length;
        document.getElementById('lateCount').textContent = allLateReports.length;
    }

    // RENDER INTERVIEWS
    function renderInterviewCard(i) {
        const photo = i.student_photo
            ? `<img src="${i.student_photo}" alt="${escapeHtml(i.student_name)}">`
            : `<span>${getInitial(i.student_name)}</span>`;

        const interviewDate = i.interview_date ? new Date(i.interview_date) : null;
        const now = Date.now();
        const isUpcoming = interviewDate && interviewDate.getTime() > now;
        const isToday = interviewDate && new Date(interviewDate).toDateString() === new Date().toDateString();
        const isPast = interviewDate && interviewDate.getTime() <= now;

        // QR validity (1 hour after interview)
        const qrValidUntil = interviewDate ? new Date(interviewDate.getTime() + 60 * 60 * 1000) : null;
        const qrStillValid = qrValidUntil && qrValidUntil.getTime() > now && interviewDate.getTime() <= now;

        // Status
        let statusBadge = '';
        let cardClass = '';
        if (i.status === 'accepted' || i.status === 'hired' || i.status === 'in_training') {
            statusBadge = '<span class="status-badge attended">✓ قُبل</span>';
        } else if (i.status === 'interview_done') {
            statusBadge = '<span class="status-badge attended">✓ تمت المقابلة</span>';
        } else if (i.status === 'rejected') {
            statusBadge = '<span class="status-badge missed">✕ مرفوض</span>';
        } else if (qrStillValid) {
            statusBadge = '<span class="status-badge live">🔴 جاري الآن</span>';
            cardClass = 'live';
        } else if (isUpcoming) {
            statusBadge = '<span class="status-badge scheduled">📅 مجدولة</span>';
            cardClass = 'upcoming';
        } else if (isPast && i.status === 'interview_scheduled') {
            statusBadge = '<span class="status-badge missed">⏰ فات الموعد</span>';
            cardClass = 'expired';
        } else {
            statusBadge = '<span class="status-badge pending">⏳ في الانتظار</span>';
        }

        // Countdown
        let countdownHtml = '';
        if (isUpcoming) {
            const cd = getCountdown(i.interview_date);
            if (cd && !cd.expired) {
                const cls = cd.urgent ? 'danger' : (cd.hours < 1 ? 'success' : '');
                countdownHtml = `
                    <div class="countdown ${cls}" data-target="${i.interview_date}">
                        <span class="countdown-label">⏰ يبدأ خلال:</span>
                        <span class="countdown-time">${cd.text}</span>
                    </div>
                `;
            }
        } else if (qrStillValid) {
            const cd = getCountdown(qrValidUntil.toISOString());
            countdownHtml = `
                <div class="countdown success" data-target="${qrValidUntil.toISOString()}">
                    <span class="countdown-label">🔴 الـ QR صالح لـ:</span>
                    <span class="countdown-time">${cd.text}</span>
                </div>
            `;
        }

        // Actions
        let actions = '';
        if (isUpcoming || qrStillValid) {
            actions += `<button class="btn btn-primary btn-sm" onclick="generateQRCode('${i.id}')"><i class="fas fa-qrcode"></i> QR Code</button>`;
            actions += `<button class="btn btn-secondary btn-sm" onclick="rescheduleInterview('${i.id}')"><i class="fas fa-edit"></i> تعديل</button>`;
        } else if (isPast && i.status === 'interview_scheduled') {
            actions += `<button class="btn btn-success btn-sm" onclick="markAttended('${i.id}')"><i class="fas fa-check"></i> حضر</button>`;
            actions += `<button class="btn btn-danger btn-sm" onclick="markMissed('${i.id}')"><i class="fas fa-times"></i> غاب</button>`;
        }
        if (i.status === 'interview_done') {
            actions += `<button class="btn btn-success btn-sm" onclick="acceptStudent('${i.id}')"><i class="fas fa-thumbs-up"></i> قبول</button>`;
            actions += `<button class="btn btn-danger btn-sm" onclick="rejectStudent('${i.id}')"><i class="fas fa-thumbs-down"></i> رفض</button>`;
        }
        actions += `<button class="btn btn-info btn-sm" onclick="viewInterviewDetails('${i.id}')"><i class="fas fa-eye"></i> التفاصيل</button>`;

        return `
            <div class="interview-card ${cardClass}">
                <div class="interview-card-header">
                    <div class="student-avatar">${photo}</div>
                    <div class="student-info">
                        <div class="student-name">${escapeHtml(i.student_name || '-')}</div>
                        <div class="student-pos">${escapeHtml(i.internship_title || '-')}</div>
                    </div>
                    ${statusBadge}
                </div>

                <div class="interview-meta">
                    <div class="meta-item">
                        <span class="label">📅 التاريخ</span>
                        <span class="value">${interviewDate ? interviewDate.toLocaleDateString('ar-EG') : '-'}</span>
                    </div>
                    <div class="meta-item">
                        <span class="label">⏰ الوقت</span>
                        <span class="value">${interviewDate ? formatTimeAr(interviewDate) : '-'}</span>
                    </div>
                    <div class="meta-item">
                        <span class="label">📍 المكان</span>
                        <span class="value">${escapeHtml(i.interview_location || 'مقر الشركة')}</span>
                    </div>
                    <div class="meta-item">
                        <span class="label">🎓 الجامعة</span>
                        <span class="value">${escapeHtml(i.student_university || '-')}</span>
                    </div>
                </div>

                ${countdownHtml}

                <div class="interview-actions">${actions}</div>
            </div>
        `;
    }

    function renderAllTabs() {
        const search = document.getElementById('searchInterviews').value.toLowerCase().trim();
        const period = document.getElementById('filterPeriod').value;

        const now = Date.now();
        const today = new Date(); today.setHours(0,0,0,0);
        const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);

        let filtered = allInterviews.slice();

        if (search) {
            filtered = filtered.filter(i =>
                (i.student_name || '').toLowerCase().includes(search) ||
                (i.internship_title || '').toLowerCase().includes(search)
            );
        }

        if (period === 'today') {
            filtered = filtered.filter(i => {
                if (!i.interview_date) return false;
                const d = new Date(i.interview_date);
                return d >= today && d < tomorrow;
            });
        } else if (period === 'week') {
            const weekEnd = new Date(today); weekEnd.setDate(weekEnd.getDate() + 7);
            filtered = filtered.filter(i => {
                if (!i.interview_date) return false;
                const d = new Date(i.interview_date);
                return d >= today && d < weekEnd;
            });
        } else if (period === 'month') {
            const monthEnd = new Date(today); monthEnd.setMonth(monthEnd.getMonth() + 1);
            filtered = filtered.filter(i => {
                if (!i.interview_date) return false;
                const d = new Date(i.interview_date);
                return d >= today && d < monthEnd;
            });
        }

        const upcoming = filtered.filter(i => i.interview_date && new Date(i.interview_date).getTime() > now);
        const todayInts = filtered.filter(i => {
            if (!i.interview_date) return false;
            const d = new Date(i.interview_date);
            return d >= today && d < tomorrow;
        });
        const past = filtered.filter(i => i.interview_date && new Date(i.interview_date).getTime() <= now);

        document.getElementById('upcomingGrid').innerHTML = upcoming.length === 0
            ? '<div class="empty-state"><i class="fas fa-calendar-plus"></i><h3>لا توجد مقابلات قادمة</h3><p>اضغط "جدولة مقابلة جديدة" لإضافة مقابلة</p></div>'
            : upcoming.map(renderInterviewCard).join('');

        document.getElementById('todayGrid').innerHTML = todayInts.length === 0
            ? '<div class="empty-state"><i class="fas fa-calendar-day"></i><h3>لا توجد مقابلات اليوم</h3></div>'
            : todayInts.map(renderInterviewCard).join('');

        document.getElementById('pastGrid').innerHTML = past.length === 0
            ? '<div class="empty-state"><i class="fas fa-history"></i><h3>لا توجد مقابلات سابقة</h3></div>'
            : past.map(renderInterviewCard).join('');

        renderLateReports();
    }

    function renderLateReports() {
        const list = document.getElementById('lateReportsList');
        if (allLateReports.length === 0) {
            list.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>لا توجد تقارير تأخير</h3><p>هنا تظهر التقارير لما يحصل تأخير</p></div>';
            return;
        }

        const BLAME_LABELS = {
            'student': 'الطالب',
            'company': 'الشركة',
            'both': 'الطرفين',
            'force_majeure': 'قوة قاهرة'
        };

        list.innerHTML = allLateReports.map(r => `
            <div class="late-report-card">
                <div class="late-icon"><i class="fas fa-exclamation-triangle"></i></div>
                <div class="late-body">
                    <div class="late-title">تقرير تأخير - ${BLAME_LABELS[r.blame_target] || r.blame_target}</div>
                    <div class="late-reason">${escapeHtml(r.reason)}</div>
                    <div class="late-meta">
                        <span><i class="fas fa-calendar"></i> ${formatDateTimeAr(r.created_at)}</span>
                        <span class="status-badge ${r.status === 'accepted' ? 'attended' : r.status === 'rejected' ? 'missed' : 'pending'}">
                            ${r.status === 'accepted' ? '✓ مقبول' : r.status === 'rejected' ? '✕ مرفوض' : '⏳ في انتظار المراجعة'}
                        </span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // SCHEDULE INTERVIEW
    window.openScheduleModal = async (appId = null) => {
        // جيب الطلبات اللي ممكن تتجدول لها مقابلة
        const sb = window.ProVance.sb;
        const { data: pendingApps } = await sb.from('applications')
            .select('*')
            .eq('company_user_id', companyUserId)
            .in('status', ['pending', 'reviewing'])
            .order('created_at', { ascending: false });

        const apps = pendingApps || [];
        if (apps.length === 0 && !appId) {
            window.ProVance.showToast('مفيش طلبات جاهزة لجدولة مقابلة', 'warning');
            return;
        }

        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        const defaultDate = tomorrow.toISOString().slice(0,10);

        const html = `
            <div class="modal active" id="scheduleModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <div class="modal-title">
                            <i class="fas fa-calendar-plus"></i>
                            <span>جدولة مقابلة</span>
                        </div>
                        <button class="modal-close" onclick="closeModal('scheduleModal')"><i class="fas fa-times"></i></button>
                    </div>

                    <div class="field">
                        <label><i class="fas fa-user-graduate"></i> اختر الطالب <span class="req">*</span></label>
                        <select id="schApp">
                            <option value="">-- اختر --</option>
                            ${apps.map(a => `<option value="${a.id}" ${appId === a.id ? 'selected' : ''}>${escapeHtml(a.student_name)} - ${escapeHtml(a.internship_title)}</option>`).join('')}
                        </select>
                    </div>

                    <div class="grid-2">
                        <div class="field">
                            <label><i class="fas fa-calendar"></i> التاريخ <span class="req">*</span></label>
                            <input type="date" id="schDate" value="${defaultDate}" min="${new Date().toISOString().slice(0,10)}">
                        </div>
                        <div class="field">
                            <label><i class="fas fa-clock"></i> الوقت <span class="req">*</span></label>
                            <input type="time" id="schTime" value="10:00">
                        </div>
                    </div>

                    <div class="field">
                        <label><i class="fas fa-map-marker-alt"></i> المكان</label>
                        <input type="text" id="schLocation" placeholder="مثال: مقر الشركة، القاهرة">
                    </div>

                    <div class="field">
                        <label><i class="fas fa-link"></i> رابط المقابلة (اختياري)</label>
                        <input type="text" id="schLink" placeholder="مثال: Zoom/Google Meet link" style="direction:ltr;text-align:right">
                    </div>

                    <div class="field">
                        <label><i class="fas fa-sticky-note"></i> ملاحظات للطالب</label>
                        <textarea id="schNotes" rows="3" placeholder="مثال: احضر CV ورقي، البس رسمي..."></textarea>
                    </div>

                    <div style="background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.2);padding:12px;border-radius:10px;margin-bottom:14px;font-size:0.86rem">
                        <strong style="color:var(--warning)"><i class="fas fa-info-circle"></i> ملاحظة:</strong>
                        <span style="color:var(--text-muted)"> سيتم توليد QR Code تلقائياً للمقابلة. الـ QR صالح لساعة واحدة بعد موعد المقابلة. لو الطالب ما حضرش في الـ ساعة دي، هيتم إرسال إشعار للطرفين لإبلاغ السبب.</span>
                    </div>

                    <div style="display:flex;gap:10px;margin-top:18px">
                        <button class="btn btn-secondary" onclick="closeModal('scheduleModal')" style="flex:1;justify-content:center">إلغاء</button>
                        <button class="btn btn-primary" onclick="saveSchedule()" style="flex:1;justify-content:center">
                            <i class="fas fa-save"></i> جدولة
                        </button>
                    </div>
                </div>
            </div>
        `;
        renderModal(html);
    };

    window.saveSchedule = async () => {
        const appId = document.getElementById('schApp').value;
        const date = document.getElementById('schDate').value;
        const time = document.getElementById('schTime').value;
        const location = document.getElementById('schLocation').value.trim();
        const link = document.getElementById('schLink').value.trim();
        const notes = document.getElementById('schNotes').value.trim();

        if (!appId || !date || !time) {
            window.ProVance.showToast('املأ الحقول الأساسية', 'warning');
            return;
        }

        const interviewDate = new Date(`${date}T${time}:00`);

        try {
            const sb = window.ProVance.sb;
            const { error } = await sb.from('applications').update({
                status: 'interview_scheduled',
                interview_date: interviewDate.toISOString(),
                interview_location: location || null,
                interview_link: link || null,
                interview_notes: notes || null
            }).eq('id', appId);

            if (error) throw error;

            // أنشئ QR Code للمقابلة
            const qrCodeStr = 'INT-' + Math.random().toString(36).substring(2, 18).toUpperCase();
            const validUntil = new Date(interviewDate.getTime() + 60 * 60 * 1000); // ساعة بعد المقابلة

            const { data: company } = await sb.from('companies').select('company_name').eq('user_id', companyUserId).maybeSingle();
            const app = allInterviews.find(a => a.id === appId);

            await sb.from('qr_codes').insert({
                code: qrCodeStr,
                qr_type: 'interview',
                company_user_id: companyUserId,
                company_name: company?.company_name,
                application_id: appId,
                student_user_id: app?.student_user_id,
                student_name: app?.student_name,
                metadata: {
                    interview_time: interviewDate.toISOString(),
                    interview_location: location,
                    interview_link: link,
                    interview_notes: notes
                },
                valid_from: interviewDate.toISOString(),
                valid_until: validUntil.toISOString(),
                status: 'active'
            });

            // إشعار للطالب
            if (app && window.ProVance.sendNotification) {
                await window.ProVance.sendNotification({
                    userId: app.student_user_id,
                    userType: 'student',
                    title: '📅 موعد مقابلة جديد',
                    message: `تم تحديد موعد مقابلتك مع ${app.company_name} يوم ${interviewDate.toLocaleString('ar-EG')}`,
                    type: 'info',
                    link: 'student-applications.html'
                });
            }

            window.ProVance.showToast('تم جدولة المقابلة ✓', 'success');
            closeModal('scheduleModal');
            await loadAll();
        } catch (err) {
            console.error(err);
            window.ProVance.showToast('حدث خطأ: ' + err.message, 'error');
        }
    };

    // GENERATE QR CODE
    window.generateQRCode = async (interviewId) => {
        const interview = allInterviews.find(i => i.id === interviewId);
        if (!interview) return;

        // ابحث عن QR موجود
        let qrCode = allQrCodes.find(q => q.application_id === interviewId && q.qr_type === 'interview' && q.status === 'active');

        if (!qrCode) {
            // أنشئ QR جديد
            const sb = window.ProVance.sb;
            const qrCodeStr = 'INT-' + Math.random().toString(36).substring(2, 18).toUpperCase();
            const interviewDate = new Date(interview.interview_date);
            const validUntil = new Date(interviewDate.getTime() + 60 * 60 * 1000);

            const { data: company } = await sb.from('companies').select('company_name').eq('user_id', companyUserId).maybeSingle();

            const { data: newQr, error } = await sb.from('qr_codes').insert({
                code: qrCodeStr,
                qr_type: 'interview',
                company_user_id: companyUserId,
                company_name: company?.company_name,
                application_id: interviewId,
                student_user_id: interview.student_user_id,
                student_name: interview.student_name,
                metadata: { interview_time: interview.interview_date },
                valid_from: interviewDate.toISOString(),
                valid_until: validUntil.toISOString(),
                status: 'active'
            }).select().single();

            if (error) {
                console.error(error);
                window.ProVance.showToast('حدث خطأ في إنشاء الـ QR', 'error');
                return;
            }
            qrCode = newQr;
        }

        // أعرض QR
        const qrData = JSON.stringify({
            type: 'interview',
            code: qrCode.code,
            company: qrCode.company_name,
            student: qrCode.student_name,
            valid_until: qrCode.valid_until
        });

        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=${encodeURIComponent(qrData)}&color=000000&bgcolor=FFFFFF`;

        const validUntil = new Date(qrCode.valid_until);
        const cd = getCountdown(validUntil.toISOString());

        const html = `
            <div class="modal active" id="qrModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <div class="modal-title">
                            <i class="fas fa-qrcode"></i>
                            <span>QR Code للمقابلة</span>
                        </div>
                        <button class="modal-close" onclick="closeModal('qrModal')"><i class="fas fa-times"></i></button>
                    </div>

                    <div class="qr-display-card">
                        <h3 style="font-size:1.05rem;margin-bottom:6px">${escapeHtml(interview.student_name)}</h3>
                        <p style="color:var(--text-muted);font-size:0.86rem">${escapeHtml(interview.internship_title)}</p>

                        <div class="qr-canvas-wrap">
                            <img src="${qrUrl}" alt="QR Code" id="qrImg" onerror="this.style.background='#fff';this.style.padding='30px';this.alt='تعذر تحميل الـ QR'">
                        </div>

                        <div class="qr-validity" id="qrValidity">
                            <i class="fas fa-clock"></i>
                            <span>صالح حتى: ${formatDateTimeAr(validUntil)}</span>
                        </div>

                        <button class="copy-link-btn" onclick="copyQRCode('${qrCode.code}')">
                            <i class="fas fa-copy"></i>
                            <span>الكود: ${qrCode.code}</span>
                        </button>

                        <div class="qr-info">
                            <div class="qr-info-row">
                                <span class="label">📅 التاريخ:</span>
                                <span class="value">${formatDateTimeAr(interview.interview_date)}</span>
                            </div>
                            <div class="qr-info-row">
                                <span class="label">📍 المكان:</span>
                                <span class="value">${escapeHtml(interview.interview_location || '-')}</span>
                            </div>
                            <div class="qr-info-row">
                                <span class="label">⏱️ المدة:</span>
                                <span class="value">ساعة كاملة</span>
                            </div>
                            <div class="qr-info-row">
                                <span class="label">🎯 الحالة:</span>
                                <span class="value">${qrCode.status === 'active' ? '✓ نشط' : '⏸ ' + qrCode.status}</span>
                            </div>
                        </div>
                    </div>

                    <div style="display:flex;gap:10px;margin-top:14px">
                        <button class="btn btn-secondary" onclick="closeModal('qrModal')" style="flex:1;justify-content:center">إغلاق</button>
                        <button class="btn btn-primary" onclick="printQR()" style="flex:1;justify-content:center">
                            <i class="fas fa-print"></i> طباعة
                        </button>
                    </div>
                </div>
            </div>
        `;
        renderModal(html);
    };

    window.copyQRCode = (code) => {
        navigator.clipboard.writeText(code).then(() => {
            window.ProVance.showToast('تم نسخ الكود ✓', 'success');
        }).catch(() => {
            window.ProVance.showToast('تعذر النسخ', 'error');
        });
    };

    window.printQR = () => {
        const img = document.getElementById('qrImg');
        if (!img) return;
        const printWin = window.open('', '_blank', 'width=600,height=600');
        printWin.document.write(`
            <html dir="rtl"><head><title>QR Code</title>
            <style>
                body { font-family: Arial; text-align: center; padding: 40px; }
                img { max-width: 400px; }
                h2 { margin-bottom: 20px; }
            </style>
            </head><body>
            <h2>ProVance - QR Code للمقابلة</h2>
            <img src="${img.src}">
            <p>اطبع هذه الصفحة واعرضها للطالب لمسح الـ QR</p>
            </body></html>
        `);
        printWin.document.close();
        setTimeout(() => printWin.print(), 500);
    };

    // ACTIONS
    window.markAttended = async (id) => {
        const ok = await window.ProVance.confirmModal({
            title: 'تأكيد الحضور',
            message: 'هل تريد تسجيل أن الطالب حضر المقابلة؟'
        });
        if (!ok) return;

        try {
            await window.ProVance.sb.from('applications').update({ status: 'interview_done' }).eq('id', id);
            window.ProVance.showToast('تم تسجيل الحضور ✓', 'success');
            await loadAll();
        } catch (err) {
            console.error(err);
            window.ProVance.showToast('حدث خطأ', 'error');
        }
    };

    window.markMissed = async (id) => {
        const ok = await window.ProVance.confirmModal({
            title: 'تأكيد الغياب',
            message: 'هل تريد تسجيل أن الطالب غاب؟ هيتم إنشاء تقرير تأخير'
        });
        if (!ok) return;

        try {
            const sb = window.ProVance.sb;
            const interview = allInterviews.find(i => i.id === id);

            // أنشئ late report
            await sb.from('late_reports').insert({
                application_id: id,
                reported_by: 'company',
                reporter_user_id: companyUserId,
                blame_target: 'student',
                reason: 'الطالب لم يحضر المقابلة في الوقت المحدد',
                expected_time: interview.interview_date,
                status: 'pending'
            });

            // إشعار للطالب
            if (interview && window.ProVance.sendNotification) {
                await window.ProVance.sendNotification({
                    userId: interview.student_user_id,
                    userType: 'student',
                    title: '⚠️ تم تسجيل غيابك',
                    message: `الشركة سجلت أنك غبت عن مقابلة ${interview.internship_title}. يرجى إبلاغ سبب الغياب`,
                    type: 'warning',
                    link: 'student-applications.html'
                });
            }

            window.ProVance.showToast('تم تسجيل الغياب', 'warning');
            await loadAll();
        } catch (err) {
            console.error(err);
            window.ProVance.showToast('حدث خطأ', 'error');
        }
    };

    window.acceptStudent = async (id) => {
        const ok = await window.ProVance.confirmModal({
            title: 'قبول الطالب',
            message: 'هل تريد قبول الطالب وبدء التدريب؟'
        });
        if (!ok) return;

        try {
            const sb = window.ProVance.sb;
            await sb.from('applications').update({ status: 'accepted' }).eq('id', id);

            const interview = allInterviews.find(i => i.id === id);
            if (interview && window.ProVance.sendNotification) {
                await window.ProVance.sendNotification({
                    userId: interview.student_user_id,
                    userType: 'student',
                    title: '🎉 مبروك! تم قبولك',
                    message: `الشركة قبلتك في تدريب ${interview.internship_title}`,
                    type: 'success'
                });
            }

            window.ProVance.showToast('تم قبول الطالب 🎉', 'success');
            await loadAll();
        } catch (err) {
            console.error(err);
            window.ProVance.showToast('حدث خطأ', 'error');
        }
    };

    window.rejectStudent = async (id) => {
        const reason = prompt('سبب الرفض:');
        if (!reason || !reason.trim()) return;

        try {
            const sb = window.ProVance.sb;
            await sb.from('applications').update({
                status: 'rejected',
                rejection_reason: reason.trim()
            }).eq('id', id);

            const interview = allInterviews.find(i => i.id === id);
            if (interview && window.ProVance.sendNotification) {
                await window.ProVance.sendNotification({
                    userId: interview.student_user_id,
                    userType: 'student',
                    title: 'تحديث على طلبك',
                    message: `للأسف لم يتم قبولك في ${interview.internship_title}. السبب: ${reason}`,
                    type: 'warning'
                });
            }

            window.ProVance.showToast('تم الرفض', 'success');
            await loadAll();
        } catch (err) {
            console.error(err);
        }
    };

    window.rescheduleInterview = (id) => openScheduleModal(id);

    window.viewInterviewDetails = (id) => {
        const i = allInterviews.find(x => x.id === id);
        if (!i) return;

        const html = `
            <div class="modal active" id="detailsModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <div class="modal-title">
                            <i class="fas fa-info-circle"></i>
                            <span>تفاصيل المقابلة</span>
                        </div>
                        <button class="modal-close" onclick="closeModal('detailsModal')"><i class="fas fa-times"></i></button>
                    </div>

                    <div class="qr-info">
                        <div class="qr-info-row"><span class="label">👤 الطالب:</span><span class="value">${escapeHtml(i.student_name)}</span></div>
                        <div class="qr-info-row"><span class="label">📧 البريد:</span><span class="value">${escapeHtml(i.student_email || '-')}</span></div>
                        <div class="qr-info-row"><span class="label">📞 الهاتف:</span><span class="value">${escapeHtml(i.student_phone || '-')}</span></div>
                        <div class="qr-info-row"><span class="label">🎓 الجامعة:</span><span class="value">${escapeHtml(i.student_university || '-')}</span></div>
                        <div class="qr-info-row"><span class="label">💼 المنصب:</span><span class="value">${escapeHtml(i.internship_title)}</span></div>
                        <div class="qr-info-row"><span class="label">📅 التاريخ:</span><span class="value">${formatDateTimeAr(i.interview_date)}</span></div>
                        <div class="qr-info-row"><span class="label">📍 المكان:</span><span class="value">${escapeHtml(i.interview_location || '-')}</span></div>
                        ${i.interview_link ? `<div class="qr-info-row"><span class="label">🔗 الرابط:</span><span class="value"><a href="${i.interview_link}" target="_blank" style="color:var(--primary)">فتح</a></span></div>` : ''}
                        <div class="qr-info-row"><span class="label">📝 الحالة:</span><span class="value">${escapeHtml(i.status)}</span></div>
                    </div>

                    ${i.interview_notes ? `
                        <div style="margin-top:14px;padding:12px;background:rgba(255,255,255,0.03);border-radius:10px">
                            <strong>📋 ملاحظات:</strong>
                            <p style="margin-top:6px;color:var(--text-muted)">${escapeHtml(i.interview_notes)}</p>
                        </div>
                    ` : ''}

                    <div style="display:flex;gap:10px;margin-top:18px">
                        <button class="btn btn-secondary" onclick="closeModal('detailsModal')" style="flex:1;justify-content:center">إغلاق</button>
                    </div>
                </div>
            </div>
        `;
        renderModal(html);
    };

    // COUNTDOWN UPDATER
    function updateCountdowns() {
        document.querySelectorAll('.countdown[data-target]').forEach(el => {
            const target = el.getAttribute('data-target');
            const cd = getCountdown(target);
            if (!cd) return;
            const timeEl = el.querySelector('.countdown-time');
            if (cd.expired) {
                el.classList.add('danger');
                timeEl.textContent = 'انتهى الوقت';
            } else {
                if (cd.urgent) el.classList.add('danger');
                timeEl.textContent = cd.text;
            }
        });
    }

    // LOAD ALL
    async function loadAll() {
        const sb = window.ProVance.sb;
        if (!sb) return;

        try {
            const [appsRes, qrRes, lateRes] = await Promise.all([
                sb.from('applications').select('*').eq('company_user_id', companyUserId)
                    .in('status', ['interview_scheduled', 'interview_done', 'accepted', 'rejected', 'hired', 'in_training', 'completed'])
                    .order('interview_date', { ascending: true }),
                sb.from('qr_codes').select('*').eq('company_user_id', companyUserId)
                    .eq('qr_type', 'interview').order('created_at', { ascending: false }),
                sb.from('late_reports').select('*')
                    .order('created_at', { ascending: false })
            ]);

            allInterviews = appsRes.data || [];
            allQrCodes = qrRes.data || [];

            // فلتر late reports اللي تخص شركتنا
            const myAppIds = new Set(allInterviews.map(a => a.id));
            allLateReports = (lateRes.data || []).filter(r => myAppIds.has(r.application_id));

            updateStats();
            renderAllTabs();
        } catch (err) {
            console.error('Load error:', err);
            window.ProVance.showToast('خطأ في تحميل البيانات', 'error');
        }
    }

    // LISTENERS
    document.getElementById('searchInterviews').addEventListener('input', renderAllTabs);
    document.getElementById('filterPeriod').addEventListener('change', renderAllTabs);

    // INIT
    async function init() {
        const ok = window.ProVance.requireCompanyAuth ? await window.ProVance.requireCompanyAuth() : true;
        if (!ok) return;

        const session = window.ProVance.getSession ? await window.ProVance.getSession() : null;
        if (session && session.user) {
            companyUserId = session.user.id;
        } else if (window.ProVance.sb) {
            const { data } = await window.ProVance.sb.auth.getSession();
            if (data?.session?.user) companyUserId = data.session.user.id;
        }

        if (!companyUserId) {
            window.location.href = 'company-login.html';
            return;
        }

        await loadAll();

        // Realtime
        const sb = window.ProVance.sb;
        if (sb) {
            sb.channel('interviews-' + companyUserId)
                .on('postgres_changes', { event: '*', schema: 'public', table: 'applications', filter: `company_user_id=eq.${companyUserId}` }, () => loadAll())
                .on('postgres_changes', { event: '*', schema: 'public', table: 'qr_codes', filter: `company_user_id=eq.${companyUserId}` }, () => loadAll())
                .subscribe();
        }

        // Update countdowns every second
        setInterval(updateCountdowns, 1000);
    }

    init();
})();
    </script>
</body>
</html>
