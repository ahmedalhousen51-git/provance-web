<html lang="ar" dir="rtl">
<head>

    <title>إدارة الأقسام والفروع - ProVance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
:root { --primary: #ef4444; --secondary: #dc2626; --gradient: linear-gradient(135deg, #ef4444, #dc2626); --bg: #0a0e27; --bg-2: #1a1535; --card: rgba(255,255,255,0.04); --card-hover: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.08); --text: #fff; --text-muted: #94a3b8; --text-dim: rgba(148,163,184,0.6); --error: #ef4444; --success: #10b981; --warning: #f59e0b; --info: #4facfe; --orange: #ff9800; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
.bg-anim { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 20% 20%, rgba(239,68,68,0.08), transparent 45%), radial-gradient(circle at 80% 80%, rgba(220,38,38,0.06), transparent 45%), var(--bg); }
.layout { display: flex; min-height: 100vh; }
.sidebar { width: 260px; background: rgba(20,18,40,0.7); backdrop-filter: blur(20px); border-left: 1px solid var(--border); padding: 24px 16px; position: fixed; inset: 0 0 0 auto; z-index: 100; transition: transform .3s; display: flex; flex-direction: column; }
.sidebar-logo {
            padding: 8px 4px 18px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px;
        }
        .logo-icon {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            filter: drop-shadow(0 4px 12px rgba(239,68,68,0.3));
        }
        .logo-icon svg {
            width: 100%;
            height: 100%;
        }
        .logo-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }
        .logo-brand {
            font-size: 1.15rem;
            font-weight: 900;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
            line-height: 1;
        }
        .logo-tagline {
            font-size: 0.68rem;
            color: var(--text-muted);
            font-weight: 600;
        }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; color: var(--text-muted); text-decoration: none; border-radius: 10px; font-size: 0.92rem; font-weight: 600; margin-bottom: 4px; transition: all .2s; }
.nav-item:hover { background: var(--card); color: var(--text); }
.nav-item.active { background: var(--gradient); color: #fff; }
.nav-item i { width: 18px; }
.main { flex: 1; margin-right: 260px; padding: 24px; min-width: 0; }
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; gap: 14px; flex-wrap: wrap; }
.menu-toggle { display: none; background: var(--card); border: 1px solid var(--border); color: var(--text); width: 42px; height: 42px; border-radius: 10px; cursor: pointer; }
.topbar-title { font-size: 1.5rem; font-weight: 800; }
.topbar-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 18px; }
.stat-mini { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; display: flex; align-items: center; gap: 11px; transition: all .2s; }
.stat-mini:hover { transform: translateY(-3px); border-color: var(--primary); }
.stat-mini-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.05rem; color: #fff; flex-shrink: 0; }
.stat-mini-icon.primary { background: var(--gradient); }
.stat-mini-icon.success { background: linear-gradient(135deg, #10b981, #059669); }
.stat-mini-icon.warning { background: linear-gradient(135deg, #f59e0b, #f97316); }
.stat-mini-icon.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
.stat-mini-icon.info { background: linear-gradient(135deg, #4facfe, #00f2fe); }
.stat-mini-num { font-size: 1.4rem; font-weight: 800; line-height: 1; }
.stat-mini-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; }
.section { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 22px; margin-bottom: 18px; }
.section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
.section-icon { width: 42px; height: 42px; border-radius: 12px; background: var(--gradient); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.1rem; }
.section-title { font-size: 1.15rem; font-weight: 800; margin: 0; }
.section-subtitle { color: var(--text-muted); font-size: 0.86rem; margin-top: 3px; }
.field { margin-bottom: 14px; }
.field label { display: block; color: var(--text); font-size: 0.9rem; font-weight: 600; margin-bottom: 7px; }
.field label i { color: var(--primary); margin-left: 4px; }
.field label .req { color: var(--error); }
.field input, .field select, .field textarea { width: 100%; padding: 11px 14px; background: rgba(255,255,255,0.03); border: 2px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.92rem; font-family: inherit; transition: all .2s; }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--primary); background: rgba(255,255,255,0.06); }
.field textarea { resize: vertical; min-height: 80px; }
.field-note { font-size: 0.78rem; color: var(--text-dim); margin-top: 4px; font-style: italic; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 11px 18px; border: none; border-radius: 10px; font-weight: 700; font-family: inherit; font-size: 0.9rem; cursor: pointer; transition: all .2s; text-decoration: none; white-space: nowrap; }
.btn-primary { background: var(--gradient); color: #fff; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(239,68,68,0.4); }
.btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
.btn-secondary:hover { background: var(--card-hover); }
.btn-success { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
.btn-danger { background: rgba(239,68,68,0.1); color: var(--error); border: 1px solid rgba(239,68,68,0.3); }
.btn-info { background: rgba(79,172,254,0.15); color: var(--info); border: 1px solid rgba(79,172,254,0.3); }
.btn-warning { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
.btn-sm { padding: 7px 12px; font-size: 0.82rem; }
.tabs-container { display: flex; gap: 8px; margin-bottom: 18px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 6px; overflow-x: auto; }
.tab-btn { padding: 10px 16px; background: none; border: none; color: var(--text-muted); font-family: inherit; font-size: 0.9rem; font-weight: 700; border-radius: 10px; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 6px; transition: all .2s; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { background: var(--gradient); color: #fff; }
.tab-badge { background: rgba(255,255,255,0.15); padding: 1px 8px; border-radius: 10px; font-size: 0.72rem; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.dept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
.dept-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; transition: all .2s; position: relative; }
.dept-card:hover { transform: translateY(-3px); border-color: var(--primary); }
.dept-card.disabled { opacity: 0.6; }
.dept-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.dept-icon { width: 48px; height: 48px; border-radius: 12px; background: var(--gradient); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.2rem; flex-shrink: 0; }
.dept-name { font-weight: 800; font-size: 1rem; }
.dept-status { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 12px; font-size: 0.72rem; font-weight: 700; margin-top: 4px; }
.dept-status.active { background: rgba(16,185,129,0.15); color: var(--success); }
.dept-status.closed { background: rgba(239,68,68,0.15); color: var(--error); }
.dept-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 10px; }
.dept-meta-item { font-size: 0.8rem; color: var(--text-muted); }
.dept-meta-item strong { color: var(--text); display: block; font-size: 0.9rem; margin-top: 2px; }
.dept-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.dept-actions .btn { flex: 1; justify-content: center; padding: 8px; min-width: 80px; font-size: 0.78rem; }
.toggle-switch { position: relative; display: inline-block; width: 50px; height: 26px; flex-shrink: 0; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; cursor: pointer; inset: 0; background: rgba(255,255,255,0.1); transition: .4s; border-radius: 34px; }
.toggle-slider:before { position: absolute; content: ""; height: 18px; width: 18px; right: 4px; bottom: 4px; background: #fff; transition: .4s; border-radius: 50%; }
input:checked + .toggle-slider { background: var(--gradient); }
input:checked + .toggle-slider:before { transform: translateX(-24px); }
.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; }
.toggle-label { font-weight: 600; font-size: 0.92rem; flex: 1; }
.system-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; margin-bottom: 14px; }
.system-card { background: rgba(255,255,255,0.02); border: 2px solid var(--border); border-radius: 14px; padding: 16px; cursor: pointer; transition: all .2s; }
.system-card:hover { transform: translateY(-3px); border-color: var(--primary); }
.system-card.selected { border-color: var(--primary); background: rgba(239,68,68,0.05); }
.system-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.system-card-icon { width: 44px; height: 44px; border-radius: 12px; background: var(--gradient); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.1rem; }
.system-card-name { font-weight: 800; font-size: 0.95rem; }
.system-card-desc { color: var(--text-muted); font-size: 0.8rem; margin-top: 2px; }
.system-card-info { color: var(--text-muted); font-size: 0.82rem; line-height: 1.5; margin: 8px 0; }
.system-card-finance { margin: 8px 0; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 8px; }
.system-card-finance-title { font-size: 0.78rem; font-weight: 800; margin-bottom: 6px; }
.system-card-finance ul { margin: 0; padding-right: 16px; }
.system-card-finance li { font-size: 0.78rem; line-height: 1.7; color: var(--text-muted); }
.system-card-finance li strong { color: var(--text); }
.system-card-price { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); padding: 8px; border-radius: 8px; color: var(--primary); font-weight: 700; font-size: 0.84rem; text-align: center; }
.salary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.fields-tags { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 10px; min-height: 50px; }
.field-tag { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: var(--primary); padding: 4px 10px; border-radius: 12px; font-size: 0.84rem; display: inline-flex; align-items: center; gap: 6px; }
.field-tag .remove { cursor: pointer; font-weight: 800; font-size: 1rem; color: var(--error); }
.add-row { display: flex; gap: 8px; margin-top: 8px; }
.add-row input { flex: 1; }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal.active { display: flex; }
.modal-content { background: var(--bg-2); border: 1px solid var(--border); border-radius: 22px; width: 100%; max-width: 700px; max-height: 92vh; overflow-y: auto; padding: 28px; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
.modal-title { font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
.modal-title i { color: var(--primary); }
.modal-close { background: var(--card); border: 1px solid var(--border); color: var(--text); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: var(--card-hover); transform: rotate(90deg); }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); background: var(--card); border: 1px solid var(--border); border-radius: 16px; }
.empty-state i { font-size: 4rem; color: rgba(148,163,184,0.3); margin-bottom: 16px; display: block; }
.empty-state h3 { color: var(--text); margin-bottom: 6px; font-size: 1.1rem; }
.loading-overlay { position: fixed; inset: 0; background: rgba(10,14,39,0.95); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity .3s; }
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-spinner { width: 60px; height: 60px; border: 4px solid var(--card); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 14px 24px; border-radius: 12px; color: #fff; font-weight: 700; z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
.action-bar { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }
.price-config-card { background: rgba(239,68,68,0.04); border: 1px solid rgba(239,68,68,0.2); border-radius: 14px; padding: 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.price-config-label { font-size: 0.9rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 7px; flex: 1; min-width: 200px; }
@media (max-width: 1024px) {
    .sidebar { transform: translateX(100%); width: 280px; }
    .sidebar.open { transform: translateX(0); }
    .main { margin-right: 0; }
    .menu-toggle { display: flex; align-items: center; justify-content: center; }
}
@media (max-width: 600px) {
    .salary-row { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .dept-grid { grid-template-columns: 1fr; }
}
    </style>
</head>
<body>
    <div class="bg-anim"></div>
    <div class="layout">
        <main class="main">
            <div class="topbar">
                <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="topbar-title"><i class="fas fa-cogs" style="color:var(--primary)"></i> إدارة الأقسام والفروع</h1>
                <div class="topbar-actions">
                    <button class="btn btn-secondary btn-sm" onclick="openBranchesModal()">
                        <i class="fas fa-map-marked-alt"></i> إدارة الفروع
                    </button>
                    <button class="btn btn-primary btn-sm" onclick="openAddDeptModal()">
                        <i class="fas fa-plus"></i> إضافة قسم/مجال جديد
                    </button>
                    <button class="btn btn-secondary btn-sm" onclick="loadAll()">
                        <i class="fas fa-sync-alt"></i> تحديث
                    </button>
                    <button class="btn btn-secondary btn-sm" onclick="syncAllToInternships()" title="حدّث بيانات كل الأقسام في صفحة فرص التدريب (بعد تعديل اسم الشركة أو عنوانها)">
                        <i class="fas fa-cloud-upload-alt"></i> مزامنة كل الأقسام
                    </button>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-row">
                <div class="stat-mini">
                    <div class="stat-mini-icon primary"><i class="fas fa-th-list"></i></div>
                    <div>
                        <div class="stat-mini-num" id="statTotalDepts">0</div>
                        <div class="stat-mini-label">إجمالي الأقسام</div>
                    </div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-icon success"><i class="fas fa-door-open"></i></div>
                    <div>
                        <div class="stat-mini-num" id="statActiveDepts">0</div>
                        <div class="stat-mini-label">أقسام مفتوحة</div>
                    </div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-icon error"><i class="fas fa-door-closed"></i></div>
                    <div>
                        <div class="stat-mini-num" id="statClosedDepts">0</div>
                        <div class="stat-mini-label">أقسام مغلقة</div>
                    </div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-icon info"><i class="fas fa-file-alt"></i></div>
                    <div>
                        <div class="stat-mini-num" id="statTotalApps">0</div>
                        <div class="stat-mini-label">إجمالي الطلبات</div>
                    </div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-icon warning"><i class="fas fa-clock"></i></div>
                    <div>
                        <div class="stat-mini-num" id="statPendingApps">0</div>
                        <div class="stat-mini-label">طلبات قيد المراجعة</div>
                    </div>
                </div>
            </div>

            <!-- Training Price (read-only — set by admin) -->
            <div class="price-config-card">
                <div class="price-config-label">
                    <i class="fas fa-tag" style="color:var(--primary)"></i>
                    سعر التدريب المحدد من الإدارة:
                </div>
                <div id="trainingPriceDisplay" style="font-size:1.1rem;font-weight:800;color:var(--primary)">—</div>
                <div style="font-size:0.78rem;color:var(--text-muted);display:flex;align-items:center;gap:4px">
                    <i class="fas fa-info-circle"></i>
                    السعر يحدده فريق ProVance عند مراجعة الشركة
                </div>
            </div>

            <!-- Branch Filter -->
            <div class="section" style="margin-bottom:14px;padding:14px">
                <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
                    <label style="font-weight:700;font-size:0.9rem;display:flex;align-items:center;gap:6px;color:var(--text)">
                        <i class="fas fa-map-marker-alt" style="color:var(--primary)"></i>
                        الفرع الحالي:
                    </label>
                    <select id="branchFilter" onchange="onBranchChange()" style="flex:1;min-width:200px;padding:10px 14px;background:rgba(255,255,255,0.03);border:2px solid var(--border);border-radius:10px;color:var(--text);font-size:0.92rem;font-family:inherit">
                        <option value="">-- كل الفروع --</option>
                    </select>
                    <button class="btn btn-success btn-sm" onclick="openAddBranchModal()">
                        <i class="fas fa-plus-circle"></i> إضافة فرع
                    </button>
                </div>
                <div id="branchInfo" style="margin-top:10px;display:none"></div>
            </div>

            <!-- Tabs -->
            <div class="tabs-container">
                <button class="tab-btn active" data-tab="all" onclick="switchTab(event, 'all')">
                    <i class="fas fa-list"></i> كل الأقسام <span class="tab-badge" id="allCount">0</span>
                </button>
                <button class="tab-btn" data-tab="active" onclick="switchTab(event, 'active')">
                    <i class="fas fa-check"></i> المفعّلة <span class="tab-badge" id="activeCount">0</span>
                </button>
                <button class="tab-btn" data-tab="closed" onclick="switchTab(event, 'closed')">
                    <i class="fas fa-pause"></i> المغلقة <span class="tab-badge" id="closedCount">0</span>
                </button>
            </div>

            <!-- Departments Grid -->
            <div id="tab-all" class="tab-content active">
                <div class="dept-grid" id="deptGrid">
                    <div class="empty-state">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>جاري التحميل...</p>
                    </div>
                </div>
            </div>
            <div id="tab-active" class="tab-content">
                <div class="dept-grid" id="activeGrid"></div>
            </div>
            <div id="tab-closed" class="tab-content">
                <div class="dept-grid" id="closedGrid"></div>
            </div>
        </main>
    </div>

    <div id="modalsContainer"></div>
    <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="company-layout.js"></script>
    <script>

        // ============================================================
        // 🛡️ Resilient Supabase Client + Session
        // ============================================================
        if (!window.getSafeSupabase) {
            window.getSafeSupabase = async function() {
                if (window.ProVance && typeof window.ProVance.waitForSupabaseClient === 'function') {
                    try {
                        const sb = await window.ProVance.waitForSupabaseClient(8000);
                        if (sb && typeof sb.from === 'function') return sb;
                    } catch(e) {}
                }
                try {

// ========== Helpers ==========
function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function safeParse(value, fallback) {
    if (value === null || value === undefined) return fallback;
    if (typeof value === 'object') return value;
    if (typeof value !== 'string') return fallback;
    try { return JSON.parse(value); } catch { return fallback; }
}
function formatDate(d) { if (!d) return '-'; return new Date(d).toLocaleDateString('ar-EG'); }

function showToast(msg, type = 'info') {
    const t = document.createElement('div');
    const c = { error:'#ef4444', success:'#10b981', warning:'#f59e0b', info:'#4facfe' };
    t.className = 'toast';
    t.style.background = c[type] || c.info;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 4000);
}

function renderModal(html) {

window.closeModal = (id) => {

window.switchTab = (e, tab) => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

// ========== Load Data ==========
async function loadAll() {
    try {
        // Make sure sb is ready
        const { data: sessData } = await sb.auth.getSession();
        if (!sessData || !sessData.session) {
            window.location.href = 'company-login.html';
            return;
        }
        companyUserId = sessData.session.user.id;

        // Company + Internships + Applications - Promise.allSettled to handle failures gracefully
        const results = await Promise.allSettled([
            sb.from('companies').select('user_id, company_name, email, status, company_field, company_location, primary_phone, training_fields, training_details, branch_locations, employees_count, training_price, training_currency').eq('user_id', companyUserId).maybeSingle(),
            sb.from('internships').select('id, company_user_id, company_name, company_location, title, field, description, duration, max_applicants, current_applicants, trainee_type, requirements, knowledge_benefits, financial_benefits, salary_min, salary_max, salary_currency, status, start_date, end_date, created_at, updated_at').eq('company_user_id', companyUserId).order('created_at', { ascending: false }),
            sb.from('applications').select('id, student_user_id, student_name, student_email, student_photo, student_university, student_cv_url, internship_id, company_name, internship_title, application_message, status, created_at, updated_at, interview_date, rejection_reason').eq('company_user_id', companyUserId).order('created_at', { ascending: false })
        ]);

        const companyRes = results[0].status === 'fulfilled' ? results[0].value : { data: null };
        const internshipsRes = results[1].status === 'fulfilled' ? results[1].value : { data: [] };
        const applicationsRes = results[2].status === 'fulfilled' ? results[2].value : { data: [] };

        companyData = companyRes.data;
        allInternships = internshipsRes.data || [];
        allApplications = applicationsRes.data || [];

        if (!companyData) {
            // لو الـ data null → ممكن RLS أو مشكلة مؤقتة → جرب مرة تانية بعد ثانية
            if (!window._companyRetried) {
                window._companyRetried = true;
                console.warn('companyData is null, retrying in 1s...');
                setTimeout(() => loadAll(), 1000);
                return;
            }
            // لو retry فشل → اعرض رسالة واضحة
            showToast('خطأ في تحميل بيانات الشركة - تأكد من RLS policies', 'error');
            document.getElementById('loadingOverlay').classList.add('hidden');
            return;
        }
        window._companyRetried = false; // reset للمرة الجاية

        // عرض سعر التدريب (القراءة فقط — الأدمن هو اللي بيحدده)
        const _priceDisplay = document.getElementById('trainingPriceDisplay');
        if (_priceDisplay) {
            _priceDisplay.textContent = companyData.training_price != null
                ? `${companyData.training_price} ${companyData.training_currency || 'EGP'}`
                : 'لم يُحدد بعد';
        }

        // لو الشركة pending
        if (companyData.status === 'pending') {
            window.location.href = 'Company-pending.html';
            return;
        }

        // تحميل الفروع
        loadBranches();

        renderDepartments();
        updateStats();

        document.getElementById('loadingOverlay').classList.add('hidden');
    } catch (err) {
        console.error('═══════════ LOAD ERROR ═══════════');
            console.error('Page:', window.location.pathname);
            console.error('Error:', err);
            console.error('Code:', err?.code);
            console.error('Message:', err?.message);
            console.error('Details:', err?.details);
            console.error('Hint:', err?.hint);
            console.error('═════════════════════════════════');
        showToast('خطأ في تحميل البيانات', 'error');
        document.getElementById('loadingOverlay').classList.add('hidden');
    }
}

// ========== Build Departments from training_fields + training_details + internships ==========
function getDepartments() {
    if (!companyData) return [];

    const trainingFields = safeParse(companyData.training_fields, []);
    const trainingDetails = safeParse(companyData.training_details, {});

    let depts = trainingFields.map(field => {
        const details = trainingDetails[field] || {};
        const existingInt = allInternships.find(i => i.field === field || i.title === field);

        return {
            field: field,
            name: field,
            details: details,
            branchId: details.branchId || '',
            internship: existingInt,
            apps: allApplications.filter(a => a.internship_id === existingInt?.id || a.field === field),
            active: !existingInt || existingInt.status === 'active'
        };
    });

    // فلترة بالفرع المختار
    if (currentBranchId) {
        depts = depts.filter(d => d.branchId === currentBranchId);
    }

    return depts;
}

function updateStats() {
    const depts = getDepartments();
    const active = depts.filter(d => d.active).length;
    const closed = depts.length - active;
    const pending = allApplications.filter(a => a.status === 'pending').length;

    document.getElementById('statTotalDepts').textContent = depts.length;
    document.getElementById('statActiveDepts').textContent = active;
    document.getElementById('statClosedDepts').textContent = closed;
    document.getElementById('statTotalApps').textContent = allApplications.length;
    document.getElementById('statPendingApps').textContent = pending;

    document.getElementById('allCount').textContent = depts.length;
    document.getElementById('activeCount').textContent = active;
    document.getElementById('closedCount').textContent = closed;
}

// ========== Render Departments ==========
function renderDepartments() {
    const depts = getDepartments();

    if (depts.length === 0) {
        const empty = `
            <div class="empty-state">
                <i class="fas fa-th-list"></i>
                <h3>لا توجد أقسام أو مجالات تدريبية</h3>
                <p>اضغط "إضافة قسم/مجال جديد" لتبدأ</p>
            </div>`;
        document.getElementById('deptGrid').innerHTML = empty;
        document.getElementById('activeGrid').innerHTML = empty;
        document.getElementById('closedGrid').innerHTML = empty;
        return;
    }

    const active = depts.filter(d => d.active);
    const closed = depts.filter(d => !d.active);

    document.getElementById('deptGrid').innerHTML = depts.map(createDeptCard).join('');
    document.getElementById('activeGrid').innerHTML = active.length === 0
        ? '<div class="empty-state"><i class="fas fa-check"></i><h3>لا توجد أقسام مفعّلة</h3></div>'
        : active.map(createDeptCard).join('');
    document.getElementById('closedGrid').innerHTML = closed.length === 0
        ? '<div class="empty-state"><i class="fas fa-pause"></i><h3>لا توجد أقسام مغلقة</h3></div>'
        : closed.map(createDeptCard).join('');
}

// ========== Toggle Department (active/closed) ==========
window.toggleDept = async (field) => {
    const depts = getDepartments();
    const dept = depts.find(d => d.field === field);
    if (!dept) return;

    const newActive = !dept.active;
    const msg = newActive ? 'فتح القسم للتقديم؟' : 'إغلاق القسم (المتدربين مش هيشوفوه)؟';
    if (!confirm(msg)) return;

    try {
        // Update internship status لو موجود
        if (dept.internship) {
            await sb.from('internships').update({
                status: newActive ? 'active' : 'closed',
                updated_at: new Date().toISOString()
            }).eq('id', dept.internship.id);
        } else if (newActive) {
            // اعمل internship جديد
            await syncToInternship(field, dept.details);
        }

        showToast(newActive ? '✅ تم فتح القسم' : '⏸️ تم إغلاق القسم', 'success');
        await loadAll();
    } catch (err) {
        showToast('خطأ: ' + err.message, 'error');
    }
};

// ========== Delete Department ==========
window.deleteDept = async (field) => {
    if (!confirm(`هل تريد حذف القسم "${field}"؟\n⚠️ ده هيمسحه من المنصة و الطلاب مش هيشوفوه.`)) return;

    try {
        // 1. شيله من training_fields و training_details
        const fields = safeParse(companyData.training_fields, []).filter(f => f !== field);
        const details = safeParse(companyData.training_details, {});
        delete details[field];

        await sb.from('companies').update({
            training_fields: fields,
            training_details: details,
            updated_at: new Date().toISOString()
        }).eq('user_id', companyUserId);

        // 2. امسح الـ internship المرتبط
        const dept = getDepartments().find(d => d.field === field);
        if (dept && dept.internship) {
            await sb.from('internships').delete().eq('id', dept.internship.id);
        }

        showToast('🗑️ تم حذف القسم', 'success');
        await loadAll();
    } catch (err) {
        showToast('خطأ: ' + err.message, 'error');
    }
};

// ========== مزامنة كل الأقسام دفعة واحدة (بعد تعديل بيانات الشركة) ==========
window.syncAllToInternships = async () => {
    if (!confirm('تحديث بيانات كل الأقسام في صفحة فرص التدريب؟\nهيستخدم آخر بيانات الشركة والفروع.')) return;
    try {
        // اجيب أحدث بيانات الشركة
        const { data: fresh } = await sb.from('companies')
            .select('company_name, company_location, training_fields, training_details, branch_locations')
            .eq('user_id', companyUserId).maybeSingle();
        if (fresh) {
            companyData = { ...companyData, ...fresh };
            allBranches = safeParse(fresh.branch_locations, allBranches);
        }

        const td = safeParse(companyData.training_details, {});
        const fields = Object.keys(td);
        if (fields.length === 0) { showToast('مفيش أقسام للمزامنة', 'warning'); return; }

        let done = 0;
        for (const field of fields) {
            try { await syncToInternship(field, td[field]); done++; } catch(e) { console.warn('sync failed', field, e); }
        }
        showToast(`✅ تم تحديث ${done} قسم في صفحة فرص التدريب`, 'success');
        await loadAll();
    } catch (err) {
        showToast('خطأ: ' + err.message, 'error');
    }
};

// ========== Sync to Internships table (للظهور في صفحة الطالب) ==========
async function syncToInternship(field, details) {
    if (!companyData) return;

    // لو فيه branchId، استخدم عنوان الفرع
    let location = companyData.company_location;
    if (details.branchId) {
        const branch = allBranches.find(b => b.id === details.branchId);
        if (branch) {
            location = (branch.fullAddress || branch.name);
            if (branch.city && !location.includes(branch.city)) {
                location = branch.city + ' - ' + location;
            }
        }
    }
    
    const internshipData = {
        company_user_id: companyUserId,
        company_name: companyData.company_name,
        // company_logo removed - شيلناه لتحسين السرعة، الـ logo يجي من companies table في الـ frontend
        company_location: location,
        title: field,
        field: field,
        description: details.knowledgeBenefits || '',
        duration: getDurationText(details.duration),
        max_applicants: parseInt(details.count) || 10,
        current_applicants: 0,
        trainee_type: details.traineeSystem || 'first-time',
        requirements: details.trainingRequirements || '',
        knowledge_benefits: details.knowledgeBenefits || '',
        financial_benefits: details.financialBenefits || '',
        salary_min: parseFloat(details.minSalary) || 0,
        salary_max: parseFloat(details.maxSalary) || 0,
        salary_currency: details.currency || 'EGP',
        status: 'active',
        updated_at: new Date().toISOString()
    };

    // شوف لو فيه واحد بالفعل
    const { data: existing } = await sb.from('internships')
        .select('id')
        .eq('company_user_id', companyUserId)
        .eq('field', field)
        .maybeSingle();

    if (existing) {
        await sb.from('internships').update(internshipData).eq('id', existing.id);
    } else {
        internshipData.created_at = new Date().toISOString();
        await sb.from('internships').insert(internshipData);

        // إشعار للطلاب المهتمين بهذا المجال
        try {
            const { data: interested } = await sb.from('student')
                .select('user_id, interested_fields')
                .not('interested_fields', 'is', null);
            if (interested && interested.length > 0) {
                const fieldLow = (field || '').toLowerCase();
                const matched = interested.filter(s => {
                    const fields = Array.isArray(s.interested_fields) ? s.interested_fields : [];
                    return fields.some(f =>
                        (f || '').toLowerCase().includes(fieldLow) ||
                        fieldLow.includes((f || '').toLowerCase())
                    );
                });
                const coName = companyData.company_name || 'شركة';
                for (const stu of matched.slice(0, 100)) {
                    await sb.from('notifications').insert({
                        user_id: stu.user_id,
                        user_type: 'student',
                        title: `🎯 فرصة جديدة في مجالك: ${field}`,
                        message: `شركة "${coName}" أضافت فرصة تدريب جديدة في مجال "${field}". قدّم الآن!`,
                        type: 'info',
                        is_read: false,
                        link: 'student-internship.html'
                    });
                }
            }
        } catch(ne) { console.warn('interest notification failed:', ne); }
    }
}

    // إظهار/إخفاء الميزة المادية حسب النظام

window.saveDept = async () => {
    const field = document.getElementById('deptField').value.trim();
    const duration = document.getElementById('deptDuration').value;
    const count = document.getElementById('deptCount').value;
    const supervisor = document.getElementById('deptSupervisor').value.trim();
    const minSalary = document.getElementById('deptMinSalary').value;
    const maxSalary = document.getElementById('deptMaxSalary').value;
    const currency = document.getElementById('deptCurrency').value;
    const knowledge = document.getElementById('deptKnowledge').value.trim();
    const financial = document.getElementById('deptFinancial').value.trim();
    const requirements = document.getElementById('deptRequirements').value.trim();

    // Validation
    const branchId = document.getElementById('deptBranch').value;
    
    if (!field) { showToast('أدخل اسم القسم', 'error'); return; }
    if (!branchId) { showToast('اختر الفرع', 'error'); return; }
    if (!duration) { showToast('اختر مدة التدريب', 'error'); return; }
    if (!count || parseInt(count) < 1) { showToast('أدخل عدد المتدربين', 'error'); return; }
    if (!supervisor) { showToast('أدخل اسم المشرف', 'error'); return; }
    if (!minSalary || !maxSalary) { showToast('أدخل نطاق الراتب', 'error'); return; }
    if (!knowledge) { showToast('أدخل الميزة المعرفية', 'error'); return; }
    if ((selectedSystem === 'once-trained' || selectedSystem === 'twice-trained') && !financial) {
        showToast('الميزة المادية إلزامية في النظام المختار', 'error');
        return;
    }

    const newDetails = {
        traineeSystem: selectedSystem,
        branchId: branchId,
        duration, count: count.toString(), supervisor,
        minSalary, maxSalary, currency,
        knowledgeBenefits: knowledge,
        financialBenefits: financial,
        trainingRequirements: requirements,
        otherCurrency: ''
    };

    try {
        let allDetails = safeParse(companyData.training_details, {});
        
        if (editingField) {
            // === تعديل قسم موجود - يعدّل مباشرة ===
            allDetails[field] = newDetails;
            await sb.from('companies').update({
                training_details: allDetails,
                updated_at: new Date().toISOString()
            }).eq('user_id', companyUserId);
            
            await syncToInternship(field, newDetails);
            
            showToast('✅ تم حفظ التعديلات', 'success');
            closeModal('deptModal');
            await loadAll();
        } else {
            // === قسم جديد - يبعت للأدمن للموافقة ===
            let fields = safeParse(companyData.training_fields, []);
            if (fields.includes(field)) {
                showToast('القسم ده موجود بالفعل', 'error');
                return;
            }
            
            // شوف لو في طلب pending للقسم ده
            try {
                const { data: existing } = await sb.from('pending_approvals')
                    .select('id')
                    .eq('company_user_id', companyUserId)
                    .eq('type', 'department')
                    .eq('item_name', field)
                    .eq('status', 'pending')
                    .maybeSingle();
                
                if (existing) {
                    showToast('⏳ القسم ده مستني موافقة الأدمن بالفعل', 'warning');
                    closeModal('deptModal');
                    await loadAll();
                    return;
                }
            } catch(e) { /* table may not exist yet */ }
            
            // ابعت للأدمن
            const { error: insertErr } = await sb.from('pending_approvals').insert({
                company_user_id: companyUserId,
                type: 'department',
                item_name: field,
                data: newDetails,
                status: 'pending',
                created_at: new Date().toISOString()
            });
            
            if (insertErr) {
                console.error(insertErr);
                if (insertErr.message && insertErr.message.includes('pending_approvals')) {
                    showToast('⚠️ جدول الموافقات مش موجود - شغّل SQL migration 18 الأول', 'error');
                } else {
                    showToast('خطأ: ' + insertErr.message, 'error');
                }
                return;
            }
            
            // ابعت notification للأدمن
            try {
                await sb.from('notifications').insert({
                    user_id: companyUserId,  // مؤقت - الأدمن يشوفها من query على pending_approvals
                    user_type: 'admin',
                    type: 'new_approval',
                    title: 'طلب موافقة جديد',
                    message: `الشركة "${companyData.company_name}" طلبت إضافة قسم: ${field}`,
                    link: 'admin-approvals.html'
                });
            } catch(e) { /* notifications table may not exist */ }
            
            showToast('⏳ تم إرسال القسم للأدمن للمراجعة والموافقة', 'success');
            closeModal('deptModal');
            await loadAll();
        }
    } catch (err) {
        console.error(err);
        showToast('خطأ: ' + err.message, 'error');
    }
};


// ========== Branches ==========
function loadBranches() {
    allBranches = safeParse(companyData.branch_locations, []);
    
    // لو مفيش فروع، أنشئ "الفرع الرئيسي" تلقائياً
    if (allBranches.length === 0) {
        allBranches = [{ id: 'main', name: 'الفرع الرئيسي', fullAddress: companyData.company_location || '' }];
    }
    
    // تأكد إن كل فرع له id
    allBranches = allBranches.map((b, i) => {
        if (typeof b === 'string') {
            return { id: 'branch_' + i, name: 'فرع ' + (i + 1), fullAddress: b };
        }
        if (!b.id) b.id = 'branch_' + i;
        if (!b.name) b.name = b.fullAddress || ('فرع ' + (i + 1));
        return b;
    });
    
    // املأ الـ dropdown
    const select = document.getElementById('branchFilter');
    select.innerHTML = '<option value="">-- كل الفروع --</option>' +
        allBranches.map(b => `<option value="${escapeHtml(b.id)}" ${currentBranchId === b.id ? 'selected' : ''}>${escapeHtml(b.name)}</option>`).join('');
    
    updateBranchInfo();
}

function updateBranchInfo() {
    const info = document.getElementById('branchInfo');
    if (!currentBranchId) {
        info.style.display = 'none';
        return;
    }
    const branch = allBranches.find(b => b.id === currentBranchId);
    if (!branch) { info.style.display = 'none'; return; }
    
    info.style.display = 'block';
    info.innerHTML = `
        <div style="padding:10px;background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.15);border-radius:10px;font-size:0.84rem">
            <i class="fas fa-info-circle" style="color:var(--primary)"></i>
            بتعرض دلوقتي أقسام: <strong>${escapeHtml(branch.name)}</strong>
            ${branch.fullAddress ? ' - ' + escapeHtml(branch.fullAddress) : ''}
            <button class="btn btn-secondary btn-sm" onclick="editBranch('${escapeHtml(branch.id)}')" style="margin-right:8px;padding:4px 10px;font-size:0.78rem">
                <i class="fas fa-edit"></i> تعديل
            </button>
        </div>
    `;
}

window.saveBranch = async (existingId) => {
    const name = document.getElementById('branchName').value.trim();
    const address = document.getElementById('branchAddress').value.trim();
    const city = document.getElementById('branchCity').value.trim();
    const phone = document.getElementById('branchPhone').value.trim();
    const manager = document.getElementById('branchManager').value.trim();

    if (!name) { showToast('أدخل اسم الفرع', 'error'); return; }
    if (!address) { showToast('أدخل عنوان الفرع', 'error'); return; }

    try {
        if (existingId) {
            // === تعديل فرع موجود - يعدّل مباشرة ===
            let branches = [...allBranches];
            const idx = branches.findIndex(b => b.id === existingId);
            if (idx >= 0) {
                branches[idx] = { id: existingId, name, fullAddress: address, city, phone, manager };
            }
            
            await sb.from('companies').update({
                branch_locations: branches,
                updated_at: new Date().toISOString()
            }).eq('user_id', companyUserId);

            // حدّث الـ internships لكل قسم مربوط بالفرع ده (يحدّث الـ location)
            companyData.branch_locations = branches;
            allBranches = branches;
            const td = safeParse(companyData.training_details, {});
            const linked = Object.keys(td).filter(f => td[f].branchId === existingId);
            for (const field of linked) {
                try { await syncToInternship(field, td[field]); } catch(e) { console.warn('sync failed', field, e); }
            }

            showToast('✅ تم حفظ التعديلات وتحديث الأقسام المرتبطة', 'success');
            closeModal('branchModal');
            await loadAll();
        } else {
            // === فرع جديد - يبعت للأدمن للموافقة ===
            const branchData = { name, fullAddress: address, city, phone, manager };
            
            // شوف لو في طلب pending للفرع ده
            try {
                const { data: existing } = await sb.from('pending_approvals')
                    .select('id')
                    .eq('company_user_id', companyUserId)
                    .eq('type', 'branch')
                    .eq('item_name', name)
                    .eq('status', 'pending')
                    .maybeSingle();
                
                if (existing) {
                    showToast('⏳ الفرع ده مستني موافقة الأدمن بالفعل', 'warning');
                    closeModal('branchModal');
                    return;
                }
            } catch(e) { /* table may not exist */ }
            
            const { error: insertErr } = await sb.from('pending_approvals').insert({
                company_user_id: companyUserId,
                type: 'branch',
                item_name: name,
                data: branchData,
                status: 'pending',
                created_at: new Date().toISOString()
            });
            
            if (insertErr) {
                if (insertErr.message && insertErr.message.includes('pending_approvals')) {
                    showToast('⚠️ جدول الموافقات مش موجود - شغّل SQL migration 18 الأول', 'error');
                } else {
                    showToast('خطأ: ' + insertErr.message, 'error');
                }
                return;
            }
            
            // ابعت notification للأدمن
            try {
                await sb.from('notifications').insert({
                    user_id: companyUserId,
                    user_type: 'admin',
                    type: 'new_approval',
                    title: 'طلب فرع جديد',
                    message: `الشركة "${companyData.company_name}" طلبت إضافة فرع: ${name}`,
                    link: 'admin-approvals.html'
                });
            } catch(e) { /* notifications table may not exist */ }
            
            showToast('⏳ تم إرسال الفرع للأدمن للموافقة', 'success');
            closeModal('branchModal');
        }
    } catch (err) {
        showToast('خطأ: ' + err.message, 'error');
    }
};

window.deleteBranch = async (branchId) => {
    // شوف لو في أقسام مرتبطة بالفرع
    const trainingDetails = safeParse(companyData.training_details, {});
    const linkedDepts = Object.keys(trainingDetails).filter(field => trainingDetails[field].branchId === branchId);

    if (linkedDepts.length > 0) {
        if (!confirm(`⚠️ في ${linkedDepts.length} قسم/أقسام مرتبطة بالفرع ده:\n${linkedDepts.join(', ')}\n\nهل تريد حذف الفرع؟ (الأقسام مش هتتمسح لكن مش هتكون مربوطة بفرع)`)) return;
    } else {
        if (!confirm('هل تريد حذف الفرع ده؟')) return;
    }

    try {
        const branches = allBranches.filter(b => b.id !== branchId);

        // شيل الـ branchId من الأقسام
        const newDetails = { ...trainingDetails };
        linkedDepts.forEach(field => {
            delete newDetails[field].branchId;
        });

        await sb.from('companies').update({
            branch_locations: branches,
            training_details: newDetails,
            updated_at: new Date().toISOString()
        }).eq('user_id', companyUserId);

        // حدّث الـ internships للأقسام اللي كانت مربوطة بالفرع (يرجّع location لعنوان الشركة الرئيسي)
        companyData.training_details = newDetails;
        companyData.branch_locations = branches;
        allBranches = branches;
        for (const field of linkedDepts) {
            try { await syncToInternship(field, newDetails[field]); } catch(e) { console.warn('sync failed for', field, e); }
        }

        if (currentBranchId === branchId) currentBranchId = '';

        showToast('🗑️ تم حذف الفرع وتحديث الأقسام المرتبطة', 'success');
        closeModal('branchModal');
        await loadAll();
    } catch (err) {
        showToast('خطأ: ' + err.message, 'error');
    }
};

// ========== Init ==========
async function init() {
    try {
        // انتظر sb لو لسه مش جاهز
        if (!sb) {
            showToast('فشل تحميل Supabase', 'error');
            return;
        }
        await loadAll();
    } catch (err) {
        console.error('Init error:', err);
        document.getElementById('loadingOverlay').classList.add('hidden');
    }
}

document.addEventListener('DOMContentLoaded', init);

// Safety: 12 ثانية ولو لسه بيحمل، أخفي الـ loading
setTimeout(() => {
    const el = document.getElementById('loadingOverlay');
    if (el && !el.classList.contains('hidden')) {
        console.warn('⚠️ Loading timeout');
        el.classList.add('hidden');
    }
}, 12000);

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        const modals = document.querySelectorAll('.modal.active');
        if (modals.length > 0) closeModal(modals[modals.length - 1].id);
    }
});
    </script>
