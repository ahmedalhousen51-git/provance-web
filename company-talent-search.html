<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://jrwazyrdzmbcnddpxxrf.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://jrwazyrdzmbcnddpxxrf.supabase.co">

    <title>البحث عن المواهب - ProVance</title>

    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        :root {
            --primary: #ef4444;
            --primary-dark: #dc2626;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #ef4444;

            --bg: #0a0e27;
            --bg-card: rgba(255,255,255,0.04);
            --bg-hover: rgba(255,255,255,0.08);
            --border: rgba(255,255,255,0.1);

            --text: #ffffff;
            --text-muted: #94a3b8;

            --sidebar-w: 260px;
            --header-h: 72px;
            --radius: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ============================================================
         * Loading Overlay
         * ============================================================ */
        #loading {
            position: fixed; inset: 0;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity .4s, visibility .4s;
        }
        #loading.hidden { opacity: 0; visibility: hidden; }

        .spinner-wrap { text-align: center; }
        .spinner-box {
            width: 60px; height: 60px;
            margin: 0 auto 16px;
            border: 4px solid rgba(239,68,68,0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ============================================================
         * Sidebar
         * ============================================================ */
        .sidebar {
            position: fixed; top: 0; right: 0;
            width: var(--sidebar-w); height: 100vh;
            background: linear-gradient(180deg, #0f172a, #1e293b);
            border-left: 1px solid var(--border);
            display: flex; flex-direction: column;
            transition: transform .3s;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 22px 20px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
        }

        .sidebar-logo {
            padding: 8px 4px 18px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px;
        }
        .logo-icon {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            filter: drop-shadow(0 4px 12px rgba(239,68,68,0.3));
        }
        .logo-icon svg {
            width: 100%;
            height: 100%;
        }
        .logo-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }
        .logo-brand {
            font-size: 1.15rem;
            font-weight: 900;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
            line-height: 1;
        }
        .logo-tagline {
            font-size: 0.68rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .sidebar-brand { font-weight: 800; font-size: 1.1rem; }
        .sidebar-brand small { display: block; font-size: 0.72rem; color: var(--text-muted); font-weight: 500; }

        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
            overflow-y: auto;
        }

        .nav-section { margin-bottom: 20px; }
        .nav-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0 12px 8px;
        }

        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 11px 14px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 3px;
            transition: all .2s;
            font-weight: 600;
            font-size: 0.93rem;
            position: relative;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text);
        }

        .nav-item.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
        }

        .nav-item i { width: 20px; text-align: center; font-size: 0.95rem; }

        .nav-badge {
            margin-right: auto;
            background: var(--danger);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            min-width: 20px;
            text-align: center;
        }
        .nav-badge:empty { display: none; }

        .sidebar-footer {
            padding: 14px;
            border-top: 1px solid var(--border);
        }

        .logout-btn {
            width: 100%;
            padding: 12px;
            background: rgba(239,68,68,0.1);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            font-size: 0.93rem;
            transition: all .2s;
        }
        .logout-btn:hover { background: rgba(239,68,68,0.2); color: #fff; }

        /* ============================================================
         * Main Content
         * ============================================================ */
        .main {
            margin-right: var(--sidebar-w);
            min-height: 100vh;
        }

        .header {
            height: var(--header-h);
            background: rgba(10,14,39,0.8);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0;
            z-index: 100;
        }

        .header-title {
            display: flex; align-items: center; gap: 12px;
            font-size: 1.15rem; font-weight: 700;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.3rem;
            cursor: pointer;
            padding: 8px;
        }

        .user-box {
            display: flex; align-items: center; gap: 12px;
            padding: 6px 10px 6px 6px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50px;
        }

        .user-avatar {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            overflow: hidden;
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .user-info { line-height: 1.2; }
        .user-info .name { font-size: 0.87rem; font-weight: 700; }
        .user-info .role { font-size: 0.72rem; color: var(--text-muted); }

        /* ============================================================
         * Page Content
         * ============================================================ */
        .page { padding: 28px; }

        /* Welcome Card */
        .welcome {
            background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(118,75,162,0.08));
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: var(--radius);
            padding: 26px;
            margin-bottom: 24px;
            display: flex; gap: 22px; align-items: center; flex-wrap: wrap;
        }

        .welcome-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem;
            flex-shrink: 0;
        }

        .welcome-content { flex: 1; min-width: 260px; }
        .welcome-content h1 {
            font-size: 1.7rem; font-weight: 900;
            margin-bottom: 6px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .welcome-content p { color: var(--text-muted); margin-bottom: 14px; }

        .welcome-actions { display: flex; gap: 10px; flex-wrap: wrap; }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-family: inherit;
            font-size: 0.92rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex; align-items: center; gap: 8px;
            transition: all .2s;
        }
        .btn:hover { transform: translateY(-1px); }

        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); color: #fff; }
        .btn-outline { background: var(--bg-card); color: var(--text); border: 1px solid var(--border); }
        .btn-outline:hover { background: var(--bg-hover); }
        .btn-small { padding: 8px 14px; font-size: 0.85rem; }

        /* Stats Grid */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            display: flex; gap: 16px; align-items: center;
            cursor: pointer;
            transition: all .2s;
        }
        .stat-card:hover { transform: translateY(-3px); border-color: var(--primary); }

        .stat-icon {
            width: 52px; height: 52px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
            color: #fff;
            flex-shrink: 0;
        }
        .stat-icon.primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); }
        .stat-icon.success { background: linear-gradient(135deg, #10b981, #059669); }
        .stat-icon.warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .stat-icon.info    { background: linear-gradient(135deg, #ef4444, #dc2626); }

        .stat-value { font-size: 1.9rem; font-weight: 900; line-height: 1; margin-bottom: 4px; }
        .stat-label { font-size: 0.85rem; color: var(--text-muted); }

        /* Sections */
        .section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px;
            margin-bottom: 24px;
        }

        .section-head {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
        }

        .section-title {
            font-size: 1.1rem; font-weight: 800;
            display: flex; align-items: center; gap: 10px;
        }
        .section-title i { color: var(--primary); }

        /* Search Bar */
        .search-bar {
            position: relative;
            margin-bottom: 18px;
        }
        .search-bar i {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted);
        }
        .search-bar input {
            width: 100%;
            padding: 11px 44px 11px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.93rem;
        }
        .search-bar input:focus { outline: none; border-color: var(--primary); }

        /* Applications Grid */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 14px;
        }

        .app-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            transition: all .2s;
        }
        .app-card:hover { border-color: var(--primary); }

        .app-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .app-avatar {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            color: #fff;
            flex-shrink: 0;
            overflow: hidden;
            font-weight: 700;
        }
        .app-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .app-name { font-weight: 700; font-size: 0.98rem; }
        .app-sub  { font-size: 0.83rem; color: var(--text-muted); }

        .app-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 12px 0;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }
        .detail-row { font-size: 0.82rem; }
        .detail-row .lbl { color: var(--text-muted); }
        .detail-row .val { font-weight: 600; }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.76rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .status-pending  { background: rgba(245,158,11,0.15); color: #fbbf24; }
        .status-accepted { background: rgba(16,185,129,0.15); color: #34d399; }
        .status-rejected { background: rgba(239,68,68,0.15);  color: #f87171; }
        .status-interview { background: rgba(239,68,68,0.15); color: #f87171; }

        .app-actions { display: flex; gap: 8px; margin-top: 12px; }
        .app-actions .btn { flex: 1; justify-content: center; }

        /* Empty States */
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        .empty i { font-size: 2.8rem; margin-bottom: 12px; opacity: 0.4; }
        .empty h3 { font-size: 1.1rem; margin-bottom: 6px; color: var(--text); }

        /* Charts */
        .charts-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .chart-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }
        .chart-box h3 {
            font-size: 1rem; font-weight: 700;
            margin-bottom: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .chart-box h3 i { color: var(--primary); }
        .chart-container { position: relative; height: 260px; }

        /* Interviews List */
        .interview-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.02);
            border-radius: 10px;
            margin-bottom: 8px;
        }
        .interview-item:last-child { margin-bottom: 0; }

        .interview-avatar {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        .interview-info { flex: 1; min-width: 0; }
        .interview-info .n { font-weight: 700; font-size: 0.92rem; }
        .interview-info .f { font-size: 0.8rem; color: var(--text-muted); }

        .interview-time {
            font-size: 0.82rem;
            color: var(--info);
            font-weight: 600;
            white-space: nowrap;
        }

        /* Modals */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center; justify-content: center;
            z-index: 9998;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: #1e293b;
            border: 1px solid var(--border);
            border-radius: 16px;
            max-width: 500px; width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn .3s;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .modal-head {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-head h3 { font-size: 1.1rem; font-weight: 700; }
        .modal-close {
            background: none; border: none; color: var(--text-muted);
            font-size: 1.3rem; cursor: pointer;
        }

        .modal-body { padding: 22px 24px; }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; font-weight: 600; font-size: 0.9rem;
            margin-bottom: 6px; color: var(--text-muted);
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.93rem;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus { outline: none; border-color: var(--primary); }
        .form-group textarea { resize: vertical; min-height: 80px; }

        .modal-foot {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex; gap: 10px; justify-content: flex-end;
        }

        /* ============================================================
         * Mobile Responsive
         * ============================================================ */
        @media (max-width: 992px) {
            .charts-row { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(100%);
                box-shadow: -10px 0 30px rgba(0,0,0,.5);
            }
            .sidebar.open { transform: translateX(0); }
            .main { margin-right: 0; }
            .menu-toggle { display: block; }
            .page { padding: 18px; }
            .user-info { display: none; }
            .welcome-content h1 { font-size: 1.4rem; }
            .stats { grid-template-columns: 1fr 1fr; }
            .stat-value { font-size: 1.5rem; }
            .app-details { grid-template-columns: 1fr; }
        }

        @media (max-width: 480px) {
            .stats { grid-template-columns: 1fr; }
            .welcome { padding: 20px; }
            .welcome-icon { width: 56px; height: 56px; font-size: 1.6rem; }
        }

        /* Backdrop for mobile */
        .sidebar-backdrop {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        .sidebar-backdrop.show { display: block; }
    </style>
</head>
<body>
    <!-- Loading -->
    <div id="loading">
        <div class="spinner-wrap">
            <div class="spinner-box"></div>
            <p style="color: var(--text-muted)">جاري التحميل...</p>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main">
        <header class="header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="menu-toggle" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="header-title">
                    <i class="fas fa-search" style="color: var(--primary);"></i>
                    البحث عن المواهب
                </div>
            </div>

            <div class="user-box">
                <div class="user-avatar" id="headerAvatar">
                    <i class="fas fa-building"></i>
                </div>
                <div class="user-info">
                    <div class="name" id="headerName">جاري التحميل...</div>
                    <div class="role">شركة معتمدة</div>
                </div>
            </div>
        </header>

                        <!-- Info Banner -->
            <div style="margin:0 24px 18px;background:linear-gradient(135deg,rgba(239,68,68,0.1),rgba(220,38,38,0.05));border:1px solid rgba(239,68,68,0.25);border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">
                <div style="width:50px;height:50px;background:linear-gradient(135deg,#ef4444,#dc2626);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#fff;flex-shrink:0"><i class="fas fa-search-plus"></i></div>
                <div style="flex:1;min-width:200px">
                    <div style="font-weight:800;font-size:1.05rem">ابحث في كل طلاب المنصة 🔍</div>
                    <div style="color:var(--text-muted);font-size:0.88rem;margin-top:4px">دور بفلاتر ذكية واتواصل مع أي طالب مناسب لشركتك. بياناتهم محمية (مفيش phone/email).</div>
                </div>
            </div>

            <!-- Search Bar -->
            <div style="margin:0 24px 14px">
                <div style="position:relative">
                    <i class="fas fa-search" style="position:absolute;top:50%;right:14px;transform:translateY(-50%);color:var(--text-muted)"></i>
                    <input type="text" id="searchQuery" placeholder="ابحث بالاسم، الجامعة، المهارات..." 
                        style="width:100%;padding:14px 42px 14px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:inherit;font-size:0.95rem"
                        oninput="applyFilters()">
                </div>
            </div>

            <!-- Smart Filters -->
            <div style="margin:0 24px 18px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:14px">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:10px">

// تطبيع النص العربي للمقارنة (يوحّد الحروف المتشابهة عشان المنصورة=المنصوره)
function normalizeArabic(str) {
    return String(str || '')
        .trim()
        .replace(/[\u064B-\u065F\u0670]/g, '')   // إزالة التشكيل
        .replace(/\u0640/g, '')                   // إزالة التطويل

        .replace(/ى/g, 'ي')                       // توحيد الياء

        .replace(/\s+/g, ' ')                     // توحيد المسافات
        .toLowerCase();
}

// مفتاح المطابقة: تطبيع + إزالة "ال" التعريف + إزالة المسافات
function cityMatchKey(s) {
    let n = normalizeArabic(s);
    n = n.replace(/^ال/, '');      // شيل "ال" التعريف من الأول
    n = n.replace(/\s/g, '');       // شيل كل المسافات للمطابقة
    return n;
}

// مسافة التعديل (Levenshtein) — كام حرف فرق بين كلمتين
function levenshtein(a, b) {
    const m = a.length, n = b.length;
    if (m === 0) return n;
    if (n === 0) return m;
    let prev = Array.from({ length: n + 1 }, (_, i) => i);
    let cur = new Array(n + 1);
    for (let i = 1; i <= m; i++) {
        cur[0] = i;
        for (let j = 1; j <= n; j++) {
            const cost = a[i - 1] === b[j - 1] ? 0 : 1;
            cur[j] = Math.min(prev[j] + 1, cur[j - 1] + 1, prev[j - 1] + cost);
        }
        [prev, cur] = [cur, prev];
    }
    return prev[n];
}

// كام حرف فرق مسموح حسب طول الكلمة (الكلمات القصيرة أكثر صرامة)
function allowedCityDist(len) {
    if (len <= 3) return 0;   // قصيرة جداً → مطابقة تامة فقط
    if (len <= 6) return 1;   // حرف واحد فرق
    return 2;                 // طويلة → حرفين فرق
}

// جهّز مفاتيح القاموس مرة واحدة
const _cityAliasIndex = [];
EGYPT_CITIES.forEach(c => {
    c.aliases.forEach(a => _cityAliasIndex.push({ key: cityMatchKey(a), name: c.name }));
});

// يحوّل أي كتابة لاسم المدينة الرسمي (حتى لو فيها زيادة/نقص حرف)
function resolveCity(input) {
    if (!input) return '';
    const key = cityMatchKey(input);
    if (!key) return String(input).trim();

    // 1) مطابقة تامة مع القاموس
    for (const entry of _cityAliasIndex) {
        if (entry.key === key) return entry.name;
    }
    // 2) مطابقة تقريبية (زيادة/نقص/تغيير حرف)
    let best = null, bestDist = 99;
    for (const entry of _cityAliasIndex) {
        const d = levenshtein(key, entry.key);
        const tol = allowedCityDist(Math.min(key.length, entry.key.length));
        if (d <= tol && d < bestDist) { bestDist = d; best = entry.name; }
    }
    if (best) return best;

    // 3) مش في القاموس → رجّع الكتابة الأصلية منظّفة
    return String(input).trim();
}

function calculateCompleteness(s) {
    const fields = ['full_name', 'phone', 'birth_date', 'gender', 'university', 'faculty', 'gpa', 'photo', 'bio', 'cv_url', 'linkedin', 'city', 'education_level'];
    const filled = fields.filter(f => s[f] && String(s[f]).trim() !== '').length;
    const skills = Array.isArray(s.skills) ? s.skills.length : 0;
    const interests = Array.isArray(s.interested_fields) ? s.interested_fields.length : 0;
    let score = (filled / fields.length) * 70;
    if (skills >= 3) score += 15; else score += (skills / 3) * 15;
    if (interests >= 2) score += 15; else score += (interests / 2) * 15;
    return Math.min(100, Math.round(score));
}

            return;
        }
        
        allStudents = (data || []).map(s => ({ ...s, completeness: calculateCompleteness(s) }));
        console.log('✓ Loaded', allStudents.length, 'students');

        // حدّد الطلاب اللي بيتمرنوا فعلاً من جدول applications (عشان فلتر "يتدرب حالياً" يشتغل)
        try {
            const { data: apps } = await sb.from('applications')
                .select('student_user_id, status')
                .in('status', ['in_training', 'hired', 'accepted', 'completed']);
            if (Array.isArray(apps) && apps.length > 0) {
                const trainingMap = {}; // student_user_id → 'in_training' أو 'completed'
                apps.forEach(a => {
                    if (!a.student_user_id) return;
                    if (a.status === 'completed') {
                        if (!trainingMap[a.student_user_id]) trainingMap[a.student_user_id] = 'completed';
                    } else {
                        trainingMap[a.student_user_id] = 'in_training'; // تدريب حالي له أولوية
                    }
                });
                allStudents.forEach(s => {
                    const derived = trainingMap[s.user_id];
                    // الاشتقاق من applications له الأولوية (الحقيقة الفعلية)
                    if (derived) s.training_status = derived;
                });
            }
        } catch (e) { console.warn('Could not derive training status from applications:', e); }
        
        populateFilters();
        applyFilters();
    } catch(err) {
        hideLoading();
        console.error(err);
        showToast('خطأ: ' + err.message, 'error');
    }
}

function populateFilters() {
    // اجلب كل القيم الفريدة
    const fields = new Set();
    const universities = new Set();
    const citiesMap = {}; // normalized → display (يوحّد المدن المتشابهة)
    
    allStudents.forEach(s => {
        if (Array.isArray(s.interested_fields)) {
            s.interested_fields.forEach(f => {
                const name = typeof f === 'string' ? f : (f.name || f);
                if (name) fields.add(name);
            });
        }
        if (s.university) universities.add(s.university);
        if (s.city) {
            const canonical = resolveCity(s.city);     // الاسم الرسمي (لو معروف)
            const key = normalizeArabic(canonical);     // مفتاح التوحيد
            // فضّل أسماء القاموس النظيفة كصيغة عرض
            if (!citiesMap[key]) citiesMap[key] = canonical;
        }
    });
    
    // املأ السيلكتات
    const fieldSelect = document.getElementById('filterField');
    fieldSelect.innerHTML = '<option value="">كل المجالات</option>' + 
        [...fields].sort().map(f => `<option value="${esc(f)}">${esc(f)}</option>`).join('');
    
    const uniSelect = document.getElementById('filterUniversity');
    uniSelect.innerHTML = '<option value="">كل الجامعات</option>' + 
        [...universities].sort().map(u => `<option value="${esc(u)}">${esc(u)}</option>`).join('');
    
    // المدن: القيمة = الصيغة المطبّعة (للفلترة الموحّدة)، النص = صيغة العرض
    const citySelect = document.getElementById('filterCity');
    const cityEntries = Object.keys(citiesMap).map(key => ({ key, display: citiesMap[key] })).sort((a, b) => a.display.localeCompare(b.display, 'ar'));
    citySelect.innerHTML = '<option value="">كل المدن</option>' + 
        cityEntries.map(c => `<option value="${esc(c.key)}">${esc(c.display)}</option>`).join('');
}

window.addSkillFilter = () => {
    const input = document.getElementById('skillInput');
    const val = input.value.trim();
    if (!val) return;
    if (skillFilters.includes(val)) { input.value = ''; return; }
    skillFilters.push(val);
    input.value = '';
    renderSkillTags();
    applyFilters();
};

window.removeSkillFilter = (idx) => {
    skillFilters.splice(idx, 1);
    renderSkillTags();
    applyFilters();
};

function renderSkillTags() {
    const container = document.getElementById('skillTags');
    if (skillFilters.length === 0) {
        container.innerHTML = '<span style="color:var(--text-muted);font-size:0.82rem;font-style:italic">لا فلاتر مهارات</span>';
        return;
    }
    container.innerHTML = skillFilters.map((s, i) => 
        '<span style="background:rgba(239,68,68,0.15);color:#ef4444;padding:5px 10px;border-radius:14px;font-size:0.82rem;font-weight:600;display:inline-flex;align-items:center;gap:6px">' + esc(s) + '<button onclick="removeSkillFilter(' + i + ')" style="background:rgba(255,255,255,0.1);border:none;color:#ef4444;width:18px;height:18px;border-radius:50%;cursor:pointer;font-size:0.7rem">×</button></span>'
    ).join('');
}

window.resetFilters = () => {
    document.getElementById('searchQuery').value = '';
    document.getElementById('filterField').value = '';
    document.getElementById('filterEduLevel').value = '';
    document.getElementById('filterUniversity').value = '';
    document.getElementById('filterCity').value = '';
    document.getElementById('filterStudyYear').value = '';
    document.getElementById('filterTrainingStatus').value = '';
    document.getElementById('filterLevel').value = '';
    document.getElementById('sortBy').value = 'newest';
    skillFilters = [];
    renderSkillTags();
    applyFilters();
};

window.applyFilters = () => {
    const query = document.getElementById('searchQuery').value.trim().toLowerCase();
    const field = document.getElementById('filterField').value;
    const eduLevel = document.getElementById('filterEduLevel').value;
    const university = document.getElementById('filterUniversity').value;
    const city = document.getElementById('filterCity').value;
    const studyYear = document.getElementById('filterStudyYear').value;
    const trainingStatus = document.getElementById('filterTrainingStatus').value;
    const levelFilter = document.getElementById('filterLevel').value;
    const sortBy = document.getElementById('sortBy').value;

    filteredStudents = allStudents.filter(s => {
        // Text search
        if (query) {
            const searchable = [
                s.full_name, s.university, s.faculty, s.major, s.city, s.bio,
                ...(Array.isArray(s.skills) ? s.skills.map(sk => typeof sk === 'string' ? sk : sk.name || '') : []),
                ...(Array.isArray(s.interested_fields) ? s.interested_fields.map(f => typeof f === 'string' ? f : f.name || '') : [])
            ].filter(Boolean).join(' ').toLowerCase();
            if (!searchable.includes(query)) return false;
        }
        
        // Field filter
        if (field) {
            const hasField = Array.isArray(s.interested_fields) && s.interested_fields.some(f => {
                const name = typeof f === 'string' ? f : f.name || '';
                return name === field;
            });
            if (!hasField) return false;
        }
        
        // Education level
        if (eduLevel && s.education_level !== eduLevel) return false;
        
        // University
        if (university && s.university !== university) return false;
        
        // City
        if (city && normalizeArabic(resolveCity(s.city)) !== city) return false;
        
        // Study year
        if (studyYear) {
            const sy = s.study_year || s.year_of_study;
            if (String(sy) !== studyYear) return false;
        }
        
        // Training status
        if (trainingStatus && s.training_status !== trainingStatus) return false;

        // Training level
        if (levelFilter && (s.level || 'beginner') !== levelFilter) return false;

        // Skills (يحتوي على الأقل واحدة)
        if (skillFilters.length > 0) {
            const studentSkills = (Array.isArray(s.skills) ? s.skills : []).map(sk => 
                (typeof sk === 'string' ? sk : sk.name || '').toLowerCase()
            );
            const hasAnySkill = skillFilters.some(filter => 
                studentSkills.some(skill => skill.includes(filter.toLowerCase()))
            );
            if (!hasAnySkill) return false;
        }
        
        return true;
    });
    
    // Sort
    if (sortBy === 'completeness') {
        filteredStudents.sort((a, b) => b.completeness - a.completeness);
    } else if (sortBy === 'gpa') {
        filteredStudents.sort((a, b) => {
            const aG = parseFloat(a.gpa) || 0;
            const bG = parseFloat(b.gpa) || 0;
            return bG - aG;
        });
    } else if (sortBy === 'name') {
        filteredStudents.sort((a, b) => (a.full_name || '').localeCompare(b.full_name || ''));
    } else {
        // newest
        filteredStudents.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    }
    
    updateStats();
    renderStudents();
};

function updateStats() {
    document.getElementById('statTotal').textContent = allStudents.length;
    document.getElementById('statShowing').textContent = filteredStudents.length;
}

async function loadStudentAISection(containerId, studentUserId, currentAppId) {
    const el = document.getElementById(containerId);
    if (!el) return;
    try {
        const sb = await window.getSafeSupabase();
        if (!sb) { el.remove(); return; }

        // جيب كل تدريبات الطالب + سجل الحضور
        const [appsRes, attRes] = await Promise.all([
            sb.from('applications')
              .select('id,company_name,company_logo,company_user_id,internship_title,status,training_schedule,training_start_date,training_end_date,created_at')
              .eq('student_user_id', studentUserId)
              .in('status', ['hired', 'in_training', 'completed'])
              .order('created_at', {ascending: false}),
            sb.from('attendance_logs')
              .select('id,application_id,company_user_id,scanned_at,status,attendance_type')
              .eq('student_user_id', studentUserId)
              .eq('attendance_type', 'daily_attendance')
        ]);

        const apps = appsRes.data || [];
        const attLogs = attRes.data || [];

        if (apps.length === 0) { el.innerHTML = ''; return; }

        function fmtDateLocal(d) {
            if (!d) return '-';
            try { return new Date(d).toLocaleDateString('ar-EG', {day:'2-digit',month:'2-digit',year:'numeric'}); }
            catch(e) { return String(d).slice(0,10); }
        }
        function initLocal(name) { return (name||'?').trim().charAt(0).toUpperCase(); }

        function calcAttLocal(app) {
            const sched = app.training_schedule || {};
            const startDate = sched.start_date || app.training_start_date || null;
            const endDate   = sched.end_date   || app.training_end_date   || null;
            const appLogs = attLogs.filter(function(a) {
                if (a.application_id) return a.application_id === app.id;
                return a.company_user_id === app.company_user_id;
            }).filter(function(a) {
                if (!startDate || !a.scanned_at) return true;
                const d = new Date(a.scanned_at.slice(0,10));
                const start = new Date(startDate);
                const end = endDate ? new Date(endDate) : null;
                return d >= start && (end === null || d <= end);
            });
            const presentSet = new Set(appLogs.filter(function(a){return a.status!=='absent';}).map(function(a){return a.scanned_at?a.scanned_at.slice(0,10):null;}).filter(Boolean));
            const absentSet  = new Set(appLogs.filter(function(a){return a.status==='absent';}).map(function(a){return a.scanned_at?a.scanned_at.slice(0,10):null;}).filter(Boolean));
            const lateCount  = appLogs.filter(function(a){return a.status==='late';}).length;
            const presentDays = presentSet.size, absentDays = absentSet.size;
            const rate = (presentDays+absentDays)>0 ? Math.min(100,Math.round(presentDays/(presentDays+absentDays)*100)) : 0;
            return { rate, presentDays, absentDays, lateCount };
        }

        const cardsHtml = apps.map(function(app) {
            const sched = app.training_schedule || {};
            const startDate = sched.start_date || app.training_start_date || null;
            const endDate   = sched.end_date   || app.training_end_date   || null;

            let durationText = '-';
            if (startDate && endDate) {
                const days = Math.ceil((new Date(endDate)-new Date(startDate))/86400000)+1;
                durationText = days>=30 ? Math.round(days/30)+' شهر' : days+' يوم';
            }

            const att = calcAttLocal(app);
            const rateColor = att.rate>=75?'#10b981':att.rate>=50?'#f59e0b':'#ef4444';
            const isActive  = app.status==='in_training'||app.status==='hired';

            const statusBadge = isActive
                ? '<span style="display:inline-flex;align-items:center;gap:5px;background:rgba(16,185,129,0.12);color:#10b981;padding:4px 12px;border-radius:20px;font-size:0.72rem;font-weight:700"><span style="width:6px;height:6px;border-radius:50%;background:#10b981"></span>جاري التدريب</span>'
                : '<span style="background:rgba(79,172,254,0.12);color:#4facfe;padding:4px 12px;border-radius:20px;font-size:0.72rem;font-weight:700">✓ مكتمل</span>';

            const logo = app.company_logo
                ? '<img src="' + esc(app.company_logo) + '" alt="" style="width:100%;height:100%;object-fit:cover">'
                : '<span style="font-size:1.3rem;font-weight:800">' + initLocal(app.company_name) + '</span>';

            const circ   = +(2*Math.PI*22).toFixed(1);
            const offset = +(circ*(1-att.rate/100)).toFixed(1);

            const attRing = '<div style="position:relative;width:62px;height:62px;flex-shrink:0">' +
                '<svg viewBox="0 0 52 52" style="width:62px;height:62px;transform:rotate(-90deg)">' +
                '<circle cx="26" cy="26" r="22" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="4.5"/>' +
                '<circle cx="26" cy="26" r="22" fill="none" stroke="' + rateColor + '" stroke-width="4.5" stroke-dasharray="' + circ + '" stroke-dashoffset="' + offset + '" stroke-linecap="round"/>' +
                '</svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:0.74rem;font-weight:900;color:' + rateColor + '">' + att.rate + '%</div></div>';

            const attDetails = [
                '<span style="color:#10b981"><i class="fas fa-check"></i> ' + att.presentDays + ' حضر</span>',
                att.absentDays>0 ? '<span style="color:#ef4444"><i class="fas fa-times"></i> ' + att.absentDays + ' غياب</span>' : '',
                att.lateCount>0  ? '<span style="color:#f59e0b"><i class="fas fa-clock"></i> ' + att.lateCount + ' تأخر</span>'  : ''
            ].filter(Boolean).join('<span style="opacity:0.3"> • </span>');

            const isCurrent = app.id === currentAppId;
            const borderColor = isActive ? 'rgba(16,185,129,0.25)' : isCurrent ? 'rgba(79,172,254,0.3)' : 'var(--border)';
            const topBar      = isActive ? 'linear-gradient(90deg,#10b981,#059669)' : isCurrent ? 'var(--gradient)' : 'rgba(255,255,255,0.06)';

            return '<div style="background:rgba(255,255,255,0.02);border:1px solid ' + borderColor + ';border-radius:18px;overflow:hidden;margin-bottom:14px">' +
                '<div style="height:4px;background:' + topBar + '"></div>' +
                '<div style="padding:16px">' +
                '<div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">' +
                '<div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,rgba(79,172,254,0.15),rgba(0,242,254,0.08));border:1px solid rgba(79,172,254,0.2);display:flex;align-items:center;justify-content:center;color:var(--primary);overflow:hidden;flex-shrink:0">' + logo + '</div>' +
                '<div style="flex:1;min-width:0">' +
                '<div style="font-weight:800;font-size:0.98rem;margin-bottom:2px">' + esc(app.company_name||'-') + '</div>' +
                '<div style="color:var(--text-muted);font-size:0.8rem;margin-bottom:6px">' + esc(app.internship_title||'') + '</div>' +
                statusBadge + '</div></div>' +
                '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">' +
                '<div style="background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:9px;text-align:center"><div style="font-size:0.62rem;color:var(--text-muted);margin-bottom:3px">📅 بدأ</div><div style="font-weight:700;font-size:0.78rem">' + fmtDateLocal(startDate) + '</div></div>' +
                '<div style="background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:9px;text-align:center"><div style="font-size:0.62rem;color:var(--text-muted);margin-bottom:3px">🏁 انتهى</div><div style="font-weight:700;font-size:0.78rem">' + (endDate ? fmtDateLocal(endDate) : (isActive ? '<span style="color:#10b981;font-size:0.7rem">جاري</span>' : '-')) + '</div></div>' +

            '<button id="'+uid+'t1" onclick="ftrTabSAI(\''+uid+'\',1)" style="flex:1;padding:10px 8px;border:none;border-radius:8px;font-weight:700;font-family:inherit;cursor:pointer;font-size:0.85rem;white-space:nowrap;background:linear-gradient(135deg,#4facfe,#00f2fe);color:#fff"><i class="fas fa-tasks"></i> المهام ('+appTasks.length+')</button>' +
            '<button id="'+uid+'t2" onclick="ftrTabSAI(\''+uid+'\',2)" style="flex:1;padding:10px 8px;border:none;border-radius:8px;font-weight:700;font-family:inherit;cursor:pointer;font-size:0.85rem;white-space:nowrap;background:none;color:#94a3b8"><i class="fas fa-brain"></i> التقييم الذكي</button>' +
            '<button id="'+uid+'t3" onclick="ftrTabSAI(\''+uid+'\',3)" style="flex:1;padding:10px 8px;border:none;border-radius:8px;font-weight:700;font-family:inherit;cursor:pointer;font-size:0.85rem;white-space:nowrap;background:none;color:#94a3b8"><i class="fas fa-briefcase"></i> التوصيات المهنية</button>' +
            '</div>' +
            '<div id="'+uid+'p1">'+tasksHtml+'</div>' +
            '<div id="'+uid+'p2" style="display:none">'+evalHtml+'</div>' +
            '<div id="'+uid+'p3" style="display:none">'+careerHtml+'</div>';

    } catch(e) {
        console.error('openSAIReport:', e);
        const inner2 = document.getElementById('saiInner');
        if (inner2) inner2.innerHTML = '<div style="text-align:center;padding:40px;color:#ef4444"><i class="fas fa-exclamation-circle" style="font-size:2rem;display:block;margin-bottom:10px"></i><p>حدث خطأ أثناء التحميل</p></div>';
    }
};

window.viewStudent = async (userId) => {
    const s = allStudents.find(x => x.user_id === userId);
    if (!s) return;
    
    const initial = (s.full_name || '?').charAt(0).toUpperCase();
    const photo = s.photo && !s.photo.startsWith('preset:') ? s.photo : null;
    const avatar = photo 
        ? '<img src="' + esc(photo) + '" alt="" style="width:100px;height:100px;border-radius:50%;object-fit:cover">'
        : '<div style="width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#ef4444,#dc2626);display:flex;align-items:center;justify-content:center;color:#fff;font-size:2.5rem;font-weight:800">' + initial + '</div>';
    
    const skills = Array.isArray(s.skills) ? s.skills : [];
    const interests = Array.isArray(s.interested_fields) ? s.interested_fields : [];
    const languages = Array.isArray(s.languages) ? s.languages : [];
    
    const ageDisplay = (() => {
        if (!s.birth_date) return '';
        const age = new Date().getFullYear() - new Date(s.birth_date).getFullYear();
        return age > 0 && age < 100 ? age + ' سنة' : '';
    })();
    
    const eduLevels = {high_school:'ثانوي', diploma:'دبلوم', university:'جامعي', graduate:'خريج', postgraduate:'دراسات عليا', bachelor:'بكالوريوس', master:'ماجستير', phd:'دكتوراه'};
    
    const html = '<div id="profileModal" style="position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:2000;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto" onclick="if(event.target===this)closeProfileModal()">' +
        '<div style="background:var(--bg);border:1px solid var(--border);border-radius:20px;width:100%;max-width:700px;padding:24px;margin:auto">' +
            '<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:18px;gap:14px">' +
                '<div></div>' +
                '<button onclick="closeProfileModal()" style="background:var(--bg-card);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:50%;cursor:pointer">×</button>' +
            '</div>' +
            
            '<!-- Header -->' +
            '<div style="display:flex;align-items:center;gap:18px;margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border);flex-wrap:wrap">' +
                avatar +
                '<div style="flex:1;min-width:200px">' +
                    '<div style="font-size:1.3rem;font-weight:800;margin-bottom:4px">' + esc(s.full_name || '-') + '</div>' +
                    '<div style="color:var(--text-muted);font-size:0.9rem;margin-bottom:8px">' +
                        (s.education_level ? esc(eduLevels[s.education_level] || s.education_level) : '') +
                        (s.university ? ' • ' + esc(s.university) : '') +
                    '</div>' +
                    '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
                        (s.training_status === 'looking' ? '<span style="background:rgba(245,158,11,0.15);color:#f59e0b;padding:4px 10px;border-radius:14px;font-size:0.78rem;font-weight:700">🔍 يبحث عن تدريب</span>' : '') +
                        (s.training_status === 'in_training' ? '<span style="background:rgba(16,185,129,0.15);color:#10b981;padding:4px 10px;border-radius:14px;font-size:0.78rem;font-weight:700">🎓 يتدرب حالياً</span>' : '') +
                        (s.training_status === 'completed' ? '<span style="background:rgba(79,172,254,0.15);color:#4facfe;padding:4px 10px;border-radius:14px;font-size:0.78rem;font-weight:700">✓ أكمل تدريب سابق</span>' : '') +
                        ('<span style="background:rgba(255,255,255,0.06);color:' + ({beginner:'#4facfe',intermediate:'#f59e0b',advanced:'#10b981'}[s.level||'beginner']) + ';padding:4px 10px;border-radius:14px;font-size:0.78rem;font-weight:700"><i class="fas fa-layer-group"></i> ' + ({beginner:'المستوى الأول',intermediate:'المستوى الثاني',advanced:'المستوى الثالث'}[s.level||'beginner']) + '</span>') +
                    '</div>' +
                '</div>' +
            '</div>' +
            
            '<!-- Privacy Notice -->' +
            '<div style="background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.2);padding:10px;border-radius:8px;margin-bottom:14px;font-size:0.84rem;color:#f59e0b"><i class="fas fa-shield-alt"></i> <strong>للخصوصية:</strong> بيانات التواصل (هاتف، إيميل) مخفية. للتواصل مع الطالب، اعرض فرصة تدريب وانتظره يقدّم.</div>' +
            
            (s.bio ? '<h4 style="font-size:0.95rem;margin-bottom:8px;color:var(--primary)"><i class="fas fa-pen-fancy"></i> نبذة عني</h4><p style="background:var(--bg-card);padding:12px;border-radius:8px;color:var(--text-muted);line-height:1.7;font-size:0.92rem;margin-bottom:14px">' + esc(s.bio) + '</p>' : '') +
            
            '<h4 style="font-size:0.95rem;margin-bottom:10px;color:var(--primary)"><i class="fas fa-id-card"></i> البيانات الشخصية</h4>' +
            '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:18px">' +
                (ageDisplay ? '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px"><div style="color:var(--text-muted);font-size:0.78rem">العمر</div><div style="font-weight:700;font-size:0.92rem">' + ageDisplay + '</div></div>' : '') +
                (s.gender ? '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px"><div style="color:var(--text-muted);font-size:0.78rem">النوع</div><div style="font-weight:700;font-size:0.92rem">' + (s.gender === 'male' ? 'ذكر' : s.gender === 'female' ? 'أنثى' : '-') + '</div></div>' : '') +
                (s.city ? '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px"><div style="color:var(--text-muted);font-size:0.78rem">المدينة</div><div style="font-weight:700;font-size:0.92rem">' + esc(s.city) + '</div></div>' : '') +
                (s.country ? '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px"><div style="color:var(--text-muted);font-size:0.78rem">الدولة</div><div style="font-weight:700;font-size:0.92rem">' + esc(s.country) + '</div></div>' : '') +
            '</div>' +
            
            '<h4 style="font-size:0.95rem;margin-bottom:10px;color:var(--primary)"><i class="fas fa-graduation-cap"></i> التعليم</h4>' +
            '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:18px">' +
                (s.university ? '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px"><div style="color:var(--text-muted);font-size:0.78rem">الجامعة</div><div style="font-weight:700;font-size:0.92rem">' + esc(s.university) + '</div></div>' : '') +
                (s.faculty ? '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px"><div style="color:var(--text-muted);font-size:0.78rem">الكلية</div><div style="font-weight:700;font-size:0.92rem">' + esc(s.faculty) + '</div></div>' : '') +
                ((s.year_of_study || s.study_year) ? '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px"><div style="color:var(--text-muted);font-size:0.78rem">سنة الدراسة</div><div style="font-weight:700;font-size:0.92rem">' + esc(s.year_of_study || s.study_year) + '</div></div>' : '') +
                (s.gpa ? '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px"><div style="color:var(--text-muted);font-size:0.78rem">المعدل</div><div style="font-weight:700;font-size:0.92rem;color:#f59e0b">⭐ ' + esc(s.gpa) + '</div></div>' : '') +
                (s.graduation_year ? '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px"><div style="color:var(--text-muted);font-size:0.78rem">سنة التخرج</div><div style="font-weight:700;font-size:0.92rem">' + esc(s.graduation_year) + '</div></div>' : '') +
            '</div>' +
            
            (interests.length > 0 ? '<h4 style="font-size:0.95rem;margin-bottom:10px;color:var(--primary)"><i class="fas fa-heart"></i> المجالات المهتم بها</h4><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px">' + interests.map(i => '<span style="background:rgba(239,68,68,0.15);color:#ef4444;padding:5px 12px;border-radius:14px;font-size:0.82rem;font-weight:600">' + esc(typeof i === 'string' ? i : i.name || '') + '</span>').join('') + '</div>' : '') +
            
            (skills.length > 0 ? '<h4 style="font-size:0.95rem;margin-bottom:10px;color:var(--primary)"><i class="fas fa-tools"></i> المهارات</h4><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px">' + skills.map(sk => '<span style="background:rgba(79,172,254,0.15);color:#4facfe;padding:5px 12px;border-radius:14px;font-size:0.82rem;font-weight:600">' + esc(typeof sk === 'string' ? sk : sk.name || '') + '</span>').join('') + '</div>' : '') +
            
            (languages.length > 0 ? '<h4 style="font-size:0.95rem;margin-bottom:10px;color:var(--primary)"><i class="fas fa-language"></i> اللغات</h4><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px">' + languages.map(l => '<span style="background:rgba(16,185,129,0.15);color:#10b981;padding:5px 12px;border-radius:14px;font-size:0.82rem;font-weight:600">' + esc(typeof l === 'string' ? l : (l.name || '') + (l.level ? ' (' + l.level + ')' : '')) + '</span>').join('') + '</div>' : '') +
            
            ((s.linkedin || s.github || s.portfolio || s.cv_url) ? '<h4 style="font-size:0.95rem;margin-bottom:10px;color:var(--primary)"><i class="fas fa-link"></i> الروابط</h4><div style="display:flex;flex-direction:column;gap:6px;margin-bottom:18px">' +
                (s.linkedin ? '<a href="' + esc(s.linkedin) + '" target="_blank" style="color:var(--primary);text-decoration:none;background:var(--bg-card);padding:8px 12px;border-radius:8px"><i class="fab fa-linkedin"></i> LinkedIn</a>' : '') +
                (s.github ? '<a href="' + esc(s.github) + '" target="_blank" style="color:var(--primary);text-decoration:none;background:var(--bg-card);padding:8px 12px;border-radius:8px"><i class="fab fa-github"></i> GitHub</a>' : '') +
                (s.portfolio ? '<a href="' + esc(s.portfolio) + '" target="_blank" style="color:var(--primary);text-decoration:none;background:var(--bg-card);padding:8px 12px;border-radius:8px"><i class="fas fa-globe"></i> Portfolio</a>' : '') +
                (s.cv_url ? '<a href="' + esc(s.cv_url) + '" target="_blank" style="color:var(--primary);text-decoration:none;background:var(--bg-card);padding:8px 12px;border-radius:8px"><i class="fas fa-file-pdf"></i> السيرة الذاتية (CV)</a>' : '') +
            '</div>' : '') +
            
            '<div id="tsAISection" style="margin-bottom:14px"><div style="text-align:center;padding:18px;color:var(--text-muted);font-size:0.84rem"><i class="fas fa-spinner fa-spin" style="color:#a855f7"></i> جاري تحميل سجل التدريب...</div></div>' +
            '<div style="display:flex;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">' +
                '<button onclick="closeProfileModal()" style="flex:1;background:var(--bg-card);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:10px;font-weight:700;font-family:inherit;cursor:pointer">إغلاق</button>' +
                '<a href="company-requests-control.html" style="flex:1;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;text-decoration:none;padding:12px;border-radius:10px;font-weight:700;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px"><i class="fas fa-bullhorn"></i> اعرض فرصة جديدة</a>' +
            '</div>' +
        '</div>' +
    '</div>';

    document.body.insertAdjacentHTML('beforeend', html);
    document.body.style.overflow = 'hidden';
    loadStudentAISection('tsAISection', userId, null);
};

window.closeProfileModal = () => {
    const m = document.getElementById('profileModal');
    if (m) m.remove();
    document.body.style.overflow = '';
};

// Init
(async () => {
    await loadAll();
    renderSkillTags();
})();

</script>
