<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <link rel="preconnect" href="https://jrwazyrdzmbcnddpxxrf.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://jrwazyrdzmbcnddpxxrf.supabase.co">

    <title>إعادة تعيين كلمة مرور الطالب - ProVance</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --gradient: linear-gradient(135deg, #4facfe, #00f2fe);
            --bg: #0a0e27;
            --card: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.1);
            --text: #ffffff;
            --text-muted: #94a3b8;
            --error: #ef4444;
            --success: #10b981;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .bg-anim {
            position: fixed; inset: 0; z-index: -1;
            background:
                radial-gradient(circle at 20% 20%, rgba(79,172,254,0.15), transparent 45%),
                radial-gradient(circle at 80% 80%, rgba(0,242,254,0.12), transparent 45%),
                var(--bg);
        }
        .card {
            width: 100%;
            max-width: 460px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 36px;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            animation: cardIn .6s ease-out;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header { text-align: center; margin-bottom: 28px; }
        .icon {
            width: 80px; height: 80px;
            margin: 0 auto 16px;
            background: var(--gradient);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; color: #fff;
            box-shadow: 0 15px 40px rgba(79,172,254,0.4);
        }
        h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; }
        .field { margin-bottom: 16px; }
        .field label {
            display: flex; align-items: center; gap: 6px;
            color: var(--text-muted);
            font-size: 0.88rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .field input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.04);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            transition: all .2s;
            direction: ltr;
            text-align: right;
        }
        .field input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255,255,255,0.08);
        }
        .input-wrap { position: relative; }
        .toggle-pass {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
        }
        .err-msg {
            display: block;
            color: var(--error);
            font-size: 0.82rem;
            margin-top: 6px;
            min-height: 18px;
        }
        .strength-bar {
            margin-top: 8px;
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
        }
        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all .3s;
            border-radius: 2px;
        }
        .strength-fill.weak { background: var(--error); width: 33%; }
        .strength-fill.medium { background: #f59e0b; width: 66%; }
        .strength-fill.strong { background: var(--success); width: 100%; }
        .strength-text {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--gradient);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1.05rem;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all .2s;
            margin-top: 8px;
        }
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(79,172,254,0.4);
        }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .submit-btn .spinner { display: none; }
        .submit-btn.loading .txt { display: none; }
        .submit-btn.loading .spinner { display: inline-block; }
        .info-box {
            background: rgba(79,172,254,0.08);
            border: 1px solid rgba(79,172,254,0.2);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 18px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .info-box i { color: var(--primary); }
        .success-state { display: none; text-align: center; padding: 20px 0; }
        .success-state.active { display: block; }
        .success-icon {
            width: 90px;
            height: 90px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.6rem;
            color: #fff;
            animation: pop .5s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(0); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        @media (max-width: 480px) {
            .card { padding: 30px 22px; }
            h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="bg-anim"></div>
    <div style="position: absolute; top: 20px; right: 20px; left: 20px; display: flex; justify-content: center; z-index: 10;">
        <a href="index.html" style="display: inline-flex; align-items: center; text-decoration: none;">
            <img src="assets/logo.png" alt="ProVance" style="height: 40px;" onerror="this.style.display='none'">
        </a>
    </div>


    <div class="card">
        <div id="formState">
            <div class="header">
                <div class="icon">
                    <i class="fas fa-lock-open"></i>
                </div>
                <h1>إعادة تعيين كلمة المرور</h1>
                <p class="subtitle">اختر كلمة مرور جديدة قوية</p>
            </div>

            <div class="info-box">
                <i class="fas fa-shield-alt"></i>
                كلمة مرور قوية: 8 أحرف على الأقل، مع أحرف وأرقام
            </div>

            <form id="resetForm" novalidate>
                <div class="field">
                    <label>
                        <i class="fas fa-lock"></i>
                        كلمة المرور الجديدة
                    </label>
                    <div class="input-wrap">
                        <input type="password" id="password" placeholder="6 أحرف على الأقل" required>
                        <button type="button" class="toggle-pass" data-target="password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                    <div class="strength-text" id="strengthText"></div>
                    <span class="err-msg" id="passwordErr"></span>
                </div>

                <div class="field">
                    <label>
                        <i class="fas fa-check-double"></i>
                        تأكيد كلمة المرور
                    </label>
                    <div class="input-wrap">
                        <input type="password" id="confirmPassword" placeholder="نفس كلمة المرور" required>
                        <button type="button" class="toggle-pass" data-target="confirmPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="err-msg" id="confirmPasswordErr"></span>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="txt">حفظ كلمة المرور الجديدة</span>
                    <i class="fas fa-check"></i>
                    <i class="fas fa-spinner fa-spin spinner"></i>
                </button>
            </form>
        </div>

        <div class="success-state" id="successState">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
            <h1>تم بنجاح!</h1>
            <p class="subtitle" style="margin: 14px 0 24px;">
                تم تغيير كلمة المرور بنجاح.<br>
                يمكنك الآن تسجيل الدخول بكلمة المرور الجديدة.
            </p>
            <a href="student-login.html" class="submit-btn" style="text-decoration:none; max-width: 280px; margin: 0 auto;">
                <i class="fas fa-sign-in-alt"></i>
                <span>تسجيل الدخول</span>
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
    (function() {
        'use strict';

        const passInp = document.getElementById('password');
        const confirmInp = document.getElementById('confirmPassword');
        const submitBtn = document.getElementById('submitBtn');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');

        function showErr(id, msg) {
            document.getElementById(id + 'Err').textContent = msg;
            document.getElementById(id).style.borderColor = 'var(--error)';
        }
        function clearErr(id) {
            document.getElementById(id + 'Err').textContent = '';
            document.getElementById(id).style.borderColor = '';
        }

        function checkStrength(pass) {
            let score = 0;
            if (pass.length >= 6) score++;
            if (pass.length >= 10) score++;
            if (/[A-Z]/.test(pass) && /[a-z]/.test(pass)) score++;
            if (/[0-9]/.test(pass)) score++;
            if (/[^A-Za-z0-9]/.test(pass)) score++;

            strengthFill.classList.remove('weak','medium','strong');
            if (score <= 2) {
                strengthFill.classList.add('weak');
                strengthText.textContent = 'ضعيفة';
                strengthText.style.color = 'var(--error)';
            } else if (score <= 3) {
                strengthFill.classList.add('medium');
                strengthText.textContent = 'متوسطة';
                strengthText.style.color = '#f59e0b';
            } else {
                strengthFill.classList.add('strong');
                strengthText.textContent = 'قوية ممتازة';
                strengthText.style.color = 'var(--success)';
            }
        }

        passInp.addEventListener('input', () => {
            clearErr('password');
            checkStrength(passInp.value);
        });
        confirmInp.addEventListener('input', () => clearErr('confirmPassword'));

        document.querySelectorAll('.toggle-pass').forEach(btn => {
            btn.addEventListener('click', () => {
                const target = document.getElementById(btn.dataset.target);
                const isPass = target.type === 'password';
                target.type = isPass ? 'text' : 'password';
                btn.innerHTML = `<i class="fas fa-${isPass ? 'eye-slash' : 'eye'}"></i>`;
            });
        });

        // ── Supabase client (self-contained fallback) ──────────────────────────
        const SB_URL = 'https://jrwazyrdzmbcnddpxxrf.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyd2F6eXJkem1iY25kZHB4eHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzUyMzksImV4cCI6MjA5MjExMTIzOX0.KaZt3Xb-9zjjwlSYnCvQQVxzDgbcOxdmnpg9wsUsqQI';
        const sb = (window.ProVance && window.ProVance.sb) ||
            window.supabase.createClient(SB_URL, SB_KEY, { auth: { persistSession: true, autoRefreshToken: true, storage: window.localStorage } });

        function showToast(msg, type) {
            const c = { error:'#ef4444', success:'#10b981', warning:'#f59e0b' };
            const t = document.createElement('div');
            t.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:' + (c[type]||'#4facfe') + ';color:#fff;padding:14px 24px;border-radius:12px;font-family:Cairo,sans-serif;font-weight:700;z-index:9999;';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }

        // ── انتظار جلسة الاسترداد من Supabase ─────────────────────────────────
        let recoveryReady = false;
        sb.auth.onAuthStateChange((event, session) => {
            if (event === 'PASSWORD_RECOVERY') {
                recoveryReady = true;
            }
        });

        // تحقق من وجود session فعلية عند تحميل الصفحة
        sb.auth.getSession().then(({ data: { session } }) => {
            if (session) recoveryReady = true;
        });

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = passInp.value;
            const confirmPassword = confirmInp.value;

            clearErr('password'); clearErr('confirmPassword');

            let ok = true;
            if (password.length < 6) { showErr('password','كلمة المرور 6 أحرف على الأقل'); ok=false; }
            if (password !== confirmPassword) { showErr('confirmPassword','كلمتا المرور غير متطابقتين'); ok=false; }
            if (!ok) return;

            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            try {
                // تحقق من وجود جلسة قبل التحديث
                if (!recoveryReady) {
                    const { data: { session } } = await sb.auth.getSession();
                    if (!session) {
                        showToast('رابط إعادة التعيين غير صالح أو منتهي. اطلب رابطاً جديداً', 'error');
                        submitBtn.classList.remove('loading');
                        submitBtn.disabled = false;
                        return;
                    }
                }

                const { error } = await sb.auth.updateUser({ password });

                if (error) {
                    console.error(error);
                    let msg = 'حدث خطأ، حاول مرة أخرى';
                    if (error.message && error.message.includes('expired')) msg = 'انتهت صلاحية الرابط. يرجى طلب رابط جديد';
                    if (error.message && error.message.includes('session')) msg = 'الرابط غير صالح أو منتهي. اطلب رابطاً جديداً';
                    showToast(msg, 'error');
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                    return;
                }

                document.getElementById('formState').style.display = 'none';
                document.getElementById('successState').classList.add('active');

                await sb.auth.signOut();

            } catch (err) {
                console.error(err);
                showToast('خطأ في الاتصال، حاول مرة أخرى', 'error');
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });
    })();
    </script>
</body>
</html>
