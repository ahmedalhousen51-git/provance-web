<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>لوحة التحكم - ProVance Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
:root { --primary: #ef4444; --secondary: #dc2626; --gradient: linear-gradient(135deg, #ef4444, #dc2626); --bg: #0a0e27; --bg-2: #1a1535; --card: rgba(255,255,255,0.04); --card-hover: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.08); --text: #fff; --text-muted: #94a3b8; --text-dim: rgba(148,163,184,0.6); --error: #ef4444; --success: #10b981; --warning: #f59e0b; --info: #4facfe; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
.bg-anim { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 20% 20%, rgba(239,68,68,0.08), transparent 45%), radial-gradient(circle at 80% 80%, rgba(220,38,38,0.06), transparent 45%), var(--bg); }
.layout { display: flex; min-height: 100vh; }
.sidebar { width: 260px; background: rgba(20,18,40,0.7); backdrop-filter: blur(20px); border-left: 1px solid var(--border); padding: 24px 16px; position: fixed; inset: 0 0 0 auto; z-index: 100; transition: transform .3s; display: flex; flex-direction: column; }
.sidebar-logo { display: flex; align-items: center; justify-content: center; padding: 0 8px 20px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
.sidebar-logo img { height: 32px; max-width: 100%; }
.sidebar-logo .text-logo { font-size: 1.5rem; font-weight: 900; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.admin-badge { background: var(--gradient); color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 0.78rem; font-weight: 800; text-align: center; margin-bottom: 14px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; color: var(--text-muted); text-decoration: none; border-radius: 10px; font-size: 0.92rem; font-weight: 600; margin-bottom: 4px; transition: all .2s; }
.nav-item:hover { background: var(--card); color: var(--text); }
.nav-item.active { background: var(--gradient); color: #fff; }
.nav-item i { width: 18px; }
.nav-badge { margin-right: auto; background: rgba(255,255,255,0.2); color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 800; }
.main { flex: 1; margin-right: 260px; padding: 24px; min-width: 0; }
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; gap: 14px; flex-wrap: wrap; }
.menu-toggle { display: none; background: var(--card); border: 1px solid var(--border); color: var(--text); width: 42px; height: 42px; border-radius: 10px; cursor: pointer; }
.topbar-title { font-size: 1.5rem; font-weight: 800; }
.topbar-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.date-display { color: var(--text-muted); font-size: 0.86rem; font-weight: 600; }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 22px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; display: flex; align-items: center; gap: 14px; transition: all .25s; cursor: pointer; }
.stat-card:hover { border-color: var(--primary); transform: translateY(-3px); }
.stat-card-icon { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; color: #fff; flex-shrink: 0; }
.stat-card-icon.red { background: var(--gradient); }
.stat-card-icon.success { background: linear-gradient(135deg, #10b981, #059669); }
.stat-card-icon.warning { background: linear-gradient(135deg, #f59e0b, #f97316); }
.stat-card-icon.info { background: linear-gradient(135deg, #4facfe, #00f2fe); }
.stat-card-num { font-size: 2rem; font-weight: 800; line-height: 1; }
.stat-card-label { font-size: 0.85rem; color: var(--text-muted); margin-top: 5px; }
.section-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.section-title i { color: var(--primary); }
.activity-grid { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; }
.activity-item { display: flex; align-items: center; gap: 14px; padding: 14px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; transition: all .2s; }
.activity-item:hover { background: var(--card-hover); transform: translateX(-4px); }
.activity-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1rem; color: #fff; flex-shrink: 0; }
.activity-icon.new { background: linear-gradient(135deg, #4facfe, #00f2fe); }
.activity-icon.approved { background: linear-gradient(135deg, #10b981, #059669); }
.activity-icon.rejected { background: linear-gradient(135deg, #ef4444, #dc2626); }
.activity-icon.pending { background: linear-gradient(135deg, #f59e0b, #f97316); }
.activity-body { flex: 1; min-width: 0; }
.activity-title { font-weight: 800; font-size: 0.95rem; margin-bottom: 3px; }
.activity-meta { color: var(--text-muted); font-size: 0.84rem; }
.activity-time { color: var(--text-dim); font-size: 0.8rem; white-space: nowrap; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state i { font-size: 4rem; color: rgba(148,163,184,0.3); margin-bottom: 16px; display: block; }
.empty-state h3 { color: var(--text); margin-bottom: 6px; font-size: 1.1rem; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px; border: none; border-radius: 10px; font-weight: 700; font-family: inherit; font-size: 0.88rem; cursor: pointer; transition: all .2s; text-decoration: none; white-space: nowrap; }
.btn-primary { background: var(--gradient); color: #fff; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(239,68,68,0.4); }
.btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
.btn-secondary:hover { background: var(--card-hover); }
.btn-sm { padding: 7px 12px; font-size: 0.8rem; }
.loading-overlay { position: fixed; inset: 0; background: rgba(10,14,39,0.95); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity .3s; }
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-spinner { width: 60px; height: 60px; border: 4px solid var(--card); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 14px 24px; border-radius: 12px; color: #fff; font-weight: 700; z-index: 9999; }
@media (max-width: 1024px) {
    .sidebar { transform: translateX(100%); width: 280px; }
    .sidebar.open { transform: translateX(0); }
    .main { margin-right: 0; }
    .menu-toggle { display: flex; align-items: center; justify-content: center; }
}
@media (max-width: 600px) {
    .topbar-title { font-size: 1.2rem; }
    .stats-row { grid-template-columns: 1fr 1fr; }
}
    </style>
</head>
<body>
    <div class="bg-anim"></div>
    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo"><div class="text-logo">ProVance</div></div>
            <div class="admin-badge"><i class="fas fa-shield-alt"></i> ADMIN PANEL</div>
            <a href="admin-dashboard.html" class="nav-item active"><i class="fas fa-th-large"></i> الرئيسية</a>
            <a href="admin-campany.html" class="nav-item"><i class="fas fa-building"></i> الشركات <span class="nav-badge" id="pendingBadge" style="display:none">0</span></a>
            <a href="admin-trainees.html" class="nav-item"><i class="fas fa-users"></i> المتدربين</a>
            <a href="admin-users.html" class="nav-item"><i class="fas fa-user-shield"></i> الأدمن</a>
            <a href="admin-notification.html" class="nav-item"><i class="fas fa-bell"></i> الإشعارات</a>
            <a href="#" onclick="logoutAdmin(event)" class="nav-item" style="margin-top:auto; color:var(--error)">
                <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
            </a>
        </aside>

        <main class="main">
            <div class="topbar">
                <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="topbar-title"><i class="fas fa-th-large" style="color:var(--primary)"></i> لوحة التحكم الرئيسية</h1>
                <div class="topbar-actions">
                    <span class="date-display" id="currentDate"></span>
                    <button class="btn btn-secondary btn-sm" onclick="refreshData()">
                        <i class="fas fa-sync-alt"></i> تحديث
                    </button>
                </div>
            </div>

            <div class="stats-row">
                <div class="stat-card" onclick="window.location.href='admin-campany.html'">
                    <div class="stat-card-icon red"><i class="fas fa-building"></i></div>
                    <div>
                        <div class="stat-card-num" id="totalCompanies">0</div>
                        <div class="stat-card-label">الشركات المسجلة</div>
                    </div>
                </div>
                <div class="stat-card" onclick="window.location.href='admin-trainees.html'">
                    <div class="stat-card-icon info"><i class="fas fa-user-graduate"></i></div>
                    <div>
                        <div class="stat-card-num" id="totalStudents">0</div>
                        <div class="stat-card-label">الطلاب المسجلين</div>
                    </div>
                </div>
                <div class="stat-card" onclick="window.location.href='admin-campany.html'">
                    <div class="stat-card-icon success"><i class="fas fa-check-circle"></i></div>
                    <div>
                        <div class="stat-card-num" id="approvedCompanies">0</div>
                        <div class="stat-card-label">الشركات المعتمدة</div>
                    </div>
                </div>
                <div class="stat-card" onclick="window.location.href='admin-campany.html'">
                    <div class="stat-card-icon warning"><i class="fas fa-clock"></i></div>
                    <div>
                        <div class="stat-card-num" id="pendingCompaniesCount">0</div>
                        <div class="stat-card-label">طلبات قيد المراجعة</div>
                    </div>
                </div>
            </div>

            <div class="section-title">
                <i class="fas fa-history"></i>
                آخر النشاطات
            </div>

            <div class="activity-grid" id="activityGrid">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>جاري التحميل...</p>
                </div>
            </div>
        </main>
    </div>

    <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
const SUPABASE_URL = 'https://jrwazyrdzmbcnddpxxrf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyd2F6eXJkem1iY25kZHB4eHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzUyMzksImV4cCI6MjA5MjExMTIzOX0.KaZt3Xb-9zjjwlSYnCvQQVxzDgbcOxdmnpg9wsUsqQI';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, storage: window.localStorage }
});

function escapeHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function showToast(msg, type = 'info') {
    const t = document.createElement('div');
    const colors = { error:'#ef4444', success:'#10b981', warning:'#f59e0b', info:'#4facfe' };
    t.className = 'toast';
    t.style.background = colors[type] || colors.info;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 4000);
}

window.logoutAdmin = async (e) => {
    e.preventDefault();
    if (!confirm('هل أنت متأكد من تسجيل الخروج؟')) return;
    await sb.auth.signOut();
    localStorage.clear();
    window.location.href = 'index.html';
};

async function checkAdmin() {
    try {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) { window.location.href = 'admin-login.html'; return null; }
        const { data: admin } = await sb.from('admins').select('*').eq('user_id', session.user.id).maybeSingle();
        if (!admin) { await sb.auth.signOut(); window.location.href = 'admin-login.html'; return null; }
        return admin;
    } catch (e) {
        window.location.href = 'admin-login.html';
        return null;
    }
}

async function loadStats() {
    try {
        const [companiesRes, studentsRes] = await Promise.all([
            sb.from('companies').select('status'),
            sb.from('student').select('user_id')
        ]);

        const companies = companiesRes.data || [];
        const students = studentsRes.data || [];

        const total = companies.length;
        const approved = companies.filter(c => c.status === 'approved').length;
        const pending = companies.filter(c => c.status === 'pending').length;

        document.getElementById('totalCompanies').textContent = total;
        document.getElementById('approvedCompanies').textContent = approved;
        document.getElementById('pendingCompaniesCount').textContent = pending;
        document.getElementById('totalStudents').textContent = students.length;

        const badge = document.getElementById('pendingBadge');
        if (pending > 0) { badge.textContent = pending; badge.style.display = 'inline-block'; }
        else { badge.style.display = 'none'; }
    } catch (err) {
        console.error('loadStats:', err);
    }
}

async function loadActivities() {
    try {
        const { data: companies } = await sb.from('companies')
            .select('company_name, email, status, created_at, approved_at, rejected_at')
            .order('created_at', { ascending: false })
            .limit(10);

        const grid = document.getElementById('activityGrid');

        if (!companies || companies.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-chart-line"></i>
                    <h3>لا توجد نشاطات بعد</h3>
                    <p>هتظهر هنا آخر التسجيلات والطلبات</p>
                </div>`;
            return;
        }

        const map = {
            approved: { text: 'تم الاعتماد', icon: 'fa-check-circle', cls: 'approved' },
            rejected: { text: 'تم الرفض', icon: 'fa-times-circle', cls: 'rejected' },
            pending: { text: 'بانتظار المراجعة', icon: 'fa-clock', cls: 'pending' }
        };

        grid.innerHTML = companies.map(c => {
            const info = map[c.status] || { text: 'تسجيل جديد', icon: 'fa-plus-circle', cls: 'new' };
            return `
                <div class="activity-item">
                    <div class="activity-icon ${info.cls}"><i class="fas ${info.icon}"></i></div>
                    <div class="activity-body">
                        <div class="activity-title">${escapeHtml(c.company_name || 'شركة')}</div>
                        <div class="activity-meta">${info.text} - ${escapeHtml(c.email || '')}</div>
                    </div>
                    <div class="activity-time">${formatTime(c.created_at)}</div>
                </div>
            `;
        }).join('');
    } catch (err) {
        console.error('loadActivities:', err);
    }
}

function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    const diff = new Date() - d;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'الآن';
    if (mins < 60) return `منذ ${mins} د`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `منذ ${hrs} س`;
    return d.toLocaleDateString('ar-EG');
}

function updateDate() {
    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('ar-EG', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
}

window.refreshData = async () => {
    showToast('جاري التحديث...', 'info');
    await Promise.all([loadStats(), loadActivities()]);
    updateDate();
    showToast('تم التحديث', 'success');
};

async function init() {
    const admin = await checkAdmin();
    if (!admin) return;
    updateDate();
    await Promise.all([loadStats(), loadActivities()]);
    document.getElementById('loadingOverlay').classList.add('hidden');
}

document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
